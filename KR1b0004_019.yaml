body:
  text: 尚書注疏卷十九漢孔氏傳唐陸德明音義孔穎達疏周書文侯之命秦誓費誓序平王錫晉文侯秬鬯圭瓚傳以圭為杓柄謂之圭瓚作文侯之命傳所以名篇幽王為犬戎所殺平王立而東遷洛邑晉文侯迎送安定之故錫命焉音義平王馬本無平字錫星歷反馬本作賜秬音巨鬯勑亮反瓚才但反杓上灼反柄彼病反疏正義曰幽王嬖褒姒廢申后逐太子宜臼宜臼奔申申侯與犬戎既殺幽王晉文侯與鄭武公迎宜臼立之是為平王遷於東都平王乃以文侯為方伯賜其秬鬯之酒以圭瓚副焉作䇿書命之史録其䇿書作文侯之命傳正義曰祭之初酌鬱鬯之酒以灌尸圭瓚者酌鬱鬯之杓杓下有槃瓚即槃之名也是以圭為杓之柄故謂之圭瓚周禮典瑞云祼圭有瓚以肆先王以祼賔客鄭司農云於圭頭為器可以挹鬯祼祭謂之瓚以肆先王灌先王祭也鄭玄云肆解牲體以祭因以為名爵行曰祼漢禮瓚槃大五升口徑八寸下有槃口徑一尺詩云瑟彼玉瓚黃流在中毛傳云玉瓚圭瓚也黃金所以飾流鬯也鄭云黃流秬鬯也圭瓚之狀以圭為柄黃金為勺青金為外朱中央是説圭瓚之形狀也禮無明文而知其然者祭統云君執圭瓚祼尸大宗執璋瓚亞祼鄭云圭瓚璋瓚祼器也以圭璋為柄酌鬱鬯曰祼然則圭瓚璋瓚惟柄以圭璋為異其瓚形則同考工記玉人云祼圭尺有二寸有瓚以祀廟大璋中璋九寸邊璋七寸厚寸黃金勺靑金外朱中鼻寸鄭云鼻勺流也凡流皆為龍口也三璋之勺形如圭瓚是鄭以璋形如此知圭瓚亦然毛傳又云九命然後錫以秬鬯圭瓚則晉文侯於時九命為東西大伯故得受此賜也秬鬯從經為傳故此惟解圭瓚周本紀云幽王嬖褒姒褒姒生子伯服幽王廢申后並去太子用褒姒為后伯服為太子申侯怒乃與西夷犬戎共攻殺幽王於是諸侯乃與申侯共立太子宜臼是為平王東徙於洛邑避戎寇隱六年左傳周桓公言於王曰我周之東遷晉鄭焉依鄭語云晉文侯於是乎定天子是迎送安定之故平王錫命焉文侯之命傳平王命為侯伯疏傳正義曰伯長也諸侯之長謂之伯也僖元年左傳云凡侯伯救患分災討罪禮也是謂諸侯之長為侯伯王肅云幽王既滅平王東遷晉文侯鄭武公夾輔王室晉為大國功重故平王命為侯伯王若曰父義和傳順其功而命之文侯同姓故稱曰父義和字也稱父者非一人故以字别之丕顯文武克慎明德傳大明乎文王武王之道能詳慎顯用有德昭升于上敷聞在下惟時上帝集厥命于文王傳更述文王所以王也言文王聖德明升于天而布聞在下民惟以是故上天集成其王命德流子孫亦惟先正克左右昭事厥辟傳言君既聖明亦惟先正官賢臣能左右明事其君所以然越小大謀猷罔不率從肆先祖懷在位傳文王君聖臣良於小大所謀道德天下無不循從其化故我後世先祖歸在王位音義義和馬云能以義和諸侯義本亦作誼别彼列反聞音問王于況反辟必亦反疏正義曰平王順文侯之功親之敬而呼其字曰父義和既呼其字乃告以上世之事大明乎文王武王之道能詳慎顯用冇德之人以為大臣文王之為王也聖德明升於天言其道至天也又布聞於在下言其德被民也惟以是故上天成其大命於文王使之身為天子澤流後世文武聖明如此亦惟先世長官之臣能左右明事其君君聖臣賢之故於小大所謀道德天下無有不循從其化故我之先祖文武之後諸王皆得歸在王位言先世聖王得賢臣之力將説已無賢臣故言此也傳正義曰覲禮説天子呼諸侯之義同姓大國則曰伯父其異姓則曰伯舅同姓小國則曰叔父其異姓則曰叔舅鄭玄禮注云稱之以父與舅親親之辭晉文侯唐叔之後與王同姓故稱曰父曲禮天子謂二伯為伯父伯舅計文侯為侯伯天子當呼為伯父此不云伯而直稱父者尤親之也左傳以文侯名仇今呼曰義和知是字也天子於同姓諸侯皆呼為父稱父者非一人若不稱其字無以知是文侯故以字别之鄭玄讀義為儀儀仇皆訓匹也故名仇字儀古人名字不可皆令相配不必然也後世先祖謂文武之後在今王之先祖成康以至宣幽皆是也懷歸也歸在王位者王位是其所有也若歸向家然故稱歸也嗚呼閔豫小子嗣造天丕愆傳歎而自痛傷也言我小子而遭天大罪過父死國敗祖業隤隕殄資澤于下民侵戎我國家純傳言周邦喪亂絶其資用惠澤於下民侵兵傷我國及卿大夫之家禍甚大即我御事罔或耆夀俊在厥服豫則罔克傳所以遇禍即我治事之臣無有耆宿夀考俊德在其服位我則材劣無能之致音義豫如字又音與愆去虔反隤杜回反隕于敏反殄大見反疏正義曰王又歎而自傷嗚呼疲病者是我小子繼嗣先王之位遭天大罪過於我周家父死國敗傾覆祖業致使周邦喪亂絶其資用惠澤於下民言下民資用盡致使前王澤竭也西夷犬戎侵兵傷我國及卿大夫之家其禍亦甚大也所以遇此禍者即我治事之臣無有耆宿夀考俊德之人在其服位我則材弱無能之致自恨已弱不能致得賢臣恐又不能自立也傳正義曰此經所言追敘幽王滅事民不自治立君以養之民之資用是王者佑助以得之言周邦喪亂不能撫佑下民絶其資用惠澤於下民也幽王之滅由夷狄交侵兵傷我國及卿大夫之家其禍甚大諸言國家者皆謂國為國家傳意欲見君臣俱被其害故以家為卿大夫之家王肅云遭天之大愆謂幽王為犬戎所殺殄絶其先祖之澤於下民侵犯兵寇傷我國家甚大謂犬戎也此經亦是追敘往事言幽王所以遇禍者即我周家治事之臣無有耆宿夀考俊德之人在其服位致使有犬戎之禍亦是我材劣無能之致幽王之時平王被逐在外國之興亡非平王所知言我無能之致者引過歸已自懼將來復然故下句思得賢臣曰惟祖惟父其伊恤朕躬嗚呼有績豫一人永綏在位傳王曰同姓諸侯在我惟祖惟父列者其惟當憂念我身嗚呼能有成功則我一人長安在王位言恃諸侯父義和汝克紹乃顯祖傳重稱字親之不稱名尊之言汝能明汝顯祖唐叔之道奬之汝肇刑文武用會紹乃辟追孝于前文人傳言汝今始法文武之道矣當用是道合會繼汝君以善使追孝於前文德之人汝君平王自謂也繼先祖之志為孝汝多修扞我于艱若汝豫嘉傳戰功曰多言汝之功多甚修矣乃扞我於艱難謂救周誅犬戎汝功我所善之音義辟扶亦反扞下旦反注同疏正義曰王又言我以無能之致私為言曰同姓諸侯惟我祖之列者惟我父之列者其惟當憂念我身又自傷歎嗚呼此諸侯等若有能助我有功則我一人長安在王位言已無能惟恃賴諸侯也又呼文侯字曰父義和汝能明汝顯祖唐叔之道汝始法文武之道用是道會合繼汝君以善追孝於前世文德之人救周之國汝功為多甚修矣乃能扞蔽我於艱難謂救周誅犬戎也如汝之功是我所善陳其前功以勸勉之也傳正義曰文侯是同姓諸侯王言已未得文侯之時常望同姓助已王私為言曰同姓諸侯在我惟祖惟父列者惟當憂念我身伊訓惟也望得同姓之間有憂已者以思謂未得更歎而為言嗚呼同姓諸侯若有能助我有功則我一人長得安在王位言已恃賴諸侯思得其人在後果得文侯告文侯以此言言已思文侯之功天子之於諸侯常稱父舅而已既呼其父又稱其字所以别他人也初則别於他人重則可以已矣重稱其字者親之也禮君父之前曰名朋友之交曰字是名重於字也輕前人則斥其名尊前人則避其重故不稱其名尊之也不於上文作傳於此言尊之者就此親之並解之也昭乃顯祖不知所斥以晉之上世有功名者惟有唐叔耳故知明汝顯祖唐叔之道所以勸奬之令其繼唐叔之業也以其初有大功終當不殞其業故言始法文武之道當用是文武之道合會繼汝君以善令以功德佐汝君使汝君繼前世追行孝道於前世文德之人汝君者平王自謂也先祖之志在於平定天下故子孫繼父祖之志為孝也戰功曰多者周禮司勳文又云王功曰勳國功曰功民功曰庸事功曰勞治功曰力戰功曰多彼有此六功也言功多殊於他人故云汝之功多甚修矣言其功修整美其功之善也文侯之功在於誅犬戎立平王言乃扞蔽我於艱難知謂救周誅犬戎也若訓如也如汝之功我所善也王肅云云如汝之功我所嘉也王曰父義和其歸視爾師寧爾邦傳遣令還晉國其歸視汝衆安汝國內上下用賚爾秬鬯一卣傳黑黍曰秬釀以鬯草不言圭瓚可知卣中樽也當以錫命告其始祖故賜鬯彤弓一彤矢百盧弓一盧矢百傳彤赤盧黑也諸侯有大功賜弓矢然後專征伐彤弓以講德習射藏示子孫馬四匹傳馬供武用四匹曰乘侯伯之賜無常以功大小為度父往哉柔逺能邇惠康小民無荒寧傳父往歸國哉懷柔逺人必以文德能柔逺者必能柔近然後國安安小人之道必以順無荒廢人事而自安簡恤爾都用成爾顯德傳當簡核汝所任憂治汝都鄙之人人和政治則汝顯用有德之功成矣不言鄙由近以及逺音義令力呈反賚力代反卣音酉又音由釀女亮反彤徒冬反供音恭核户革反治直吏反疏正義曰王既陳其功乃賚賜之王曰父義和其當歸汝晉國視汝衆民安汝國內上下川賜汝秬鬯之酒一卣樽歸以告祭汝之始祖又賜汝彤弓一彤矢百玈弓一玈矢百馬四匹父往歸國哉必以文德安彼逺人欲安逺必能安近是逺近乃得安耳當以順道安汝之小民無得荒廢人事以自安逸簡核汝所任之臣憂治汝都鄙之人民用成汝顯明之德戒使歸國善治民也傳正義曰釋草云秬黑黍李巡曰黑黍一名秬周禮鬱人掌和鬱鬯以實彞而陳之鄭云鬱鬱金香草也築鬱金煮之以和鬯酒鄭衆云鬱為草若蘭又有鬯人掌共秬鬯鄭玄云鬯釀秬為酒芬香調暢於上下也如彼鄭説釀黑黍之米為酒築鬱金之草煮以和之此傳言釀以鬯草似用鬯草合釀不同者終是以鬯和黍米之酒或先或後言之耳詩美宣王賜召穆公云釐爾圭瓚秬鬯一卣告于文人知賜秬鬯者必以圭瓚副焉此不言圭瓚明並賜之可知也卣中尊也釋器文孫炎云樽彛為上罍為下卣居中郭璞云在罍彛之間即犧象壺著大山等六尊是也周禮司尊彛云春祠夏禴祼用雞彛鳥彛秋嘗冬蒸祼用斝彝黃彝則祭時實鬯酒於彛此用卣者未祭則盛於卣及祭則實於彛此初賜未祭故盛以卣也詩稱告於文人毛傳云文人文德之人也鄭玄云王賜召虎以鬯酒一尊使以祭其宗廟告其先祖諸有德美見記也然則得秬鬯之賜當遍告宗廟此傳惟言告始祖者舉祖之尊者言之耳彤字從丹玈字從玄故彤赤玈黑也是諸侯有大功賜弓矢然後專征伐禮記王制文也周禮司弓矢掌六弓其名王􅋃夾庾唐大鄭玄云六者弓異體之名也往體寡來體多曰王􅋃往體多來體寡曰夾庾往體來體若一曰唐大經又云唐弓大弓以授學射者使者勞者鄭云學射者弓用中後習強弱則易也使者勞者弓亦用中逺近可也勞者勤勞王事若晉文侯受弓矢之賜者鄭玄以此彤弓玈弓為周禮唐弓大弓唐大是弓強弱之名彤玈是弓赤黑之色孔意亦當然也此傳及毛傳皆云彤弓以講德習射用周禮為説也唐弓大弓以授學射者是習射也授使者勞者是講德也講論知其有德乃賜之耳襄八年左傳云晉范宣子來聘季武子賦彤弓宣子曰城濮之役我先君文公受彤弓於襄王以為子孫藏杜預云藏之以示子孫六畜特以馬賜之者為馬供武用故也周禮校人云乘馬一師四圉圉養一馬是四匹曰乘乘車必駕四馬故也司勳云凡賞無常輕重視功是侯伯之賜無常以功大小為度論語云逺人不服則修文德以來之是懷柔逺人必以文德也能柔逺者必能柔近逺近俱安然後國安惠順也康安也言順安小民者安小民之道必以順道安之故言順安也順者順小民之心為其政也論語云因民之所利而利之是順安也簡恤者共有爾都之文當簡核汝都內善人而任之令以德憂治汝都鄙之人人和政治則汝顯用有德之功成矣言用賢之名既成國君之治亦成也鄭云都國都也鄙邊邑也言都不言鄙由近以及逺也序魯侯伯禽宅曲阜傳始封之國居曲阜徐夷並興東郊不開傳徐戎淮夷並起為寇於魯故東郊不開作費誓傳魯侯征之於費地而誓衆也諸侯之事而連帝王孔子序書以魯有治戎征討之備秦有悔過自誓之戒足為世法故録以備王事猶詩録商魯之頌音義伯禽魯侯名不開舊讀皆作開馬本作闢費音祕疏正義曰魯侯伯禽於成王即政元年始就封於魯居曲阜之地於時徐州之戎淮浦之夷並起為寇於魯東郊之門不敢開闢魯侯時為方伯率諸侯征之至費地而誓戒士衆史録其誓辭作費誓傳正義曰經稱淮夷徐戊序言徐夷略之也此戎夷在魯之東諸侯之制於郊有門恐其侵逼魯境故東郊之門不開費誓傳費魯東郊之地名疏傳正義曰甘誓牧誓皆至戰地而誓知費非戰地者東郊不開則戎夷去魯近矣此誓令其治兵器具糗糧則是未出魯境故知費是魯東郊地名非戰處也公曰嗟人無譁聽命傳伯禽為方伯監七百里內之諸侯帥之以征歎而勑之使無喧譁欲其靜聽誓命徂兹淮夷徐戎並興傳今往征此淮浦之夷徐州之戎並起為寇此戎夷帝王所羈縻統敘故錯居九州之內秦始皇逐出之善􅙀乃甲胄敿乃干無敢不弔傳言當善簡汝甲鎧胄兜鍪施汝楯紛無敢不令至攻堅使可用備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善傳備汝弓矢弓調矢利鍛鍊戈矛磨礪鋒刃皆使無敢不功善音義譁户瓜反監工銜反􅙀了雕反敿居表反弔音的鎧苦代反兜丁侯反鍪音矛楯常準反又音允紛芳云反令力呈反鍛丁亂反礪力世反鍊來見反疏正義曰魯侯將征徐戎召集士衆歎而敕之公曰嗟在軍之人無得喧譁皆靜而聽我誓命今往征此淮浦之夷徐州之戎以其並起為寇故也汝等善簡擇汝之甲胄施汝楯紛無敢不令至攻極堅備汝弓天一弓百矢令弓調矢利鍛錬汝之戈矛磨礪汝之鋒刃無敢不使皆善戒之使善言不善將得罪也傳正義曰禮諸侯不得專征伐惟州牧於當州之內有不順者得專征之於時伯禽為方伯監七百里內之諸侯故得帥之以征戎夷王制云千里之外設方伯以八州八伯是州别立一賢侯以為方伯即周禮大宗伯云八命作牧是也禮記明堂位云封周公於曲阜地方七百里孔意以周之大國不過百里禮記云七百里者監此七百里內之諸侯非以七百里地並封伯禽也下云魯人三郊三遂指言魯人明於時軍內更有諸侯之人故知帥七百里內諸侯之人以之共征也鄭云人謂軍之士衆及費地之民案下句令填塞坑穽必使軍旁之民塞之或當如鄭言也詩美宣王命程伯休父率彼淮浦省此徐土知淮夷是淮浦之夷徐戎是徐州之戎也四海之名東方曰夷西方曰戎謂在九州之外此徐州淮浦中夏之地而得有戎夷者此戎夷帝王之所羈縻而統敘之不以中國之法齊其風俗故得雜錯居九州之內此伯禽之時有淮浦者淮浦之夷並起詩美宣王命召穆公平淮夷則戎夷之處中國久矣漢時內地無戎夷者秦始皇逐出之始皇之崩至孔之初惟可三四十年古老猶在及見其事故孔得親知之也王肅云皆紂時錯居中國經傳不説其事無以知紂時來也世本云杼作甲宋仲子云少康子杼也説文云胄兜鍪也兜鍪首鎧也經典皆言甲胄秦世已來始有鎧兜鍪之文古之作甲用皮秦漢以來用鐵鎧鍪二字皆從金蓋用鐵為之而因以作名也甲胄為有善有惡故令􅙀簡取其善者鄭云􅙀謂穿徹之謂甲繩有斷絶當使􅙀理穿治之干是楯也敿乃干必施功於楯但楯無施功之處惟繫紛於楯故以為施汝楯紛紛如綬而小繫於楯以持之其以為飾鄭云敿猶繫也王肅云敿楯當有紛繫持之是相傳為此説也弔訓至也無敢不令至極攻堅使可用鄭云至猶善也備訓具也每弓百矢弓十矢千使其數備足令弓調矢利案毛傳云五十矢為束或臨戰用五十矢為束凡金為兵器皆須鍛礪有刃之兵非獨戈矛而已云鍛鍊戈矛磨礪鋒刃令其文互相通稱諸侯兵器皆使無敢不功善令皆利快也今惟淫舍牿牛馬傳今軍人惟大放舍牿牢之牛馬言軍所在必放牧也杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑傳擭捕獸機檻當杜塞之穽穿地陷獸當以土窒敜之無敢令傷所放牿牢之牛馬牛馬之傷汝則有殘人畜之常刑音義牿工毒反杜本又作􅖏擭華化反徐户覆反敜徐乃協反又乃結反穽在性反檻户減反窒珍栗反畜許六反又丑六反疏正義曰此戒軍旁之民也今軍人惟欲大放舍牿牢之牛馬令牧於野澤杜汝捕獸之擭塞汝陷獸之穽無敢令傷所放牿牢之牛馬牛馬之傷汝則有殘害人畜之常刑傳正義曰淫訓大也周禮充人掌繫祭祀之牲牷祀五帝則繫於牢芻之三月鄭玄云牢閉也校人掌王馬之政天子十有二間馬六種然則掌牛馬之處謂之牢間牢間是周衛之名也此言大舍牿牛馬則是出之牢間牧於野澤令其逐草而牧之故謂此牢間之牛馬為牿牛馬而知牿即間牢之謂也故言大放舍牿牢之牛馬言軍人所在必須放牧此告軍旁之民也既言牛馬在牿遂以牿為牛馬之名下云無敢傷牿謂傷牛馬牿之傷謂牛馬傷也鄭玄以牿為桎牿之牿施牿於牛馬之腳使不得走失周禮冥氏掌為阱擭以攻猛獸知穽擭皆是捕獸之器也檻以捕虎豹穿地為深坑又設機於上防其躍而出也穽以捕小獸穿地為深坑入必不能出其上不設機也穽以穿地為名擭以得獸為名擭亦設於穽中但穽不設機為異耳杜塞之窒敜之皆閉塞之義使之填坑廢機無敢令傷所放牿牢之牛馬牛馬之傷汝則有殘人畜之常刑今律文施機槍作坑穽者杖一百傷人之畜産者償所減價王肅云杜閉也擭所以捕禽獸機檻之屬敜塞也穽穿地為之所以陷墮之恐害牧牛馬故使閉塞之鄭玄云山林之田春始穿地為穽或設擭其中以遮獸擭作鍔也馬牛其風臣妾逋逃勿敢越逐傳馬牛其有風佚臣妾逋亡勿敢棄越壘伍而求逐之役人賤者男曰臣女曰妾祇復之我商賚汝傳衆人其有得佚馬牛逃臣妾皆敬還復之我則商度汝功賜與汝乃越逐不復汝則有常刑傳越逐為失伍不還為攘盜汝則有此常刑無敢寇攘踰垣牆傳軍人無敢暴劫人踰越人垣牆物有自來者無敢取之竊馬牛誘臣妾汝則有常刑傳軍人盜竊馬牛誘偷奴婢汝則有犯軍令之常刑甲戌我惟征徐戎傳誓後甲戌之日我惟征之峙乃糗糧無敢不逮汝則有大刑傳皆當儲峙汝糗糒之糧使足食無敢不相逮及汝則有乏軍興之死刑魯人三郊三遂峙乃楨幹甲戌我惟築傳總諸侯之兵而但稱魯人峙具楨幹道近也題曰楨旁曰幹言三郊三遂明東郊距守不峙甲戌日當築攻敵壘距堙之屬無敢不供汝則有無餘刑非殺傳峙具楨幹無敢不供不供汝則有無餘之刑刑者非一也然亦非殺汝魯人三郊三遂峙乃芻茭無敢不多汝則有大刑傳郊遂多積芻茭供軍牛馬不多汝則亦有乏軍興之大刑音義逋布吳反佚音逸商如字徐音章賚力代反徐音來度待洛反攘如羊反垣音袁峙直里反爾雅云具也糗去九反一音昌紹反糧音良糒音備楨徐音貞幹工翰反築陟六反守手又反堙音因供音恭芻初俱反茭音交疏正義曰馬牛其有放佚臣妾其有逋逃汝無敢棄越壘伍而逺求逐之其有得佚馬牛逃臣妾皆敬還復之歸於本主我則商度汝功賞賜汝汝若棄越壘伍逺求逐馬牛臣妾及有得馬牛臣妾不肯敬還復歸本主者汝則有常刑傳正義曰僖四年左傳云惟是風馬牛不相及也賈逵云風放也牝牡相誘謂之風然則馬牛風佚因牝牡相逐而遂至放佚逺去也逋亦逃也軍士在軍當各守部署止則有壘壁行則有隊伍勿敢棄越壘伍而逺求逐之周禮大宰以九職任萬民八曰臣妾聚斂疏材僖十七年左傳云晉惠公之妻梁嬴孕過期卜招父與其子卜之其子曰將生一男一女招曰然男為人臣女為人妾是役人賤者男曰臣女曰妾也古人或以婦女從軍故云臣妾逋逃也峙具也預貯未粟謂之儲峙鄭衆云糗熬大豆及米也説文云糗熬米麥也鄭玄云糗搗熬榖也謂熬米麥使熟又搗之以為粉也糒乾飯也糗糒是行軍之糧皆當儲峙汝糗糒之糧使在軍足食無敢不相逮及謂糧儲少不及衆人汝則有乏軍興之死刑興軍征伐而有乏少謂之乏軍興今律乏軍興者斬指言魯人明更有他國之人總諸侯之兵而但謂魯人峙具楨幹為道近故也峙具楨幹以擬築之用題曰楨謂當牆兩端者也旁曰幹謂在牆兩邊者也釋詁云楨幹也舍人曰楨正也築牆所立兩木也幹所以當牆兩邊障土者三郊三遂謂魯人三軍周禮司徒萬二千五百家為鄉司馬法萬二千五百人為軍小司徒云凡起徒役無過家一人是家出一人一鄉為一軍天子六軍出自六鄉則諸侯大國三軍亦當出自三鄉也周禮又云萬二千五百人為遂遂人職云以嵗時精其人民簡其兵器以起征役則六遂亦當出六軍鄉為正遂為副耳鄭衆云六遂之地在王國百里之外然則王國百里為郊鄉在郊內遂在郊外釋地云邑外謂之郊孫炎曰邑國都也設百里之國去國十里為郊則諸侯之制亦當鄉在郊內遂在郊外此言三郊三遂者三郊謂三鄉也蓋使三鄉之民分在四郊之內三遂之民分在四郊之外鄉近於郊故以郊言之鄉遂之民分在國之四靣當有四郊四遂惟言三郊三遂者明東郊令留守不令峙楨幹也上云甲戌我惟征徐戎此云甲戌我惟築期以至日即築當築攻敵之壘距堙之屬兵法攻城築土為山以窺望城內謂之距堙襄六年左傳云晏弱城東陽而遂圍萊甲寅堙之環城傅於堞杜預云堞女墻也堙土山也周城為土山及女牆宣十五年公羊傳楚子圍宋使司馬子反乘堙而窺宋城宋華元亦乘堙而出見之何休云堙距堙上城具也是攻敵城壘必有距堙知築者築距堙之屬也上云無敢不逮此云無敢不供下云無敢不多文異者糗糧難備不得偏少故云無敢不逮楨幹易得惟恐闕事故云不敢不供芻茭賤物惟多為善故云無敢不多量事而為文也不供汝則有無餘之刑者言刑者非一謂合家盡刑之王肅云汝則有無餘刑父母妻子同産皆坐之無遺免之者故謂無餘之刑然入於罪隸亦不殺之鄭玄云無餘刑非殺者謂盡奴其妻子不遺其種類在軍使給厮役反則入於罪隸舂稿不殺之周禮司厲云其奴男子入於罪隸女子入於舂稿鄭玄云奴從坐而沒入縣官者男女同名鄭衆云輸於罪隸舂人稿人之官也然不供楨幹雖是大罪未應緣坐盡及家人蓋亦權以脅之使勿犯耳芻茭鄭云茭乾芻也序秦穆公伐鄭傳遣三帥帥師往伐之晉襄公帥師敗諸崤傳崤晉要塞也以其不假道伐而敗之囚其三帥還歸作秦誓傳晉舍三帥還歸秦穆公悔過作誓音義秦穆公伐鄭事見魯僖公三十三年三帥色類反下注同謂孟明視西乞術白乙丙崤户交反塞悉代反假工下反疏正義曰秦穆公使孟明視西乞術白乙丙三帥帥師伐鄭未至鄭而還晉襄公帥師敗之於崤山囚其三帥後晉舍三帥得還歸於秦秦穆公自悔已過誓戒羣臣史録其誓辭作秦誓傳正義曰左傳僖三十年晉文公與秦穆公圍鄭鄭使燭之武説秦伯秦伯竊與鄭人盟使杞子逢孫揚孫戍之乃還三十二年杞子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔蹇叔曰不可公辭焉召孟明西乞白乙使出師伐鄭是遣三帥帥師往伐之事也序言穆公伐鄭嫌似穆公親行故辨之耳杜預云殽在𢎞農澠池縣西築城守道謂之塞言其要塞盜賊之路也崤山險厄是晉之要道關塞也從秦嚮鄭路經晉之南境於南河之南崤關而東適鄭禮征伐朝聘過人之國必遣使假道晉以秦不假道故伐之左傳僖三十二年晉文公卒三十三年秦師及滑鄭商人弦髙將市於周遇之矯鄭伯之命以牛十二犒師孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還晉先軫請伐秦師襄公在喪墨縗絰夏四月敗秦師于殽獲百里孟明視西乞術白乙丙以歸是襄公親自帥師伐而敗之囚其三帥也春秋之例君將不言帥師舉其重者此言襄公帥師依實為文非彼例也又春秋經書此事云晉人及薑戎敗秦師于殽實是晉侯而書晉人者杜預云晉侯諱背喪用兵通以賤者告也是言晉人告魯不言晉侯親行而云大夫將兵大夫賤不合書名氏故稱人也直言敗秦師于殽不言秦之將帥之名亦諱背喪用兵故告辭略也左傳又稱晉文公之夫人文嬴秦女也請三帥曰彼實構吾二君寡君若得而食之不厭君何辱討焉使歸就戮于秦以逞寡君之志若何公許之秦伯素服郊次嚮師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也是晉舍三帥而得還秦穆公於是悔過作誓序言還歸謂三帥還也嫌穆公身還故辨之公羊傳説此事云匹馬隻輪無反者左傳稱秦伯嚮師而哭則師亦少有還者秦誓傳貪鄭取敗悔而自誓公曰嗟我士聽無譁傳誓其羣臣通稱士也豫誓告汝羣言之首傳衆言之本要古人有言曰民訖自若是多盤傳言民之行已盡用順道是多樂稱古人言悔前不順忠臣責人斯無難惟受責俾如流是惟艱哉傳人之有非以義責之此無難也若已有非惟受人責即改之如水流下是惟艱哉我心之憂日月逾邁若弗云來傳言我心之憂欲改過自新如日月並行過如不復云來雖欲改悔恐死及之無所益音義樂音洛俾必爾反下同復扶又反疏正義曰穆公自悔伐鄭乃集羣臣而告之公曰咨嗟我之朝廷之士聽我告於汝無得喧譁我誓告汝衆言之首誥汝以言中之最要者古人有言曰民之行己盡用順道是多樂言順善事則身大樂也見他有非理以義責之此無難也惟已有非理受人之責即能改之使如水之流下此事是惟難哉言己已往之前不受人言故自悔也今我心憂欲自改過自新但日月益為疾行如似不復云來恐已老死不得改過也傳正義曰士者男子之大號故羣臣通稱之鄭云誓其羣臣下及萬民獨云士者舉中言之訖盡也自用若順盤樂也盡用順道則有福有福則身樂故云是多樂也稱古人言者悔前不用古人之言不順忠臣之謀故也昔漢明帝問東平王劉蒼云在家何者為樂對曰為善最樂是其用順道則多樂逾益邁行也員即云也言日月益為疾行並皆過去如似不復云來畏其去而不復來夜而不復明言已年老前途稍近雖欲改悔恐死及之不得修改身無所益也王肅云年已衰老恐命將終日月遂往若不云來將不復見日月雖欲改過無所及益自恨改過遲晚深自咎責之辭惟古之謀人則曰未就豫忌傳惟為我執古義之謀人謂忠賢蹇叔等也財曰未成我所欲反忌之耳惟今之謀人姑將以為親傳惟指今事為我所謀之人我且將以為親而用之悔前違古從今以取破敗音義為于偽反下為我謀同疏正義曰此穆公自説已之前過我欲伐鄭之時羣臣共為謀計惟為我執古義之謀人我則曰未成我之所欲反猜忌之惟指今事為我所謀之人我且將以為親已而用之悔前違古從今自取破敗也其古之謀人當謂忠賢之臣若蹇叔之等今之謀人勸穆公使伐鄭者蓋謂杞子之類國內亦當有此人雖則云然尚猷詢兹黃髮則罔所愆傳言前雖則有云然之過今我庶幾以道謀此黃髮賢老則行事無所過矣番番良士旅力既愆我尚有之傳勇武番番之良士雖衆力已過老我今庶幾欲有此人而用之仡仡勇夫射御不違我尚不欲傳仡仡壯勇之夫雖射御不違我庶幾不欲用自悔之至音義番音波仡許訖反又魚乞反馬本作訖訖無所省録之貌徐云強狀射神夜反疏正義曰言我前事雖則有云然之過我今庶幾以道謀此黃髮賢者受用其言則行事無所過也番番然勇武之善士雖衆力既過老而謀計深長我庶幾欲有此人而用之仡仡然壯勇之夫雖射御不有違失而智慮淺近我庶幾不欲用之自悔往前用勇壯之計失也惟截截善諞言俾君子易辭我皇多有之昧昧我思之傳惟察察便巧善為辨佞之言使君子回心易辭我前多有之以我昧昧思之不明故也如有一介臣斷斷猗無他伎其心休休焉其如有容傳如有束修一介臣斷斷猗然專一之臣雖無他伎藝其心休休焉樂善其如是則能有所容言將任之音義截才節反馬云辭語截削省要也諞音辨徐敷連反又甫淺反馬本作偏云少也辭約損明大辨佞之人易羊石反昧音妹介音界馬本作介云一介耿介一心端慤者字又作個音工佐反斷丁亂反又音短猗於綺反又於宜反伎其綺反本亦作技他本亦作它吐何反樂音洛疏正義曰惟察察然便巧善為辨佞之言能使君子回心易辭我前大多有之昧昧然我思之不明故也如有一心耿介之臣斷斷守善猗然獨無他伎藝而其心樂善休休焉其如是則能有所含容如此者我將任用之悔前用巧佞之人今將任寬容善士也傳正義曰截截猶察察明辨便巧之善諞猶辨也由其便巧善為辨佞之言使君子聽之回心易辭皇訓大也我前大多有之謂杞子之等及在國從已之人以我昧昧而暗思之不明故有此輩在我側也孔注論語以束修為束帶修飾此亦當然一介謂一心耿介斷斷守善之貌休休好善之意如有束帶修飾一心耿介斷斷然守善猗然專一之臣雖復無他伎藝休休焉好樂善道其心行如是則能有所含容言得此人將任用之猗者足句之辭不為義也禮記大學引此作斷斷兮猗是兮之類詩云河水清且漣猗是也王肅云一介耿介一心端慤斷斷守善之貌無他技能徒守善而已休休好善之貌其如是人能有所容忍小過寬則得衆穆公疾技巧多端故思斷斷無他技者人之有技若已有之人之彥聖其心好之不啻如自其口出是能容之傳人之有技若已有之樂善之至也人之美聖其心好之不啻如自其口出心好之至也是人必能容之以保我子孫黎民亦職有利哉傳用此好技聖之人安我子孫衆人亦主有利哉言能興國音義好呼報反啻始豉反疏正義曰此説大賢之行也大賢之人見人之有技如似已自有之見人之冇美善通聖者其心愛好之不啻如自其口出愛彼美聖口必稱揚而薦達之其心愛之又甚於口言其愛之至也是人於民必能含容之用此愛好技聖之人安我子孫衆民則我子孫衆民亦主有利益哉言其能興邦也人之有技冒疾以惡之人之彥聖而違之俾不達傳見人之有技藝蔽冒疾害以惡之人之美聖而違背壅塞之使不得上通是不能容以不能保我子孫黎民亦曰殆哉傳冒疾之人是不能容人用之不能安我子孫衆人亦曰危殆哉音義冒莫報反注同惡烏路反背音佩壅於勇反塞先得反殆唐在反疏正義曰此説大佞之行也大佞之人見人之有技蔽冒疾害以惡之見人之有美善通聖者而違背壅塞之使不達於在上是人之不能含容人也用此疾惡技聖之人不能安我子孫衆民則我子孫衆民亦曰危殆哉言其必亂邦也傳正義曰傳以冒為覆冒之冒謂蔽障掩蓋之也疾謂疾惡之謂憎疾患害之也見人之美善通聖而違背之不從其言壅塞之使不得上通皆是佞人害賢之行也邦之杌隉曰由一人傳杌隉不安言危也一人所任用國之傾危曰由所任不用賢邦之榮懷亦尚一人之慶傳國之光榮為民所歸亦庶幾其所任用賢之善也穆公陳戒背賢則危用賢則榮自誓改前過之意音義杌五骨反隉五結反徐語折反疏正義曰既言賢佞行異又言用之安否邦之杌隉危而不安曰由所任一人之不賢也邦之光榮為民所歸亦庶幾所任一人之冇慶也言國家用賢則榮背賢則危穆公自誓將改前過用賢人者也尚書注疏卷十九尚書注疏卷十九考證文侯之命序疏監本誤刻於標目之下今移正文侯之命胡安國曰詩降于黍離書止於文侯之命於是春秋作矣王若曰父義和傳義和字也疏左傳以文侯名仇臣召南按文侯唐叔之九世孫穆侯之子也左傳曰穆侯之夫人薑氏以條之役生太子命之曰仇即文侯也又按史記十二諸侯年表文侯十年周幽王為犬戎所殺十一年平王東遷洛邑然則此篇其作於平王元年乎費誓序傳諸侯之事而連帝王臣召南按傳言孔子序書以魯有治戎征討之備秦有悔過自誓之戒足為世法故録以備王事猶詩録商魯之頌其義正大光明故吕祖謙深取其説而譏後儒議論皆以私意窺聖人也費誓傳費魯東郊之地名臣召南按費去魯尚逺不得即言東郊當是魯公帥諸侯之師至費地將戰而誓軍士非戰於魯國近郊也孔傳因書序有東郊不開之文遂誤以費地為東郊耳蘇軾謂費在東海郡非魯東郊乃當時治兵於費所見甚卓甘誓牧誓費誓皆以所戰之地為誓名也徂兹蘇軾謂猶言往者王充耘曰當從孔傳解作往征魯人三郊三遂蘇軾曰言魯人以别之知當時有諸侯之師也楨幹芻茭皆重物故獨使魯人供之秦誓序還歸作秦誓蔡沈曰以經文考之繆公之悔蓋悔用杞子之謀不聽蹇叔之言也序亦不明此意金履祥曰秦晉交兵之故具見左傳而不言作誓之事書序誤云敗崤還歸之作惟史記載誓辭於取王官及郊封崤尸之後穆公亦自是不復東征矣臣召南按謂誓作於崤敗時自書序後諸儒並守其説然以春秋證之穆公雖素服郊次嚮師而哭自此兵連禍結曽無改悔之心則史記謂此誓作於取王官之後可信也金履祥説雖新實確可以補孔疏所不及疏襄公在喪墨縗絰絰監本訛經今改正番番良士王十朋曰番番與申伯番番同旅力既愆傳衆力陳師凱曰張氏謂衆力如目力耳力手足之力既愆已皆不及人也仡仡勇夫蔡沈曰良士謂蹇叔勇夫謂三帥諞言謂杞子也如有一介臣蘇軾曰至哉穆公之論此二人也前一人似房元齡後一人似李林甫後之人主監此足矣尚書注疏卷十九考證
