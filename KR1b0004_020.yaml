body:
  text: 侍讀臣召南謹言按孔子序書斷自唐堯下訖襄王之世歷年一千七百三十有四得典謨訓誥誓命百篇古帝王繼天出治之大經大法燦然完備以傳學者火於秦復出於漢百篇中蓋存者半逸者半伏生今文二十八篇孔安國古文連伏生書共五十八篇是也五十八篇之在漢世又顯者半晦者半古文上祕府事寢不行今文歐陽大小夏侯三家並立博士是也三家經文又同者半異者半西京劉向合校文字異者七百有餘脫字數十東京蔡雍等考定刻石太學是也自漢及晉之東古文復出及齊梁缺簡稍完然天下行古文者半不行者半古文但傳江左至隋開皇始頒學官是也唐太宗詔孔穎達諸儒撰五經正義於是尚書家之說又廢者半行者半專用孔傳今文三家訓解遂佚不傳論者謂注經最後出者𫝊世最逺書有孔傳猶易有費詩有毛春秋有左禮有小戴不其然乎顧自有正義以來讀書家又信者半疑者半穎達同時有馬嘉運托其疵後時有王元感糾其繆然疑疏不疑傳也至宋信傳者半疑傳者半矣劉敞程子王安石蘇軾諸儒考脫簡訂句讀每離傳以解經然疑傳不疑經也至南宋信經者半疑經者半矣林之竒吕祖謙所著依小序酌傳疏猶不過略短從長其酷信古文恨不見百篇全經者則有鄭樵其力辨古文疑孔傳一書為僞者則有吳棫至元吳澄明郝敬直謂尚書真者半僞者半自伏生二十八篇以外不可為經當留者半刪者半此則不可以不辨者也古文平易淺近較二十八篇之渾渾灝灝噩噩誠絶不相類如較僞太誓白魚赤烏之妄僞百兩篇豐刑原命之誣其純其駮固天地懸隔也且其文變蝌蚪為隸古不無得失其篇本書序以詮次不無後先其說採綴載籍條貫成章不無增減遷就其閲世自漢至晉不列庠序後進通儒伏處巖穴者或隨時補苴緣飾其間遂令虞夏商周之文如出一手雖朱子亦嘗疑之而不能不奉為經者其言道粹然不詭於正其言治犛然足為後代準繩大禹謨精一執中上紹二典府事歌敘後啓箕疇湯誥言降衷恆性仲虺言制事制心千古聖賢學問之淵源功德之根本具在古文不可沒也如必尋瘢索垢則今文以耄年記憶之餘傳誦女子之口音訛字異在所不免据論語孟子有堯命舜命契之辭則堯典有缺文也据左傳范燮苑何忌所引大學𫝊所述則康誥有缺文也酒誥之簡俄空夔曰之文再見康誥首簡乃言作洛梓材終篇全似告君果與孔門𫝊授經文一一符合乎哉月令本自吕覽王制明出漢儒戴記雜採𫝊說猶且尊為禮經獨於古文嘖有煩言非持平之論也且孔𫝊詁經義質辭簡雖有迂曲要非若牟長朱普秦延君輩章句動至數十萬言之繁猥也又非若馬融鄭元輩動据中候璿璣鈐考靈曜諸緯書之竒怪不經也孔疏於制度典章徵引該博隨文剖晰時有折衷如解武成謂簡編斷絶經失其本解無逸謂太甲稱祖未知其然解臯陶謨庶明勵翼無採王鄭二家解泰誓謂文王是追稱非及身改正朔至如据經正史記之違据傳闢䜟書之誕有功聖經實為趙宋諸大儒道之先路縱或曲護孔傳義涉支離善學者棄瑕録瑜取舍各半可矣但記其過而忘其功可乎哉由斯以談即疑傳疑疏亦非持平之論也蔡沈生諸儒之後又親承朱子緒言竭其生平功力以為集𫝊宜毫髮無憾矣後人之論蔡𫝊猶不免於信者半疑者半况孔傳作於前漢孔疏作於唐初者哉孟子曰遊於聖人之門者難為言蓋即解釋聖人之經而其難已如此也國子監本嵗久版字漫漶刓敝亦缺者半完者半别風淮雨三豕渡河每卷訛舛多有今奉敕校刋臣與原詹事臣浩等廣搜舊藏善本對讐是正訂訛補缺為之句讀以付開雕輯為考證如干條附記每卷之末其無他書可据雖明知文有脫誤槩仍舊本志慎也臣謹識
