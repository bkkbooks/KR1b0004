body:
  text: 尚書注疏卷十六漢孔氏傳唐陸德明音義孔頴達疏周書蔡仲之命立政多方序蔡叔既沒傳以罪放而卒王命蔡仲踐諸侯位傳成王也父卒命子罪不相及作蔡仲之命傳冊書命之疏正義曰蔡叔與管叔流言於國謗毁周公周公因之郭鄰至死不赦蔡叔既沒成王命蔡叔之子蔡仲踐諸侯之位封為國君以策書命之史敘其事故作蔡仲之命傳正義曰編書以世先後為次此篇在成王書內知王命蔡仲是成王命之也蔡叔之沒不知何年其命蔡仲未必初卒即命以其繼父命子故繫之蔡叔之後也蔡叔有罪而命蔡仲者父卒命子罪不相及也昭二十年左傳曰父子兄弟罪不相及其言罪不相及謂蔡仲不坐父爾若父有大罪罪當絶滅正可别封他國不得仍取蔡名以蔡叔為始祖也蔡叔身尚不死明其罪輕不立管叔之後者蓋罪重無子或有而不賢故也蔡仲之命傳蔡國名仲字因以名篇惟周公位冡宰正百工傳百官總已以聽冡宰謂武王崩時羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘傳致辟謂誅殺囚謂制其出入郭鄰中國之外地名從車七乘言少管蔡國名降霍叔于庶人三年不齒傳罪輕故退為庶人三年之後乃齒録封為霍侯子孫為晉所滅蔡仲克庸祗德周公以為卿士傳蔡仲能用敬德稱其賢也明王之法誅父用子言至公周公圻內諸侯二卿治事叔卒乃命諸王邦之蔡傳叔之所封圻內之蔡仲之所封淮汝之間圻內之蔡名已滅故取其名以名新國欲其戒之音義辟婢亦反徐扶亦反乘繩證反從才用反圻巨依反下同疏正義曰惟周公於武王崩後其位為冡宰之卿正百官之治攝王政治天下於時管蔡霍等羣叔流言於國謗毁周公周公乃以王命致法殺管叔於商就殷都殺之囚蔡叔遷之於郭鄰之地惟與之從車七乘降黜霍叔於庶人若今除名為民三年之內不得與兄弟年齒相次蔡叔之子蔡仲能用敬德周公為畿內諸侯得立二卿以蔡仲為己之卿士周公善其為人及蔡叔既卒乃將蔡仲命之於王國之於蔡為諸侯也傳正義曰周禮有掌囚之官鄭云囚拘也主拘繫當刑殺者拘繫之是為制其出入不得輒行郭鄰中國之外地名蓋相傳為然不知在何方舜典云流宥五刑謂流之逺地任其自生此則徙之郭鄰而又囚之管蔡世家云封叔鮮於管封叔度於蔡是管蔡為國名杜預云管在滎陽京縣東北降霍叔于庶人言羣叔流言則霍叔亦流言也而知其罪輕者以其不死不遷直降黜而已明其罪輕也霍叔不監殷民周公惟伐管蔡不言伐霍叔於時霍叔蓋在京邑聞管蔡之語流傳其言謂其實然不與朝廷同心故退之世家云武王已克商平天下封功臣昆弟封叔處於霍則武王已封之矣後黜為庶人奪其爵祿三年之後乃更爵祿蓋復其舊封封為霍侯春秋閔元年晉侯滅霍既子孫得為國君為晉所滅知三年之後復得封也世家惟云封霍不聞其爵傳言霍侯或當有所據而知之周禮冡宰以八則治都鄙馬融云距王城四百里至五百里謂之都鄙鄙邊邑也以封王之子弟在畿內者冡宰又云乃施則于都鄙而建其長立其兩馬鄭皆云立卿兩人是畿內諸侯立二卿定四年左傳說此事云周公舉之以為已卿士是為周公圻內之卿士也世家云周公舉胡以為魯卿士魯國治於是周公言於成王復封之於蔡案魯世家云成王封周公於魯周公不就封留佐成王則周公身不就封安得使胡為卿士馬遷說之謬爾仲之所封淮汝之間左傳有文叔之所封圻內之蔡其事不知所出也世家云蔡叔居上蔡宋仲子云胡徙居新蔡杜預云武王封叔度於汝南上蔡至平侯徙新蔡昭侯徙居九江下蔡檢其地上蔡新蔡皆屬汝南郡去京師太逺叔若封於上蔡不得在圻內也孔言叔封圻內或當有以知之但圻內蔡地不知所在爾王若曰小子胡傳言小子明當受教訓胡仲名順其事而告之惟爾率德改行克愼厥猷傳言汝循祖之德改父之行能愼其道歎其賢肆豫命爾侯于東土往即乃封敬哉傳以汝率德改行之故故我命汝為諸侯於東土往就汝所封之國當修己以敬哉爾尚蓋前人之愆惟忠惟孝傳汝當庶幾修德掩蓋前人之過子能蓋父所以為惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後傳汝乃行善迹用汝身使可蹤跡而法循之能勤無懈怠以垂法子孫世世稱頌乃當我意率乃祖文王之彝訓無若爾考之違王命傳言當循文武之常教以父違命為世戒皇天無親惟德是輔民心無常惟惠之懷傳天之於人無有親疏惟有德者則輔佑之民心於上無有常主惟愛己者則歸之為善不同同歸于治為惡不同同歸于亂傳言人為善為惡各有百端未必正同而治亂所歸不殊宜愼其微爾其戒哉愼厥初惟厥終終以不困不惟厥終終以困窮傳汝其戒治亂之機哉作事云為必愼其初念其終則終用不困窮懋乃攸績睦乃四鄰以蕃王室以和兄弟傳勉汝所立之功親汝四鄰之國以蕃屛王室以和協同姓之邦諸侯之道康濟小民率自中無作聰明亂舊章傳汝為政當安小民之居成小民之業循用大中之道無敢為小聰明作異辨以變亂舊典文章詳乃視聽罔以側言改厥度則豫一人汝嘉傳詳審汝視聽非禮義勿視聽無以邪巧之言易其常度必斷之以義則我一人善汝矣王曰嗚呼小子胡汝往哉無荒棄朕命傳歎而勑之欲其念戒小子胡汝往之國哉無廢棄我命欲其終身奉行後世遵則音義行下孟反封如字徐音甫用反治直吏反懋音茂蕃方元反注同度如字注同斷丁亂反疏正義曰此使之為諸侯於東土爾不知何爵也世家云蔡仲卒子蔡伯荒立卒子宮侯立自此以下遂皆稱侯則蔡仲初封即為侯也蔡伯荒者自稱其字伯非爵也傳正義曰忠施於君孝施於父子能蓋父惟得為孝而亦得為忠者父以不忠獲罪若能改父之行蓋父之愆是為忠臣也序成王東伐淮夷遂踐奄傳成王即政淮夷奄國又叛王親征之遂滅奄而徙之以其數反覆作成王政傳為平淮夷徙奄之政令亡音義踐似淺反馬同大傳云藉也數色角反覆芳服反政如字馬本作征云正疏正義曰周公攝政之初奄與淮夷從管蔡作亂周公征而定之成王即政之初淮夷與奄又叛成王親往征之成王東伐淮夷遂踐滅奄國以其數叛徙奄民作誥命之辭言平淮夷徙奄之政令史敘其事作成王政之篇成訓平也言平此叛逆之民以為王者政令故以成王政為篇名傳正義曰洛誥之篇言周公歸政成王多士已下皆是成王即政初事編篇以先後為次此篇在成王書內知是成王即政淮夷奄國又叛王親征之又案洛誥成王即政始封伯禽伯禽既為魯侯乃居曲阜費誓稱魯侯伯禽宅曲阜淮夷徐戎並興魯侯征之作費誓彼言淮夷並興即此伐淮夷王伐淮夷魯伐徐戎是同時伐明是成王即政之年復重叛也鄭𤣥謂此伐淮夷與踐奄是攝政三年伐管蔡時事其編篇於此即云未聞費誓之篇言淮夷之叛則是重叛明矣多方之篇責殷臣云我惟時其戰要囚之至於再至於三若武王伐紂之後惟攝政三年之一叛正可至於再爾安得至於三乎故知是成王即政又叛也鄭𤣥讀踐為翦翦滅也孔不破字蓋以踐其國即是踐滅之事故孔以踐為滅也下篇序云成王既踐奄將遷其君是滅其奄而徙之以其數反覆故也序成王既踐奄將遷其君於蒲姑傳已滅奄而徙其君及人臣之惡者於蒲姑蒲姑齊地近中國教化之周公告召公作將蒲姑傳言將徙奄新立之君於蒲姑告召公使作冊書告令之亡音義蒲如字徐扶各反馬本作薄近附近之近疏正義曰成王既踐滅奄國將遷其君於蒲姑之地周公告召公使作冊書言將遷奄君於蒲姑之地史敘其事作將蒲姑之篇傳正義曰昭二十年左傳晏子云古人居此地者有蒲姑氏杜預云樂安博昌縣北有蒲姑城是蒲姑為齊地也周公遷殷頑民於成周近京師教化之知今遷奄君臣於蒲姑為近中國教化之必如此言則奄去中國逺於蒲姑杜預云奄闕不知所在鄭云奄蓋在淮夷之地亦未能詳成王先伐淮夷遂滅奄奄似逺於淮夷也禮天子不滅國諸侯有罪則殺其君而擇立次賢者故知所徙者言將徙奄新立之君於蒲姑也上言周公告召公其篇既亡不知告以何事孔以意卜之告召公使為此策書告令之不能知其必然否也序成王歸自奄傳伐奄歸在宗周誥庶邦傳誥以禍福作多方疏正義曰成王歸自伐奄在於宗周鎬京諸侯以王征還皆來朝集周公稱王命以禍福咸告天下諸侯國史敘其事作多方多方傳衆方天下諸侯疏傳正義曰自武王伐紂及成王即政新封建者甚少天下諸侯多是殷之舊國其心未服周家由是奄君重叛今因滅奄新歸故告天下諸侯以興亡之戒欲令其無二心也語雖普告天下意在殷之舊國篇末亦告殷之多士獨言諸侯者舉其尊者以其篇主告殷之諸侯故也惟五月丁亥王來自奄至于宗周傳周公歸政之明年淮夷奄又叛魯征淮夷作費誓王親征奄滅其國五月還至鎬京音義費音祕鎬胡老反疏傳正義曰以洛誥語歸政之事多士之篇次之多士是歸政明年之事故知此篇亦歸政明年之事事猶不明故取費誓為證以成王政之序言成王東伐淮夷費誓之篇言淮夷徐戎並興俱言淮夷明是一事故言魯征淮夷作費誓王親征奄滅其國以明二者為一時之事也上序言成王伐淮夷而此傳言魯征淮夷者當時淮夷徐戎並起為亂魯與二國相近發意欲並征二國故以二國誓衆但成王恐魯不能獨平二國故復親往征之所以成王政之序與費誓之經並言淮夷為此故也傳言五月還至鎬京明此宗周即鎬京也禮記祭統衛孔悝之鼎銘云即宮於宗周彼宗周謂洛邑也是洛邑亦名宗周知此是鎬京者成王以周公歸政之時暫至洛邑還歸處西都鎬京是王常居知至于宗周至鎬京也且此與周官同時事也周官序云還歸在豐經云歸于宗周豐鎬相近即此宗周是鎬京也周公曰王若曰猷告爾四國多方傳周公以王命順大道告四方稱周公以别王自告惟爾殷侯尹民我惟大降爾命爾罔不知傳殷之諸侯正民者我大下汝命謂誅紂也言天下無不知紂暴虐以取亡音義別彼列反疏正義曰周公以成王之意告衆方之諸侯曰我王順大道以告汝四方之國多方諸侯惟爾殷之諸侯正民者我武王大下汝天下民命誅殺虐紂汝諸侯天下之民無有不知紂以暴虐取亡欲令其思念之傳正義曰成王新始即政周公留而輔之周公以王命告令諸侯所告實非王言故加周公曰於王若曰之上以明周公宣成王之意也猷道也周公以王命順大道告四方也既言四國又言多方見四方國多也不直言王曰稱周公以别王自告也王肅云周公攝政稱成王命以告及還政稱王曰嫌自成王辭故加周公以明之然多士之篇王若曰之上不加周公曰者以彼上句云周公初于新邑洛用告知是周公故也諸侯為民之主民所取正故謂之正民民以君為命死生在君天下之命在於一人紂言我大黜下汝之民命正謂武王誅紂也言天下無不知紂以暴虐取亡欲使思念之令其心棄殷而慕周也洪惟圖天之命弗永寅念于祀惟帝降格于夏傳大惟為王謀天之命不長敬念于祭祀謂夏桀惟天下至戒於夏以譴告之謂災異有夏誕厥逸不肯戚言于民傳有夏桀不畏天戒而大其逸豫不肯憂言於民無憂民之言乃大淫昏不克終日勸于帝之迪傳言桀乃大為過昏之行不能終日勸於天之道乃爾攸聞傳言桀之惡乃汝所聞音義譴棄淺反迪徒歷反馬本作攸云所也行下孟反疏正義曰以諸侯心未服周故舉夏殷為戒此章皆說桀亡湯興之事言夏桀大惟居天子之位謀上天之命而不能長敬念于祭祀惟天下至戒於夏桀謂下災異以譴告之兾其見災而懼改修政德而有夏桀不畏天命乃大其逸豫不肯憂言於民惟乃自樂其身無憂民之言夏桀乃復大為淫昏之行不能終竟一日勉於天之道言不能一日行天道也桀之此惡乃是汝之所聞言不虛也傳正義曰上天之命去惡與善凡為民主皆當謀之恐天捨已而去常須敬念祭祀天所譴告謂下災異天不言故下災異以譴告責人主兾自修政也厥圖帝之命不克開于民之麗傳桀其謀天之命不能開於民所施政教麗施也言昏昧乃大降罰崇亂有夏因甲于內亂傳桀乃大下罰於民重亂有夏言殘虐外不憂民內不勤德因甲於二亂之內言昏甚不克靈承于旅罔丕惟進之恭洪舒于民傳言桀不能善奉於人衆無大惟進恭德而大舒惰於治民亦惟有夏之民叨懫日欽劓割夏邑傳桀洪舒於民故亦惟有夏之民貪叨忿懫而逆命於是桀日尊敬其能劓割夏邑者謂殘賊臣音義麗力馳反重直用反又直龍反懫勑二反說文之二反劓魚器反疏正義曰又言桀惡桀其謀天之命不能開發於民之所施政教正謂不能開發善政以施於民桀乃大下罪罰於民重亂有夏之國外不憂民內不勤德因復甲於二者之內為亂之行桀不能以善道奉承於衆民無大惟進之恭德而大舒惰於民言桀不能進行恭德而舒惰於治民桀既舒惰於民故亦惟有夏之民貪叨忿懫而違逆桀命於是桀日日尊敬殘賊之臣能劓割夏邑者任用之使威服下民也傳正義曰釋詁云崇重也桀既為惡政無以悛改乃復大下罪罰於民重亂有夏之國言其殘虐大也夾聲近甲古人甲與夾通用夾於二事之內而為亂行故傳以二事充之外不憂民內不勤德桀身夾於二亂之內言其昏暗甚也鄭王皆以甲為狎王云狎習災異於內外為禍亂鄭云習為鳥獸之行於內為淫亂與孔異也民當奉主而責桀不能善奉於民衆者君之奉民謂設美政於民也以善奉民當敬以循之不敢懈惰桀乃無大惟進於恭德而大舒緩懈惰於治民令民益困而政益亂也禮記云言悖而出亦悖而入桀既不憂於民故民亦違逆桀命為貪叨忿懫之行文十八年左傳云縉雲氏有不才子貪於飲食冒於貨賄天下之民謂之叨餮說者皆言貪財為叨貪食為餮叨即叨也叨餮謂貪財貪食也忿懫言忿怒違理也民既如此桀無如之何惟日日尊敬其能劓割夏邑者謂性能殘賊者任用之天惟時求民主乃大降顯休命于成湯傳天惟是桀惡故更求民主以代之大下明美之命於成湯使王天下刑殄有夏惟天不畀純傳命湯刑絶有夏惟天不與桀亦已大乃惟以爾多方之義民不克永于多享傳天所以不與桀以其乃惟用汝多方之義民為臣而不能長久多享國故惟夏之恭多士大不克明保享于民傳惟桀之所謂恭人衆士大不能明安享于民言亂主所任任同己者乃胥惟虐于民至于百為大不克開傳桀之衆士乃相與惟暴虐於民至于百端所為言虐非一大不能開民以善言與桀合志音義畀必二反疏正義曰天惟桀惡之故更求民主以代之天乃大下明美之命於成湯使之代桀王天下乃命湯施刑罰絶有夏惟天不與夏桀亦已大矣天所不與之者乃惟此桀用汝多方之義民為臣而不能長久於多享國故也義民實賢人也夏桀不用惟夏桀之所謂恭人衆士者大不能用明道安存享於衆民乃相與惟行暴虐於民至于百端所為言虐無所不作大不能開民以善其臣與桀同惡夏家所以滅亡也傳正義曰惟桀之所謂恭人衆士實非恭人亂主所好好用同己者以其同己謂之為恭人實非善人故不能明享於民杜預訓享為受受國者謂受而有之此言不能安享於民謂不能安存享受於民衆也乃惟成湯克以爾多方簡代夏作民主傳乃惟成湯能用汝衆方之賢大代夏政為天下民主愼厥麗乃勸厥民刑用勸傳湯愼其施政於民民乃勸善其人雖刑亦用勸善言政刑清以至于帝乙罔不明德愼罰亦克用勸傳言自湯至于帝乙皆能成其王道畏愼輔相無不明有德愼去刑罰亦能用勸善要囚殄戮多罪亦克用勸開釋無辜亦克用勸傳帝乙已上要察囚情絶戮衆罪亦能用勸善開放無罪之人必無枉縱亦能用勸善今至于爾辟弗克以爾多方享天之命傳今至于汝君謂紂不能用汝衆方享天之命故誅滅之音義相息亮反去羌呂反要一遙反又一妙反注同殄亭遍反上時掌反辟必亦反疏正義曰桀殘虐於民乃惟成湯能用汝衆方之賢人大代夏桀作天下民主湯既為民主愼其所施政教於民民乃勸勉為善其民雖被刑殺亦用勸勉為善非徒湯聖後世亦賢自湯至于帝乙皆能成其王道無不顯用有德畏愼刑罰亦能用勸勉為善要察囚情絶戮衆罪亦能用勸勉為善開放無罪亦能用勸勉為善今至於汝君紂反先王之道不能用汝多方之民享有上天之命由此故被誅滅汝等宜當知之不當更令如殷也傳正義曰大代夏者言天位之重湯能代之謂之大代夏也王肅云以大道代夏為民主愼厥麗者總謂施政教爾但下句言刑用勸勸用刑則厥麗之言有賞賞謂賞用勸也但所施政教其事既多非徒刑賞而已舉事得中民皆勸也政無失刑無濫民以是勸善言政刑清將欲斷罪必受其要辭察其虛實故言要囚也殄戮多罪罪者不濫開釋無罪者不枉殺人不縱有罪亦是政刑清故能用勸善也嗚呼王若曰誥告爾多方非天庸釋有夏傳歎而順其事以告汝衆方非天用釋棄桀桀縱惡自棄故誅放非天庸釋有殷乃惟爾辟以爾多方大淫圖天之命屑有辭傳非天用棄有殷乃惟汝君紂用汝衆方大為過惡者共謀天之命惡事盡有辭說布在天下故見誅滅也疏正義曰周公先自歎而復稱王命云王順其事而言曰以言告人謂之誥我告汝衆方諸侯非天用廢有夏夏桀縱惡自棄也非天用廢有殷殷紂縱惡自棄也又指說紂惡乃惟汝君殷紂用汝衆方之民大為過惡者共此惡人謀天之命其惡事盡有辭說布在天下以此故見誅滅乃惟有夏圖厥政不集于享天降時喪有邦間之傳更說桀也言桀謀其政不成于享故天下是喪亡以禍之使天下有國聖人代之言有國明皇天無親佑有德音義間間厠之間疏正義曰更說桀亡之由乃惟有夏桀謀其政不能成於享國所謀皆是惡事故天下是喪亡以禍之使有國聖人來代之言皇天無親惟佑有德故以聖君代閽主也湯是夏之諸侯故云有國乃惟爾商後王逸厥逸傳後王紂逸豫其過逸言縱恣無度圖厥政不蠲蒸天惟降時喪傳紂謀其政不潔進于善故天惟下是喪亡謂誅滅惟聖罔念作狂惟狂克念作聖傳惟聖人無念於善則為狂人惟狂人能念於善則為聖人言桀紂非實狂愚以不念善故滅亡天惟五年須暇之子孫誕作民主罔可念聽傳天以湯故五年須暇湯之子孫兾其改悔而紂大為民主肆行無道事無可念言無可聽武王服喪三年還師二年音義蠲吉𤣥反馬云明也一音圭蒸絶句之承反馬云升也疏正義曰更說紂亡之由乃惟汝啇之後王紂逸豫其過縱恣無度紂謀其為政不能潔進於善惟行惡事天惟下是喪亡以禍之惟聖人無念於善則為狂人惟狂人能念於善則為聖人紂雖狂愚兾其念善也計紂為惡早應誅滅天惟以成湯之故故積五年須待間暇湯之子孫縱緩多年兾其改悔而紂大為民主肆行無道事無可念言無可聽由是天始改意故誅滅之傳正義曰聖者上智之名狂者下愚之稱孔子曰惟上智與下愚不移是聖必不可為狂狂必不能為聖此事决矣而此言惟聖人無念於善則為狂人惟狂人能念於善則為聖人者方言天須暇於紂兾其改悔說有此理爾不言此事是實也謂之為聖寧肯無念於善已名為狂豈能念善中人念與不念其實少有所移欲見念善有益故舉狂聖極善惡者言之湯是創業聖王理當祚𦙍長逺計紂未死五年之前已合喪滅但紂是湯之子孫天以湯聖人之故故五年須待間暇湯之子孫兾其改悔能念善道而紂大為民主肆行無道所為皆惡事無可念者言皆惡言無可聽者由是天始滅之五年者以武王討紂初立即應伐之故從武王初立之年數至伐紂為五年文王受命九年而崩其年武王嗣立服喪三年未得征伐十一年服闋乃觀兵於孟津十三年方始殺紂從九年至十三年是五年也然服喪三年還師二年乃事理宜然而云以湯故須暇之者以殷紂惡盈久合誅滅逢文王崩未暇行師兼之示弱凡經五載聖人因言之以為法教爾其實非天不知紂狂望其後改悔亦非曲念湯德延此歲年也天惟求爾多方大動以威開厥顧天傳天惟求汝衆方之賢者大動紂以威開其能顧天可以代者惟爾多方罔堪顧之惟我周王靈承于旅傳惟汝衆方之中無堪顧天之道者惟我周王善奉於衆言以仁政得人心克堪用德惟典神天傳言周文武能堪用德惟可以主神天之祀任天王天惟式教我用休簡畀殷命尹爾多方傳天以我用德之故惟用教我用美道代殷大與我殷之王命以正汝衆方之諸侯音義任音壬畀并至反疏正義曰天以紂惡之故將選人代之惟求賢人於汝衆方大動紂以威謂誅去紂也開其有德能顧天之者欲以伐紂惟汝衆方之君悉皆無德無堪使天顧之惟我周王善奉於衆能以仁政得人心文武能堪用德惟可以主神天之祀任作天子也天惟以我用德之故故教我使用美道大與我殷王之命命我代殷為王正汝衆方諸侯言天授我以此位也傳正義曰天惟求汝衆方之賢言欲選賢以為天子也大動紂以威謂誅殺紂也天意復開其能顧天可以代者欲使代之顧謂回視有聖德者天回視之詩所謂乃眷西顧此惟與宅與彼顧同言天顧文王而與之居即此意也但謂天顧此人人亦顧天此云開厥顧天謂人顧天也下云罔堪顧之謂天顧人也言多方人皆無德不堪使天顧之傳以顧事通於彼故皆以天言之周以能行美道乃得天顧復言天用教我美道者人之美惡何事非天由為美道為天所顧以美歸功於天言教我用美道故得當天意也今我曷敢多誥我惟大降爾四國民命傳今我何敢多誥汝而已我惟大下汝四國民命謂誅管蔡商奄之君爾曷不忱裕之于爾多方傳汝何不以誠信行寬裕之道於汝衆方欲其戒四國崇和協爾曷不夾介乂我周王享天之命傳夾近也汝何不近大見治於我周王以享天之命而為不安乎今爾尚宅爾宅畋爾田爾曷不惠王熙天之命傳今汝殷之諸侯皆尚得居汝常居臣民皆尚得畋汝故田汝何不順從王政廣天之命而自懷疑乎爾乃迪屢不靜爾心未愛傳汝所蹈行數為不安汝心未愛我周故爾乃不大宅天命爾乃屑播天命傳汝乃不大居安天命是汝乃盡播棄天命爾乃自作不典圖忱于正傳汝未愛我周播棄天命是汝乃自為不常謀信于正道我惟時其教告之我惟時其戰要囚之傳我惟汝如是不謀信于正道故其教告之謂訊以文誥其戰要囚之謂討其倡亂執其朋黨至于再至于三傳再謂三監淮夷叛時三謂成王即政又叛言迪屢不靜之事乃有不用我降爾命我乃其大罰殛之傳我教告戰要囚汝己至再三汝其有不用我命我乃大下誅汝君乃其大罰誅之非我有周秉德不康寧乃惟爾自速辜傳非我冇周執德不安寧自誅汝乃惟汝自召罪以取誅音義夾音協注同數色角反要一遙反訊音信倡音唱殛紀力反本又作極疏正義曰今我何敢多以言誥告於汝衆而已我惟大下黜汝管蔡商奄四國之君也民命謂民以君為命謂誅殺四國之君也我既殺汝四國君矣汝何不以誠信之心行寬裕之道於汝衆方諸侯欲令懲創四國務崇和協言汝衆方諸侯何不崇和協相親近大顯見治道於我周王以享受上天之命而執心不安乎今爾殷之諸侯尚得居汝常居臣民尚得畋汝故田其安樂如此汝何得不順從王政以廣大天之命而自懷疑乎汝乃復所蹈行者數為不安時或叛逆是汝心未愛我周家故也汝乃不大居安天命是汝乃欲盡播棄天命汝不愛我周家播棄天命是汝乃自為此不常謀信於正道言其心不常謀正道故為背違之心我惟汝如是不謀信於正道之故其以言辭教告之我惟汝如是不誠信於正道之故其用戰伐要察囚繫之由汝數為不信故我教告汝戰伐要囚汝至於再至於三我教告汝戰伐要囚汝己至再三如今而後乃復有不用我命者我乃其大罰誅之言我更將殺汝也非我有周執德不安數設誅罰乃惟汝自召罪也此章反覆殷勤者恐其更有叛逆故丁寧戒之傳正義曰我今何敢多為言誥而已實殺其君非徒口告管蔡商奄皆為叛逆受誅故今因奄重叛而追說前事言下四國民命王肅以四國為四方之國言從今以後四方之國苟有此罪則必誅之謂戒其將來之事與孔不同夾其旁旁是近義故為近也諸國疏遠周室不肯以治為功故責之顧氏云汝衆方諸侯何不常和協相親近大顯見治道於我周王以享上天之命而今何以不自安乎主遷於上臣易於下計汝諸侯之國應隨殷降黜今汝殷之諸侯皆尚得居汝常居臣民畋汝故田田宅不易安樂如此汝何不順從我周王之政以廣上天之命使天多佑汝何故畏我周家自懷疑乎諸侯有國故云居汝常居臣民重田故云畋汝故田治田謂之畋猶捕魚謂之漁今人以營田求食謂之畋食即此畋亦田之義也事君無二臣之道為人臣者常宜信之汝未愛我周家播棄天命汝數為叛逆是汝乃自為此不常謀信於正道教告與戰要囚連文則告以文辭是將戰之時教告謂伐紂之事昭十三年說戰法云告之以文辭董之以武師是將戰之時於法當有文辭告前敵也我惟汝如是不謀信於正道故其教告之謂訊以文辭訊告也告以文辭數其罪也其戰要囚之謂戰敗其師執取其人受其要辭而囚之謂討其倡亂之人囚執其朋黨也此雖總言戰事但下有至於再三明此指伐紂也以伐紂為一故再謂攝政之初三監與淮夷叛時也三謂成王即政又叛也言上迪屢不靜之事王曰嗚呼猷告爾有多方士暨殷多士傳王歎而以道告汝衆方與衆多士今爾奔走臣我監五祀傳監謂成周之三監此指謂所遷頑民殷衆士今汝奔走來徙臣服我監五年無過則得還本土越惟有胥伯小大多正爾罔不克臬傳於惟有相長事小大衆正官之人汝無不能用法欲其皆用法自作不和爾惟和哉爾室不睦爾惟和哉爾邑克明爾惟克勤乃事傳大小多正自為不和汝有方多士當和之哉汝親近室家不睦汝亦當和之哉汝邑中能明是汝惟能勤汝職事爾尚不忌于凶德亦則以穆穆在乃位傳汝庶幾不自忌入於凶德亦則用敬敬常在汝位克閲于乃邑謀介爾乃自時洛邑尚永力畋爾田傳汝能使我閲具于汝邑而以汝所謀為大則汝乃用是洛邑庶幾長力畋汝田矣言雖遷徙而以修善得反邑里天惟畀矜爾我有周惟其大介賚爾傳汝能修善天惟與汝憐汝我有周惟其大大賜汝言受多福之祚迪簡在王庭尚爾事有服在大僚傳非但受憐賜又乃蹈大道在王庭庶幾修汝事有所服行在大官音義臬魚列反馬本作劓閲音悅疏正義曰王言而歎曰嗚呼我以道告汝在此所有四方之多士謂四方之諸侯及與殷之衆士謂頑民遷成周者因告四方諸侯遂告成周之人遍使諸侯知之此章皆告成周之人辭也今汝成周之人奔走勤事臣我周之監成周者五年無罪過則聽汝還本土於惟有相長事謂小大衆正官之人汝無有不能用法欲其皆用法也小大衆正官之人自為不和汝衆官等自當和之哉汝等親近室家不相和親汝亦當和之哉汝邑內之人若能明於和睦之道汝惟能勤於汝之職事言是其教之使然汝能庶幾不自相怨忌入於凶德若能不入於凶德亦則用敬敬之道常在汝之職位不黜退也汝若能善相教誨使我簡閲於汝邑善汝之事以汝所謀為大則汝乃用是洛邑庶幾得反本土長得勤畋汝故田汝能修善天惟與汝憐汝我有周惟其大大賞賜汝汝非但受賞而已其有蹈大道者得在王庭被任用庶幾汝事有所服行在於大官恐其心未服故丁寧勸誘之傳正義曰言有方多士與殷多士則此二者非一人也有方多士當謂於時所有四方之諸侯也與殷多士當謂遷於成周頑民之衆士也下云以臣我監者謂成周之監明此殷多士也謂成周之三監者下云自時洛邑此所戒成周之人故知監謂成周之監此指謂所遷頑民殷家衆士也五年再閏天道有成故期以五年無過則得還本土以民性重遷設期以誘之胥相也伯長也顧氏以相長事即小大衆正官之人也和順為善德怨惡為凶德忌謂自怨忌上言自作不和是怨忌也釋訓云穆穆敬也此戒小大正官之人故云敬敬常在汝位閲謂簡閲其事觀其具足以否故言閲具於汝邑介大也以汝所謀為大善其治理聽還本國也是由在洛邑修善得反其邑里王肅云其無成雖五年亦不得反也王曰嗚呼多士爾不克勸忱我命爾亦則惟不克享凡民惟曰不享傳王歎而言曰衆士汝不能勸信我命汝亦則惟不能享天祚矣凡民亦惟曰不享於汝祚矣爾乃惟逸惟頗大遠王命則惟爾多方探天之威我則致天之罰離逖爾士傳若爾乃為逸豫頗僻大棄王命則惟汝衆方取天之威我則致行天罰離遠汝土將遠徙之音義頗破多反探吐南反辟匹亦反疏正義曰王言而歎曰嗚呼成周之衆士汝若不能勸勉信用我之教命汝則惟不能多受天福祚矣凡民惟曰不享於汝祚矣汝乃惟為逸豫惟為頗僻大遠棄王命則惟汝衆方自取天之威刑戒則致天之罰於汝身將遠徙之使離遠汝之本上傳正義曰勸信我命勸勉而信順之凡民亦惟曰不享於汝祚矣言民亦不願汝之子孫長久矣成周一邑之士不得謂之多方此蓋意在成周遷者兼告四方諸國使知亦如康誥王告康叔并使諸侯知之離遠汝土更遠徙之鄭云分離奪汝土也與孔異也王曰我不惟多誥我惟祇告爾命傳我不惟多誥汝而已我惟敬告汝吉凶之命又曰時惟爾初不克敬于和則無我怨傳又誥汝是惟汝初不能敬于和道故誅汝汝無我怨解所以再三加誅之意疏正義曰王曰我今告戒汝者不惟多為言誥汝而已惟敬告汝吉凶之命從我則吉違我則凶汝命吉凶在此言也王又謂汝所以再三被誅者是惟汝初不能敬於和道故致此爾汝自取之則無於我有怨傳正義曰又告者更言王意又謂汝曰也以上王誥已終又起别端故更稱王又復言曰以序云成王在豐誥庶邦則此篇是王親誥之辭直稱王曰者是也其有周公稱王告者則上云周公曰王若曰是也又曰嗚呼王若曰是也顧氏云又曰者是王又復言曰也序周公作立政傳周公既致政成王恐其怠忽故以君臣立政為戒立政傳言用臣當共立政故以名篇周公若曰拜手稽首告嗣天子王矣傳順古道盡禮致敬告成王言嗣天子今已為王矣不可不愼用咸戒于王曰王左右常伯常任準人綴衣虎賁傳周公用王所立政之事皆戒於王曰常所長事常所委任謂三公六卿準人平法謂士官綴衣掌衣服虎賁以武力事王皆左右近臣宜得其人周公曰嗚呼休兹知恤鮮哉傳歎此五者立政之本知憂得其人者少音義盡津忍反下同任而鴆反準之允反綴徐丁衛反又丁劣反賁音奔所長丁丈反除篇末文注以長音直良反餘並同鮮息淺反疏正義曰王之大事在於任賢使能成王初始即政猶尚幼少周公恐其怠忽政事任非其人故告以用臣之法周公順古道而告王曰我敢拜手稽首告嗣世天子成王今已為王矣王者當立善政其事不可不愼周公既為此言乃用王所立政之事皆戒於王曰王之親近左右常所長事謂三公也常所委任謂六卿也平法之人謂獄官也綴衣之人謂掌衣服者也虎賁以武力事王者此等皆近王左右最須得人周公既歷言此官復言而歎曰嗚呼美哉此五等之官立政之本也知憂此官宜得賢人者少也傳正義曰周公既拜手稽首而後發言還自言拜手稽首示己重其事欲令受其言故盡禮致敬以告王也召誥云拜手稽首旅王若公亦是召公自言己拜手稽首與此同也成王嗣世而立故呼成王為嗣天子周公攝政之時成王未親王事此時既已歸政於成王故言今己為王矣不可不愼也王肅以為於時周公會羣臣共戒成王其言曰拜手稽首者是周公讚羣臣之辭此以立政名篇知用咸戒者是周公用王所立政之事皆戒於王也三公臣之尊者知常所長事謂三公也六卿分掌國事王之所任知常所委任謂六卿也準訓平也平法之人謂士官也士察也察獄之官用法必當均平故謂獄官為準人周禮司寇之長在常任之內此士官當謂士師也衣服必連綴著之此歷言官人知綴衣是掌衣服者此言親近大臣必非造衣裳者周禮大僕下大夫掌正王之服位出入王之大命此掌衣服者當是大僕之官也周禮虎賁氏下大夫言其若虎賁獸是以武力事王者此皆左右近臣宜得其人言其急於餘官得其人者文官得其文人武官得其武人違才易務皆為非其人也此五官皆親近王故歎此五者立政之本也休美也王肅云此五官美哉是休兹為美此五官也歎其官之美美官不可不委賢人用之故歎之知憂得其人者少下句惟言禹湯文武官得其人是知憂得人者少也古之人迪惟有夏乃有室大競籲俊尊上帝傳古之人道惟有夏禹之時乃有卿大夫室家大强猶乃招呼賢俊與共尊事上天迪知忱恂于九德之行傳禹之臣蹈知誠信於九德之行謂賢智大臣九德臯陶所謀乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹惟后矣傳知九德之臣乃敢告教其君以立政君矣亦猶王矣宅居也居汝事六卿掌事者牧牧民九州之伯居內外之官及平法者皆得其人則此惟君矣謀面用丕訓德則乃宅人兹乃三宅無義民傳謀所面見之事無疑則能用大順德乃能居賢人于衆官若此則乃能三居無義民大罪宥之四裔次九州之外次中國之外桀德惟乃弗作往任是惟暴德罔後傳桀之為德惟乃不為其先王之法往所委任是惟暴德之人故絶世無後音義籲音喻忱市林反恂音荀行徐下孟反疏正義曰既言知憂得人者少乃遠述上世之事此言禹與桀也古之人能用此求賢之道者惟有夏禹之時乃有羣臣卿大夫皆是賢人室家大强猶尚招呼賢俊之人與共立於朝尊事上天禹之臣蹈知誠信於九德之行者乃敢告教其君曰我敢拜手稽首君今已為君矣不可不愼也戒其君即告曰居汝掌事之六卿居汝牧民之州伯居汝平法之獄官使此三者皆得其人則此惟為君矣言不得賢人不成為君也禹能謀所面見之事無所疑惑用大明順之德則乃能居賢人於官賢人在官職事修理乃能三處居無義之民善人在朝惡人黜遠其國乃為治矣及夏末年桀乃為天子桀之為德惟乃不為其先王之法往所委任是暴德之人以此故絶世無後得賢人則興任小人則滅是須官賢人以立政也傳正義曰經言古之人迪傳言古之人道當說古之求賢人之道也王肅云古之人道惟有夏之大禹為天子也其意言古人之道說有此事孔意似不然也孔以大夫稱家室猶家也籲訓呼也招呼者乃是臣下之事故以為夏禹之時乃有卿大夫室家大强猶乃招呼在外賢俊與之共立於朝尊事上天也言君既求賢臣之助言天子事天臣成君事故言共尊事上天九德之行非一人能備言禹之臣蹈知九德之行極言其賢智大臣也禹時伯益之輩乃可以當此經典之文更無九德之事惟有臯陶謨九德臯陶所謀者即寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而廉剛而塞强而義是也進言戒君非大賢不可故知九德之臣乃敢告教其君以立政也君矣亦猶言王矣言已為君矣不可不愼也君王一也變文以相避爾宅訓居也居汝事須得賢人六卿各掌其事者也居汝牧九州之伯主養民亦須得賢人養其民也居汝準士官主理刑法亦須賢人平其獄也六卿掌內州牧掌外內外之官及平法三事皆得其人則此惟為君矣言羣官失職則不成為君也上句周公戒王歷言五官其內無州牧此惟言三官加州牧者俱是逐急言之其有詳略爾曲禮云九州之長曰牧王制云千里之外設方伯八州八伯然則牧伯一也伯者言一州之長牧者言牧養下民牧伯俱得言之故孔以伯解牧鄭𤣥云殷之州牧曰伯虞夏及周曰牧與孔不同凡人為主皆欲臣賢但大佞似忠賢不可别欲知其遠先驗於近但禹能謀所面見之事善官賢人既得其官分别善惡無所疑惑仁賢必用邪佞必退然後舉直錯諸枉則為能用大順德如是乃能居賢人於衆官賢人既得居官則能分别善惡無義之民必獲大罪量其輕重斥之遠地乃能三處居此無義罪人三居者大罪宥之四裔次九州之外次中國之外四裔者四海之表最遠者也次九州之外者四海之內要服之外次中國之外者謂罪人所居之國外也猶若衛人居於晉去本國千里故孔注舜典云次千里之外是也鄭云三處者自九州之外至於四海三分其地遠近若周之夷鎮蕃也與孔不同亦越成湯陟丕釐上帝之耿命傳桀之昏亂亦於成湯之道得升大賜上天之光命王天下乃用三有宅克即宅曰三有俊克即俊傳湯乃用三有居惡人之法能使就其居言服罪又曰能用剛柔正直三德之俊能就其俊事言明德嚴惟丕式克用三宅三俊傳言湯所以能嚴威惟可大法象者以能用三居三德之法其在商邑用協于厥邑其在四方用丕式見德傳湯在商邑用三宅三俊之道和其邑其在四方用是大法見其聖德言遠近化音義釐力之反耿工逈反徐工頴反又工永反下同王往況反見賢遍反下注同疏正義曰不有所廢則無以興桀之滅亡夏家乃以開道湯德此言湯之能用人也桀之昏亂亦於成湯之道得升聞於天大賜受上天之光命得王有天下湯既為王乃用三有居惡人之法能使各就其居處言皆服其罪也又曰用三德之俊人能使各就其俊事言皆明其德也湯所以能嚴威惟可大法象者以其能用三居三俊之法故也成湯其在商邑用此三居三俊之道和於其邑其在四方用是斷罪任賢之大法見其聖德於民言遠近皆從化也傳正義曰成湯之道得升謂從下而升於天故天賜之以光命使之得王天下為天子也釐賜耿光皆釋詁文臯陶謨九德即洪範之三德細分以為九爾以此知三俊即是洪範所言剛克柔克正直三德之俊也能就其俊事言明德者用以俊乂居官顯明其有德也上句言則乃宅人兹乃三宅無義民先言用賢後言去惡此經先言三有宅後言曰三有俊者用賢去惡俱是立政之本上句先說夏禹言得賢然後去惡見其須賢之功及說成湯文武先言去惡後言用賢又見惡宜速去或先或後所以互相見爾嗚呼其在受德暋惟羞刑暴德之人同于厥邦傳受德紂字帝乙愛焉為作善字而反大惡自强惟進用刑與暴德之人同于其國並為威虐乃惟庶習逸德之人同于厥政傳乃惟衆習為過德之人同于其政言不任賢帝欽罰之乃伻我有夏式商受命奄甸萬姓傳天以紂惡故敬罰之乃使我周家主有華夏得用商所受天命同治萬姓言皇天無親佑有德音義受德紂字馬云受所為德也暋眉謹反徐亡巾反一音閔為于僞反下為之同强其丈反伻普耕反徐敷耕反又甫耕反疏正義曰既言湯以用賢而興又說紂之失人而滅周公又歎曰嗚呼其在殷王受德本性大惡自强惟進用刑罰與暴德之人同治其國並為威虐乃惟衆習為過德之人與之同共於其政由其任同惡之人故上天敬誅罰之乃使我周家主有華夏用商所受天命同治天下萬姓言周能用賢天親有德故得為天子傳正義曰泰誓三篇惟單言受而此云受德者則德本配受共為一人故知受德是紂字也既受之與德共為紂字而經或言受或言受德者呼之有單復爾其人實為大惡德字乃為善名非是時人呼有德知是帝乙愛焉為作善字望其為善而反為大惡以其行反其字明非時人呼也釋詁云暋强也暋即昏也故訓為强言紂自强為惡惟進用刑罰身既進用刑罰則愛好暴虐之人故為與之同於其國言並為威虐暴德言以暴虐為德逸德言以過惡為德習效為之衆者言其所任多也紂任衆為過德之人與之同於其政言其不任賢也與暴德同於其國與惡德同於其政其事一也異言之爾牧誓所云四方之多罪逋逃是信是使是以為大夫卿士俾暴虐於百姓以姦宄於商邑是其事也言天知其惡熟詳審下罰故言敬罰也商本受天命周亦受天命故言用商所受天命同治萬姓釋言云弇同也同為天子治萬姓與商同也此經之意言周家冇德皇天親有德也王肅云敬罰者謂須暇五年亦越文王武王克知三有宅心灼見三有俊心傳紂之不善亦於文武之道大行以能知三有居惡人之心灼然見三有賢俊之心以敬事上帝立民長伯傳言文武知三宅三俊故能以敬事上天立民正長謂郊祀天建諸侯疏正義曰既言上天去惡與善滅殷興周即說文王武王能用求賢審官之事桀惡所以興成湯紂惡所以開文武言紂之不善亦於文王武王使得其道大行能知居三有惡人之心居之皆得其所言服其罪也灼然見三有賢俊之心用之皆得其人言明其德也文武知此三宅三俊故能敬事上天稱天心也立民正長合民心也傳正義曰桀之昏亂開成湯紂之不善開文武其事同也於成湯言能受上天之命於文武云能敬事上帝前聖後聖為行必同交錯為文所以互相見爾文王受命武王伐紂二聖共成王道故文武並言之猶詩序云文武以天保己上治內采薇己下治外文武並言與此同也文王之時未定天下所立之官亦未具足下經所言立政任人己下三亳阪尹己上其所舉官屬多是文武時事以見二聖同道父作之子述之言其相成爾故以能知三有居惡人之心灼然見三有賢俊之心言文王之聖心能揆度知惡人真惡須屏黜之知賢人實賢須舉用之故去惡進賢皆得其所賢人難識故特言灼然言其知之審也上天之道與善去惡三宅三俊行合天心言文武知三宅三俊故能敬事上帝伯亦長也故言立民正長天子祭天知敬事上帝謂郊祀天也天子建國知立民長伯謂建諸侯也以下句立政任人己下歷言朝廷之臣與蠻夷衆君知此立民長伯主謂諸侯詩周頌維清述文王之德言肇禋大雅皇矣美文王之伐言是類類禋皆是祭天之名是文王已祀天矣文王未得封建諸侯其建諸侯維武王時爾立政任人準夫牧作三事傳文武亦法禹湯以立政常任準人及牧治為天地人之三事虎賁綴衣趣馬小尹傳趣馬掌馬之官言此三者雖小官長必愼擇其人左右攜僕百司庶府傳雖左右攜持器物之僕及百官有司主劵契藏吏亦皆擇人大都小伯藝人表臣百司傳小臣猶皆愼擇其人況大都邑之小長以道藝為表幹之臣及百官有司之職可以非其任乎太史尹伯庶常吉士傳太史下大夫掌邦六典之二尹伯長官大夫及衆掌常事之善士皆得其人司徒司馬司空亞旅傳此有三卿及次卿衆大夫則是文武未伐紂時舉文武之初以為法則夷微盧蒸三亳阪尹傳蠻夷微盧之衆帥及亳人之歸文王者三所為之立監及阪地之尹長皆用賢音義趣七口反劵音勸契苦計反藏才浪反阪音反疏正義曰言文武亦法禹湯審官以立美政任人謂六卿準夫者平法之人謂理獄官也牧者九州之牧治為天地人之三事自虎賁已下歷衆官名言此官皆須得其人不以官之尊卑為次蓋以從近而至遠虎賁綴衣趣馬三者官雖小須愼擇其人乃至左右攜持器物之僕及百官有司之下至衆府藏之吏亦須擇其人既言近王小官及遠官大者小官猶須擇人況乎大都邑之小長與冇道藝之人為表幹之臣及百官有司之職可以非其任乎以近臣況遠臣以小官況大官既以近小況遠大又舉官之次而掌事要者若太史下大夫長官大夫及衆掌常事之善士皆須得其人更舉官之大者司徒司馬司空之卿及次卿之衆大夫皆須得其人既略言內外之官又更遠及夷狄蠻夷微盧之衆帥與三處亳民之監及阪地之尹長皆須用賢人言文武於此諸官皆求賢人為之也傳正義曰前聖後聖其道皆同未必相放法也後人法前自是常事因其上說禹湯立政故言文武亦法禹湯以立政也任人則前經所云常任六卿也準夫則準人也牧者前云宅乃牧也前文有常伯綴衣虎賁不言牧此不言常伯綴衣虎賁而言牧者以前文先舉朝臣故不言牧前已備文故此不言常伯其綴衣虎賁而言牧者以下文自詳故此惟舉內外要官者言之故內官舉任人準夫外官舉牧故下云繼自今我立政立事準人牧夫我其克灼知厥若又云自古商人亦越我周文王立政立事牧夫準人則克宅之克由繹之兹乃俾乂皆據內外要重官以言之夫即人也立官所以事天地治人民為此三事而已故以三事謂天地人也王肅云文王所以立政任人常任也準夫準人也牧者諸侯之長也與孔意同周禮趣馬為校人屬官馬一十二匹立趣馬一人掌贊正良馬而齊其飲食是掌馬之小官也綴衣是太僕也虎賁太僕皆下大夫也此三公六卿亦為小尹之官雖文止三官亦包通在下之屬官三官之下小官多矣趣馬即下士其馬一匹有圉師一人是趣馬之下猶有小官也諸官有所務從業從王左右攜持器物之僕謂寺人內小臣等也百司庶府謂百官有司之下主劵契府藏之吏謂其下賤人非百官有司之身也言此等亦皆擇人小臣猶皆擇人況大都邑之小長謂公卿都邑之內大夫士及邑宰之屬以身有道藝為民之表的楨幹之臣其都邑之內屬官謂之小長周禮太宰職云乃施則于都鄙而建其長立其兩設其伍陳其殷兩謂兩卿長謂公卿伍謂大夫殷謂衆士是也周禮太史下大夫二人掌建邦之六典又太宰職亦云掌建邦之六典太史副二太宰掌其正太史掌其二六典謂治典教典禮典政典刑典事典六卿所掌者也掌邦六典之二其所掌事重故特言之尹伯長官大夫周禮每官各有長若太史為史官之長大司樂為樂官之長如此類皆是也及衆掌常事之善士謂士為長官者其大夫及士不為長官者則前云百司也居官必須善人此是總舉衆官故特言吉士周公攝政之時制禮作樂其作立政之篇必在制禮之後周禮六卿而此有三卿及次卿衆大夫則是副卿之大夫有若周禮小宰之類是也此文武未伐紂之時也遠舉文武之初以為法則爾泰誓下篇云王乃大巡六師六師則六軍也軍將皆命卿即伐紂之時已立六卿矣牧誓亦云司徒司馬司空舉之三卿者彼傳已解之云指誓戰者也牧誓所云有微盧彭濮人此舉夷微盧以見彭濮之等諸夷也蒸訓衆也此篇所言皆立官之事此經惟阪下言尹則夷微已下以一尹總之故傳言蠻夷微盧之衆帥及亳民之歸文王者三所為之立監及阪地之尹長故言師言監亦是言為之立長義出經文尹也亳是湯之舊都此言三亳必是亳民分為三處此篇說立官之意明是分為三亳必是三所各為立監也亳人之歸文王經傳未有其事文王既未伐紂亳民不應歸之鄭王所說皆與孔同言亳民歸文王者蓋以此章雜陳文王武王時事其言以文王為主故先儒因言亳民歸文王爾即如此意三亳為己歸周必是武王時也及阪地之尹長傳言其山阪之地立長爾不知其指斥何處也鄭𤣥以三亳阪尹者共為一事云湯舊都之民服文王者分為三邑其長居險故言阪尹蓋東成臯南轘轅西降谷也皇甫謐以為三亳三處之地皆名為亳蒙為北亳穀熟為南亳偃師為西亳古書亡滅既無要證未知誰得㫖矣文王惟克厥宅心乃克立兹常事司牧人以克俊有德傳文王惟其能居心遠惡舉善乃能立此常事司牧人用能俊有德者文王罔攸兼于庶言庶獄庶愼惟有司之牧夫傳文王無所兼知於毁譽衆言及衆刑獄衆當所愼之事惟愼擇有司牧夫而已勞于求才逸於任賢是訓用違庶獄庶愼文王罔敢知于兹傳是萬民順法用違法衆獄衆愼之事文王一無敢自知於此委任賢能而已音義遠于萬反譽音餘又如字疏正義曰上既總言文武此又分而說之文王惟能其居心遠惡舉善乃能立此常事其主養人之官用能俊有德者既任用俊人每事委之文王無所兼知於衆人之言或毁或譽文王皆不知也衆獄斷罪得失文王亦不得知也衆所當愼之事文王亦不得知也惟愼擇在朝有司在外牧養民之夫是時萬民或順於法或用違法衆刑獄衆所愼之事文王一皆無敢自知於此惟委任賢能而已傳正義曰上言文王能知三宅三俊知此能居心者以遠惡舉善居其心也既遠惡舉善乃能立此常事用賢養民是人君之常事也文王罔攸兼于庶言下云是訓用違即是在上庶言也是訓則稱譽之事用違則毁損之事但分析言之爾亦越武王率惟敉功不敢替厥義德傳亦於武王循惟文王撫安天下之功不敢廢其義德奉遵父道率惟謀從容德以並受此丕丕基傳武王循惟謀從文王寬容之德故君臣並受此大大之基業傳之子孫音義敉亡婢反傳直專反疏正義曰亦於武王遵循父道所循惟文王撫安天下之功不敢廢其文王義德言奉行遵父道也又言武王遵循者惟謀從文王寬容之德故武王君臣能並受此大大之基業謂受命為天子傳之子孫傳正義曰以言並受則非獨王身故以為君臣並受此大大之基業謀從寬容之德是與臣謀及基業成就則君臣共有故言並受且王為天子臣為諸侯皆受基業各傳子孫是亦為並受也嗚呼孺子王矣傳歎稚子今已為王矣不可不勤法祖考之德繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂傳繼用今已往我其立政大臣立事小臣及準人牧夫我其能灼然知其順者則大乃使治之言知臣下之勤勞然後莫不盡其力相我受民和我庶獄庶愼時則勿有間之傳能治我所受天民和平我衆獄衆愼之事如是則勿有以代之言不可復變自一話一言我則末惟成德之彥以乂我受民傳言政當用一善善在一言而已欲其口無擇言如此我則終惟有成德之美以治我所受之民音義俾必爾反下同治直吏反下同相如字馬息亮反下勱相同間間厠之間復扶又反話戶快反疏正義曰周公既歷說禹湯文武乃復指戒成王嗚呼而歎孺子今已為王矣既正位為王事不可不愼繼續從今已往我王其與立政謂大臣也其與立事謂小臣也平法之人及養民之夫此等諸臣我王其能察之灼然知其順於事者則大乃使之治理言知其能有勤勞各盡心力然後用此賢臣治我所受天民和平我衆獄訟及衆當所愼之事必能如是則勿復有以代之言其法不可復變也政從君出為人主用是一善之言善在一言而已勿以惡言亂之王能如是我王則終惟有成德之美以治我所受天民矣傳正義曰自此已下四言繼自今者凡人靡不有初鮮克有終恐王不能終之戒成王使繼續從今已往常用賢也自訓為從亦訓為用此傳言用今已往下傳言從今已往其意同也政事相對則政大事小故以立政為大臣立事為小臣及準人牧夫略舉四者以總諸臣戒王任此人也其能灼然知其能順於事者則大乃使治顧氏云君能知臣下順於事則臣感君恩大乃治理各盡心力也相訓助也助君所以治民事故相為治天命王者使之治民則天與王者此民故言能治我所受天民也能治下民理衆獄衆愼之事使得其所則為政之大要能如此則勿有以代之言此法盡善不可復變易也或據臣身既能如此不可以餘人代之也釋詁云自用也話言也舍人曰話政之善言也孫炎曰話善之言也然則話之與言是一物也自一話者言人君為政當用純一善言又云一言者純一善言在於一言而已謂發號施令當須純一不得差二欲令其口無可擇之言也顧氏云人君為政之道當須用一善而已為善之法惟在一言也末訓為終彥訓為美王能出言皆善口無可擇如此我王則終惟有成德之美以治我所受天民矣釋訓云美士為彥故彥為美嗚呼豫旦己受人之徽言咸告孺子王矣傳歎所受賢聖說禹湯之美言皆以告稚子王矣繼自今文子文孫其勿誤于庶獄庶愼惟正是乂之傳文子文孫文王之子孫從今已往惟以正是之道治衆獄衆愼其勿誤自古商人亦越我周文王立政立事牧夫準人則克宅之克由繹之兹乃俾乂傳言用古商湯亦於我周文王立政立事用賢人之法能居之於心能用陳之此乃使天下治音義稚直吏反本亦作稚繹音亦疏正義曰旦者周公名也周公又歎曰嗚呼我旦己受賢聖人說禹湯之美言皆以告孺子王矣王宜依行之繼續從今以往文王之子孫其勿得過誤於衆獄訟衆所愼之事惟當用是正是之道治之用古商人成湯亦於我周家文王其立政立事牧夫準人此等諸官皆用賢人之法則能居之於心能用陳之於位明識賢人用之為官此乃使天下大治戒成王使法之傳正義曰上陳禹湯文武此覆上文惟言湯與文王者言有詳略無别意也能居之於心謂心知其賢也能用陳之謂陳列於位用之以為官也王肅曰則能居之在位能用陳其才力如此故能使天下治也國則罔有立政用憸人不訓于德是罔顯在厥世傳商周賢聖之國則無有立政用憸利之人者憸人不順於德是使其君無顯名在其世繼自今立政其勿以憸人其惟吉士用勱相我國家傳立政之臣惟其吉士用勉治我國家音義憸息廉反徐七漸反本又作􅧴馬云憸利佞人也勱音邁疏正義曰既言湯與文王用賢大治又言其不宜用小人商周聖賢之國無有立政用憸利之人者此憸利之人不順於德若其用之是使其君無顯名在其世也王常繼續從今已往立其善政其勿用憸利之人其惟任用善士使勉力治我國家教王使用善士勿使小人也今文子文孫孺子王矣傳告文王之子孫言稚子已即政為王矣所以厚戒其勿誤于庶獄惟有司之牧夫傳獨言衆獄有司欲其重刑愼官人其克詰爾戎兵以陟禹之迹傳其當能治汝戎服兵器威懷並設以升禹治水之舊迹方行天下至于海表罔有不服傳方四方海表蠻夷戎狄無不服化者以覲文王之耿光以揚武王之大烈傳能使四夷賓服所以見祖之光明揚父之大業嗚呼繼自今後王立政其惟克用常人傳其惟能用賢才為常人不可以天官有所私音義詰起一反馬云實也疏正義曰今告汝文王之子文王之孫孺子今已即政為王矣我所以須厚戒之王其勿誤於衆治獄之官當須愼刑也惟有司之牧夫冇司主養民者宜得賢也治獄之吏養民之官若任得其人使其能治汝戎服兵器以此仆行禹之舊迹四方而行至於天下至於四海之表無有不服王之化者以顯見文王之光明以播揚武王之大業言任得賢臣則光揚父祖周公又歎曰嗚呼繼續從今已往後世之王立行善政其惟能用常人必使常得賢人不可任非其才此雖指戒成王乃是國之常法因以戒後王言此法可常行也傳正義曰上有庶愼立政立事牧夫準人此獨言庶獄與有司之牧夫者言庶獄欲其重刑官有司牧夫欲其愼官人也立官所以牧養下民戒備不虞故以詰爾戎兵為言也戎亦兵也以其並言戎兵故傳以為戎服兵器威懷並設以升禹治水之舊迹遠行必登山故以陟言之如禹之陟方意亦然方行天下言無所不至故以方為四方釋地云九夷八狄七戎六蠻謂之四海知海表謂夷狄戎蠻無有不服化者即詩小雅云蓼蕭澤及四海是也官須常得賢人故惟賢是用用賢是常常則非賢不可人主或知其不賢以私受用之代天為官故言不可以天官有所私周公若曰太史傳順其事并告太史司寇蘇公式敬爾由獄以長我王國傳忿生為武王司寇封蘇國能用法敬汝所用之獄以長施行於我王國言主獄當求蘇公之比兹式有愼以列用中罰傳此法有所愼行必以其列用中罰不輕不重蘇公所行太史掌六典有廢置官人之制故告之音義比必二反又如字行如字疏正義曰周公順其事而言曰太史以其太史掌廢置官人故呼而告之昔日司寇蘇公既能用法汝太史當敬汝所用之獄以長施行於我王國欲使太史選主獄之官當求蘇公之比也此刑獄之法冇所愼行必以其體式列用中常之罰不輕不重當如蘇公所行也傳正義曰成十一年左傳云昔周克商使諸侯撫封蘇忿生以溫為司寇是忿生為武王司寇封蘇國也蘇是國名所都之地其邑名溫故傳言以溫也特舉蘇公治獄官以告太史知其言主獄之官當求蘇公之比類也治獄必有定法此定法有所愼行周禮大司寇云刑新國用輕典刑平國用中典刑亂國用重典輕重各有體式行列周公言然之時是法為平國故必以其列用中罰使不輕不重美蘇公治獄使列用中罰明中罰不輕不重是蘇公所行也周禮大宰以八柄詔王馭羣臣有爵祿廢置生殺與奪之法太史亦掌邦之六典以副二大宰是太史有廢置官人之制故特呼而告之也尚書注疏卷十六尚書注疏卷十六考證蔡仲之命序王命蔡仲傳成王也成王上疑脫王字疏不立管叔之後者之字監本及毛本訛為從舊本改正惟周公位冡宰正百工吳棫曰周公攝政在成王諒暗時非以幼冲而攝也其攝亦不過位冡宰之位而已非如荀卿所謂攝天子位也臣召南按自戰國以來即有周公攝位之說觀此文則百官總已聽於冡宰者三年孔子所謂古之人皆然者也可以證攝位之誣乃命諸王邦之蔡傳叔之所封圻內之蔡仲之所封淮汝之間疏圻內之蔡其事不知所出也世家云蔡叔居上蔡臣召南按孔疏疑傳叔封圻內之蔡其事不知所出是也但引世家云蔡叔居上蔡則世家祗云封叔度於蔡裴氏集解引杜預曰居上蔡非本文也至杜預注左傳武王封叔度云云實据地理志以立說確矣孔傳謂叔封圻內仲封淮汝之間豈可信乎以蕃王室王應麟曰觀蔡仲之命知周所以興觀中山靖王之對知漢所以亡周公弔二叔之不咸方且封建親戚以蕃屏周漢懲七國之難抑損諸侯以成外戚之勢心有公私而國之興亡判焉附序遂踐奄傳成王即政淮夷奄國又叛王親征之疏鄭元謂此伐淮夷與踐奄是攝政三年伐管蔡時事臣召南按漢儒据書序次第多方在大誥諸篇之後又本文有戰要囚至再至三之言遂謂武庚三監叛時淮夷徐奄並叛此役為重叛成王乃親征滅之不知書序之先後次第固未可信也康成之識卓矣哉附序成王既踐奄疏鄭云奄蓋在淮夷之地按周本紀注引鄭云奄國在淮夷之北疑此疏地字訛多方序金履祥曰多士有昔朕來自奄之文是多方在多士之前也自孔安國以來惟胡宏大紀叙多方於前多士於後顧炎武曰多方當在多士前後人倒其篇第耳奄之叛是武庚既誅而懼遂與淮夷徐戎並興而周公東征乃至三年之久孟子曰伐奄三年討其君是也既克而成王踐奄蓋行巡狩之事孔傳以為奄再叛者拘於書序强為之說也克以爾多方句簡代夏作民主句蔡沈以簡字屬上句愼厥麗句乃勸厥民句刑用勸句蔡沈以愼厥麗乃勸為句厥民刑用勸為句疏大代夏桀作天下民主民主下監本脫湯既為民主五字從古本添天惟五年須暇之子孫傳武王服喪三年還師二年蔡沈曰五年必有所指孔氏牽合歲月非是天惟式教我用休傳惟用教我用美道代殷代殷各本俱訛伐􅎋以疏推之古本作代字是從之今爾奔走臣我監五祀傳監謂成周之三監臣召南按文祗應云成周之監不當云三監此指洛邑之治殷民者非謂武庚時事也即孔疏並不解三監字義則知三字衍文也又傳則得還本土得字訛是今改正立政呂祖謙曰無逸立政二篇相為經緯以無逸之心明立政之體君道備矣宅乃事宅乃牧宅乃準蘇軾曰事即常任牧即常伯準即準人一篇所謂宅俊者參差不齊然大要不出三者餘皆小臣百職事也兹乃三宅無義民傳若此則乃能三居無義民大罪宥之四裔次九州之外次中國之外呂祖謙曰夏之衰也三宅無義民言皆不義之人無一君子也潘子善問孔傳解居無義之民猶舜典五宅三居呂氏說不然孰是朱子曰呂說是臣召南按古人俱以謀面一節為有夏盛時事故以宅人為任賢三宅無義民為去不肖宋儒始改其說凡下文言三宅俱作任賢解於文為順亦越成湯陟句蔡沈以陟字連下文為句余芑舒曰古注讀是乃用三有宅克即宅曰三有俊克即俊傳湯乃用三有居惡人之法能使就其居言服罪又曰能用剛柔正直三德之俊能就其俊事言明德臣召南按孔傳以虞書之五宅三居解三宅以洪範之三德解三俊理亦可通但此篇三宅三俊始終是任官惟賢才左右惟其人之意呂祖謙曰三宅共政者也三俊待用者也然則克即宅言舊任者不曠職克即俊言新取者皆得人於經文前後皆協其在受德暋傳受德紂字帝乙愛焉為作善字王安石曰桀紂所用非人皆本於身有惡德故曰桀德受德者推本言之也臣召南按孔傳解桀德云桀之為德說甚明白而解受德則云帝乙愛紂為作善字何其曲也王安石說是太史傳掌邦六典之二六典監本訛大典今改正司徒司馬司空亞旅傳則是文武未伐紂時時字監本訛特据古本改正三亳傳及亳人之歸文王者三所為之立監疏文王既未伐紂亳民不應歸之臣召南按孔疏於傳雖不可通必為附㑹此條可謂直紏傳違三亳必非文王時官也是訓用違蔡沈以連上惟有司之牧夫為句率惟謀從容德蔡沈以率惟謀為句從容德為句陳櫟曰孔傳讀是其克詰爾戎兵以陟禹之迹傳以升禹治水之舊迹王樵曰禹迹即所謂弼成五服至於五千外薄四海咸建五長是也臣召南按孔傳以治水言非也司寇蘇公式句蔡沈以式字屬下句兹式句有愼句蔡沈以四字為句陳櫟曰兩式字孔傳同訓法為優以列用中罰蘇軾曰列者前後相比猶今言例也尚書注疏卷十六考證
