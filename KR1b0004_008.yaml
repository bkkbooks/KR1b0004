body:
  text: 尚書注疏卷八漢孔氏傳唐陸德明音義孔穎達疏商書盤庚上盤庚下盤庚中序盤庚五遷將治亳殷𫝊自湯至盤庚凡五遷都盤庚治亳殷民咨胥怨𫝊胥相也民不欲徙乃咨嗟憂愁相與怨上作盤庚三篇音義盤本又作般步千反治直吏反胥徐思餘反怨紆萬反疏正義曰商自成湯以來屢遷都邑仲丁河亶甲祖乙皆有言誥歷載於篇盤庚最在其後故序總之自湯至盤庚凡五遷都今盤庚將欲遷居而治於亳之殷地民皆戀其故居不欲移徙咨嗟憂愁相與怨上盤庚以言辭誥之史叙其事作盤庚三篇𫝊正義曰經言不常厥邑于今五邦故序言盤庚五遷𫝊嫌一身五遷故辨之云自湯至盤庚凡五遷都也上文言自契至於成湯八遷并數湯為八此言盤庚五遷又并數湯為五湯一人再數故班固云殷人屢遷前八後五其實止十二也此序云盤庚將治亳殷下𫝊云殷亳之别名則亳殷即是一都湯遷還從先王居也汲冡古文云盤庚自奄遷於殷殷在鄴南三十里束晳云尚書序盤庚五遷將治亳殷舊說以為居亳亳殷在河南孔子壁中尚書云將始宅殷是與古文不同也漢書項羽𫝊云洹水南殷墟上今安陽西有殷束晳以殷在河北與亳異也然孔子壁內之書安國先得其本此將治亳殷不可作將始宅殷亳字磨滅容或為宅壁內之書安國先得始皆作亂其字與治不類無緣誤作始字知束晳不見壁內之書妄為說耳若洹水南有殷墟或當餘王居之非盤庚也盤庚治於亳殷紂滅在於朝歌則盤庚以後遷於河北蓋盤庚後王有從河自亳地遷於洹水之南後又遷於朝歌釋詁云胥皆也相亦是皆義故通訓胥為相也民不欲徙乃咨嗟憂愁相與怨上經云民不適有居是怨上之事也仲丁祖乙亦是遷都序無民怨之言此獨有怨者盤庚祖乙之曾孫也祖乙遷都於此至今多歷年世民居已久戀舊情深前王三徙誥令則行曉喻之易故無此言此則民怨之深故序獨有此事彼各一篇而此獨三篇者謂民怨上故勸誘之難也民不欲遷而盤庚必遷者鄭𤣥云祖乙居耿後奢侈踰禮土地迫近山川嘗圯焉至陽甲立盤庚為之臣乃謀徙居湯舊都又序注云民居耿久奢淫成俗故不樂徙王肅云自祖乙五世至盤庚元兄陽甲宫室奢侈下民邑居墊隘水泉潟鹵不可以行政化故徙都於殷皇甫謐云耿在河北迫近山川自祖辛以來民皆奢侈故盤庚遷於殷此三者之說皆言奢侈鄭𤣥既言君奢又言民奢王肅專謂君奢皇甫謐專謂民奢言君奢者以天子宫室奢侈侵奪下民言民奢者以豪民室宇過度逼迫貧乏皆為細民弱劣無所容居欲遷都改制以寬之富民戀舊故違上意不欲遷也案檢孔傳無奢侈之語惟下篇云今我民用蕩析離居罔有定極傳云水泉沉溺故蕩析離居無安定之極徙以為之極孔意蓋以地勢汙下又久居水變水泉潟鹵不可行化故欲遷都不必為奢侈也此以君名名篇必是為君時事而鄭𤣥以為上篇是盤庚為臣時事何得專輒謬妄也盤庚上𫝊盤庚殷王名殷質以名篇音義盤庚殷王名馬云祖乙曾孫祖丁之子不言盤庚誥何非但録其誥也取其徙而立功故以盤庚名篇疏正義曰此三篇皆以民不樂遷開解民意告以不遷之害遷都之善也中上二篇未遷時事下篇既遷後事上篇人皆怨上初唘民心故其辭尤切中篇民已少悟故其辭稍緩下篇民既從遷故辭復益緩哀十一年左傳引此篇云盤庚之誥則此篇皆誥辭也題篇不曰盤庚誥者王肅云取其徙而立功故但以盤庚名篇然仲丁祖乙河亶甲等皆以王名篇則是史意異耳未必見他義𫝊正義曰周書諡法成王時作故桓六年左傳云周人以諱事神殷時質未諱君名故以王名名篇也上仲丁祖乙亦是王名於此始作傳者以上篇經亡此經稱盤庚故就此解之史記殷本紀云盤庚崩弟小辛立殷復衰百姓思盤庚乃作盤庚三篇與此序違非也鄭𤣥云盤庚湯十世孫祖乙之曾孫以五遷繼湯篇次祖乙故繼之于上纍之祖乙為湯𤣥孫七世也又加祖乙復其祖父通盤庚故十世本紀云祖乙崩子祖辛立崩子開甲立崩弟祖丁立崩開甲之子南庚立崩祖丁子陽甲立崩弟盤庚立是祖乙生祖辛祖辛生祖丁祖丁生盤庚故為曾孫盤庚遷於殷𫝊亳之别名民不適有居𫝊適之也不欲之殷有邑居率籲衆戚出矢言𫝊籲和也率和衆憂之人出正直之言曰我王來既爰宅於兹𫝊我王祖乙居耿爰於也言祖乙巳居於此重我民無盡劉𫝊劉殺也所以遷此重我民無欲盡殺故不能胥匡以生卜稽曰其如台𫝊言民不能相匡以生則當卜考於龜以徙曰其如我所行先王有服恪謹天命兹猶不常寧𫝊先王有所服行敬謹天命如此尚不常安有可遷輒遷不常厥邑于今五邦𫝊湯遷亳仲丁遷囂河亶甲居相祖乙居耿我往居亳凡五徙國都今不承于古罔知天之斷命𫝊今不承古而徙是無知天將斷絶汝命矧曰其克從先王之烈𫝊天將絶命尚無知之況能從先王之業乎若顚木之有由蘖𫝊言今往遷都更求昌盛如顛仆之木有用生蘖哉天其永我命于兹新邑𫝊言天其長我命於此新邑不可不徙紹復先王之大業砥綏四方𫝊言我徙欲如此音義籲音喻戚千歷反盡子忍反稽工兮反台音怡恪苦角反五邦馬云謂商邱亳囂相耿也斷又音短從才容反蘖五逹反本又作枿馬云顛本而肄生曰枿仆音赴又步北反砥之履反疏正義曰盤庚欲遷於亳之殷地其民不欲適彼殷地别有邑居莫不憂愁相與怨上盤庚率領和諧其衆憂之人出正直之言以曉告曰我先王初居此者從舊都來於是宅於此地所以遷於此者為重我民無欲盡殺故先王以久居墊隘不遷則死見下民不能相匡正以生故謀而來徙以徙為善未敢專決乂考卜於龜以徙既獲吉兆乃曰其如我所行欲徙之吉先王成湯以來凡有所服行敬順天命如此尚不常安可徙則徙不常其邑於今五邦矣今若不承於古徙以避害則是無知天將斷絶汝命矣天將絶命尚不能知況曰其能從先王之基業乎今我往遷都更求昌盛若顛仆之木有用生蘖哉人衰更求盛猶木死生蘖哉我今遷向新都上天其必長我殷之王命於此新邑繼復先王之大業致行其道以安四方之人我徙欲如此耳汝等何以不願徙乎前云若不徙以避害則天將絶汝命謂絶臣民之命明亦絶我殷王之命復云若遷往新都天其長我殷之王命明亦長臣民之命互文也𫝊正義曰此序先亳後殷亳是大名殷是亳內之别名鄭𤣥云商家自徙此而號曰殷鄭以此前未有殷名也中篇云殷降大虐將遷於殷先正其號名知於此號為殷也雖兼號為殷而商名不改或稱殷又有兼稱殷商商頌云商邑翼翼撻彼殷武是單稱之也又大雅云殷商之旅咨汝殷商是兼稱之也亳是殷地大名故殷社謂之亳社其亳鄭𤣥以為偃師皇甫謐以為梁國穀熟縣或云濟隂亳縣說既不同未知誰是釋詁云適之往也俱訓為往故適得為之不欲往彼殷地别有新邑居也籲即裕也是寬意故為和也憂則不和戚訓憂也故率和衆憂之人出正直之言詩云其直如矢故以矢言為正直之言孔以祖乙圯於相地遷都於耿今盤庚自耿遷於殷以我王為祖乙此謂耿也劉殺釋詁文水泉鹹鹵不可行化王化不行殺民之道先王所以決欲遷此者重我民無欲盡殺故也不徙所以不能相匡以生者謂水泉沉溺人民困苦不能以義相匡正以生乂考卜於龜以徙周禮太卜大遷則貞龜是遷必卜也下云于今五邦自湯以來數之則此言先王總謂成湯至祖乙也先王有所服行謂行有典法言能敬順天命即是有所服行也盤庚言先王敬順天命如此尚不常安有可遷輒遷況我不能敬順天命不遷民必死矣故不可不遷也孔以盤庚意在必遷故通數我往居亳為五邦鄭王皆云湯自商徙亳數商亳囂相耿為五計湯既遷亳始建王業此言先王遷都不得逺數居亳之前充此數也釋詁云枿餘也李巡曰枿槁木之餘也郭璞云晋衛之間曰枿是言木死顛仆其根更生蘖哉此都毁壞若枯死之木若棄去毁壞之邑更得昌盛猶顛仆枯死之木用生蘖哉盤庚斆於民由乃在位以常舊服正法度𫝊斆教也教人使用汝在位之命用常故事正其法度曰無或敢伏小人之攸針𫝊言無有敢伏絶小人之所欲葴規上者戒朝臣音義斆户教反度如字針之林反馬云諫也朝直遙反疏正義曰前既略言遷意今復並戒臣民盤庚先教於民云汝等當用汝在位之命用舊常故事正其法度欲令民徙從其臣言也民從上命即是常事法度也又戒臣曰汝等無有敢伏絶小人之所欲針規上者𫝊正義曰文王世子云小樂正斆干大胥贊之籥師斆戈籥師丞贊之彼並是教舞干戈知斆為教也小民等患水泉沉溺欲針規上而徙汝臣下勿抑塞伏絶之鄭𤣥云奢侈之俗小民咸苦之欲言於王今將屬民而詢焉故敕以無伏之王命衆悉至于庭𫝊衆羣臣以下疏𫝊正義曰周禮小司寇掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君是國將大遷必詢及於萬民故知衆悉至王庭是羣臣以下謂及下民也民不欲徙由臣不助王勸民故以下多是責臣之辭王若曰格汝衆豫告汝訓𫝊告汝以法教汝猷黜乃心無傲從康傳謀退汝違上之心無傲慢從心所安古我先王亦惟圖任舊人共政𫝊先王謀任久老成人共治其政音義傲五報反任而鴆反疏正義曰此篇所言先王其文無指斥者皆謂成湯以來諸賢王也下言神后髙后者指謂湯耳下篇言古我先王適于山者乃謂遷都之王仲丁祖乙之等也此言先王謂先世賢王此既言先王下句王播告之王用丕欽蒙上之先不言先省文也王播告之修不匿厥指𫝊王布告人以所修之政不匿其指音義播波餓反匿女力反疏傳正義曰上句言先王用舊人共政下云王播告之修當謂告臣耳𫝊言布告人者以下云民川丕變是必告臣亦又告民王用丕欽罔有逸言民用丕變𫝊王用大敬其政教無有逸豫之言民用大變從化今汝聒聒起信險膚豫弗知乃所訟傳聒聒無知之貌起信險僞膚受之言我不知汝所訟言何謂音義聒古活反馬及說文皆云拒善自用之意疏傳正義曰鄭𤣥云聒讀如聒耳之聒聒聒難告之貌王肅云聒聒拒善自用之意也此傳以聒聒為無知之貌以聒聒是多言亂人之意也起信險膚者言發起所行專信此險僞膚受淺近之言信此浮言妄有爭訟我不知汝所訟言何謂言無理也非豫自荒兹德惟汝含德不惕豫一人豫若觀火𫝊我之欲徙非廢此德汝不從我命所含惡德但不畏懼我耳我視汝情如視火音義惕他厯反疏正義曰言先王敬其教民用大變我命教汝汝不肯徙非我自廢此丕欽之德惟汝之所含德甚惡不畏懼我一人故耳汝含藏此意謂我不知我見汝情若觀火言見之分明如見火也豫亦拙謀作乃逸傳逸過也我不威脅汝徙是我拙謀成汝過音義拙之劣反疏傳正義曰逸過釋言文我若以威加汝汝自不敢不遷則無違上之過也我不威脅汝徙乃是我亦拙謀作成汝過也恨民以恩導之而不從已也若網在綱有條而不紊若農服田力穡乃亦有秋傳紊亂也穡耕稼也下之順上當如網在綱各有條理而不亂也農勤穡則有秋下承上則有福音義紊音問徐音文疏傳正義曰紊是絲亂故為亂也稼穡相對則種之曰稼斂之曰穡穡是秋收之名得為耕穫總稱故云穡耕稼下承上則有福福謂祿賞汝克黜乃心施實德于民至于婚友丕乃敢大言汝有積德傳汝羣臣能退汝違上之心施實德於民至于婚姻僚友則我大乃敢言汝有積德之臣乃不畏戎毒于逺邇惰農自安不昏作勞不服田畝越其罔有黍稷𫝊戎大昏强越於也言不欲徙則是不畏大毒於逺近如怠惰之農茍自安逸不强作勞於田畝則黍稷無所有音義昏馬同本或作暋音敏爾雅昏暋皆訓强故兩存越本又作粵音曰于也强其丈反疏傳正義曰戎大昏强越於皆釋詁文孫炎曰昏夙夜之强也書曰不昏作勞引此解彼是亦讀此為昏也鄭𤣥讀昏為暋訓為勉也與孔不同𫝊云言不欲徙則是不畏大毒於逺近其意言不徙則有毒毒為禍患也逺近謂徐促言害至有早晚也不强於作勞則黍稷無所穫以喻不遷於新邑則福祿無所有也此經惰農弗昏無黍稷對上服田力穡乃亦有秋但其文有詳略耳汝不和吉言于百姓惟汝自生毒傳責公卿不能和喻百官是自生毒害疏傳正義曰此篇上下皆言民此獨云百姓則知百姓是百官也百姓既是百官和吉言者又在百官之上知此經是責公卿不能和喻善言於百官使之樂遷也不和百官必將遇禍是公卿自生毒害乃敗禍姦宄以自災于厥身傳言汝不相率共徙是為敗禍姦宄以自災之道乃既先惡于民乃奉其恫汝悔身何及傳羣臣不欲徙是先惡於民恫痛也不徙則禍毒在汝身徒奉持所痛而悔之則於身無所及音義宄音軌奉孚勇反注同恫敕動反又音通痛也疏𫝊正義曰羣臣是民之師長當倡民為善羣臣亦不欲徙是乃先惡於民也恫痛釋言文相時憸民猶胥顧于針言其發有逸口矧豫制乃短長之命𫝊言憸利小民尚相顧於針誨恐其發動有過口之患况我制汝死生之命而汝不相教從我是不若小民汝曷弗告朕而胥動以浮言恐沈于衆𫝊曷何也責其不以情告上而相恐動以浮言不徙恐汝沈溺於衆有禍害若火之燎于原不可嚮邇其猶可撲滅𫝊火炎不可嚮近尚可撲滅浮言不可信用尚可刑戮絶之則惟汝衆自作弗靖非豫有咎傳我刑戮汝非我咎也靖謀也是汝自為非謀所致音義相息亮反馬云視也徐息羊反憸息廉反馬云憸利小小見事之人也徐七漸反曷何末反燎力召反又力鳥反又力紹反嚮許亮反撲普卜反近附近之近靖馬云安也疏正義曰又責大臣不相教遷徙是不如小民我視彼憸利小民猶尚相顧於針規之言恐其發舉有過口之患故以言相規患之小者尚知畏避況我為天子制汝短長之命威恩甚大汝不相教從我乃是汝不如小民汝若不欲徙何不以情告我而輒相恐動以浮華之言乃語民云國不可徙我怨汝自取沈溺於衆人而身被刑戮之禍害此浮言流行若似火之燎於原野炎熾不可嚮近其猶可撲之使滅以喻浮言不可止息尚可刑戮使絶也若以刑戮加汝則是汝衆自為非謀所致此耳非我有咎過也𫝊正義曰曷何同音故曷為何也顧氏云汝以浮言恐動不徙更是無益我恐汝自取沈溺於衆人不免禍害也我刑戮汝汝自招之非我咎也靖謀釋詁文告民不徙者非善謀也由此而被刑戮是汝自為非謀所致也遲任有言曰人惟求舊器非求舊惟新𫝊遲任古賢言人貴舊器貴新汝不徙是不貴舊古我先王暨乃祖乃父胥及逸勤豫敢動用非罰傳言古之君臣相與同勞逸子孫所宜法之我豈敢動用非常之罰脅汝乎世選爾勞豫不掩爾善𫝊選數也言我世世選汝功勤不掩蔽汝善是我忠於汝兹豫大享于先王爾祖其從與享之𫝊古者天子録功臣配食於廟大享蒸嘗也所以不掩汝善作福作災豫亦不敢動用非德𫝊善自作福惡自作災我不敢動用非罰加汝非德賞汝乎從汝善惡而報之音義遲直疑反徐持夷反任而金反馬云古老成人選息轉反又蘇管反掩本又作弇數色主反與音預蒸之承反疏正義曰可遷即遷是先王舊法古之賢人遲任有言曰人惟求舊器非求舊惟新言人貴舊器貴新汝不欲徙是不貴舊反遲任也古者我之先王及汝祖汝父相與同逸豫同勤勞汝為人子孫宜法汝父祖當與我同其勞逸我豈敢動用非常之罰脅汝乎自我先王以至於我世世數汝功勞我不掩蔽汝善是我忠於汝也以此故我大享祭于先王汝祖其從我先王與在宗廟而歆享之是我不掩汝善也汝有善自作福汝有惡自作災我亦不敢動用非德之賞妄賞汝各從汝善惡而報之耳其意告臣言從上必有賞違我必有罰也𫝊正義曰遲任古賢者其人既沒其言立於後世知是古賢人也鄭𤣥云古之賢史王肅云古老成人皆謂賢也釋詁云算數也舍人曰釋數之曰算選即算也故訓為數經言世世數汝功勞是從先王至已常行此事故云是我忠於汝也言己之忠責臣之不忠也周禮大宗伯祭祀之名天神曰祀地祗曰祭人鬼曰享此大享于先王謂天子祭宗廟也傳解天子祭廟得有臣祖與享之意言古者天子録功臣配食於廟故臣之先祖得與享之也古者孔氏據已而道前世也此殷時已然矣大享蒸嘗者蒸嘗是秋冬祭名謂之大享者以事各有對若蒸嘗對禘祫則禘祫為大蒸嘗為小若四時自相對則蒸嘗為大礿祠為小以秋冬物成可薦者衆故蒸嘗為大春夏物未成可薦者少故礿祠為小也知蒸嘗有功臣與祭者案周禮司勳云凡有功者銘書於王之大常祭于大蒸司勳詔之是也嘗是蒸之類而傳以嘗配之魯頌曰秋而載嘗是也祭統云內祭則大嘗禘是也外祭則郊社是也然彼以祫為大嘗知此不以蒸嘗時為禘祫而直據時祭者以殷祫於三時非獨蒸嘗也秋冬之祭尚及功臣則禘祫可知惟春夏不可耳以物未成故也近代已來惟禘祫乃祭功臣配食時祭不及之也近代已來功臣配食各配所事之君若所事之君其廟已毁時祭不祭毁廟其君尚不時祭其臣固當止矣禘祫則毁廟之主亦在焉其時功臣亦當在也王制云犆礿祫禘祫嘗祫蒸諸侯礿犆禘一犆一祫嘗祫蒸祫此王制之文夏殷之制天子春惟時祭其夏秋冬既為祫又為時祭諸侯亦春為時祭夏惟作祫不作祭秋冬先作時祭而後祫周則春曰祠夏曰礿三年一祫在秋五年一禘在夏故公羊𫝊云五年再殷祭禮緯云三年一祫五年一禘此是鄭氏之義未知孔意如何豫告汝于難若射之有志𫝊告汝行事之難當如射之有所準志必中所志乃善音義射食夜反準音准中丁仲反疏正義曰既言作福作災由人行有善惡故復教臣行善我告汝於行事之難猶如射之有所準志志之主欲得中也必中所志乃為善耳以喻人將有行豫思念之行得其道為善耳其意言遷都是善道當念從我言也𫝊正義曰此𫝊惟順經文不言喻意鄭𤣥云我告汝於我心至難矣夫射者張弓屬矢而志在所射必中然後發之為政之道亦如是也以己心度之可施於彼然後出之汝無侮老成人無弱孤有幼𫝊不用老成人之言是侮老之不徙則孤幼受害是弱易之音義侮亡甫反易以䜴反疏𫝊正義曰老謂見其年老謂其無所復知弱謂見其幼弱謂其未有所識鄭云老弱皆輕忽之意也老成人之言云可徙不用其言是侮老之也不徙則水泉鹹鹵孤幼受害不念其害則是卑弱輕易之也各長于厥居勉出乃力聽豫一人之作猷𫝊盤庚敕臣下各思長於其居勉盡心出力聽從遷徙之謀音義長丁丈反疏𫝊正義曰於時羣臣難毁其居宅惟見目前之利不思長久之計其臣非一共為此心盤庚敕臣下各思長久於其居處勉强盡心出力聽從我遷徙之謀自此以下皆是也無有逺邇用罪伐厥死用德彰厥善𫝊言逺近待之如一罪以懲之使勿犯伐去其死道德以明之使勸慕競為善音義去羌吕反疏正義曰此即遷徙之謀也言我至新都撫養在下無有逺之與近必當待之如一用刑殺之罪伐去其死道用照察之德彰明其行善有過罪以懲之使民不犯非法死刑不用是伐去其死道伐若伐樹然言止而不復行用也有善者人主以照察之德加賞祿以明之使競慕為善是彰其善也此二句相對上言用罪伐厥死下宜言用賞彰厥生不然者上言用刑下言賞善死是刑之重者舉重故言死有善乃可賞故言彰厥善行賞是德故以德言賞人生是常無善亦生不得言彰厥生故文互邦之臧惟汝衆傳有善則衆臣之功邦之不臧惟豫一人有佚罰𫝊佚失也是已失政之罰罪己之義凡爾衆其惟致告𫝊致我誠告汝衆自今至于後日各恭爾事齊乃位度乃口傳奉其職事正齊其位以法度居汝口勿浮言音義臧徐子郎反佚音逸度徐如字亦作渡疏正義曰度法度也故傳言以法度居汝口也罰及爾身弗可悔𫝊不從我謀罰及汝身雖悔可及乎盤庚中盤庚作惟涉河以民遷傳為此南渡河之法用民徙乃話民之弗率誕告用亶其有衆傳話善言民不循教發善言大告用誠於衆咸造勿䙝在王庭傳造至也衆皆至玉庭無䙝慢盤庚乃登進厥民𫝊升進命使前音義話胡快反馬云告也言也誕徐音但亶丁但反馬本作單音同誠也造七報反注同馬在早反云為也䙝息列反疏正義曰盤庚於時見都河北欲遷向河南作為南渡河之法欲用民徙乃出善言以告曉民之不循教者大為教告用誠心於其所有之衆人於時衆人皆至無有䙝慢之人盡在於王庭盤庚乃升進其民延之使前而衆告之史叙其事以為盤庚發誥之目𫝊正義曰鄭𤣥云作渡河之具王肅云為此思南渡河之事此𫝊言南渡河之法皆謂造舟船渡河之具是濟水先後之次思其事而為之法也釋詁云話言也孫炎曰話善人之言也王苦民不從教必發善言告之故以話為善言鄭𤣥詩箋亦云話善言也曰明聽朕言無荒失朕命𫝊荒廢嗚呼古我前后罔不惟民之承𫝊言我先世賢君無不承安民而恤之保后胥戚鮮以不浮于天時𫝊民亦安君之政相與憂行君令浮行也少以不行於天時者言皆行天時音義鮮息淺反疏𫝊正義曰以君承安民而憂之故民亦安君之政相與憂行君令使君令必行責時羣臣不憂行君令也舟船浮水而行故以浮為行也行天時也順時布政若月令之為也殷降大虐先王不懷𫝊我殷家於天降大災則先王不思故居而行徙疏傳正義曰遷徙者止為邑居墊隘水泉鹹鹵非為避天災也此𫝊以虐為災懷為思言殷家於天降大災則先王不思故居而行徙者以天時人事終是相將邑居不可行化必將天降之災上云不能相匡以生罔知天之斷命即是天降災也厥攸作視民利用遷𫝊其所為視民有利則用徙汝曷弗念我古后之聞𫝊古后先王之聞謂遷事承汝俾汝惟喜康共非汝有咎比于罰𫝊今我法先王惟民之承故承汝使汝徙惟與汝共喜安非謂汝有惡徙汝令比近於殃罰音義曷何末反下同俾必爾反咎其九反比毗志反徐扶至反注及下同共羣用反令力呈反近附近之近疏正義曰先王為政惟民之承今我亦法先王故承安汝使汝徙惟歡喜安樂皆與汝共之非謂汝有咎惡而徙汝令比近於殃罰也豫若籲懷兹新邑亦惟汝故以丕從厥志𫝊言我順和懷此新邑欲利汝衆故大從其志而徙之音義籲羊戌反疏正義曰盤庚言我順於道理和協汝衆歸懷此新邑者非直為我王家亦惟利汝衆故為此大從我本志而遷徙不有疑也今豫將試以汝遷安定厥邦𫝊試用汝不憂朕心之攸困𫝊所困不順上命乃咸大不宣乃心欽念以忱動豫一人𫝊汝皆大不布腹心敬念以誠感動我是汝不盡忠爾惟自鞠自苦𫝊鞠窮也言汝為臣不忠自取窮苦若乘舟汝弗濟臭厥載傳言不徙之害如舟在水中流不渡臭敗其所載物音義忱市林反鞠居六反臭徐尺售反載如字又在代反疏正義曰臭是氣之別名古者香氣穢氣皆名為臭易云其臭如蘭謂香氣為臭也晉語云惠公改葬申生臭徹於外謂穢氣為臭也下文覆述此意云無起穢以自臭則此臭謂穢氣也肉敗則臭故以臭為敗船不渡水則敗其所載物也爾忱不屬惟胥以沈不其或稽自怒曷瘳𫝊汝忠誠不屬逮古苟不欲徙相與沈溺不考之先王禍至自怒何瘳差乎音義屬音燭注同馬云獨也沈直林反瘳敕留反疏正義曰盤庚責其臣民汝等不用徙者由汝忠誠不能屬逮於古賢茍不欲徙惟相與沈溺於衆不欲徙之言不具有考驗於先王遷徙之事汝既不考於古及其禍至乃自忿怒何所瘳差也汝不謀長以思乃災汝誕勸憂𫝊汝不謀長久之計思汝不徙之災茍不欲徙是大勸憂之道疏正義曰凡人以善自勸則善事多若以憂自勸則憂來衆今不徙則憂來衆是自勸勵以憂愁之道今其有今罔後汝何生在上𫝊言不徙無後計汝何得久生在人上禍將及汝疏正義曰顧氏云責羣臣汝今日其且有今目前之小利無後日久長之計患禍將至汝何得久生在民上也今豫命汝一無起穢以自臭𫝊我一心命汝汝違我是自臭敗音義穢於廢反疏正義曰今我命汝是我之一心也汝當從我無得起為穢惡以自臭敗汝違我命是起穢以自臭也恐人倚乃身迂乃心𫝊言汝既不欲徙又為他人所誤倚曲迂僻音義倚於綺反徐於竒反迂音于僻匹亦反疏正義曰言汝心既不欲徙旁人或更誤汝我又恐他人倚曲汝身迂僻汝心使汝益不用徙也傳正義曰人心不能自决則好用非理之謀言汝既不欲遷徙又為他人所誤盤庚疑其被誤故言此也以物倚物者必曲故倚為曲也迂是回也回行必僻故迂為僻也豫迓續乃命于天豫豈汝威用奉畜汝衆𫝊迓迎也言我徙欲迎續汝命於天豈以威脅汝乎用奉畜養汝衆音義迓五駕反畜許竹反下同脅虛業反疏𫝊正義曰迓迎釋詁文不遷必將死矣天欲遷以延命天意向汝我欲迎之天斷汝命我欲續之我今徙者欲迎續汝命於天豈以威脅汝乎遷都惟用奉養汝衆臣民耳豫念我先神后之勞爾先豫丕克羞爾用懷爾然𫝊言我亦法湯大能進勞汝以義懷汝心而汝違我是汝反先人音義勞力報反又如字注同疏正義曰我念我先世神后之君成湯愛勞汝之先人故我大能進用汝與汝爵位用以道義德懷安汝心耳然汝乃違我命是汝反先人也傳正義曰易稱神者妙萬物而為言也殷之先世神明之君惟有湯耳故知神后謂湯也下髙后先后與此神后一也神者言其通聖髙者言其德尊此神后言先於髙后略而不言先其下直言先后又略而不言髙從上省文也勞爾先謂愛之也勞者勤也閔其勤勞而慰勞之勞亦愛之義故論語云愛之能勿勞乎是勞為愛也追言湯勞汝先則此所責之臣其祖於成湯之世已在朝廷世仕王朝而不用已命故責之深也失于政陳于兹髙后丕乃崇降罪疾曰曷虐朕民𫝊崇重也今既失政而陳久於此而不徙湯必大重下罪疾於我曰何為虐我民而不徙乎汝萬民乃不生生暨豫一人猷同心𫝊不進進謀同心徙先后丕降與汝罪疾曰曷不暨朕幼孫有比傳言非但罪我亦將罪汝幼孫盤庚自謂比同心故有爽德自上其罰汝汝罔能迪𫝊湯有明德在天見汝情下罰汝汝無能道言無辭音義重直勇反又直恭反疏正義曰盤庚以民不願遷言神后將罪汝欲懼之使從已也我所以必須徙者我今失於政教陳久於此民將有害髙德之君成湯必忿我不徙大乃重下罪疾於我曰何為殘虐我民而不徙乎我既欲徙而汝與萬民乃不進進與我一人謀計同心則我先君成湯大下與汝罪疾曰何故不與我幼孫盤庚有相親比同心徙乎汝不與我同心故湯有明德從上見汝之情其下罪罰於汝汝實有罪無所能道言無辭以自解說也𫝊正義曰崇重釋詁文又云塵久也孫炎曰陳居之久久則生塵矣古者塵陳同也故陳為久之義物之生長則必漸進故以生生為進進王肅亦然進進是同心願樂之意也此實責羣臣而言汝萬民者民心亦然因博及之訓爽為明言其見下故稱明德詩稱三后在天死者精神在天故言下見汝古我先后既勞乃祖乃父𫝊勞之共治人汝共作我畜民汝有戕則在乃心𫝊戕殘也汝共我治民有殘人之心而不欲徙是反父祖之行我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死𫝊言我先王安汝父祖之忠今汝不忠汝父祖必斷絶棄汝命不救汝死音義戕在良反又七良反行下孟反斷丁緩反疏正義曰又責羣臣古我先君成湯既愛勞汝祖汝父與之共治民矣汝今共為我養民之官是我於汝與先君同也而汝有殘虐民之心非我令汝如此則在汝心自為此惡是汝反祖父之行雖汝祖父亦不祐汝我先君安汝祖汝父之忠汝祖汝父忠於先君必忿汝違我乃斷絶棄汝命不救汝死言汝違我命故汝祖父亦忿見湯罪汝不救汝死也傳正義曰勞之共治人者下句責臣之身云汝共作我畜民明先后勞其祖父是勞之共治民也春秋宣十八年邾人戕鄫子左傳云凡自虐其君曰弒自外曰戕戕為殘害之義故為殘也先后愛勞汝祖汝父與共治民汝祖父必有愛人之心作訓為也汝今共為我養民之官而有殘民之心而不用徙以避害是汝反祖父之行盤庚距湯年世多矣臣父不及湯世而云父者與祖連言之耳兹豫有亂政同位具乃貝玉𫝊亂治也此我有治政之臣同位於父祖不念盡忠但念貝玉而已言其貪乃祖乃父丕乃告我髙后曰作丕刑于朕孫𫝊言汝父祖見汝貪而不忠必大乃告湯曰作大刑於我子孫求討不忠之罪迪髙后丕乃崇降弗祥𫝊言汝父祖開道湯大重下不善以罰汝陳忠孝之義以督之音義治直吏反盡子忍反告工號反我髙后本又作乃祖乃父疏正義曰又責臣云汝祖父非徒不救汝死乃更請與汝罪於此我有治政之臣同位於其父祖其位與父祖同心與父祖異不念忠誠但念具汝貝玉而已言其貪而不忠也汝先祖先父以汝如此大乃告我髙后曰為大刑於我子孫以此言開道我髙后故我髙后大乃下不善之殃以罰汝成湯與汝祖父皆欲罪汝汝何以不從我徙乎傳正義曰亂治釋詁文舍人曰亂義之治也孫炎曰亂治之理也大臣理國之政此者所責之人故言於此我有治政之臣言其同位於父祖責其位同而心異也貝者水蟲古人取其甲以為貨如今之用錢然漢書食貨志具有其事貝是行用之貨也貝玉是物之最貴者責其貪財故舉二物以言之當時之臣不念盡忠於君但念具貝玉而已言其貪也作大刑於我子孫者上句言成湯罪此諸臣其祖父不救子孫之死此句言臣之祖父請成湯討其子孫以不從已故責之益深先祖請討非盤庚所知原神之意而為之辭以懼其子孫耳訓迪為道言汝父祖開道湯也不從君為不忠違父祖為不孝父祖開道湯下罰欲使從君順祖陳忠孝之義以督勵之嗚呼今豫告汝不易𫝊凡所言皆不易之事永敬大恤無胥絶逺𫝊長敬我言大憂行之無相與絶逺棄廢之汝分猷念以相從各設中于乃心𫝊羣臣當分明相與謀念和以相從各設中正於汝心乃有不吉不迪𫝊不善不道謂凶人顛越不恭暫遇姦宄傳顛隕越墜也不恭不奉上命暫遇人而劫奪之為姦於外為宄於內我乃劓殄滅之無遺育無俾易種于兹新邑𫝊劓割育長也言不吉之人當割絶滅之無遺長其類無使易種於此新邑往哉生生今豫將試以汝遷永建乃家傳自今以往進進於善我乃以汝徙長立汝家卿大夫稱家音義不易之易以䜴反注同易種之易如字又以䜴反注同逺于萬反又如字注同分扶問反又如字注同暫才淡反隕于敏反劓魚器反徐吾氣反殄徒典反長丁丈反下遺長同疏正義曰盤庚以言事將畢欲戒使入之故嗚呼而嘆之今我告汝皆不易之事言其難也事既不易當長敬我言大憂行之無相絶逺棄廢之必須存心奉行汝羣臣常分輩相與計謀念和協以相從各設中正于汝心勿為殘害之事汝羣臣若有不善不道隕墜禮法不恭上命暫逢遇人即為姦宄而劫奪之我乃割絶滅之無有遺餘生長所以然者欲無使易其種類於此新邑故耳自今已往哉汝當進進於善今我將用以汝遷長立汝使汝在位傳諸子孫勿得違我言也𫝊正義曰此易讀為難易之易不易言其難也王肅云告汝以命之不易為難鄭𤣥云我所以告汝者不變易言必行之謂盤庚自道已言必不改易與孔異釋詁云隕落隕墜顛越也是從上倒下之言故以顛為隕越是遺落為墜也左𫝊僖九年齊桓公云恐隕越於下文十八年史克云弗敢失墜隕越是遺落廢失之意故以隕墜不恭為不奉上命也暫遇人而劫奪之謂逢人即劫為之無已成十七年左傳曰亂在外為姦在內為宄是劫奪之事故以劫奪解其姦宄也五刑截鼻為劓故劓為割也育長釋詁文不吉之人當割絶滅之無遺長其類謂早殺其人不使得子孫有此惡類也易種者即今俗語云相染易也惡種在善人之中則善人亦變易為惡故絶其類無使易種於此新邑也滅去惡種乃是常法而言於此新邑言已若至新都當整齊使潔清長立汝家謂賜之以族使子孫不絶左傳所謂諸侯命氏是也王朝大夫天子亦命之氏故云立汝家也盤庚下盤庚既遷奠厥攸居乃正厥位𫝊定其所居正郊廟朝社之位綏爰有衆曰無戲怠懋建大命𫝊安於有衆戒無戲怠勉立大教今豫其敷心腹腎腸厯告爾百姓于朕志𫝊布心腹言輸誠於百官以告志罔罪爾衆爾無共怒協比讒言豫一人傳羣臣前有此過故禁其後今我不罪汝汝勿共怒我合比凶人而妄言音義奠田薦反朝直遙反腎時忍反腸徐持良反比毗志反讒士咸反疏正義曰盤庚既遷至殷地定其國都處所乃正其郊廟朝社之位又屬民而聚之安慰於其所有之衆曰汝等自今以後無得逰戲怠惰勉力立行教命今我其布心腹腎腸輸寫誠信厯遍告汝百姓於我心志者欲遷之日民臣共怒盤庚盤庚恐其怖懼故開解之今我無復罪汝衆人我既不罪汝汝無得如前共為忿怒協比讒言毁惡我一人恕其前愆與之更始也𫝊正義曰訓攸為所定其所居總謂都城之內官府萬民之居處也鄭𤣥云徙主於民故先定其里宅所處次乃正宗廟朝廷之位如鄭之意奠厥攸居者止謂定民之居豈先令民居使足待其餘剩之處然後建王宫乎若留地以擬王宫即是先定王居不得為先定民矣孔惟言定其所居知是官民之居竝定之也禮郊在國外左祖右社面朝後市正厥位謂正此郊廟朝社之位也鄭𤣥云勉立我大命使心識教令常行之王肅云勉立大教建性命致之五福又案下句爾無共怒豫一人是恐其不從已命此句宜言我有教命汝當勉力立之鄭說如孔㫖也布心腹者此論心所欲言腹內之事耳以心為五臟之主腹為六腑之總腸在腹內腎在心下舉腎腸以配腹心詩曰公侯腹心宣十二年左傳云敢腹心是腹心足以表內腎腸配言之也布古我先王將多于前功𫝊言以遷徙多大前人之功美適于山用降我凶德嘉績于朕邦𫝊徙必依山之險無城郭之勞下去凶惡之德立善功於我國今我民用蕩析離居罔有定極𫝊水泉沈溺故蕩析離居無安定之極徙以為之極音義降工巷反徐下江反去羌吕反析先厯反注同疏正義曰言古者我之先王將故多大於前人之功是故徙都而適於山險之處用下去我凶惡之德立善功於我新國但徙來已久水泉沈溺今我在此之民用播蕩分析離其居宅無有安定之極我今徙而使之得其中也說其遷都之意亦欲多大前人之功定民極也𫝊正義曰古我先王謂遷都者前人謂未遷者前人久居舊邑民不能相匡以生則是居無功矣盤庚言先王以此遷徙故多大前人之功美故我今遷亦欲多前功矣先王至此五邦不能盡知其地所都皆近山故總稱適於山也易坎卦彖云王公設險以守其國徙必依山之險欲使下民無城郭之勞雖則近山不可全無城郭言其防守易耳徙必近山則舊處新居皆有山矣而云適於山者言其徙必依山不適平地不謂舊處無山故徙就山也水泉鹹鹵民居墊隘時君不為之徙即是凶惡之德其徙者是下去凶惡之德立善功於我新遷之國也言下者凶德在身下而墜去之民居積世穿掘處多則水泉盈溢令人沈深而陷溺其處不可安居播蕩分析離其居宅無安定之極極訓中也詩云立我蒸民莫匪爾極言民賴后稷之功莫不得其中今為民失中故徙以為之中也爾謂朕曷震動萬民以遷𫝊言皆不明已本心肆上帝將復我髙祖之德亂越我家𫝊以徙故天將復湯德治理於我家朕及篤敬恭承民命用永地于新邑𫝊言我當與厚敬之臣奉承民命用長居新邑肆豫沖人非廢厥謀弔由靈𫝊沖童童人謙也弔至靈善也非廢謂動謀於衆至用其善各非敢違卜用宏兹賁𫝊宏賁皆大也君臣用謀不敢違卜用大此遷都大業音義治直吏反弔音的或如字賁扶云反疏正義曰言我徙以為民立中汝等不明我心乃謂我何故震動萬民以為此遷我以此遷之故上天將復我髙祖成湯之德治理於我家我當與厚敬之臣奉承民命用是長居於此新邑以此須遷之故我童蒙之人非敢廢其詢謀謀於衆人衆謀不同至用其善者言善謀者皆欲遷都也又決之於龜卜而得吉我與汝羣臣各非敢違卜用是必遷光大此遷都之大業我徙本意如此耳𫝊正義曰民害不徙違失湯德以徙之故天必祐我將使復奉湯德令得治理於我家言由徙故天福之沖童聲相近皆是幼小之名自稱童人言已幼小無知故為謙也弔至靈善皆釋詁文禮將有大事必謀於衆謀衆乃是常理故言非廢謂動謀於衆言已不自專也衆謀必有異見故至極用其善者宏賁皆大也釋詁文樊光曰周禮云其聲大而宏詩云有賁其首是宏賁皆為大之義也各者非一之辭故為君臣用謀不敢違卜洪範云汝則有大疑謀及卿士謀及卜筮言非敢違卜是既謀及於衆又决於蓍龜也用大此遷都大謂立嘉績以大之也嗚呼邦伯師長百執事之人尚皆隱哉𫝊邦伯二伯及州牧也衆長公卿也言當庶幾相隱括共為善政豫其懋簡相爾念敬我衆𫝊簡大相助也勉大助汝念敬我衆民朕不肩好貨敢恭生生鞠人謀人之保居叙欽𫝊肩任也我不任貪貨之人敢奉用進進於善者人之窮困能謀安其居者則我式序而敬之音義長丁丈反注同相息亮反好呼報反任而林反疏正義曰言遷事已訖故歎而敕之嗚呼國之長伯及衆官之長與百執事之人庶幾皆相與隱括共為善政哉我其勉力大助汝等為善汝當思念愛敬我之衆民我不任用好貨之人有人果敢奉用進進於善見窮困之人能謀此窮困之人安居者我乃次序而敬用之𫝊正義曰邦伯邦國之伯諸侯師長故為東西二伯及九州之牧也鄭𤣥注禮記云殷之州長曰伯虞夏及周皆曰牧此殷時而言牧者此乃鄭之所約孔意不然故總稱牧也師訓為衆衆長衆官之長故為三公六卿也其百執事謂大夫以下諸百職事之官皆是也此總敕衆臣故二伯以下及執事之人皆戒之也釋言云庶幾尚也反復相訓故尚為庶幾庶幸也幾兾也隱謂隱審也幸兾相與隱審撿括共為善政欲其同心共為善也隱括必是舊語不知本出何書何休公羊序云隱括使就繩墨焉簡大釋詁文又云相助慮也俱訓為慮是相得為助也盤庚欲使羣臣同心為善欲勉力大佐助之使皆念敬我衆民也釋詁云肩勝也舍人曰肩强之勝也强能勝重是堪任之義故為任也我今不委任貪貨之人以恭為奉人有向善而心不决志故美其人能果敢奉用進進於善者言其人好善不倦也鞠訓為窮鞠人謂窮困之人謀人之保居謂謀此窮人之安居若見人之窮困能謀安其居愛人而樂安存之者則我式序而敬之詩云式序在位言其用次序在官位也鄭王皆以鞠為養言能謀養人安其居省我則次序而敬之與孔不同今我既羞告爾于朕志若否罔有弗欽𫝊已進告汝之後順於汝心與否當以情告我無敢有不敬無總于貨寶生生自庸𫝊無總貨寶以求位當進進皆自用功德式敷民德永肩一心𫝊用布示民必以德義長任一心以事君音義告呼報反疏正義曰今我既進而告汝於我心志矣其我所告順合於汝心與否當以情告我無得有不敬者汝等無得總於貨實以求官位當進進自用功德不當用富也用此布示於民必以德義長任一心以事君不得懷二意以遷都既定故殷勤以戒之尚書注疏卷八尚書注疏卷八考證盤庚序將治亳殷史記殷本紀帝盤庚之時殷已都河北盤庚渡河南復居成湯之故居裴駰注按鄭元曰治於亳之殷地商家自此改號曰殷皇甫謐曰今偃師是也臣召南按亳有三北亳南亳西亳此在偃師則西亳也漢地理志河南郡偃師尸鄉殷湯所都盤庚之遷是於舊地附近新營京邑故下篇曰肆上帝將復我高祖之德又曰用永地於新邑也疏盤庚以後遷於河北蓋盤庚後王有從河自亳地遷於洹水之南後又遷於朝歌臣召南按自盤庚以後都於殷凡七君至武乙始遷河北𫝊子及孫至曾孫紂史記有明文然則自亳徙朝歌自武乙始也盤庚上疏子開甲立殷本紀作沃甲司馬貞索隱曰系本作開甲臣浩按此疏所引者本紀文也又用系本作開甲蓋開字係沃字之訛誕告用亶其有衆臣浩按注疏讀此七字為句宋儒始以其有衆連下咸造二字為句今豫命汝一疏今我命汝是我之一心也臣召南按如疏所解則今豫命汝當一讀一字為一句豫丕克羞爾用懷爾然臣召南按孔𫝊以大能進勞汝解豫丕克羞爾以義懷汝心解用懷爾又云而汝違我是汝反先人孔疏順傳為說是經文然字自為一句也汝萬民乃不生生傳不進進疏進進是同心願樂之意臣浩按此二篇中三言生生𫝊俱解作進進疏謂王肅亦然似古人方言如是故有爽德𫝊湯有明德在天臣召南按𫝊解此句頗為牽强依傳則故有爽德自上六字為句汝分猷念以相從各設中於乃心金履祥曰古文尚書猷念作繇古字繇攸通用猷念所念耳分石經作比設中古文作翕中於義為長各非敢違卜用宏兹賁𫝊宏賁皆大也疏詩云有賁其首臣召南按宋儒蘇軾陳傅良解賁字作易賁卦之賁言新遷規模焕然一新以湯誥賁若草木證之似較𫝊疏為愜尚書注疏卷八考證
