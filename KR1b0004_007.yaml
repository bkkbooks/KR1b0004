body:
  text: 尚書注疏卷七漢孔氏傳唐陸徳明音義孔穎達疏商書湯誓上仲虺之誥太甲太甲中湯誥下伊訓有一徳太甲咸序伊尹相湯伐桀升自陑傳桀都安邑湯升道從陑出其不意陑在河曲之南遂與桀戰于嗚條之野𫝊地在安邑之西桀逆拒湯作湯誓音義相息亮反湯如字馬云俗儒以湯為諡或為號號者似非其意言諡近之然不在諡法故無聞焉及禹俗儒以為名帝系禹名文命王侯世本湯名天乙推此言之禹豈復非諡乎亦不在諡法故疑焉桀其列反夏之末天子升音昇陑音而疏正義曰伊尹以夏政醜惡去而歸湯輔相成湯與之伐桀升道從陑出其不意遂與桀戰于鳴條之野将戰而誓戒士衆史敘其事作湯誓傳正義曰此序湯自伐桀必言伊尹相湯者序其篇次自為首尾以上云伊尹醜夏遂相成湯伐之故文次言伊尹也計太公之相武王猶如伊尹之相成湯泰誓不言太公相者彼文無其次也且武王之時有周召之倫聖賢多矣湯稱伊尹云聿求元聖與之戮力伊尹稱惟尹躬暨湯咸有一徳則伊尹相湯其功多於太公故特言伊尹相湯也桀都安邑相𫝊為然即漢之河東郡安邑縣是也史記吳起對魏武侯云夏桀之居左河濟右太華伊闕在其南羊腸在其北修政不仁湯放之也地理志云上黨郡壺闗縣有羊腸坂在安邑之北是桀都安邑必當然矣將明陑之所在故先言桀都安邑桀都在亳西當從東而徃今乃升道從陑升者從下向上之名言陑當是山阜之地歴險迂路為出不意故也陑在河曲之南盖今潼闗左右河曲在安邑西南從陑向北渡河乃東向安邑鳴條在安邑之西桀西出拒湯故戰于鳴條之野陑在河曲之南鳴條在安邑之西皆彼有其迹相𫝊云然湯以至聖伐暴當顯行用師而出其不意掩其不備者湯承禪代之後嘗為桀臣慙而且懼故出其不意武王則三分天下有其二久不事紂紂有浮桀之罪地無險要之勢故顯然致罰以明天誅又慇懃誓衆與湯有異所以湯惟一誓武王有三鄭𤣥云鳴條南夷地名孟子云舜卒於鳴條東夷之地或云陳留平丘縣今有鳴條亭是也皇甫謐云伊訓曰造攻自鳴條朕哉自亳又曰夏師敗績乃伐三朡湯誥曰王歸自克夏至于亳三朡在定陶於義不得在陳留與東夷也今安邑見有鳴條陌昆吾亭左氏以為昆吾與桀同以乙卯日亡韋顧亦爾故詩曰韋顧既伐昆吾夏桀於左氏昆吾在衞乃在濮陽不得與桀異處同日而亡明昆吾亦來安邑欲以衞桀故同日亡而安邑有其亭也且吳起言險以指安邑安邑於此而言何得在南夷乎謐言是也湯誓𫝊戒誓湯士衆疏正義曰此經皆誓之辭也甘誓泰誓牧誓𤼵首皆有序引别言其誓意記其誓處此與費誓惟記誓辭不言誓處者史非一人辭有詳略序以經文不具故備言之也王曰格爾衆庶悉聽朕言𫝊契始封商湯遂以為天下號湯稱王則比桀於一夫非台小子敢行稱亂有夏多罪天命殛之𫝊稱舉也舉亂以諸侯伐天子非我小子敢行此事桀有昏徳天命誅之今順天今爾有衆汝曰我后不恤我衆舎我穡事而割正夏𫝊汝汝有衆我后桀也正政也言奪民農功而為割剝之政予惟聞汝衆言𫝊不憂我衆之言夏氏有罪予畏上帝不敢不正𫝊不敢不正桀罪誅之今汝其曰夏罪其如台𫝊今汝其復言桀惡其亦如我所聞之言夏王率遏衆力率割夏邑𫝊言桀君臣相率為勞役之事以絶衆力謂廢農功相率割剝夏之邑居謂征賦重有衆率怠弗協曰時日曷喪予及汝皆亡𫝊衆下相率為怠惰不與上和合比桀於日曰是日何時喪我與汝俱亡欲殺身以喪桀夏徳若茲今朕必往傳凶徳如此我必往誅之爾尚輔予一人致天之罰予其大賚汝𫝊賚與也汝庶幾輔成我我大與汝爵賞爾無不信朕不食言𫝊食盡其言偽不實爾不從誓言𫝊不用命予則孥戮汝罔有攸赦𫝊古之用刑父子兄弟罪不相及今云孥戮汝無有所赦權以脇之使勿犯音義格庚白反來也台以之反下同殛居力反恤荀律反舎音捨廢也復扶又反遏於葛反徐音謁馬云止也喪息浪反注同惰徒卧反罰音伐賚力代反徐音來疏正義曰商王成湯將與桀戰呼其將士曰來汝在軍之衆庶悉聽我之誓言我伐夏者非我小子輙敢行此以臣伐君舉為亂事乃由有夏君桀多有大罪上天命我誅之桀既失君道我非復桀臣是以順天誅之由其多罪故也桀之罪狀汝盡知之今汝桀之所有之衆即汝輩是也汝等言曰我君夏桀不憂念我等衆人舎廢我稼穡之事奪我農功之業而為割剝之政於夏邑斂我貨財我惟聞汝衆言夏氏既有此罪上天命我誅桀我畏上天之命不敢不正桀罪而誅之又質而審之今汝衆人其必言曰夏王之罪其實如我所言夏王非徒如此又與臣下相率遏絶衆力使不得事農又相率為割剝之政於此夏邑使不得安居上下同惡氏困益甚由是汝等相率怠惰不與在上和協比桀於日曰是日何時能喪若其可喪我與汝皆亡身殺之寧殺身以亡桀是其惡之甚夏王惡徳如此今我必往誅之汝庶幾輔成我一人致行天之威罰我其大賞賜汝汝無得不信我語我終不食盡其言為虚偽不實汝若不從我之誓言我則并殺汝子以戮汝身必無有所赦勸使勉力勿犯法也庶亦衆也古人有此重言猶云艱難也𫝊正義曰以湯於此稱王故本其號商之意契始封商湯號為商知契始封商湯遂以商為天下之號鄭𤣥之説亦然惟王肅云相土居商丘湯取商為號若取商丘為號何以不名商丘而單名商也若八遷國名商不改則此商猶是契商非相土之商也若八遷遷即改名則相土至湯改名多矣相土既非始祖又非受命何故用其所居之地以為天下號名成湯之意復何取乎知其必不然也湯取契封商以商為天下之號周不取后稷封邰為天下之號者契後八遷商名不改成湯以商受命故宜以商為號后稷之後隨遷易名公劉為豳太王為周文王以周受命故當以周為號二代不同理則然矣泰誓云獨夫受此湯稱為王則比桀於一夫桀既同於一夫故湯可稱王矣是言湯於伐桀之時始稱王也周書泰誓稱王則亦伐紂之時始稱王也鄭𤣥以文王生稱王亦謬也稱舉釋言文常法以臣伐君則為亂逆故舉亂謂以諸侯伐天子桀有昬徳宣三年左𫝊文以有昬徳天命誅之今乃順天行誅非復臣伐君也以此解衆人守常之意也如我者謂湯之自稱我也湯謂其衆云汝言桀之罪如我誓言所述也率遏衆力率割夏邑此經與上舎我穡事而割正夏其意一也上言夏王之身此言君臣相率再言所以積桀之罪也力施於農財供上賦故以止絶衆力謂廢農功割剝夏邑謂征賦重言以農時勞役又重斂其財致使民困而怨深賦斂重則民不安矣上既馭之非道下亦不供其命故衆下相率為怠惰不與上和合不肯每事順從也比桀於日曰是日何時喪亡欲令早喪桀命也我與汝俱亡者民相謂之辭言竝欲殺身以喪桀也所以比於日者以日無喪之理猶云桀不可喪言喪之難也不避其難與汝俱亡欲殺身以喪桀疾之甚也鄭云桀見民欲叛乃自比於日曰是日何嘗喪乎日若喪亡我與汝亦皆喪亡引不亡之徴以脇恐下民也釋詁云食偽也孫炎曰食言之偽也哀二十五年左𫝊云孟武伯惡郭重曰何肥也公曰是食言多矣能無肥乎然則言而不行如食之消盡後終不行前言為偽故通謂偽言為食言故爾雅訓食為偽也昭二十年左𫝊引康誥曰父子兄弟罪不相及是古之用刑如是也既刑不相及必不殺其子權時以廹脇之使勿犯刑法耳不於甘誓解之者以夏啓承舜禹之後刑罰尚寛殷周以後其罪或相緣坐恐其實有孥戮故於此解之鄭𤣥云大罪不止其身又孥戮其子孫周禮云其奴男子入于罪𨽻女子入于舂槀鄭意以為實戮其子故周禮注云奴謂從坐而没入縣官者也孔以孥戮為權脇之辭則周禮所云非從坐也鄭衆云謂坐為盗賊而為奴者輸於罪𨽻舂人槀人之官引此孥戮汝又引論語云箕子為之奴或如衆言别有没入非緣坐者也序湯既勝夏欲遷其社不可𫝊湯承堯舜禪代之後順天應人逆取順守而有慙徳故革命創制改正易服變置社稷而後世無及句龍者故不可而止作夏社疑至臣扈𫝊言夏社不可遷之義疑至及臣扈三篇皆亡音義社后土之神禪時戰反應應對之應創初亮反正音征又音正句音鉤句龍共工之子為后土扈音户疏正義曰湯既伐而勝夏革命創制變置社稷欲遷其社無人可代句龍故不可而止於時有言議論其事故史敘之為夏社疑至臣扈三篇皆亡𫝊正義曰𫝊解湯遷社之意湯承堯舜禪代之後已獨伐而取之雖復應天順人乃是逆取順守而有慙愧之徳自恨不及古人故革命創制改正易服因變置社稷也易革卦彖曰湯武革命順乎天而應乎人下篇言湯有慙徳大𫝊云改正朔易服色此其所得與民變革者也所以變革此事欲易人之視聽與之更新故於是之時變置社稷昭二十九年左𫝊云共工氏有子曰句龍為后土后土為社有烈山氏之子曰柱為稷自夏已上祀之周棄亦為稷自商已來祀之祭法云厲山民之有天下也其子曰農能殖百穀夏之衰也周棄繼之故祀以為稷共工氏之覇九州也其子曰后土能平九州故祀以為社是言變置之事也魯語文與祭法正同而云夏之興也周棄繼之興當為哀字之誤耳湯于初時社稷俱欲改之周棄功多於柱即令廢柱祀棄而上世治水土之臣其功無及句龍者故不可遷而止此序之次在湯誓之下云湯既勝夏下云夏師敗績湯遂從之是未及逐桀已為此謀鄭𤣥等注此序乃在湯誓之上若在作誓之前不得云既勝夏也孟子曰犧牲既成粢盛既潔祭祀以時然而旱乾水溢則變置社稷鄭𤣥因此乃云湯伐桀之時大旱既置其禮祀明徳以薦而猶旱至七年故更置社稷乃謂湯即位之後七年大旱方始變之若實七年乃變何當繫之勝夏勝夏猶尚不可况在湯誓前乎且禮記云夏之衰也周棄繼之商興七年乃變安得以夏衰為言也若商革夏命猶七年祀柱左𫝊亦不得斷為自夏已上祀柱自商已來祀棄也由此而言孔稱改正朔而變置社稷所言得其㫖也漢世儒者説社稷有二左𫝊説社祭句龍稷祭柱棄惟祭人神而已孝經説社為土神稷為榖神句龍柱棄是配食者也孔無明説而此經云遷社孔𫝊云無及力龍即同賈逵馬融等説以社為句龍也疑至與臣扈相類當是二臣名也盖亦言其不可遷之意馬融云聖人不可自専復用二臣自明也序夏師敗績湯遂從之𫝊大崩曰敗績從謂遂討之遂伐三朡俘厥寶玉𫝊三朡國名桀走保之今定陶也桀自安邑東入山出太行東南渉河湯緩追之不迫遂奔南巢俘取也玉以禮神使無水旱之災故取而寶之誼伯仲伯作典寶傳二臣作典寶一篇言國之常寶也亡音義績子寂反從才容反朡子公反俘音孚行户剛反一音如字誼本或作義疏𫝊正義曰湯伐三朡知是國名逐桀而伐其國知桀走保之也今定陶者相𫝊為然安邑在洛陽西北定陶在洛陽東南孔跡其所往之路桀自安邑東入山出太行乃東南渉河往奔三朡湯緩追之不迫遂奔南巢俘取釋詁文桀必載寶而行棄於三朡取其寶玉取其所棄者也楚語云玉足以庇廕嘉榖使無水旱之災則寶之韋昭云玉禮神之玉也言用玉禮神神享其徳使風雨調和可以庇廕嘉榖故取而寳之序湯歸自夏至于大坰𫝊自三朡而還大坰地名仲虺作誥𫝊為湯左相奚仲之後音義夏亥雅反坰故螢反徐欽螢反又古螢反虺許鬼反誥故報反相息亮反奚弦雞反疏正義曰湯歸自伐夏至于大坰之地其臣仲虺作誥以誥湯史録其言作仲虺之誥上言遂伐三朡故𫝊言自三朡而還不言歸自三朡而言歸自夏者伐夏而遂逐桀於今方始旋歸以自夏告廟故序言自夏𫝊本其來處故云自三朡耳大坰地名未知所在當是定陶向亳之路所經湯在道而言予恐來世以台為口實故仲虺至此地而作誥也序不言作仲虺之誥以理足文便故略之傳正義旧定元年左𫝊云薛之皇祖奚仲居薛以為夏車正仲虺居薛以為湯左相是其事也仲虺之誥𫝊仲虺臣名以諸侯相天子會同曰誥疏正義曰𤼵首二句史述成湯之心次二句湯言已慙之意仲虺乃作誥以下皆勸湯之辭自曰嗚呼至用爽厥師言天以桀有罪命伐夏之事自簡賢附勢至言足聽聞説湯在桀時怖懼之事自惟王弗邇聲色至厥惟舊哉言湯有徳行加民民歸之事自佑賢輔徳以下説天子之法當擢用賢良屏黜昬暴勸湯奉行此事不須以放桀為惡康誥召誥之類二字足以為文仲虺誥三字不得成文以之字足成其句畢命冏命不言之微子之命文侯之命言之與此同猶周禮司服言大裘而冕亦足句也𫝊正義曰伯仲叔季人字之常仲虺必是其名或字仲而名虺古人名字不可審知縱使是字亦得謂之為名言是人之名號也左𫝊稱居薛為湯左相是以諸侯相天子也周禮士師云以五戒先後刑罰一曰誓用之於軍旅二曰誥用之於會同是會同曰誥誥謂於會之所設言以誥衆此惟誥湯一人而言會同者因解諸篇誥義且仲虺必對衆誥湯亦是會同曰誥成湯放桀于南巢惟有慙徳𫝊湯伐桀武功成故以為號南巢地名有慙徳慙徳不及古曰予恐來世以台為口實𫝊恐來世論道我放天子常不去口音義湯伐桀武功成故號成湯一云成諡也疏正義曰桀奔南巢湯縱而不迫故稱放也𫝊言南巢地名不知地之所在周書序有巢伯來朝𫝊云南方逺國鄭𤣥云巢南方之國世一見者桀之所奔盖彼國也以其國在南故稱南耳𫝊并以南巢為地名不能委知其處故未明言之仲虺乃作誥𫝊陳義誥湯可無慙曰嗚呼惟天生民有欲無主乃亂𫝊民無君主則恣情欲必致禍亂惟天生聰明時乂𫝊言天生聰明是治民亂有夏昬徳民墜塗炭𫝊夏桀昬亂不恤下民民之危險若陷泥墜火無救之者天乃錫王勇智表正萬邦纘禹舊服𫝊言天與王勇智應為民主儀表天下法正萬國繼禹之功統其故服茲率厥典奉若天命𫝊天意如此但當循其典法奉順天命而已無所慙音義纘子管反應應對之應夏王有罪矯誣上天以布命于下傳言託天以行虐於民乃桀之大罪帝用不臧式商受命用爽厥師傳天用桀無道故不善之式用爽明也用商受王命用明其衆言為主也音義矯居表反誣音無臧作郎反疏正義曰矯詐也誣加也夏王自有所欲詐加上天言天道須然不可不爾假此以布苛虐之命於天下以困苦下民上天用桀無道之故故不善之用使商家受此為王之命以王天下用命商王明其所有之衆謂湯教之使修徳行善以自安樂是明之也傳正義曰式用釋言文昭七年左傳云是以有精爽至於神明從爽以至於明則爽是明之始故爽為明也經稱昧爽謂未大明也簡賢附勢寔繁有徒傳簡略也賢而無勢則略之不賢有勢則附之若是者繁多有徒衆無道之世所常肇我邦于有夏若苗之有莠若粟之有秕傳始我商家國於夏世欲見翦除若莠生苗若秕生粟恐被鋤治簸颺小大戰戰罔不懼于非辜矧予之徳言足聽聞傳言商家小大憂危恐其非罪見滅矧況也況我之道徳善言足聽聞乎無道之惡有道自然理音義繁音煩莠羊九反秕悲里反徐甫理反又必履反鋤仕魚反簸波我反颺音揚矧申忍反惡烏路反惟王不邇聲色不殖貨利傳邇近也不近聲樂言清簡不近女色言貞固殖生也不生資貨財利言不貪也既有聖徳兼有此行音義近附近之近行下孟反徳懋懋官功懋懋賞用人惟已改過不吝傳勉於徳者則勉之以官勉於功者則勉之以賞用人之言若自已出有過則改無所吝惜所以能成王業音義懋音茂吝良刃反王如字又于况反疏正義曰於徳能勉力行之者王則勸勉之以官於功能勉力為之者王則勸勉之以賞用人之言惟如已之所出改悔過失無所恡惜美湯之行如此凡庸之主得人之言恥非已智雖知其善不肯遂從已有愆失恥於改過舉事雖覺其非不肯更悔是惜過不改故以此美湯也成湯之為此行尚為仲虺所稱歎凡人能勉者鮮矣克寛克仁彰信兆民傳言湯寛仁之徳眀信於天下乃葛伯仇餉初征自葛東征西夷怨南征北狄怨傳葛伯遊行見農民之餉於田者殺其人奪其餉故謂之仇餉仇怨也湯為是以不祀之罪伐之從此後遂征無道西夷北狄舉逺以言則近者著矣音義仇音求餉式亮反疏正義曰此言乃者却説已過之事𦙍征云乃季秋月朔其義亦然左傳稱怨耦曰仇謂彼人有負於我我心怨之是名為仇也餉田之人不負葛伯葛伯奪其餉而殺之是葛伯以餉田之人為己之仇言非所怨而妄殺故湯為之報也孟子稱湯使亳衆徃為之耕有童子以黍肉餉葛伯奪而殺之則葛伯所殺殺亳人也傳言葛伯遊行見農人之餉於田者殺其人而奪其餉故謂之仇餉乃似葛伯自殺己人與孟子違者湯之征葛以人之枉死而為之報耳不為亳人乃報之非亳人則赦之故傳指言殺餉不辨死者何人亳人葛人義無以異故不復言亳非是故違孟子曰奚獨後予傳怨者辭也攸徂之民室家相慶曰徯予后后來其蘇傳湯所往之民皆喜曰待我君來其可蘇息民之戴商厥惟舊哉傳舊謂初征自葛時音義徯胡啟反蘇字亦作穌佑賢輔徳顯忠遂良傳賢則助之徳則輔之忠則顯之良則進之明王之道疏傳正義曰周禮鄉大夫云三年則大比考其徳行道藝而興賢者鄭𤣥云賢者謂有徳行者詩序云忠臣良士皆是善也然則賢是徳盛之名徳是資賢之實忠是盡心之事良是為善之稱俱是可用之人所從言之異耳佑之與輔顯之與遂隨便而言之兼弱攻昧取亂侮亡傳弱則兼之闇則攻之亂則取之有亡形則侮之言正義疏𫝊正義曰力少為弱不明為昧政荒為亂國滅為亡兼謂包之攻謂擊之取謂取為己有侮謂侮慢其人弱昧亂亡俱是彼國衰微之状兼攻取侮是此欲吞并之意弱昧是始衰之事來服則制為己屬不服則以兵攻之此二者始欲服其人未是滅其國亂是已亂亡謂将亡二者衰甚已将滅其國亡形已著無可忌憚故陵侮其人既侮其人必滅其國故以侮言之此是人君之正義仲虺陳此者意亦言桀亂亡取之不足為愧下言推亡及覆昬暴其意亦在桀也推亡固存邦乃其昌傳有亡道則推而亡之有存道則輔而固之王者如此國乃昌盛音義推土雷反徳日新萬邦惟懐志自滿九族乃離𫝊日新不懈怠自滿志盈溢音義懈工債反疏正義曰繫辭云日新之謂盛徳言脩徳不怠日日益新徳加于人無逺不屆故萬邦之衆惟盡歸之志意自滿則陵人人既被陵則情必不附雖九族之親乃亦離之萬邦舉逺以明近也九族舉親以明疎也漢代儒者説九族之義有二案禮戴及尚書緯歐陽説九族乃異姓有屬者父族四母族三妻族二古尚書説九族從髙祖至𤣥孫凡九族堯典云以親九族𫝊云以睦髙祖𤣥孫之親則此言九族亦謂髙祖𤣥孫之親也謂萬邦惟懐實歸之九族乃離實離之聖賢設言為戒容辭頗甚父子之間便以志滿相棄此言九族以為外姓九族有屬文便也王懋昭大徳建中于民以義制事以禮制心垂裕後昆𫝊欲王自勉明大徳立大中之道於民率義奉禮垂優足之道示後世予聞曰能自得師者王𫝊求賢聖而事之謂人莫已若者亡𫝊自多足人莫之益亡之道好問則裕自用則小𫝊問則有得所以足不問専固所以小音義中如字本或作忠非裕徐以樹反王徐于况反又如字好呼報反嗚呼慎厥終惟其始𫝊靡不有初鮮克有終故戒慎終如其始殖有禮覆昬暴𫝊有禮者封殖之昬暴者覆亡之欽崇天道永保天命傳王者如此上事則敬天安命之道音義鮮息淺反覆芳服反暴蒲報反或作虣序湯既黜夏命𫝊黜退也退其王命復歸于亳作湯誥疏正義曰湯既黜夏王之命復歸于亳以伐桀大義誥示天下史録其事作湯誥仲虺在路作誥此至亳乃作故次仲虺之下湯誥𫝊以伐桀大義告天下王歸自克夏至于亳誕告萬方𫝊誕大也以天命大義告萬方之衆人音義誕音但告工毒反疏正義曰湯之伐桀當有諸侯從之不從行者必應多矣既已克夏改正名號還至于亳海内盡來猶如武成篇所云庶邦冢君暨百工受命于周也湯於此時大誥諸侯以伐桀之義故云誕告萬方誕大釋詁文萬者舉盈數下云凡我造邦是告諸侯也王曰嗟爾萬方有衆明聽予一人誥𫝊天子自稱曰予一人古今同義惟皇上帝降衷于下民𫝊皇大上帝天也衷善也疏正義曰天生烝民與之五常之性使有仁義禮智信是天降善於下民也天既與善於民君當順之故下𫝊云順人有常之性則是為君之道若有恒性克綏厥猷惟后𫝊順人有常之性能安立其道教則惟為君之道夏王滅徳作威以敷虐于爾萬方百姓𫝊夏桀滅道徳作威刑以布行虐政於天下百官言殘酷爾萬方百姓罹其凶害弗忍荼毒傳罹被荼毒苦也不能堪忍虐之甚音義罹力之反本亦作羅洛何反荼音徒疏正義曰釋草云荼苦菜此菜味苦故假之以言人苦毒謂螫人之蟲蛇虺之類實是人之所苦故并言荼毒以喻苦也竝告無辜于上下神祗𫝊言百姓兆民竝告無罪稱寃訴天地天道福善禍淫降災于夏以彰厥罪𫝊政善天福之淫過天禍之故下災異以明桀罪惡譴寤之而桀不改音義寃紆元反譴遣戰反寤五故反肆台小子将天命明威不敢赦𫝊行天威謂誅之敢用𤣥牡敢昭告于上天神后請罪有夏𫝊明告天問桀百姓有何罪而加虐乎音義台音怡牡茂后反疏正義曰檀弓云殷人尚白牲用白今云𤣥牡夏家尚黑于時未變夏禮故不用白也故安國注論語敢用𤣥牡之文云殷家尚白未變夏禮故云𤣥牡是其義也鄭𤣥説天神有六周家冬至祭皇天大帝于圜丘牲用蒼夏至祭靈威仰於南郊則牲用騂孔注孝經圜丘與郊共為一事則孔之所説無六天之事論語堯曰之篇所言敢用𤣥牡即此事是也孔注論語以為堯曰之章有二帝三王之事録者採合以成章檢大禹謨及此篇與泰誓武成則堯曰之章其文略矣鄭𤣥解論語云用𤣥牡者為舜命禹事於時總告五方之帝莫適用用皇天大帝之牲其意與孔異聿求元聖與之戮力以與爾有衆請命𫝊聿遂也大聖陳力謂伊尹放桀除民之穢是請命音義聿允橘反述也戮舊音六又力彫反説文力周反史記音力消反穢於廢反疏𫝊正義曰聿訓述也述前所以申遂故聿為遂也戮力猶勉力也論語云陳力就列湯臣大賢惟有伊尹故知大聖陳力謂伊尹也伊尹賢人而謂之聖者相對則聖極而賢次散文則賢聖相通舜謂禹曰惟汝賢是聖得謂之賢則賢亦可言聖鄭𤣥周禮注云聖通而先識也解先識則為聖名故伊尹可為聖也孟子云伯夷聖人之清者也伊尹聖人之任者也栁下恵聖人之和者也孔子聖人之時者也是謂伊尹為聖人者也桀為殘虐人不自保故伐桀除人之穢是為請命上天孚佑下民罪人黜伏𫝊孚信也天信佑助下民桀知其罪退伏逺屏天命弗僭賁若草木兆民允殖𫝊僭差賁飾也言福善禍淫之道不差天下惡除焕然咸飾若草木同華民信樂生音義僭子念反忒也劉創林反賁彼義反徐扶云反飾也煥呼亂反樂音洛疏正義曰桀以大罪身既黜伏是天之福善禍淫之命信而不僭差也既除大惡天下煥然脩飾若草木同生華兆民信樂生也昔日不保性命今日樂生活矣僭差不齊之意故𫝊以僭為差賁飾易序卦文也俾予一人輯寜爾邦家𫝊言天使我輯安汝國家國諸侯家卿大夫茲朕未知獲戾于上下𫝊此伐桀未知得罪於天地謙以求衆心音義俾必爾反徐甫婢反使也輯音集又七入反戾力計反疏𫝊正義曰經言茲者謂此伐桀也顧氏云未知得罪于天地言伐桀之事未知得罪于天地以否湯之伐桀上應天心下符人事本實無罪而云未知得罪以否者謙以求衆心慄慄危懼若将隕于深淵𫝊慄慄危心若墜深淵危懼之甚音義慄音栗隕于敏反凡我造邦無從匪彝無即慆淫𫝊戒諸侯與之更始彝常慆慢也無從匪常無就慢過禁之各守爾典以承天休𫝊守其常法承天美道音義彝徐音夷慆他刀反爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心𫝊所以不蔽善人不赦已罪以其簡在天心故也疏正義曰鄭𤣥注論語云簡閲在天心言天簡閲其善惡也其爾萬方有罪在予一人𫝊自責化不至予一人有罪無以爾萬方𫝊無用爾萬方言非所及嗚呼尚克時忱乃亦有終𫝊忱誠也庶幾能是誠道乃亦有終世之美音義忱市林反序咎單作明居𫝊咎單臣名主土地之官作明居民法一篇亡音義咎其九反單音善卷末同疏正義曰百篇之序此類有四伊尹作咸有一徳周公作無逸作立政與此篇直言其所作之人不言其作者之意盖以經文分明故略之馬融云咎單為湯司空𫝊言主土地之官盖亦為司空也序成湯既沒太甲元年𫝊太甲太丁子湯孫也太丁未立而卒及湯沒而太甲立稱元年伊尹作伊訓肆命徂后𫝊凡三篇其二亡疏正義曰成湯既沒其嵗即太甲元年伊尹以太甲承湯之後恐其不能纂修祖業作書以戒之史叙其事作伊訓肆命徂后三篇𫝊正義曰太甲太丁子世本文也此序以太甲元年繼湯沒之下明是太丁未立而卒太甲以孫繼祖故湯沒而太甲代立即以其年稱為元年也周法以踰年即位知此即以其年稱元年者此經云元祀十有二月伊尹祠于先王奉嗣王祇見厥祖太甲中篇云惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳二者皆云十有二月若是踰年即位二者皆當以正月行事何以用十二月也明此經十二月是湯崩之踰月太甲中篇三祀十有二月是服闋之踰月以此知湯崩之年太甲即稱元年也舜禹以受帝終事自取嵗首遭喪嗣位經無其文夏后之世或亦不踰年也顧氏云殷家猶質踰月即改元年以明世異不待正月以為首也商謂年為祀序稱年者序以周世言之故也據此經序及大甲之篇太甲必繼湯後而殷本紀云湯崩太子太丁未立而卒於是乃立太丁之弟外丙二年崩别立外丙之弟仲壬四年崩伊尹乃立太丁之子太甲與經不同彼必妄也劉歆班固不見古文謬從史記皇甫謐既得此經作帝王世紀乃述馬遷之語是其踈也顧氏亦云止可依經誥大典不可用𫝊記小説伊訓𫝊作訓以教道太甲惟元祀十有二月乙丑伊尹祠于先王𫝊此湯崩踰月太甲即位奠殯而告音義祀年也夏曰嵗商曰祀周曰年唐虞曰載祠音辭祭也疏正義曰伊尹祠于先王謂祭湯也奉嗣王祇見厥祖謂見湯也故𫝊解祠先王為奠殯而告見厥祖為居位主喪羣后咸在為在位次皆述在喪之事是言祠是奠也祠喪于殯斂祭皆名為奠虞祔卒哭始名為祭知祠非宗廟者元祀即是初喪之時未得祠廟且湯之父祖不追為王所言先王惟有湯耳故知祠實是奠非祠宗廟也祠之與奠有大小耳祠則有主有尸其禮大奠則奠器而已其禮小奠祠俱是享神故可以祠言奠亦由於時猶質未有莭文周時則祠奠有異故傳解祠為奠耳傳正義曰太甲中篇云三祀十有二月伊尹以冕服奉嗣王則是除喪即吉明十二月服終禮記稱三年之喪二十五月而畢知此年十一月湯崩此祠先王是湯崩踰月太甲即位奠殯而告也此奠殯而告亦如周康王受顧命尸於天子春秋之世既有奠殯即位踰年即位此踰月即位當奠殯即位也此言伊尹祠于先王是特設祀也嗣王祇見厥祖是始見祖也特設祀禮而王始見祖明是初即王位告殯為喪主也奉嗣王祇見厥祖𫝊居位主喪侯甸羣后咸在𫝊在位次百官總已以聽冢宰𫝊伊尹制百官以三公攝家宰伊尹乃明言烈祖之成徳以訓于王𫝊湯有功烈之祖故稱焉音義見賢遍反甸徒遍反總音揔疏傳正義曰湯有功烈之祖毛詩𫝊文也烈訓業也湯有定天下之功業為商家一代之太祖故以烈祖稱焉曰嗚呼古有夏先后方懋厥徳罔有天災𫝊先君謂禹以下少康以上賢王言能以徳禳災音義少詩照反上時掌反禳如羊反疏傳正義曰有夏先君總指桀之上世有徳之王皆是也傳舉聖賢者言禹已下少康已上惟當禹與啟及少康耳魯語云杼能帥禹者也杼少康之子𫝊盖以其徳衰薄故斷自少康已上耳由勉行其徳故無有天災言能以徳禳災也山川鬼神亦莫不寧𫝊莫無也言皆安之暨鳥獸魚鼈咸若𫝊雖微物皆順之明其餘無不順音義暨其器反鼈必滅反疏正義曰山川鬼神謂山川之鬼神也亦莫不寧者謂鬼神安人君之政政善則神安之神安之則降福人君無妖孽也鳥獸魚鼈咸若者謂人君順禽魚君政善而順彼性取之有時不夭殺也鳥獸在陸魚鼈在水水陸所生微細之物人君為政皆順之明其餘無不順也于其子孫弗率皇天降災假手于我有命𫝊言桀不循其祖道故天下禍災借手於我有命商王誅討之造攻自鳴條朕哉自亳𫝊造哉皆始也始攻桀伐無道由我始修徳于亳音義亳旁各反徐扶各反疏正義曰于其子孫於有夏先君之子孫謂桀也不循其祖之道天下禍災謂滅其國而誅其身也天不能自誅於桀故借手于我有命之人謂成湯也言湯有天命将為天子就湯借手使誅桀也既受天命誅桀始攻從鳴條之地而敗之天所以命我者由湯始自修徳於亳故也惟我商王布昭聖武代虐以寛兆民允懐𫝊言湯布明武徳以寛政代桀虐政兆氏以此皆信懐我商王之徳今王嗣厥徳罔不在初𫝊言善惡之由無不在初欲其慎始立愛惟親立敬惟長始于家邦終于四海𫝊言立愛敬之道始於親長則家國竝化終洽四海音義長丁丈反疏正義曰王者之馭天下撫兆人惟愛敬二事而已孝經天子之章盛論愛敬之事言天子當用愛敬以接物也行之所立自近為始立愛惟親先愛其親推之以及踈立敬惟長先敬其長推之以及幼即孝經所云愛親者不敢惡於人敬親者不敢慢於人是推親以及物始則行於家國終乃洽於四海即孝經所云徳教加於百姓刑于四海是也所異者孝經論愛敬竝始於親令緣親以及疎此分敬屬長言從長以及幼耳嗚呼先王肇修人紀從諫弗咈先民時若傳言湯始修為人綱紀有過則改從諫如流必先民之言是順音義咈扶弗反疏正義曰賈逵注周語云先民古賢人也魯語云古曰在昔昔曰先民然則先民在古昔之前逺言之也逺古賢人亦是民内之一人故以民言之先民之言於是順從言其動皆法古賢也居上克明𫝊言理恕疏正義曰見下之謂明言其以理恕物照察下情是能明也為下克忠𫝊事上竭誠與人不求備檢身若不及𫝊使人必器之常如不及恐有過疏正義曰檢謂自攝斂也檢勑其身常如不及不自大以卑人不恃長以陵物也以至于有萬邦兹惟艱哉𫝊言湯操心常危懼動而無過以至為天子此自立之難音義操七曺反又七報反敷求哲人俾輔于爾後嗣𫝊布求賢智使師輔於爾嗣王言仁及後世音義哲本又作喆俾必爾反制官刑儆于有位𫝊言湯制治官刑法以儆戒百官曰敢有恒舞于宮酣歌于室時謂巫風𫝊常舞則荒淫樂酒曰酣酣歌則廢徳事鬼神曰巫言無政敢有殉于貨色恆于遊畋時謂淫風𫝊殉求也昧求財貨美色常遊戲畋獵是淫過之風俗敢有侮聖言逆忠直逺耆徳比頑童時謂亂風𫝊狎侮聖人之言而不行拒逆忠直之規而不納耆年有徳疏逺之童稚頑嚚親比之是荒亂之風俗惟茲三風十愆卿士有一于身家必喪𫝊有一過則徳義廢失位亡家之道邦君有一于身國必亡𫝊諸侯犯此國亡之道臣下不匡其刑墨具訓于蒙士𫝊邦君卿士則以爭臣自匡正臣不正君服墨刑鑿其頟湼以墨蒙士例謂下士士以爭友僕𨽻自匡正音義儆居領反酣户甘反巫音無樂音洛殉辭俊反徐辭荀反畋音田逺于萬反注同耆巨夷反比毗志反徐扶至反稚直利反嚚魚巾反愆去乾反喪如字又息浪反爭諫爭之爭鑿在洛反頟魚白反湼乃結反𨽻郎計反疏正義曰此皆湯所制治官之刑以儆戒百官之言也三風十愆謂巫風二舞也歌也淫風四貨也色也遊也畋也與亂風四為十愆也舞及遊畋得有時為之而不可常然故三事特言恆也歌則可矣不可樂酒而歌故以酣配之巫以歌舞事神故歌舞為巫覡之風俗也貨色人所貪欲宜其以義自節而不可専心殉求故言殉於貨色心殉貨色常為遊畋是謂淫過之風俗也侮慢聖人之言拒逆忠直之諫疎逺耆年有徳親比頑愚幼童愛惡憎善國必荒亂故為荒亂之風俗也此三風十愆雖惡有大小但有一於身者皆喪國亡家故各從其類相配為風俗臣下不匡其刑墨言臣無貴賤皆當匡正君也具訓于蒙士者謂湯制官刑非直教訓邦君卿大夫等使之受諫亦備具教訓下士使受諫也𫝊正義曰酣歌常舞竝為耽樂無度荒淫廢徳俱是敗亂政事其為愆過不甚異也恆舞酣歌乃為愆耳若不恆舞不酣歌非為過也樂酒曰酣言耽酒以自樂也説文亦云酣樂酒也楚語云民之精爽不攜貳者則明神降之在男曰覡在女曰巫又周禮有男巫女巫之官皆掌接神故事鬼神曰巫也廢棄徳義専為歌舞似巫事鬼神然言其無政也殉者心循其事是貪求之意故為求也志在得之不顧禮義昧求謂貪昧以求之無逸云于遊于畋是遊與畋别故為遊戲與畋獵為之無度是淫過之風俗也侮謂輕慢狎謂慣忽故𫝊以狎配侮而言之旅獒云徳盛不狎侮是狎侮意相類也十愆有一則亡國喪家邦君卿士慮其喪亡之故則宜以爭臣自匡正犯顔而諫臣之所難故設不諫之刑以勵臣下故言臣不正君則服墨刑墨刑五刑之輕者謂鑿其頟湼以墨司刑所謂墨罪五百者也蒙謂蒙稚卑小之稱故蒙士例謂下士也顧氏亦以為蒙謂蒙闇之士例字宜從下讀言此等流例謂下士也嗚呼嗣王祇厥身念哉𫝊言當敬身念祖徳聖謨洋洋嘉言孔彰𫝊洋洋美善言甚明可法音義洋音羊徐音翔疏正義曰此歎聖人之謨洋洋美善者謂上湯作官刑所言三風十愆令受下之諫是善言甚明可法也惟上帝不常作善降之百祥作不善降之百殃𫝊祥善也天之禍福惟善惡所在不常在一家爾惟徳罔小萬邦惟慶𫝊修徳無小則天下賚慶爾惟不徳罔大墜厥宗傳茍為不徳無大言惡有類以類相致必墜失宗廟此伊尹至忠之訓音義賚力代反疏正義曰又戒王爾惟修徳而為善徳無小徳雖小猶萬邦賴慶況大善乎爾惟不徳而為惡惡無大惡雖小猶墜失其宗廟況大惡乎𫝊正義曰爾惟徳謂修徳以善也爾惟不徳謂不修徳為惡也易繫辭曰善不積不足以成名惡不積不足以滅身乃謂大善始為福大惡乃成禍此訓作勸誘之辭言為善無小小善萬邦猶慶況大善乎而為惡無大言小惡猶墜厥宗況大惡乎此經二事辭反而意同也𫝊言惡有類者解小惡墜宗之意初為小惡小惡有族類以類相致至於大惡若致於大惡必墜失宗廟言至於大惡乃墜非小惡即能墜也晉語云趙文子冠見韓獻子曰戒之此謂成人成人在始始與善善進不善蔑由至矣始與不善不善進善亦蔑由至矣言惡有類以類相致也今太甲初立恐其親近惡人以惡類相致禍害故以言戒之此是伊尹至忠之訓也序肆命𫝊陳天命以戒太甲亡序徂后𫝊陳往古明君以戒亡序太甲既立不明𫝊不用伊尹之訓不明居喪之禮伊尹放諸桐𫝊湯葬地也不知朝政故曰放三年復歸于亳思庸𫝊念常道伊尹作太甲三篇音義朝直遙反疏正義曰太甲既立為君不明居䘮之禮伊尹放諸桐宮使之思過三年復歸于亳都以其能改前過思念常道故也自初立至放而復歸伊尹每進言以戒之史叙其事作太甲三篇案經上篇是放桐宮之事中下二篇是歸亳之事此序歴言其事以總三篇也𫝊正義曰此篇承伊訓之下經稱不恵于阿衡知不明者不用伊尹之訓也王徂桐宮始云居憂是未放已前不明居喪之禮也經稱營于桐宮密邇先王知桐是湯葬地也舜放四凶徙之遠裔春秋放其大夫流之他境嫌此亦然故辨之云不知朝政故曰放使之逺離國都往居墓側與彼放逐事同故亦稱放也古者天子居喪三年政事聽於冡宰法當不知朝政而云不知朝政曰放者彼正法三年之内君雖不親政事冡宰猶尚諮禀此則全不知政故為放也太甲上𫝊戒太甲故以名篇疏正義曰盤庚仲丁祖乙等皆是發言之人名篇此太甲及沃丁君奭以被告之人名篇史官不同故以為名有異且伊訓肆命徂后與此三篇及咸有一徳皆是伊尹戒太甲不可同名伊訓故隨事立稱以太甲名篇也惟嗣王不恵于阿衡𫝊阿倚衡平言不順伊尹之訓音義倚於綺反疏正義曰太甲以元年十二月即位此至放桐之時未知凡經幾月必是伊尹數諫久而不順方始放之盖已三五月矣必是二年放之序言三年復歸者謂即位三年非在桐宮三年也史録其伊尹訓王有伊訓肆命徂后其餘忠規切諫固應多矣太甲終不從之故言不恵于阿衡史為作書發端故言此為目也𫝊正義曰古人所讀阿倚同音故阿亦倚也稱上謂之衡故衡為平也詩毛𫝊云阿衡伊尹也鄭文亦云阿倚衡平也伊尹湯倚而取平故以為官名伊尹作書曰先王顧諟天之明命以承上下神祗傳顧謂常目在之諟是也言敬奉天命以承順天地音義顧音故諟音是説文理也祗巨支反疏𫝊正義曰説文云顧還視也諟與是古今之字異故變文為是也言先王每有所行必還迴視是天之明命謂常目在之言其想象如目前終常敬奉天命以承上天下地之神祗也社稷宗廟罔不祇肅𫝊肅嚴也言能嚴敬鬼神而逺之天監厥徳用集大命撫綏萬方𫝊監視也天視湯徳集王命於其身撫安天下惟尹躬克左右厥辟宅師𫝊伊尹言能助其君居業天下之衆音義逺于萬反監工暫反辟必亦反徐甫亦反疏正義曰孫武兵書及呂氏春秋皆云伊尹名摰則尹非名也今自稱尹者盖湯得之使尹正天下故號曰伊尹人既呼之為尹故亦以尹自稱禮法君前臣名不稱名者古人質直不可以後代之禮約之肆嗣王丕承基緒𫝊肆故也言先祖勤徳致有天下故子孫得大承基業宜念祖修徳惟尹躬先見于西邑夏自周有終相亦惟終𫝊周忠信也言身先見夏君臣用忠信有終夏都在亳西其後嗣王罔克有終相亦罔終𫝊言桀君臣滅先人之道徳不能終其業以取亡嗣王戒哉祇爾厥辟辟不辟忝厥祖傅以不終為戒慎之至敬其君道則能終忝辱也為君不君則辱其祖音義丕普悲反徐甫眉反先見並如字注同相息亮反王惟庸罔念聞傳言太甲守常不改無念聞伊尹之戒伊尹乃言曰先王昧爽丕顯坐以待旦𫝊爽顯皆明也言先王昧明思大明其徳坐以待旦而行之旁求俊彦啓迪後人𫝊旁非一方美士曰彦開道後人言訓戒無越厥命以自覆𫝊越墜失也無失亡祖命而不勤徳以自顛覆慎乃儉徳惟懐永圖𫝊言當以儉為徳思長世之謀若虞機張徃省括于度則釋傳機弩牙也虞度也度機機有度以凖望言修徳夙夜思之明旦行之如射先省矢括于度釋則中欽厥止率乃祖攸行傳止謂行所安止君止於仁子止於孝惟朕以懌萬世有辭𫝊言能循汝祖所行則我喜悦王亦見嘆美無窮音義昧音妹俊亦作畯迪大歴反越于月反本又作粤覆芳服反注同省息井反括故活反度如字虞度待洛反中丁仲反懌音亦疏正義曰伊尹作書以告太甲不念聞之伊尹乃又言曰先王以昧爽之時思大明其徳既思得其事則坐以待旦明則行之其身既勤於政又乃旁求俊彦之人置之於位令以開導後人先王之念子孫其憂勤若是嗣王今承其後無得墜失其先祖之命以自覆敗王當慎汝儉約之徳令其以儉為徳而謹慎守之惟思為長世之謀謀為政之事譬若以弩射也可凖度之機已張之又當以意往省視矢括當於所度則釋而放之如是而射則無不中矣猶若人君所修政教欲發命也當以意夙夜思之使當於民心明旦行之則無不當矣王又當敬其身所安止循汝祖之所行若能如此惟我以此喜悦王于萬世常有善辭言有聲譽亦見歎美無窮也𫝊正義曰昭七年左𫝊云是以有精爽至於神明從爽以至於明是爽謂未大明也昧是晦冥爽是未明謂夜向晨也釋詁云丕大也顯光也光亦明也於夜昧𠖇之時思欲大明其徳既思得之坐以待旦而行之言先王身之勤也旁謂四方求之故言非一方也美士曰彦釋訓文舎人曰國有美士為人所言道也括謂矢末機張省括則是以射喻也機是轉關故為弩牙虞訓度也度機者機有法度以凖望所射之物凖望則解經虞也如射者弩以張訖機闗先省矢括與所射之物三者於法度相當乃後釋弦發矢則射必中矣言為政亦如是也王未克變𫝊未能變不用訓太甲性輕脱伊尹至忠所以不已音義輕遣政反疏𫝊正義曰未能變者據在後能變故當時為未能也時既未變是不用伊尹之訓也太甲終為人主非是全不可移但體性輕脱與物推遷雖有心向善而為之不固伊尹至忠所以進言不已是伊尹知其可移故誨之不止冀其終從己也伊尹曰兹乃不義習與性成𫝊言習行不義将成其性予弗狎于弗順營于桐宮密邇先王其訓無俾世迷𫝊狎近也經營桐墓立宮令太甲居之近先王則訓於義無成其過不使世人迷惑怪之音義義本亦作誼俾必爾反後篇同近附近之近令力呈反疏正義曰伊尹以王未變乃告于朝廷羣臣曰此嗣王所行乃是不義之事習行此事乃與性成言為之不已将以不義為性也我不得令王近於不順之事當營於桐墓立宮使比近先王當受人教訓之無得成其過失使後世人迷惑怪之𫝊正義曰狎習是相近之義故訓為近也不順即是近不順也習為不義近於不順則當日日益惡必至滅亡故伊尹言已不得使王近於不順故經營桐墓立宮墓傍令太甲居之不使復知朝政身見廢退必當改悔為善也王徂桐宮居憂𫝊往入桐宮居憂位疏𫝊正義曰亦既不知朝政之事惟行居喪之禮居憂位謂服治喪禮也伊尹亦使兵士衛之選賢俊教之故太甲能終信徳也克終允徳𫝊言能思念其祖終其信徳太甲中惟三祀十有二月朔𫝊湯以元年十一月崩至此二十六月三年服闋伊尹以冕服奉嗣王歸于亳𫝊冕冠也踰月即吉服音義闋苦穴反冕音免疏正義曰周制君薨之年屬前君明年始為新君之元年此殷法君薨之年而新君即位即以其年為新君之元年惟三祀者太甲即位之三年也湯以元年十一月崩至此年十一月為再朞除喪服也至十二月服闋闋息也如喪服息即吉服舉事貴初始故於十二月朔以冕服奉嗣王歸于亳冕是在首之服冠内之别名冠是首服之大名故𫝊以冕為冠案王制云殷人冔而祭大雅云常服黼冔冔是殷之祭冠今云冕者盖冕為通名王制又云有虞氏皇而祭夏后氏收而祭殷人冔而祭周人冕而祭竝是當代别名殷禮不知天子幾冕周禮天子六冕大裘之冕祭天尚質弁師惟掌五冕備物盡文惟衮冕耳此以冕服盖以衮冕之服也顧氏云祥禫之制前儒不同案士虞禮云朞而小祥又朞而大祥中月而禫王肅云祥月之内又禫祭服彌寛而變彌數也禮記檀弓云祥而縞是月禫徙月樂王肅云是祥之月而禫禫之明月可以樂矣案此孔𫝊云二十六月服闋則與王肅同鄭𤣥以中月為間一月云祥後復更有一月而禫則三年之喪凡二十七月與孔為異作書曰民非后罔克胥匡以生𫝊無能相匡故須君以生后非民罔以辟四方傳須民以君四方皇天眷佑有商俾嗣王克終厥徳實萬世無疆之休𫝊言王能終其徳乃天之顧佑商家是商家萬世無窮之美音義胥息餘反疆居良反王拜手稽首曰予小子不明于徳自厎不類𫝊君而稽首於臣謝前過類善也闇於徳故自致不善欲敗度縱敗禮以速戾于厥躬𫝊速召也言已放縱情欲毁敗禮儀法度以召罪於其身音義厎之履反敗必邁反徐甫邁反縱子用反戾郎計反疏𫝊正義曰釋言云速徴也徴召也轉以相訓故速為召也欲者本之於情縱者放之於外有欲而縱之縱欲為一也準法謂之度體見謂之禮禮度一也故𫝊并釋之言已放縱情欲毁敗禮儀法度以召罪於其身也天作孽猶可違自作孽不可逭𫝊孽災逭逃也言天災可避自作災不可逃音義孽魚列反逭胡亂反疏𫝊正義曰洪範五行𫝊有妖孽眚祥漢書五行志説云凡草物之類謂之妖妖猶夭胎言尚微也蟲豸之類謂之孽孽則牙孽矣甚則異物生謂之眚自外來謂之祥是孽為災初生之名故為災也逭逃也釋言文樊光云行相避逃謂之逭亦行不相逄也天作災者謂若太戊桑榖生朝髙宗雊雉升鼎耳可修徳以禳之是可避也自作災者謂若桀放鳴條紂死宣室是不可逃也據其将來修徳可去及其已至改亦無益天災自作逃否亦同且天災亦由人行而至非是横加災也此太甲自悔之深故言自作甚於天災耳既往背師保之訓弗克于厥初尚賴匡救之徳圖惟厥終𫝊言己己往之前不能修徳於其初今庶幾賴教訓之徳謀終於善悔過之辭音義背音佩徐扶代反伊尹拜手稽首𫝊拜手首至手疏𫝊正義曰周禮大祝辨九拜一曰稽首二曰頓首三曰空首鄭𤣥云稽首拜頭至地也頓首拜頭叩地也空首拜頭至手所謂拜手也鄭惟解此三者拜之形容所以為異也稽首頭至地頭下至地也頓首頭下至地暫一叩之而已此言拜手稽首者初為拜頭至手乃復申頭以至于地至手是為拜手至地乃為稽首然則凡為稽首者皆先為拜手乃後為稽首故拜手稽首連言之諸言拜手稽首義皆同也大祝又云四曰振動五曰吉拜六曰凶拜七曰竒拜八曰褒拜九曰肅拜鄭注云振動者戰栗變動而拜吉拜者拜而後稽顙謂齊衰不杖以下者之拜凶拜者稽顙而後拜即三年喪拜也竒拜者謂君答臣一拜也襃拜者謂再拜拜神與尸也肅拜者謂揖拜也禮介者不拜及婦人之拜也左𫝊云天子在寡君無所稽首則諸侯於天子稽首也諸侯相於則頓首也君於臣則空首也曰脩厥身允徳協于下惟明后傳言脩其身使信徳合於羣下惟乃明君先王子恵困窮民服厥命罔有不悦𫝊言湯子愛困窮之人使皆得其所故民心服其教令無有不忻喜竝其有邦厥鄰乃曰徯我后后來無罰𫝊湯俱與鄰竝有國鄰國人乃曰待我君來言忻戴君來無罰言仁恵音義徯胡啟反疏正義曰言湯昔為諸侯之時與湯竝居其有邦國謂諸侯之國也此諸侯國人其與湯鄰近者皆願以湯為君乃言曰待我后后來無罰於我言羨慕湯徳忻戴之也王懋乃徳視乃厥祖無時豫怠𫝊言當勉脩其徳法視其祖而行之無為是逸豫怠惰奉先思孝接下思恭𫝊以念祖徳為孝以不驕慢為恭視逺惟明聽徳惟聰𫝊言當以明視逺以聰聽徳音義懋音茂疏正義曰人之心識所知在於聞見聞見所得在於耳目故欲言人之聰明以視聽為主視若不見故言惟明明謂鍳察是非也聽若不明故言惟聰聰謂識知善惡也視戒見近迷逺故言視逺聽戒背正從邪故言聽徳各準其事相配為文朕承王之休無斁𫝊王所行如此則我承王之美無斁音義斁音亦厭於艷反太甲下伊尹申誥于王曰嗚呼惟天無親克敬惟親𫝊言天於人無有親疎惟親能敬身者民罔常懐懐于有仁𫝊民所歸無常以仁政為常鬼神無常享享于克誠𫝊言鬼神不係一人能誠信者則享其祀天位艱哉𫝊言居天子之位難以此三者疏正義曰伊尹以至忠之心喜王改悔重告於王冀王大善一篇皆誥辭也天親克敬民歸有仁神享克誠言天民與神皆歸于善也奉天宜其敬謹飬民宜用仁恩事神當以誠信亦準事相配而為文也徳惟治否徳亂𫝊為政以徳則治不以徳則亂與治同道罔不興與亂同事罔不亡𫝊言安危在所任治亂在所法音義治直吏反注及下同疏𫝊正義曰任賢則興任佞則亡故安危在所任於善則治於惡則亂故治亂在所法總言治國則稱道單指所行則言事興難而亡易道大而事小故大言典而小言亡也此所云惟言治亂在所與耳下句云終始慎厥與言當與賢不與佞治亂在於用臣故𫝊於此言安危在所任也終始慎厥與惟明明后傳明慎其所與治亂之機則為明王明君疏正義曰重言明明言其為大明耳𫝊因文重故言明王明君君王猶是一也先王惟時懋敬厥徳克配上帝𫝊言湯惟是終始所與之難勉修其徳能配天而行之今王嗣有令緒尚監兹哉𫝊令善也繼祖善業當夙夜庶幾視祖此配天之徳而法之若升髙必自下若陟遐必自邇傳言善政有漸如登高升遠必用下近為始然後終致高逺無輕民事惟難𫝊無輕為力役之事必重難之乃可無安厥位惟危𫝊言當常自危懼以保其位慎終于始𫝊於始慮終於終思始疏正義曰欲慎其終於始即須慎之故𫝊云於始慮終𫝊以将終戒惰故又云於終思始言終始皆當慎也有言逆于汝心必求諸道𫝊人以言咈違汝心必以道義求其意勿拒逆之有言遜于汝志必求諸非道𫝊遜順也言順汝心必以非道察之勿以自蔵嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞𫝊胡何貞正也言常念慮道徳則得道徳念為善政則成善政一人天子天子有大善則天下得其正音義咈扶弗反疏𫝊正義曰胡之與何方言之異耳易彖象皆以貞為正也伊尹此言勸王為善弗慮弗為必是善事人君善事惟有道徳政教言不慮何獲是念慮有所得知心所念慮是道徳也不為何成則為之有所成則知心所念是為善政也謂天子為一人者其義有二一則天子自稱一人是為謙辭言已是人中之一耳一則臣下謂天子為一人是為尊稱言天下惟一人而已君罔以辯言亂舊政𫝊利口覆國家故特慎焉臣罔以寵利居成功𫝊成功不退其志無限故為之極以安之音義覆芳服反疏𫝊正義曰四時之序成功者退臣既成功不知退謝其志貪欲無限其君不堪所求或有怨恨之心君懼其謀必生誅殺之計自古以來人臣有功不退者皆喪家滅族者衆矣經稱臣無以寵利居成功者為之限極以安之也伊尹告君而言及臣事者雖復汎説大理亦見已有退心也邦其永孚于休𫝊言君臣各以其道則國長信保於美序伊尹作咸有一徳𫝊言君臣皆有純一之徳以戒太甲疏正義曰太甲既歸于亳伊尹致仕而退恐太甲徳不純一故作此篇以戒之經稱尹躬及湯有一徳言已君臣皆有純一之徳戒太甲使君臣亦然此主戒太甲而言臣有一徳者欲令太甲亦任一徳之臣經云任官惟賢材左右惟其人是戒太甲使善用臣也伊尹既放太甲又迎而復之是伊尹有純一之徳已為太甲所信是已君臣純一欲令太甲法之咸有一徳𫝊即政之後恐其不一故以戒之疏正義曰此篇終始皆言一徳之事發首至陳戒于徳敘其作戒之由已下皆戒辭也徳者得也内得于心行得其理既得其理執之必固不為邪見更致差貳是之謂一徳也而凡庸之王監不周物志既少決性復多疑與智者謀之與愚者敗之則是二三其徳不為一也經云徳惟一動罔不吉徳二三動罔不凶是不二三則為一徳也又曰終始惟一時乃日新言守一必須固也太甲新始即政伊尹恐其二三故専以一徳為戒伊尹既復政厥辟𫝊還政太甲将告歸乃陳戒于徳𫝊告老歸邑陳徳以戒疏正義曰自太甲居桐而伊尹秉政太甲既歸于亳伊尹還政其君将欲告老歸其私邑乃陳言戒王於徳以一徳戒王也太甲既得復歸伊尹即應還政其告歸陳戒未知在何年也下云今嗣王新服厥命則是初始即政盖太甲居亳之後即告老也君奭云在太甲時則有若保衡保衡伊尹也襄二十一年左𫝊云伊尹放太甲而相之卒無怨色則伊尹又相太甲盖伊尹此時将欲告歸太甲又留之為相如成王之留周公不得歸也𫝊正義曰伊尹湯之上相位為三公必封為國君又受邑于畿内告老致政事於君欲歸私邑以自安将離王朝故陳戒以徳也無逸云肆祖甲之享國三十三年𫝊稱祖甲即太甲也殷本紀云太甲崩子沃丁立沃丁序云沃丁既葬伊尹于亳則伊尹卒在沃丁之世湯為諸侯之時已得伊尹此至沃丁始卒伊尹夀年百有餘嵗此告歸之時已應七十左右也殷水紀云太甲既立三年伊尹放之於桐宮居桐宮三年悔過反善伊尹乃迎而授之政謂太甲歸亳之嵗已為即位六年與此經相違馬遷之説妄也紀年云殷仲壬即位居亳其卿士伊尹仲壬崩伊尹乃放太甲於桐而自立也伊尹即位於太甲七年太甲潛自出桐殺伊尹乃立其子伊陟伊奮命復其父之田宅而中分之案此經序伊尹奉太甲歸于亳其文甚明左𫝊又稱伊尹放太甲而相之孟子云有伊尹之志則可無伊尹之志則簒伊尹不肯自立太甲不殺伊尹也必若伊尹放君自立太甲起而殺之則伊尹死有餘罪義當汙宮滅族太甲何所感徳而復立其子還其田宅乎紀年之書晉太康八年汲郡民發魏安僖王塚得之盖當時流俗有此妄説故其書因記之耳曰嗚呼天難諶命靡常𫝊以其無常故難信常厥徳保厥位厥徳匪常九有以亡𫝊人能常其徳則安其位九有諸侯桀不能常其徳湯伐而兼之音義諶徐市林反疏正義曰毛詩𫝊云九有九州也此𫝊云九有諸侯謂九州所有之諸侯伊尹此言汎説大理未指夏桀但𫝊顧下文比桀為此言之驗故云桀不能常其徳湯伐而兼之夏王弗克庸徳慢神虐民𫝊言桀不能常其徳不敬神明不恤下民皇天弗保監于萬方啓迪有命𫝊言天不安桀所為廣視萬方有天命者開道之眷求一徳俾作神主𫝊天求一徳使伐桀為天地神祗之主惟尹躬暨湯咸有一徳克享天心受天明命𫝊享當也所征無敵謂之受天命疏𫝊正義曰徳當神意神乃享之故以享為當也天道逺而人道近天之命人非有言辭文誥正以神明佑之使之所征無敵謂之受天命也緯侯之書乃稱有黄龍𤣥龜白魚赤雀負圖銜書以授聖人正典無其事也漢自哀平之間緯侯始起假託鬼神妄稱祥瑞孔時未有其説縱使時已有之亦非孔所信也以有九有之師爰革夏正𫝊爰於也於得九有之衆遂伐夏勝之改其正非天私我有商惟天佑于一徳𫝊非天私商而王之佑助一徳所以王非商求于下民惟民歸于一徳𫝊非商以力求民民自歸于一徳徳惟一動罔不吉徳二三動罔不凶𫝊二三言不一惟吉凶不僭在人惟天降災祥在徳𫝊行善則吉行惡則凶是不差徳一天降之善不一天降之災是在徳音義王于况反下以王同或如字僭子念反疏正義曰指其已然則為吉凶言其徵兆則曰災祥其事不甚異也吉凶已成之事指人言之故曰在人災祥未至之徴行之所招故言在徳在徳謂為徳有一與不一在人謂人行有善與不善也吉凶已在其身故不言來處災祥自外而至故言天降其實吉凶亦天降也今嗣王新服厥命惟新厥徳𫝊其命王命新其徳戒勿怠終始惟一時乃日新𫝊言徳行終始不衰殺是乃日新之義任官惟賢材在右惟其人𫝊官賢才而任之非賢才不可任選左右必忠良不忠良非其人臣為上為徳為下為民𫝊言臣奉上布徳順下訓民不可官所私任非其人其難其慎惟和惟一𫝊其難無以為易其慎無以輕之羣臣當和一心以事君政乃善音義行下孟反殺色界反衰微也殺害也言小小害也為上之為于偽反為民同為徳之為如字為下同徐皆于偽反易以䜴反疏正義曰上既言在徳此指戒嗣王今新始服其王命惟當新其所行之徳所云新者終始所行惟常如一無有哀殺之時是乃日新也王既身行一徳臣亦當然任人為官惟用其賢才輔弼左右惟當用其忠良之人乃可為左右耳此任官左右即王之臣也臣之為用所施多矣何者言臣之助為在上當施為道徳身為臣下當須助為於民也臣之既當為君又須為民故不可任非其才用非其人此臣之所職其事甚難無得以為易其事須慎無得輕忽為臣之難如此惟當衆臣和順惟當共秉一心以此事君然後政乃善耳言君臣宜皆有一徳傳正義曰説命云王言惟作命成十八年左𫝊云人之求君使出命也是言人君職在發命新服厥命新始服行王命故云其命王命也新其徳者勤行其事日日益新戒王勿懈怠也日新者日日益新也若今日勤而明日惰昨日是而今日非自旁觀之則有新有舊言王徳行終始皆同不有衰殺從旁觀之每日益新是乃日新之義也任官謂任人以官故云官賢才而任之言官用賢才而委任之詩序云任賢使能非賢才不可任也冏命云小大之臣咸懐忠良故言選左右必忠良不忠良即是非其人任官是用人為官左右亦是任而用之故言選左右也直言其人人字不見故據冏命之文以忠良充之言臣奉上布徳者奉上謂奉為在上解經為上也布徳者謂布為道徳解經為徳也順下訓民者順下謂卑順以為臣下解經為下也訓民者謂以善道訓助下民解經為民也顧氏亦同此解其難其慎者此經申上臣事既所為如此其難無以為易其慎無以輕忽之戒臣無得輕易臣之職也既事不可輕宜和恊奉上羣臣當一心以事君如此政乃善耳一心即一徳言臣亦當一徳也徳無常師主善為師𫝊徳非一方以善為主乃可師善無常主協于克一𫝊言以合於能一為常徳俾萬姓咸曰大哉王言𫝊一徳之言故曰大又曰一哉王心𫝊能一徳則一心克綏先王之祿永厎烝民之生𫝊言為王而令萬姓如此則能保安先王之寵祿長致衆民所以自生之道是明王之事音義烝之承反嗚呼七世之廟可以觀徳𫝊天子立七廟有徳之王則為祖宗其廟不毁故可觀徳萬夫之長可以觀政𫝊能整齊萬夫其政可知音義長之丈反疏正義曰此又勸王修徳以立後世之名禮王者祖有功宗有徳雖七世之外其廟不毁嗚呼七世之廟其外則猶有不毁者可以觀知其有明徳也立徳在於為政萬夫之長能使其整齊可以觀知其善政也萬夫之長尚爾况天子乎勸王使為善政也𫝊正義曰天子立七廟是其常事其有徳之王則列為祖宗雖七廟親盡而其廟不毁故於七廟之外可以觀徳矣下云萬夫之長可以觀政謂觀其萬夫之長此七世之廟可以觀徳謂觀七世之外文雖同而義小異耳所謂辭不害意漢氏以來論七廟者多矣其文見於記𫝊者禮器家語荀卿書穀梁𫝊皆曰天子立七廟以為天子常法不辨其廟之名王制云天子七廟三昭三穆與太祖之廟而七祭法云王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止漢書韋𤣥成議曰周之所以七廟者后稷始封文王武王受命而王是以三廟不毁與親廟四而七也鄭𤣥用此為説惟周有七廟二祧為文王武王廟也故鄭𤣥王制注云此周制七者太祖及文王武王二祧與親廟四太祖后稷也殷則六廟契及湯與二昭二穆夏則五廟無太祖禹與二昭二穆而已良由不見古文故為此謬説此篇乃是商書已云七世之廟則天子立七廟王者常禮非獨周人始有七廟也文武則為祖宗不在昭穆之數王制之文不得云三昭三穆也劉歆馬融王肅雖則不見古文皆以七廟為天子常禮所言二祧者王肅以為髙祖之父及祖也并髙祖已下共為三昭三穆耳喪服小記云王者禘其祖之所自出以其祖配之而立四廟庶子王亦如之所以不同者王肅等以為受命之王是初基之王故立四廟庶子王者謂庶子之後自外繼立雖承正統之後自更别立已之髙祖已下之廟猶若漢宣帝别立戾太子悼皇考廟之類也或可庶子初基為王亦得與嫡子同正立四廟也后非民罔使民非后罔事𫝊君以使民自尊民以事君自生無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功𫝊上有狹人之心則下無所自盡矣言先盡其心然後乃能盡其力人君所以成功音義狹户夾反盡徐子忍反注同疏正義曰既言君民相須又戒王虛心待物凡為人主無得自為廣大以狹小前人勿自以所知為大謂彼所知為小若謂彼狹小必待之輕薄彼知遇薄則意不自盡匹夫匹婦不得自盡其意則在下不肯親上在上不得下情如是則人主無與成其功也序沃丁既葬伊尹于亳𫝊沃丁太甲子伊尹既致仕老終以三公禮葬咎單遂訓伊尹事𫝊訓暢其所行功徳之事作沃丁𫝊咎單忠臣名作此篇以戒也亡音義沃烏毒反徐於毒反疏正義曰沃丁殷王名也沃丁既葬伊尹言重其賢徳備禮而葬之咎單以沃丁愛慕伊尹遂訓暢伊尹之事以告沃丁史錄其事作沃丁之篇𫝊正義曰世本本紀皆云太甲崩子沃丁立是為太甲子也伊尹本是三公上篇言其告歸知致仕老終以三公禮葬皇甫謐云沃丁八年伊尹卒卒年百有餘嵗大霧三日沃丁葬之以天子禮葬祀以太牢親臨喪以報大徳晉文請隧襄王不許沃丁不當以天子之禮葬伊尹也孔言三公禮葬未必有文要情事當然也序伊陟相太戊𫝊伊陟伊尹子太戊沃丁弟之子亳有祥桑穀共生于朝𫝊祥妖怪二木合生七日大拱不恭之罰伊陟贊于巫咸作咸乂四篇𫝊贊告也巫咸臣名皆亡音義陟張力反相息亮反太戊馬云太甲子桑蘇臧反穀工木反楮也朝直遙反巫咸馬云巫男巫也名咸殷之巫也乂治也疏正義曰伊陟輔相太戊於亮都之内有不善之祥桑穀二木共生于朝朝非生木之處是為不善之徵伊陟以此桑穀之事告于巫咸史錄其事作咸又四篇又訓治也言所以致妖須治理之故名篇為咸乂也伊陟不先告太戊而告巫咸者君奭云在太戊時則有若巫咸乂王家則咸是賢臣能治王事大臣見怪而懼先共議論而後以告君下篇序云太戊贊于伊陟明先告于巫咸而後告太戊𫝊正義曰伊陟伊尹子相傳為然殷本紀云沃丁崩弟太庚立崩子小甲立崩弟雍已立崩弟太戊立是太戊為小甲弟太庚之子漢書五行志云凡草物之類謂之妖自外來謂之祥祥是惡事先見之徵故為妖怪也二木合生謂共處生也七日大拱伏生書𫝊有其文或當别出餘書則孔用之也鄭𤣥注書𫝊云兩手搤之曰拱生七日而見其大滿兩手也殷本紀云一暮大拱言一夜即滿拱所聞不同故説異也五行𫝊曰貌之不恭是謂不肅時則有青眚之祥漢書五行志夏侯始昌劉向算法云肅敬也内曰恭外曰敬人君行已體貌不恭怠慢驕蹇則不能敬木色青故有青眚之祥是言木之變怪是貌不恭之罰人君貌不恭天将罰之木怪見其徵也皇甫謐云太戊問於伊陟伊陟曰臣聞妖不勝徳帝之政事有闕白帝修徳太戊退而占之曰桑穀野木而不合生於朝意者朝亡乎太戊懼修先王之政明飬老之禮三年而逺方重譯而至七十六國是言妖不勝徳也禮有贊者皆以言告人故贊為告也君奭𫝊曰巫氏也當以巫為氏名咸此言臣名者言是臣之名號也鄭𤣥云巫咸謂之巫官者案君奭咸子乂稱賢父子竝為大臣必不世作巫官故孔言巫氏是也序太戊贊于伊陟𫝊告以改過自新作伊陟原命𫝊原臣名原命伊陟二篇皆亡疏正義曰言太戊贊於伊陟惟告伊陟不告原也史錄其事而作伊陟原命二篇則太戊告伊陟亦告原俱以桑榖事告故序總以為文也原是臣名而云原命謂以言命原故以原命名篇猶如冏命畢命也序仲丁遷于嚻𫝊太戊子去亳嚻地名作仲丁𫝊陳遷都之義亡音義嚻五羔反疏正義曰此三篇皆是遷都之事俱以君名名篇竝陳遷都之義如盤庚之誥民也發其舊都謂之遷到彼新邑謂之居遷于嚻與居相亦事同也以河亶甲三字句長不言于其實亦是居于相也圮于耿者孔意以為毁于相地乃遷于耿地其篇盖言毁意故序特言圮也李顒云嚻在陳留浚儀縣皇甫謐云仲丁自亳徙嚻在河北也或曰今河南敖倉二説未知孰是也相地孔云在河北盖有文而知也謐又以耿在河東皮氏縣耿鄉是也𫝊正義曰此及下𫝊言仲丁是太戊之子河亶甲仲丁弟也祖乙河亶甲子皆世本文也仲丁是太戊之子太戊之時仍云亳有祥知仲丁遷于嚻去亳也序河亶甲居相𫝊仲丁弟相地名在河北作河亶甲傳亡音義亶丁但反相息亮反在河北今魏郡有相縣序祖乙圮于耿𫝊亶甲子圮于相遷於耿河水所毁曰圮作祖乙𫝊亡音義圮備美反徐扶鄙反馬云毁也疏𫝊正義曰孔以河亶甲居相祖乙即亶甲之子故以為圮於相地乃遷都于耿釋詁云圮毁也故云河水所毁曰圮據文圮于耿也知非圮毁于耿更遷餘處必云圮於相地遷於耿者明與其上文連上云遷于嚻謂遷來向嚻居於相謂居於相地故知圮于耿謂遷來于耿以文相類故孔為此解謂古人之言雖尚要約皆使言足其文令人曉解若圮於相遷居於耿經言圮於耿大不辭乎且亶甲居於相祖乙居耿今為水所毁更遷他處故言毁于耿耳非既毁乃遷耿也盤庚云不常厥邑于今五邦及其數之惟有亳嚻相耿四處而已知此既毁於耿更遷一處盤庚又自彼處而遷於殷耳殷本紀云祖乙遷於邢馬遷所為説耳鄭𤣥云祖乙又去相居耿而國為水所毁於是修徳以禦之不復徙也錄此篇者善其國圮毁改政而不徙如鄭所言稍為文便但上有仲丁亶甲下有盤庚皆為遷事作書述其遷意此若毁而不遷序當改文見義不應文類遷居更以不遷為義汲冡古文云盤庚自奄遷於殷者盖祖乙圮於耿遷於奄盤庚自奄遷於殷亳嚻相耿與此奄五邦者此盖不經之書未可依信也尚書注疏卷七尚書注疏卷七考證湯誓序升自陑𫝊湯升道從陑出其不意劉敞曰言升陑者謂桀雖據險亦不能拒湯所謂地利不如人和孔氏乃云出其不意孫吴之師非湯與伊尹之義也湯誓𫝊戒誓湯士庶臣召南按文義應作湯戒誓士衆又按此篇今爾有衆汝曰及今汝其曰皆謂士衆不欲伐夏故作誓明必往之義孔傳解經全非經意至序所云升自陑遂與桀戰於鳴條之野則此誓已後之事也林之竒曰此篇是始興師誓衆於亳邑之辭甚確仲虺之誥序至於大坰仲虺作誥臣召南按史記作至於泰卷陶中􅣂作誥注徐廣曰一無陶字又按仲虺荀子作中蘬大戴作仲傀趙岐曰萊朱一曰仲虺左𫝊仲虺為湯左相是伊尹為右相成湯放桀於南巢疏桀奔南巢一段臣浩按疏一條監本誤移於後文奉若天命注下又此篇疏並不依經𫝊之次以類相從今竝一一移正湯誥序湯既黜夏命復歸於亳作湯誥臣召南按伏生今文無湯誥而孔壁古文有之即此篇王歸自克夏云云是也乃史記殷本紀曰既絀夏命還亳作湯誥維三月王自至於東郊告諸侯羣后毋不有功於民勤力乃事予乃大罰殛女毋予怨曰古禹臯陶久勞於外其有功乎民民乃有安東為江北為濟西為河南為淮四瀆已修萬民乃有居后稷降播農殖百穀三公咸有功於民故后有立昔蚩尤與其大夫作亂百姓帝乃弗予有状先王言不可不勉曰不道毋之在國女毋我怨以令諸侯按其辭酷類尚書但今文本闕湯誥古文具存不知司馬遷何處得此逸篇也附錄於此若有恒性羅欽順曰六經之中言心自帝舜始言性自成湯始臣浩按此句宋儒連上降𠂻於下民讀即中庸天命之謂性也孔𫝊則連下克綏厥猷讀伊訓序太甲元年疏湯没而太甲代立即以其年稱為元年也蘇軾曰本年改元亂世事也不容在伊尹而有之不可以不辨又曰元祀十有二月者太甲立之明年正月也殷之正月夏之十二月也殷雖以建丑為正猶以夏正數月猶周公作豳詩於成王之世而云七月流火九月授衣皆夏正也伊尹祠於先王王應麟曰漢律厯志引伊訓伊尹祠於先王誕資有牧方明説者謂祀先王於方明朱子曰方當作乃即所謂乃明言烈祖之成徳自周有終𫝊周忠信也蘇軾曰自由也由忠信之道則有終王柏曰周當作君金履祥曰古文君字與周字相似故誤呉氏經説亦云當作君乃陳戒於徳疏𫝊稱祖甲即太甲也臣召南按此説不確若無逸所稱祖甲即是太甲則何以叙於中宗髙宗之後附序仲丁遷於囂囂史記作隞附序祖乙圮於耿𫝊圮於相遷於耿王應麟曰殷本紀謂祖乙遷於邢皇極經世祖乙踐位圮於耿徙居邢盖從史記以書序考之孔氏以圮於耿為圮於相恐未通蘇氏書𫝊云祖乙圮於耿盤庚不得不遷以經世紀年考之自祖乙以乙未踐位至盤庚巳亥巳一百二十五年若謂民蕩析離居因耿之圮不應如此之久也當闕所疑尚書注疏卷七考證
