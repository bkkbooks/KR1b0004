body:
  text: 尚書注疏卷十二漢孔氏傳唐陸德明音義孔穎達疏周書旅獒大誥金縢之命微子序西旅獻獒傳西戎逺國貢大犬大保作旅獒傳召公陳戒音義獒五羔反馬云作豪酋豪也召時照反後召云皆倣此疏正義曰西方之戎有國名旅者遣獻其大犬其名曰獒於是大保召公因陳戒史叙其事作旅獒傳正義曰西旅西方夷名西方曰戎克商之後乃来知是西戎逺國也獒是犬名故云貢大犬成王時召公為大保知此時大保亦召公也釋詁云旅陳也故云召公陳戒上旅是國名此旅訓為陳二旅字同而義異鄭云獒讀曰豪西戎無君名強大有政者為酋豪國人遣其酋豪来獻見於周良由不見古文妄為此說旅獒傳因獒而陳道義惟克商遂通道于九夷八蠻傳四夷慕化貢其方賄九八言非一皆通道路無逺不服西旅厎貢厥獒傳西戎之長致貢其獒犬髙四尺曰獒以大為異大保乃作旅獒用訓于王傳陳貢獒之義以訓諫王音義賄呼罪反厎之履反長丁丈反疏正義曰惟武王既克商華夏既定遂開通道路於九夷八蠻於是有西戎旅國致貢其大犬名獒太保召公乃作此篇陳貢獒之義用訓諌於王傳正義曰曲禮云其在東夷西戎南蠻北狄經舉夷蠻則戎狄可知四夷慕化貢其方賄言所貢非獨旅也四夷各自為國無大小統領九八言非一也釋地云九夷八狄七戎六蠻謂之四海又云八蠻在南方六戎在西方五狄在北方上下二文三方數目不同明堂位稱九夷八蠻六戎五狄與爾雅上文不同周禮職方氏掌四夷八蠻七閩九貉五戎六狄之人鄭衆云四八七九五六周之所服國數也徧檢經傳四夷之數參差不同先儒舊解此爾雅殷制明堂位及職方并爾雅下文云八蠻在南六戎在西五狄在北皆為周制義或當然明堂位言六戎五狄職方言五戎六狄趙商以此問鄭鄭答云戎狄但有其國數其名難得而知是鄭亦不能定解言克商遂通道是王家遣使通道也魯語引此事韋昭云通道譯使懐柔之是王家遣使通彼彼聞命来獻也言其通夷蠻而有戎貢是四夷皆通道路無所不服西戎之長謂旅國之君致貢其獒或遣使貢之不必自来也犬髙四尺曰獒釋畜文左傳晉靈公有犬謂之獒旅國以犬為異故貢之也曰嗚呼明王愼德四夷咸賔傳言明王愼德以懐逺故四夷皆賔服無有逺邇畢獻方物惟服食器用傳天下萬國無有逺近盡貢其方土所生之物惟可以供服食器用者言不為耳目華侈王乃昭德之致于異姓之邦無替厥服傳德之所致謂逺夷之貢以分賜異姓諸侯使無廢其職分寶玉于伯叔之國時庸展親傳以寶玉分同姓之國是用誠信其親親之道音義供音恭為于偽反侈昌氏反又式氏反疏正義曰嗚呼歎而言也自古明聖之王慎其徳教以柔逺人四夷皆来賔服無有逺之與近盡貢其方土所生之物其所獻者惟可以供其服食器用而已不為耳目華侈供玩好之用也明王既得所貢乃明其徳之所致分賜於彼異姓之國明已德致逺賜異姓之國令使無廢其服職事也分寶玉於同姓伯叔之國見已無所愛惜是用誠信其親親之道也傳正義曰以言無有逺近是華夷總統之辭釋詁云畢盡也故云天下萬國無有逺之與近盡貢其方土所生之物惟可以供服食器用者𤣥纁絺紵供服也橘柚菁茅供食也羽毛齒革瑶琨篠簜供器用也下言不役耳目故知言不為耳目華侈也周禮大行人云九州之外謂之蕃國世壹見各以其所貴寶為贄鄭𤣥云所貴寶見經傳者犬戎獻白狼白鹿是也餘外則周書王會備焉案王㑹篇諸方致貢無所不有此言惟服食器用者逺方所貢雖不充於器用實亦受之召公深戒武王故言此耳明王有德四夷乃貢是德之所致謂逺夷之貢也昭德之致正謂賜異姓諸侯令其見此逺物服德畏威無廢其貢獻常職也魯語稱武王時肅慎氏来貢楛矢石砮長尺有咫先王欲昭令德之致逺以示後人使永監焉故銘其楛曰肅慎氏貢矢以分大姬配虞胡公而封諸陳古者分異姓以逺方之貢使無忘服也故分陳以肅慎氏之矢是分異姓之事禮有異姓庶姓異姓王之甥舅庶姓與王無親其分庶姓亦當以逺方之貢矣寶玉亦是萬國所貢但不必是逺方所貢耳以寶玉分同姓之國示已不愛惜共諸侯有之是用誠信其親親之道也言用寶以表誠心使彼知王親愛之也定四年左傳稱分魯公以夏后氏之璜是以寶玉分同姓也異姓疎慮其廢職故賜以逺方之物攝彼心同姓親嫌王無恩賜以寶玉貴物表王心此亦互相見也人不易物惟德其物傳言物貴由人有德則物貴無德則物賤所貴在於德德盛不狎侮傳盛德必自敬何狎易侮慢之有狎侮君子罔以盡人心傳以虛受人則人盡其心矣狎侮小人罔以盡其力傳以悅使民民忘其勞則力盡矣音義不易羊質反狎易以豉反盡津忍反下同疏正義曰既言分物賜人因說貴不在物言有徳無徳之王俱是以物賜人所賜之物一也不改易其物惟有德者賜人其此賜者是物若無德者賜人則此物不是物矣恐人主恃已賜人不自脩德言此者戒人主使脩徳也又說脩德之事德盛者常自敬身不為輕狎侮慢之事狎侮君子則無以盡人心君子被君侮慢不肯盡心矣狎侮小人則無以盡其力小人被君侮慢不復肯盡力矣君子不盡心小人不盡力則國家之事敗矣傳正義曰有德不濫賞賞必加於賢人得者則以為榮故有德則物貴也無德則濫賞賞或加於小人賢者得之反以為恥故無德則物賤也所貴不在於物乃在於德以虚受人易咸卦象辭也人主以已為虛受用人言執謙以下人則人皆盡其心矣詩序云悅以使民民忘其死故云以悅使民民忘其勞在上撫悅之則人皆盡其力矣此君子謂臣小人謂民太甲曰接下思恭不可狎侮臣也論語云使民如承大祭不可狎侮民也襄九年左傳云君子勞心小人勞力故别言之不役耳目百度惟貞傳言不以聲色自役則百度正玩人喪德玩物喪志傳以人為戲弄則喪其德以器物為戲弄則喪其志志以道寧言以道接傳在心為志發氣為言皆以道為本故君子勤道不作無益害有益功乃成不貴異物賤用物民乃足傳遊觀為無益竒巧為異物言明王之道以德義為益器用為貴所以化治生民犬馬非其土性不畜傳非此土所生不畜以不習其用珍禽竒獸不育于國傳皆非所用有損害故不寶逺物則逺人格傳不侵奪其利則來服矣所寶惟賢則邇人安傳寶賢任能則近人安近人安則逺人安矣音義玩五貫反喪息浪反觀官喚反畜許竹反疏正義曰既言不可狎侮又言不可縱恣不以聲色使役耳目則百事之度皆惟正矣以聲色自娱必玩弄人物既玩弄人者喪其德也玩弄物者喪其志也人物既不可玩則當以道自處志當以道而寧身言當以道而接物依道而行則志自得而言自當傳正義曰昭元年左傳子産論晉侯之疾云茲心不爽昏亂百度杜預云百度百事之節也此言志既不營聲色百事皆自用心則皆得正也喪德喪志其義一也玩人為重以德言之玩物為輕以志言之終是志荒而德喪耳在心為志詩序文也在心為志謂心動有所向也發氣為言言於志所趣也志是未發言是已發相接而成本末之異耳志言並皆用道但志未發故以道寧志不依道則不得寧耳言是已發故以道接言不以道則不可接物志言皆以道為本故君子須勤道也遊觀徒費時日故為無益無益多矣非徒遊觀而已竒巧世所希有故為異物異物多矣非徒竒巧而已諸是妄作皆為無益諸是世所希皆為異物異物無益不可徧舉舉此二者以明此類皆是也不作是初造之辭為作有所害故以為無益不貴是愛好之語有貴必有賤故以異物對用物雖經言用物傳言器用可矣經言有益有益不知所謂故傳以德義是人之本故德義為有益諸是益身之物皆是有益亦舉重為言經之戒人主人主如此所以化世俗生養下民也此言生民宣十二年左傳云分謗生民皆為生活民也下云生民保厥居與孝經云生民之本盡矣言民生於世謂之生民與此傳異也俗本云弗賤衍弗字也犬馬非其土性不畜者此篇為戒止為此句以西旅之獒非中國之犬不用令王愛好之故言此也僖十五年左傳言晉侯乗鄭馬及戰䧟於濘是非此土所生不習其用也犬不習用傳記無文詩序云任賢使能周室中興故傳以任能配寶賢言之論語云舉直錯諸枉則民服故寶賢任能則近人安嫌安近不及逺故云近人安則逺人安矣楚語云王孫圉聘於晉定公饗之趙簡子鳴玉以相問於王孫圉曰楚之白珩猶在乎對曰然簡子曰其為寶也㡬何矣曰未嘗為寶楚之所寶者曰觀射父及左史倚相此楚國之寶也若夫白珩先王之所玩何寶之焉是謂寶賢也嗚呼夙夜罔或不勤傳言當早起夜寐常勤於德不矜細行終累大德傳輕忽小物積害毁大故君子愼其微爲山九仞功虧一簣傳八尺曰仞喻向成也未成一簣猶不為山故曰功虧一簣是以聖人乾乾日昃愼終如始允廸茲生民保厥居惟乃世王傳言其能信蹈行此誡則生人安其居天子乃世世王天下武王雖聖猶設此誡况非聖人可以無誡乎其不免於過則亦宜矣音義行下孟反累劣偽反仞音刃字又作刃七尺曰仞一云八尺曰仞虧曲為反簣其貴反向許亮反乾其連反昃音側王如字又于況反注同疏正義曰所戒以終故歎以結之嗚呼為人君者當早起夜寐無有不勤於德言當勤行德也若不矜惜細行作随宜小過終必損累大德矣譬如為山已髙九仭其功虧損在於一簣惟少一簣而止猶尚不成山以喻樹德行政小有不終德政則不成矣必當慎終如始以成徳政王者信能蹈行此誡生民皆安其居處惟天子乃世世王天下也傳正義曰矜是憐惜之意故以不惜細行為輕忽小物謂上狎侮君子小人愛玩犬馬禽獸之類是小事也積小害毁大德故君子愼其微易繫辭曰小人以小善為無益而不為也以小惡為無傷而不去也故惡積而不可掩罪大而不可解是故君子當愼微也周禮匠人有畎遂溝洫皆廣深等而澮云廣二尋深二仞則澮亦廣深等仞與尋同故知八尺曰仞王肅聖證論及注家語皆云八尺曰仞與孔義同鄭𤣥云七尺曰仞與孔意異論語云譬如為山未成一簣鄭云簣盛土器為山九仞欲成山以喻為善向成也未成一簣猶不為山故曰為山功虧一簣古語云行百里者半於九十言末路之艱難也是以聖人乾乾不息至於日昃不敢自暇恐末路之失同於一簣故愼終如始也乾乾易乾卦文日昃無逸篇文允廸茲者此總結上文信蹈行此誡行此以上言也言君主於治民故先云生民安其居天子乃得世世王天下也𫝊以庸君多自用已不受人言叙經意而申之云武王雖聖召公猶設此誡况非聖人可以無誡乎身既非聖又無善誡其不免於過則亦宜其然矣序巢伯來朝傳殷之諸侯伯爵也南方逺國武王克商慕義來朝芮伯作旅巢命傳芮伯周同姓圻内之國為卿大夫陳威德以命巢亡音義巢仕交反徐吕交反芮如鋭反圻音祈疏正義曰巢國伯爵之君南方逺國也以武王克商乃慕義来朝王之卿大夫有芮伯者陳王威德以命巢君史叙其事作旅巢命之篇傳正義曰武王克商即來受周之王命知是殷之諸侯伯是爵也仲虺之誥云成湯放桀于南巢或此巢是也故先儒相傳皆以為南方之國今聞武王克商慕義而来朝也鄭𤣥以為南方世一見者孔以夷狄之爵不過子此君伯爵夷夏未明故直言逺國也世本云芮伯姬姓是周同姓也杜預云芮馮翊臨晉縣芮鄉是也知是圻内之國者芮伯在朝作命必是王臣不得其官故卿與大夫並言之旅訓為陳陳王威徳以命巢序武王有疾周公作金縢傳為請命之書藏之於匱緘之以金不欲人開之音義武王有疾馬本作有疾不豫縢徒登反緘工咸反疏正義曰武王有疾周公作䇿書告神請代武王死事畢納書於金縢之匱遂作金縢凡序言作者謂作此篇也案經周公䇿命之書自納金縢之匱及為流言所謗成王悟而開之史叙其事乃作此篇非周公作也序以經具故略言之傳正義曰經云金縢之匱則金縢是匱之名也詩述韔弓之事云竹閉緄縢毛傳云緄繩縢約也此傳言緘之以金則訓縢為緘王鄭皆云縢束也又鄭喪大記注云齊人謂棺束為緘家語稱周廟之内有金人三緘其口則縢是束縛之義藏之於匱緘之以金若今釘之不欲人開也鄭云凡藏祕書藏之於匱必以金緘其表是祕密之書皆藏於匱非周公始造此匱獨藏此書也金縢傳遂以所藏為篇名疏正義曰發首至王季文王史叙将告神之事也史乃䇿祝至屏璧與珪告神之辭也自乃卜至乃瘳言卜吉告王差之事也自武王既喪已下叙周公被流言東征還反之事也此篇叙事多而言語少若使周公不遭流言則請命之事遂無人知為成王開書周公得反史官美大其事故叙之以為此篇旣克商二年王有疾弗豫傳伐紂明年武王有疾不悅豫二公曰我其爲王穆卜周公曰未可以戚我先王傳穆敬戚近也召公太公言王疾當敬卜吉凶周公言未可以死近我先王相順之辭公乃自以爲功傳周公乃自以請命為已事爲三壇同墠傳因大王王季文王請命於天故為三壇壇築土墠除地大除地於中為三壇爲壇於南方北面周公立焉傳立壇上對三王植璧秉珪乃告大王王季文王傳璧以禮神植置也置於三王之坐周公秉桓珪以為䞇告謂祝辭音義豫本又作忬為于偽反戚千歴反壇徒丹反築土也馬云土堂墠音善植時織反徐音置䞇音至祝如字或之又反下同疏正義曰既克商二年即伐紂之明年也王有疾病不悅豫召公與太公二公同辭而言曰我其為王敬卜吉凶問王疾病瘳否周公曰王今有疾未可以死近我先王故當須卜也周公既為此言公乃自以請命之事為己事除地為墠墠内築壇為三壇同墠又為一壇於南方北面周公立壇上焉置璧於三王之坐公自執珪乃告大王王季文王告此三王之神也傳正義曰武王以文王受命十三年伐紂既殺紂即當稱元年克紂稱元年知此二年是伐紂之明年也王肅亦云克殷明年顧命云王有疾不懌懌悅也故不豫為不悅豫也何休因此為例云天子曰不豫諸侯曰負兹大夫曰犬馬士曰負薪釋訓云穆敬也戚是親近之義故為近也武王時三公惟周召與太公耳知二公是召公太公也言王疾恐死當敬卜吉凶周公言武王既定天下當成就周道未可以死近我先王死則神與先王相近故言近先王若生則人神道隔是為逺也二公恐王死欲為之卜周公言王未可以死是相順之辭也鄭云戚憂也周公既内知武王有九齡之命又有文王曰吾與爾三之期今必瘳不以此終故止二公之卜云未可以憂怖我先王如鄭此言周公知王不死先王豈不知乎而慮先王憂也功訓事也周公雖許二公之卜仍恐王疾不瘳不復與二公謀之乃自以請命為己之事獨請代武王死也所以周公自請為己事者周公位居冢宰地則近親脫或卜之不善不可使外人知悉亦不可苟譲故自以為功也請命請之於天而告三王者以三王精神已在天矣故因太王王季文王以請命於天三王每王一壇故為三壇壇是築土墠是除地大除其地於中為三壇周公為壇於南方亦當在此墠内但其處小别故下别言之周公北面則三壇南面可知但不知以何方為上耳鄭𤣥云時為壇墠於豐壇墠之處猶存焉禮授坐不立授立不坐欲其髙下均也神位在壇故周公立壇上對三王也周禮大宗伯云以蒼璧禮天詩說禱旱云圭璧既卒是璧以禮神不知其何色也鄭云植古置字故為置也言置璧於三王之坐也周禮云公執桓圭知周公秉桓圭又置以為䞇也告謂祝辭下文是其辭也史乃冊祝曰惟爾元孫某遘厲虐疾傳史為冊書祝辭也元孫武王某名臣諱君故曰某厲危虐暴也若爾三王是有丕子之責于天以旦代某之身傳大子之責謂疾不可救於天則當以旦代之死生有命不可請代聖人叙臣子之心以垂世教予仁若考能多材多藝能事鬼神傳我周公仁能順父又多材多藝能事鬼神言可以代武王之意乃元孫不若旦多材多藝不能事鬼神乃命于帝庭敷佑四方傳汝元孫受命于天庭為天子布其德教以佑助四方言不可以死用能定爾子孫于下地四方之民罔不祇畏傳言武王用受命帝庭之故能定先人子孫於天下四方之民無不敬畏嗚呼無墜天之降寶命我先王亦永有依歸傳歎惜武王言不救則墜天之寶命救之則先王長有依歸今我卽命于元龜傳就受三王之命於大龜卜知吉凶爾之許我我其以璧與珪歸俟爾命傳許謂疾瘳待命當以事神爾不許我我乃屏璧與珪傳不許謂不愈也屏藏也言不得事神音義遘工豆反遇也丕普悲反馬同徐甫眉反鄭音不瘳勑留反下同疏正義曰史乃為䇿書執以祝之曰惟爾元孫某某即發也遇得危暴重疾今恐其死若爾三王是有大子之責於天謂負天大子責必須一子死者請以旦代發之身令旦死而發生又告神以代之状我仁能順父又且多材力多技藝又能善事鬼神汝元孫不如旦多材多藝又不能事鬼神言取發不如取旦也然人各有能發雖不能事鬼神則有人君之用乃受命於天帝之庭能布其徳教以佑助四方之民用能安定汝三王子孫在於下地四方之民無不敬而畏之以此之故不可使死嗚呼發之可惜如此神明當救助之無得隕墜天之所下寶命天下寶命謂使為天子若武王死是隕墜之也若不墜命則我先王亦永有依歸為宗廟之主神得歸之我與三王人神道隔許我以否不可知今我就受三王之命於彼大龜卜其吉凶吉則許我凶則為不許我爾之許我使卜得吉兆旦死而發生我其以璧與珪歸家待汝神命我死當以珪璧事神爾不許我使卜兆不吉發死而旦生我乃屏去璧之與珪言不得事神當藏珪璧也傳正義曰告神之言書之於䇿祝是讀書告神之名故云史為策書祝辭史讀此䇿書以祝告神也武王是大王之曾孫也尊統於上繼之於祖謂元孫是長孫也某者武王之名本告神云元孫發臣諱君故曰某也易乾卦云夕惕若厲厲為危也虐訓為暴言性命危而疾暴重也泰誓牧誓皆不諱發而此獨諱之孔惟言臣諱君不解諱之意鄭𤣥云諱之者由成王讀之也意雖不明當謂成王開匱得書王自讀之至此字口改為某史官録為此篇因遂成王所讀故諱之上篇泰誓牧誓王自稱者令入史制為此典故不須諱之責讀如左傳施舎已責之責責謂負人物也大子之責於天言負天一大子謂必須死疾不可救於天必須一子死則當以旦代之死生有命不可請代今請代者聖人叙臣子之心以垂世教耳非謂可代得也鄭𤣥弟子趙商問𤣥曰若武王未終疾固當瘳信命之終雖請不得自古以来何患不為𤣥答曰君父疾病方困忠臣孝子不忍黙爾視其歔欷歸其命於天中心惻然欲為之請命周公達於此禮著在尚書若君父之病不為請命豈忠孝之志也然則命有定分非可代死周公為此者自申臣子之心非謂死實可代自古不廢亦有其人但不見爾未必周公獨為之鄭𤣥云丕讀曰不愛子孫曰子元孫遇疾若汝不救是将有不愛子孫之過為天所責欲使為之請命也與孔讀異告神稱予知周公自稱我也考是父也故仁能順父上云元孫對祖生稱此言順父從親為始祖為王考曾祖為皇考考父可以通之傳舉親而言父耳既能順父又多材多藝能事鬼神言已可以代武王之意上言丕子之責於天則是天欲取武王非父祖取之此言已能順父祖善事鬼神者假令天意取之其神必共父祖同處言已是父祖所欲欲令請之於天也以王者存亡大運在天有徳於民天之所與是受命天庭也以人況天故言在庭非王實至天庭受天命也既受天命以為天子布其徳教以佑助四方之民當於天心有功於民言不可以死也乃卜三龜一習吉傳習因也以三王之龜卜一相因而吉啓籥見書乃幷是吉傳三兆既同吉開籥見占兆書乃亦幷是吉公曰體王其罔害傳公視兆曰如此兆體王其無害言必愈予小子新命于三王惟永終是圖傳周公言我小子新受三王之命武王惟長終是謀周之道茲攸俟能念予一人傳言武王愈此所以待能念我天子事成周道公歸乃納冊于金縢之匱中王翼日乃瘳傳從壇歸翼明瘳差也音義籥于若反徐以略反馬云藏卜兆書管并必政反差初賣反疏正義曰祝告已畢即於壇所乃卜其吉凶用三王之龜卜一皆相因而吉觀兆已知其吉猶尚未見占書占書在於藏内啓藏以籥見其占書亦與兆體乃并是吉公視兆曰觀此兆體王身其無患害也我小子新受命於三王謂卜得吉也我武王當惟長終是謀周之道此卜吉之愈者上天所以須待武王能念我一人天子之事成其周道故也公自壇歸乃納䇿於金縢之匱中王明日乃病瘳傳正義曰習則襲也襲是重衣之名因前而重之故以習為因也雖三龜並卜卜有先後後者因前故云因也周禮太卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆三兆各别必三代法也洪範卜筮之法三人占則從二人之言是必三代之法並用之矣故知三龜三王之龜龜形無異代之别但卜法既别各用一龜謂之三王之龜耳每龜一人占之其後君與大夫等總占三代之龜定其吉凶未見占書已知吉者卜有大體見兆之吉凶麤觀可識故知吉也鄭𤣥云籥開藏之管也開兆書藏之室以管乃復見三龜占書亦合於是吉王肅亦云籥開藏占兆書管也然則占兆别在於藏大卜三兆之下云其經兆之體皆百有二十其頌皆千有二百占兆之書則彼頌是也略觀三兆既已同吉開藏以籥見彼占兆之書乃亦并是吉言其兆頌符同為大吉也如此兆體指卜之所得兆也周禮占人云凡卜筮君占體大夫占色史占墨卜人占圻鄭𤣥云體兆象也色兆氣也墨兆廣也圻兆璺也尊者視兆象而已卑者以次詳其餘也周公卜武王占之曰體王其無害鄭意此言體者即彼君占體也但周公令卜汲汲欲王之愈必當親視灼龜躬省兆繇不惟占體而已但鄭以君占體與此文同故引以為證耳兹攸俟能念予一人者此原三王之意也言武王得愈者此謂卜吉武王之愈言天與三王一一須待武王能念我天子事成周道若死則不復得念天子之事周道必不成也禮天子自稱曰予一人故以一人言天子也壇所即卜故從壇歸也翼明釋言文瘳訓差亦為愈病除之名也藏此書者此既告神即是國家舊事其書不可捐棄又不可示諸世人故藏于金縢之匱耳武王旣喪管叔及其羣弟乃流言於國傳武王死周公攝政其弟管叔及蔡叔霍叔乃放言於國以誣周公以惑成王曰公將不利於孺子傳三叔以周公大聖有次立之勢遂生流言孺稚也稚子成王周公乃告二公曰我之弗辟我無以告我先王傳辟法也告召公太公言我不以法法三叔則我無以成周道告我先王周公居東二年則罪人斯得傳周公既告二公遂東征之二年之中罪人此得于後公乃爲詩以貽王名之曰鴟鴞王亦未敢誚公傳成王信流言而疑周公故周公既誅三監而作詩解所以宜誅之意以遺王王猶未悟故欲讓公而未敢音義喪蘇浪反孺如樹反辟扶亦反治也說文作壁云必亦反法也馬鄭音避謂避居東都貽羊支反名如字徐亡政反鴟尺夷反鴞于驕反誚在笑反遺唯季反疏正義曰公於成王之世為管蔡所誣王開金縢之書方始明公本意卒得成就周道天下太平史官美大其事述為此篇故追言請命於前乃說流言於後自此以下說周公身事武王既喪成王幼弱周公攝王之政専決萬㡬管叔及其羣弟蔡叔霍叔乃流放其言於國中曰公将不利於孺子言欲簒王位為不利周公乃告二公曰我之不以法法此三叔則我無以成就周道告我先王既言此遂東征之周公居東二年則罪人於此皆得謂獲三叔及諸叛逆者罪人既得訖成王猶尚疑公公於此既得罪人之後為詩遺王名之曰鴟鴞鴟鴞言三叔不可不誅之意王心雖疑亦未敢責誚公言王意欲責而未敢也傳正義曰武王既死成王幼弱故周公攝政攝政者雖以成王為主政令自公出不復闗成王也蔡仲之命云羣叔流言乃致辟管叔于商囚蔡叔于郭鄰降霍叔于庶人則知羣弟是蔡叔霍叔也周語云獸三為羣則滿三乃稱羣蔡霍二人而言羣者并管故稱羣也傳既言周公攝政乃云其弟管叔盖以管叔為周公之弟孟子曰周公弟也管叔兄也史記亦以管叔為周公之兄孔似不用孟子之說或可孔以其弟謂武王之弟與史記亦不違也流言者宣布其言使人聞知若水流然流即放也乃放言於國以誣周公以惑成王王亦未敢誚公是王心惑也鄭𤣥云流公将不利於孺子之言於京師於時管蔡在東蓋遣人流傳此言於民間也殷法多兄亡弟立三叔以周公大聖又是武王之弟有次立之勢今復秉國之權恐其因即簒奪遂生流言不識大聖之度謂其實有異心非是故誣之也但啓商共叛為罪重耳辟法也釋詁文周公東征詩東山之篇歌此事也序云東征知居東者遂東往征也雖征而不戰故言居東也東山詩曰自我不見于今三年又云三年而歸此言二年者詩言初去及来凡經三年此直數居東之年除其去年故二年也罪人既多必前後得之故云二年之中罪人此得惟言居東不知居在何處王肅云東洛邑也管蔡與商奄共叛故東征鎮撫之案驗其事二年之間罪人皆得成王信流言而疑周公管蔡既誅王疑益甚故周公既誅三監而作詩解所以宜誅之意其詩云鴟鴞鴟鴞既取我子無毁我室毛傳云無能毁我室者攻堅之故也寧亡二子不可以毁我周室言宜誅之意也釋言云貽遺也以詩遺王王猶未悟故欲譲公而未敢政在周公故畏威未敢也鄭𤣥以為武王崩周公為冢宰三年服終将欲攝政管蔡流言即避居東都成王多殺公之屬黨公作鴟鴞之詩救其屬臣請勿奪其官位土地及遭風雷之異啓金縢之書迎公来反反乃居攝後方始東征管蔡解此一篇及鴟鴞之詩皆與孔異秋大熟未穫天大雷電以風傳二年秋也蒙恒風若雷以威之故有風雷之異禾盡偃大木斯拔邦人大恐傳風災所及邦人皆大恐王與大夫盡弁以啓金縢之書傳皮弁質服以應天乃得周公所自以爲功代武王之說傳所藏請命冊書本二公及王乃問諸史與百執事傳二公倡王啓之故先見書史百執事皆從周公請命對曰信噫公命我勿敢言傳史百執事言信有此事周公使我勿道今言之則負周公噫恨辭王執書以泣曰其勿穆卜傳本欲敬卜吉凶今天意可知故止之昔公勤勞王家惟予沖人弗及知傳言已童幼不及知周公昔日忠勤今天動威以彰周公之德傳發雷風之威以明周公之聖德惟朕小子其新逆我國家禮亦宜之傳周公以成王未寤故留東未還改過自新遣使者迎之亦國家禮有德之宜王出郊天乃雨反風禾則盡起傳郊以玉幣謝天天即反風起禾明郊之是二公命邦人凡大木所偃盡起而築之歲則大熟傳木有偃拔起而立之築有其根禾木無虧百穀豐熟周公之德此已上大誥後因武王喪幷見之音義穫户郭反拔皮八反弁皮彦反徐扶變反應應對之應說如字徐音始銳反倡昌亮反從才用反又如字噫於其反馬本作懿猶億也沖直忠反新逆馬本作親迎使所吏反築音竹本亦作筑謂築其根馬云築拾也見賢遍反疏正義曰為詩遺王之後其秋大熟未及收穫天大雷電又隨之以風禾盡偃仆大木於此而拔風災所及邦人大恐王見此變與大夫盡皮弁以開金縢之書案省故事求變異所由乃得周公所自以為功請代武王之說二公及王問於本從公之人史與百執事問審然以否對曰信言有此事也乃為不平之聲噫公命我勿敢言王執書以泣曰其勿敬卜吉凶言天之意已可知也昔公勤勞王家惟我幼童之人不及見知今天動雷電之威以彰明周公之德惟朕小子其改過自新遣人往迎之我國家褒崇有德之禮亦宜行之王於是出郊而祭以謝天天乃雨反風禾則盡起二公命邦人凡大木所偃仆者盡扶起而築之禾木無虧歲則大熟言周公之所感致若此也傳正義曰上文居東二年未有别年之事知即是二年秋也嫌别年故辨之洪範咎徵云蒙恒風若以成王蒙闇故常風順之風是闇徵而有雷者以威怒之故以示天之威怒有雷風之異言邦人則風災惟在周邦不及寛逺故云風災所及邦人皆大恐言獨畿内恐也皮弁象古故為質服祭天尚質故服以應天也周禮司服云王祀昊天上帝則服大裘而冕無旒乃是冕之質者是事天宜質服故服之以應天變也周禮視朝則皮弁服皮弁是視朝服每日常服而言質者皮弁白布衣素積裳故為質也鄭𤣥以為爵弁必爵弁者承天變降服亦如國家失道焉二公與王若同而問當言王及二公今言二公及王則是二公先問知二公倡王啓之故先見書鄭云開金縢之書者省察變異所由故事也以金縢匱内有先王故事疑其遭遇災變必有消伏之術故倡王啓之史為公造䇿書而百執事給使令皆從周公請命者周公使我勿道此事者公以臣子之情忠心欲代王死非是規求名譽不用使人知之且武王廖而周公不死恐人以公為詐故令知者勿言今被問而言之是違負周公也噫者心不平之聲故為恨辭公之東征止為伐罪罪人既得公即當還以成王未寤恐與公不和故留東未還待王之察已也新迎者改過自新遣使者迎之詩九罭之篇是迎之事也亦國家禮有德之宜言尊崇有德宜用厚禮詩稱衮衣籩豆是國家禮也祭天於南郊故謂之郊郊是祭天之處也王出郊者出城至郊為壇告天也周禮大宗伯云以蒼璧禮天牲幣如其器之色是祭天有玉有幣今言郊者以玉幣祭天告天以謝過也王謝天天即反風起禾明王郊之是也鄭𤣥引易傳云陽感天不旋日陽謂天子也天子行善以感天不迴旋經日故郊之是得反風也上文禾偃木拔拔必亦偃故云木有偃拔起而立之築有其根禾木無虧百穀豐熟鄭王皆云築拾也禾為大木所偃者起其木拾下禾無所亡失意太曲碎當非經㫖案序将東征作大誥此上居東二年以来皆是大誥後事而編於大誥之前者因武王喪并見之序武王崩三監及淮夷叛傳三監管蔡商淮夷徐奄之屬皆叛周周公相成王將黜殷作大誥傳相謂攝政黜絶也將以誅叛者之義大誥天下音義監古懴反視也相息亮反注同疏正義曰武王既崩管叔蔡叔與紂子武庚三人監殷民者又及淮夷共叛周公相成王攝王政将欲東征黜退殷君武庚之命以誅叛之義大誥天下史叙其事作大誥傳正義曰知三監是管蔡商者以序上下相顧為文此言三監及淮夷叛總舉諸叛之人也下云成王既黜殷命殺武庚命微子啓代殷後又言成王既伐管叔蔡叔以殷餘民封康叔此序言三監叛将征之下篇之序歴言伐得三人足知下文管叔蔡叔武庚即此三監之謂知三監是管蔡商也漢書地理志云周既滅殷分其畿内為三國詩風邶鄘衛是也邶以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷民謂之三監先儒多同此說惟鄭𤣥以三監為管蔡霍獨為異耳謂之監者當以殷之畿内被紂化日久未可以建諸侯且使三人監此殷民未是封建之也三人雖有其分互相監領不必獨主一方也史記衛世家云武王克殷封紂子武庚為諸侯奉其先祀為武庚未集恐有側心乃令其弟管叔蔡叔傅相之是言輔相武庚共監殷人故稱監也序惟言淮夷叛傳言淮夷徐奄之屬共叛周者以下序文云成王東伐淮夷遂踐奄作成王政又云成王既黜殷命滅淮夷作周官又云魯侯伯禽宅曲阜徐夷並興作費誓彼三序者一時之事皆在周公歸政之後也多方篇數此諸國之罪云至于再至于三得不以武王初崩已叛成王即政又叛謂此為再三也以此知淮夷叛者徐奄之屬皆叛也君奭序云召公為保周公為師相成王為左右於時成王為天子自知政事二公為臣輔助之此言相成王者有異於彼故辨之相謂攝政攝政者敎由公出不復闗白成王耳仍以成王為主故稱成王鄭𤣥云黜貶退也黜實退名但此黜乃殺其身絶其爵故以黜為絶也周公此行普伐諸叛獨言黜殷命者定四年左傳云管蔡啓商惎間王室則此叛武庚為主且顧微子之序故特言黜殷命也以誅叛者之義大誥天下經皆是也大誥傳陳大道以誥天下遂以名篇音義誥本亦作靠疏正義曰此陳伐叛之義以大誥天下而兵凶戰危非衆所欲故言煩重其自殷勤多止而更端故數言王曰大意皆是陳說武庚之罪自言已之不能言已當繼父祖之功須去叛逆之賊人心既從卜之又吉往伐無有不克勸人勉力用心此時武王初崩屬有此亂周公以臣代君天下未察其志親弟猶尚致惑何況疎賤者乎周公慮其有向背之意故殷勤告之陳夀云臯陶之謨略而雅周公之誥煩而悉何則臯陶與舜禹共談周公與羣下矢誓也其意或亦然乎但君奭康誥乃與召公康叔語也其辭亦甚委悉抑亦當時設言自好煩復也管蔡導武庚為亂此篇略於管蔡者猶難以伐弟為言故專說武庚罪耳王若曰猷大誥爾多邦越爾御事傳周公稱成王命順大道以誥天下衆國及於御治事者盡及之弗弔天降割于我家不少傳言周道不至故天下凶害於我家不少謂三監淮夷並作難延洪惟我幼沖人傳凶害延大惟累我幼童人成王言其不可不誅之意嗣無疆大厯服弗造哲迪民康傳言子孫承繼祖考無窮大數服行其政而不能為智道以安人故使叛先自責矧曰其有能格知天命傳安人且猶不能況其有能至知天命者乎已予惟小子若渉淵水予惟往求朕攸濟傳已發端歎辭也我惟小子承先人之業若渉淵水往求我所以濟渡言祇懼敷賁敷前人受命茲不忘大功傳前人文武也我求濟渡在布行大道在布陳文武受命在此不忘大功言任重予不敢閉于天降威用傳天下威用謂誅惡也言我不敢閉絶天所下威用而不行將欲伐四國寧王遺我大寶龜紹天明卽命傳安天下之王謂文王也遺我大寶龜疑則卜之以繼天明就其命而言之言卜不可違音義猷音由道也邦馬本作大誥繇爾多邦盡津忍反弔音的又如字割馬本作害不少馬讀弗少延為句難乃旦反累劣偽反矧矢忍反賁扶云反徐音憤遺唯季反疏正義曰周公雖攝王政其號令大事則假成王為辭言王順大道而為言曰我今以大道誥汝天下衆國及於衆治事之臣以我周道不至故上天下其凶害于我家不少言叛逆者多此害延長寛大惟累我幼童人成王自言害及已也我之致此凶害以我為子孫承繼無疆界之大數服行其政不能為智道令民安故使之叛自責也安民猶且不能況曰其能至於知天之大命者乎言已不能知天意也復歎而言已乎我惟小子承先人之業如渉淵水惟往求我所以濟渡言已恐懼之甚我所求濟者惟在布行大道布陳前人文王武王受命之事在我此身不忘大功既不忘大功將誅叛逆由此我不敢絶天之所下威用而不行之言必將伐四國也寧天下之王謂文王也文王遺我大寶龜疑則就而卜之以繼大明命今我就受其命言已就龜卜其伐之吉凶已得吉也傳正義曰序云相成王則王若曰者稱成王之言故言周公稱成王命實非王意成王爾時信流言疑周公豈命公伐管蔡乎猷訓道也故云順大道以告天下衆國也鄭王本猷在誥下漢書王莽攝位東郡大守翟義叛莽莽依此作大誥其書亦道在誥下此本猷在大上言以道誥衆國於文為便但此經云猷大傳云大道古人之語多倒猶詩稱中谷谷中也多邦之下云於爾御事是於諸國治事者盡及之也鄭𤣥云王周公也周公居攝命大事則權稱王惟名與器不可假人周公自稱為王則是不為臣矣大聖作則豈為是乎釋詁云延長也洪大也此害長大敗亂國家經言惟我幼童人謂損累之故傳加累字累我童人言其不可不誅之意鄭王皆以延上屬為句言害不少乃延長之王肅又以惟為念向下為義大念我幼童子與繼文武無窮之道嗣訓繼也言子孫承繼祖疆境界則是無窮大數長逺傳世三十卜年七百是長逺也民近而天逺以易而況難天子必當至靈至靈乃知天命言已猶不能安民明其不知天命自責而謙前人文武也者成王前人故為文武也以渉水為喻言求濟者在於布行大道行天子之政也文武有大功德故受天命又當布陳文武受命所行之事也陳行天子之政又陳文武所行之事在此不忘大功大功太平之功也言已所任至重不得不奉天道行誅伐也王者征伐刑獄象天震曜殺戮則征伐者天之所威用謂誅惡是也天有此道王者用之用之則開不用則閉言我不敢閉絶天之所下威用而不行之既不敢不行故將伐四國紂為昏虐天下不安言文王能安之安天下之王謂文王也遺我大寶龜者天子寶藏神龜疑則卜之繼天明道就其命而行之言卜吉則當行不可違卜也所以大寶龜皆得繼天明者以天道𤣥逺龜是神靈能傳天意以示吉凶故疑則卜之以繼天明道鄭𤣥云時既卜乃後出誥故先云然曰有大艱于西土西土人亦不靜越茲蠢傳曰語更端也四國作大難於京師西土人亦不安於此蠢動殷小腆誕敢紀其叙傳言殷後小腆腆之禄父大敢紀其王業欲復之天降威知我國有疵傳天下威謂三叔流言故禄父知我周國有疵病民不康曰予復反鄙我周邦傳禄父言我殷當復欺惑東國人令不安反鄙易我周家道其罪無狀今蠢今翼日民獻有十夫予翼以于敉寧武圖功傳今天下蠢動今之明日四國人賢者有十夫来翼佐我周用撫安武事謀立其功言人事先應我有大事休朕卜幷吉傳大事戎事也人謀既從卜又幷吉所以為美音義蠢尺允反難乃旦反下同又如字腆他典反馬云至也誕大旦反父音甫後同疵在斯反馬云瑕也令力呈反易以䜴反下其易同敉亡婢反應應對之應幷必政反注及篇末同疏正義曰上言為害不少陳欲征之意未說武庚之罪更後發端言之曰今四國叛逆有大艱於西土言作亂於東與京師為難也西土之人為此亦不得安静於此人情皆蠢蠢然動殷後小國腆腆然之禄父大敢紀其王業之次叙而欲興復之禄父所以敢然者上天下威於三叔以其流言欲下威誅之禄父知我周國自此庛病而欺惑東國人令人不安禄父謂人曰我殷復望得更為天子反鄙易我周國今天下蠢動今之明日四國民之賢者有十夫不從叛逆其来為我翼佐我周於是用撫安武事謀立其功明禄父舉事不當得賢者叛来投我為我謀用是人事先應如此則我有兵戎大事征伐必休美矣人謀既從我卜又并吉是其休也言往必克敵安民之意告衆使知也傳正義曰周公丁寧其事止而復言别加一曰語更端也下言王曰此不言王史詳略耳四國作逆於東京師以為大艱故言作大難於京師西土人亦不安亦如東方見其亂不安也釋詁云蠢動也鄭云周民亦不定其心騒動言以兵應之當時京師無與應者鄭言妄耳殷本天子之國武庚比之為小故言小腆腆是小貌也鄭𤣥云腆謂小國也王肅云腆主也殷小主謂禄父也大敢紀其王業經紀王業望復之也王肅云天降威者謂三叔流言當誅伐之言誅三叔是天下威也釋詁云疵病也鄭王皆云知我國有疵病之瑕禄父以父罪滅殷身亦當死幸得繼其先祀宜荷天恩反鄙薄輕易我周家言其不識恩養道其罪無状也漢代止有無状之語盖言其罪大無可形状也近代已来遭重喪答人書云無状招禍是古人之遺語也武庚既叛聞者皆驚故今天下蠢動謂聞叛之日也今之明日聞叛之明日以獻為賢四國民内賢者十夫来翼佐我周十人史無姓名直是在彼逆地有先見之明知彼必敗棄而歸周周公喜其来降舉以告衆謂之為賢未必是大賢也用撫安武事謀立其功用此十夫為之將欲伐叛而賢者即来言人事先應也成十三年左傳云國之大事在祀與戎今論伐叛知大事戎事也十夫来翼人謀既從卜又并吉所以為美美即經之休也既言其休乃說我卜并吉以成此休之意鄭𤣥云卜并吉者謂三龜皆從也王肅云何以言美以三龜一習吉是言并吉證其休也與孔異矣肆予告我友邦君越尹氏庶士御事傳以美故告我友國諸侯及於正官尹氏卿大夫衆士御治事者言謀及之曰予得吉卜予惟以爾庶邦于伐殷逋播臣傳用汝衆國往伐殷逋亡之臣謂禄父爾庶邦君越庶士御事罔不反曰艱大傳汝衆國上下無不反曰征伐四國為大難叙其情以戒之民不靜亦惟在王宫邦君室傳言四國不安亦在天子諸侯教化之過自責不能綏近以及逺越予小子考翼不可征王害不違卜傳於我小子先卜敬成周道若謂今四國不可征則王室有害故宜從卜音義逋布吾反疏正義曰以人從卜吉為美之故故我告汝有邦國之君及於尹氏卿大夫衆士治事者曰我得吉卜我惟與汝衆國往伐殷逋亡播蕩之臣謂伐禄父也汝國君及於衆治事者無不反我之意相與言曰伐此四國為難甚大言其不欲征也汝不欲伐罪我之由四國之民不安而叛者亦惟在我天子王宫與邦君之室教化之過使之然以此令汝難征過事在我雖然於我小子先考疑而卜之欲敬成周道若謂四國難大不可征則於王室有害不可違卜宜從卜往征也傳正義曰肆訓故也承上休之下以其東征必美之故我告友國君以下共謀之尹氏即顧命云百尹氏也尹正也諸官之正謂卿大夫故傳言及於正官尹氏卿大夫尹氏即官也總呼大夫為官氏也上文大誥爾多邦越爾御事無尹氏庶士下文爾庶邦君越庶士御事亦無尹氏惟此及下文施義二者詳其文餘略之從可知也逋逃也播謂播蕩逃亡之意禄父殷君謂之為殷今日叛逆是背周逃亡故云用汝衆國往伐彼殷君於我周家逋逃亡叛之臣謂禄父也王以卜吉之故將以諸國伐殷且彼諸國之情必有不欲伐者無不反我之意相與言曰征伐四國為大難言其情必如此叙其情以戒之使勿然也鄭云汝國君及下羣臣不與我同志者無不反我之意云三監叛其為難大是言反者謂反上意反是上意則知曰者相與言也自責惟當言天子教化之過而并言諸侯者化從天子布於諸侯道之不行亦邦君之咎見庶邦亦有過故并言之教化之過在於君身而云王宫邦君室者宫室是行化之處故指以言之翼訓敬也於我小子先自考卜欲敬成周道汝庶邦御事等若謂今四國不可征則周道不成於王室有害故宜從卜小子先卜當謂初即位時卜其欲成周道也不可違卜謂上朕卜并吉也言欲征卜吉當從卜征之肆予沖人永思艱曰嗚呼允蠢鰥寡哀哉傳故我童人成王長思此難而歎曰信蠢動天下使無妻無夫者受其害可哀哉予造天役遺大投艱于朕身傳我周家為天下役事遺我甚大投此艱難於我身言不得已越予沖人不卬自恤義爾邦君越爾多士尹氏御事傳言征四國於我童人不惟自憂而已乃欲施義於汝衆國君臣上下至御治事者綏予曰無毖于恤不可不成乃寧考圖功傳汝衆國君臣當安勉我曰無勞於憂不可不成汝寧祖聖考文武所謀之功責其以善言之助音義鰥故頑反造為也馬云遺也卬五剛反我也毖音祕疏正義曰以汝等有難征之意故我童子成王長思此難而歎曰嗚呼四國今叛信蠢動天下使鰥寡受害尤可哀哉我周家為天下役事而遺我甚大乃投此艱難於我身此難須平不可以已今征四國於我童人不惟自憂而已乃欲施義於汝衆國君於汝多士尹氏治事之人如此為汝計汝君臣當安勉我曰無勞於征伐之憂我諸侯當往共征四國汝王不可不成汝寧祖聖考所謀之功宜出此善言以助我何謂違我不欲征也傳正義曰為天子者當役已以養天下故我國家為天下役事總言周家當救天下此事遺我故為甚大以大役遺我以為甚大而又投擲此艱難之事於我身謂當己之時有四國叛逆言已職當静亂不得以已也卬我恤憂也四國叛逆害及衆國君得静亂則為大美言征四國於我童人不惟自憂而已乃欲施義於汝衆國君臣言難除則義施也綏安也毖勞也言我既施義於汝汝衆國君臣言得我之功當安慰勉勸我曰無勞於憂令我無憂四國衆國自来征之經言寧即文王考即武王故言寧祖聖考也王以衆國反己乃復設為此言責其無善言助己巳予惟小子不敢替上帝命傳不敢廢天命言卜吉當必征之天休于寧王興我小邦周寧王惟卜用克綏受茲命傳言天美文王興周者以文王惟卜之用故能安受此天命明卜宜用今天其相民矧亦惟卜用傳人獻十夫是天助民況亦用卜乎吉可知矣亦亦文王嗚呼天明畏弼我丕丕基傳歎天之明德可畏輔成我大大之基業言卜不可違也音義相息浪反畏如字徐音威疏正義曰既叙衆國之情告以必征之意已乎我惟小子不敢廢上帝之命卜吉不征是廢天命從卜而興乃有故事天休美於安天下之文王興我小國周者以安民之王惟卜是用以此之故安受此上天之命明卜宜用之今天助民矣十夫佐周是天助也人事既驗況亦如文王惟卜之用吉可知矣嗚呼而歎天之明德可畏也輔成我周家大大之基業卜既得吉不可違也傳正義曰天之助民乃是常道而云民獻十夫是天助民者下云亦惟十人迪知上帝命故以民獻十夫為天助民也王曰爾惟舊人爾丕克遠省爾知寧王若勤哉傳特命久老之人知文王故事者大能逺省識古事汝知文王若彼之勤勞哉目所親見法之又明天閟毖我成功所予不敢不極卒寧王圖事傳閟愼也言天愼勞我周家成功所在我不敢不極盡文王所謀之事謂致太平肆予大化誘我友邦君傳我欲極盡文王所謀故大化天下道我友國諸侯天棐忱辭其考我民傳言我周家有大化誠辭為天所輔其成我民矣予曷其不于前寧人圖功攸終傳我何其不於前文王安人之道謀立其功所終乎天亦惟用勤毖我民若有疾傳天亦勞愼我民欲安之如人有疾欲已去之予曷敢不于前寧人攸受休畢傳天欲安民我何敢不於前文王所受美命終畢之音義省悉井反閟音祕棐徐音匪又芳鬼反忱市林反疏正義曰既述文王之事王又命於衆曰汝惟久老之人汝大能逺省識古事汝知寧王若此之勤勞哉以老人目所親見必知之也以文王勤勞如此故天命慎勞来我周家當至成功所在天意既然我不敢不極盡文王所謀之事文王教致太平我欲盡行之我欲盡文王所謀故我大為教化勸誘我所友國君共伐叛逆天既輔助我周家有大化誠辭其必成就我之衆民天意既如此矣我何其不於前文王安民之道謀立其功之處所而終竟之乎天亦惟勞慎我民若人有疾病而欲已去之天意於民如此之急我何敢不於前安人文王所受美命終畢之乎以須終畢之故故當誅除逆亂安養下民使之致太平傳正義曰閟慎釋詁文天慎勞我周家者美其德當天心慎惜又勞来勸勉之使至成功所在在於致太平也天意欲使之然我為文王子孫敢不極盡文王所謀之事文王本謀謂致太平釋詁云棐輔也忱誠也文承大化之下知輔誠辭者言周家有大化誠辭為天所輔其成我民必為民除害使得成也亦者亦民之義也君民共為一體天慎勞使成功亦當勤勞民使安寧故言亦也如疾欲已去之言天急於民至甚也上云卒寧王圖事又云圖功攸終此云攸受休畢畢終也三者文辭略同義不甚異大意惟言當終文王之業須征逆亂之賊周公重兵慎戰丁寧以勸民耳王曰若昔朕其逝朕言艱日思傳順古道我其往東征矣我所言國家之難備矣日思念之若考作室旣厎法厥子乃弗肯堂矧肯構傳以作室喻治政也父已致法子乃不肯為堂基況肯構立屋乎不為其易則難者可知厥父葘厥子乃弗肯播矧肯穫傳又以農喻其父已葘耕其田子乃不肯播種況肯收穫之乎厥考翼其肯曰予有後弗棄基傳其父敬事創業而子不能繼成其功其肯言我有後不棄我基業乎今不征是棄之肆予曷敢不越卬敉寧王大命傳作室農人猶惡棄基故我何敢不於今日撫循文王大命以征逆乎若兄考乃有友伐厥子民養其勸弗救傳若兄弟父子之家乃有朋友來伐其子民養其勸不救者以子惡故以此四國將誅而無救者罪大故音義日人實反之難乃旦反下為難同厎之履反構古候反治直吏反葘側其反草也田一歲曰葘穫户郭反惡烏路反疏正義曰子孫成父祖之業古道當然王又言曰今順古昔之道我其往東征矣我所言國家之難備矣日日思念之乃以作室為喻若父作室營建基址既致法矣其子乃不肯為之堂況肯構架成之乎又以治田為喻其父葘耕其田殺其草已堪下種矣其子乃不肯布種況肯收穫乎其此作室治田之父乃是敬事之人見其子如此其肯言曰我有後不棄我基業乎必不肯為此言也我若不終文武之謀則文武之神亦如此耳其肯道我不棄基業乎作室農人猶惡棄其基業故我何敢不於我身今日撫循安人之文王大命以征討叛逆乎我今東征無往不克若凡人兄及父與子弟為家長者乃有朋友来伐其子則民皆養其勸伐之心不救之何則以子惡故也以喻伐四國雖親如父兄亦無救之者以君惡故也言罪大不可不誅無救所以必克也顧氏以上不卬自恤𫝊云不惟自憂遂皆以卬為惟但卬之為惟非是正訓觀孔意亦以不卬為惟義也傳正義曰又以農喻也者上言作室此言治田其取喻一也上言若考作室既厎法此類上文當云若父為農既耕田從上省文耳葘謂殺草故治田一歲曰葘言其始殺草也播謂布種后稷播殖百穀是也定本云矧弗肯構矧弗肯穫皆有弗字檢孔傳所解弗為衍字經言厥考翼其肯曰予有後弗棄基者治田作室為喻既同故以此經結上二事鄭王本於矧肯構下亦有此一經然取喻既同不應重出盖先儒見下有而上無謂其脫而妄増之經言若兄考者此經大意言兄不救弟父不救子發首兄考備文伐厥子不言弟互相發見傳言兄弟父子之家以足之民養其勸民為父兄為家長者也養其心不退止也王曰嗚呼肆哉爾庶邦君越爾御事傳歎今伐四國必克之故以告諸侯及臣下御治事者爽邦由哲亦惟十人迪知上帝命傳言其故有明國事用智道十人蹈知天命謂人獻十夫來佐周越天棐忱爾時罔敢易法矧今天降戾于周邦傳於天輔誠汝天下是知無敢易天法況今天下罪於周使四國叛乎惟大艱人誕鄰胥伐于厥室爾亦不知天命不易傳惟大為難之人謂三叔也大近相伐於其室家謂叛逆也若不早誅汝天下亦不知天命之不易也音義易以豉反疏正義曰既言四國無救之者王曰又言歎今伐四國必克之故告汝衆國君及於汝治事之臣所以知必克者故有明國事用智道者亦惟有十人此人皆蹈知上天之命謂民獻十夫来佐周家此人既来克之必也於我天輔誠信之故汝天下是知無敢變易天法者若易法無信則上天不輔故無敢易法也況今天下罪於周國使四國叛逆惟大為難之人謂三叔等大近相伐於其室家自欲拔本塞源反害周室是其為易天法也彼變易天法若不早誅之汝天下亦不知天命之不可變易也傳正義曰言其故者此言其必克之故也爽明也由用也有明國事用智道言其有賢德也蹈天者識天命而履行之此言十人謂上文民獻十夫来佐周家者此是賢人賢人既来彼無所與是必克之效也王肅云我未伐而知民弗救者以民十夫用知天命故也於天輔誠言天之所輔必是誠信汝天下於是觀之始知無敢變易天法若易天法則天不輔之況今天下罪於周使四國叛乎以小況大易法猶尚不可況叛逆乎惟大為難之人謂三叔者以下句言相伐於其室家室家自相伐知惟大為難之人謂三叔也大近相伐於其室家者三叔為周室至親而舉兵作亂是室家自相伐為叛逆之罪是變易天法之極若汝諸國不肯誅之是汝天下亦不知天命之不可變易也王肅云惟大為難之人謂管蔡也大近相伐於其室家明不可不誅也管蔡犯天誅而汝不欲伐則亦不知天命之不易也予永念曰天惟喪殷若穡夫予曷敢不終朕畝傳稼穡之夫除草養苗我長念天亡殷惡主亦猶是矣我何敢不順天終竟我壟畝乎言當滅殷天亦惟休于前寧人予曷其極卜敢弗于從傳天亦惟美于文王受命我何其極卜法敢不於從言必從也率寧人有指疆土矧今卜幷吉傳循文王所有指意以安疆土則善矣況今卜幷吉乎言不可不從肆朕誕以爾東征天命不僭卜陳惟若茲傳以卜吉之故大以汝衆東征四國天命不僭差卜兆陳列惟若此吉必克之不可不勉音義壟力勇反僭子念反疏正義曰所以必當誅四國者我長思念之曰天惟喪亡殷國若稼穡之夫務去草也天意既然我何敢不終我壟畝也言穢草盡須除去殷餘皆當殄滅也天亦惟美於前寧人文王我何其極文王卜法敢不於是從乎言必從之也我循彼寧人所有指意以安疆土不待卜筮便即東征己自善矣況今卜東征而龜并吉以吉之故我大以爾東征四國天命必不僭差卜兆陳列惟若此吉不可不從卜不可不勉力也傳正義曰天亦惟美於文王受命言文王德當天心天每事美之故得受天命是文王之德大美也文王用卜能受天命今於我何其窮極文王卜法敢不從乎言必從文王卜也文王之指意欲令天下疆土皆得其宜有叛逆者自然須平定之我直循彼文王所有指意伐叛則已善矣不必須卜筮也況今卜并吉乎言不可不從也王肅云順文王安人之道有指意盡天下疆土使皆得其所不必須卜筮也況今卜三龜皆吉明不可不從也天命不僭者天意去惡與善其事必不僭差言我善而彼惡也卜兆陳列惟若此吉言往必克之不可不勉力也序成王旣黜殷命殺武庚傳一名禄父命微子啓代殷後傳啓知紂必亡而奔周命為宋公為湯後作微子之命傳封命之書疏正義曰成王既黜殷君之命殺武庚乃命微子啓代武庚為殷後為書命之史叙其事作微子之命黜殷命謂絶其爵也殺武庚謂誅其身也傳正義曰啓知紂必亡告父師少師而遁於荒野微子作誥是其事也武王既克紂微子乃歸之非去紂即奔周也𫝊言得封之由故言其奔周耳僖六年左傳云許僖公見楚子面縛銜璧大夫衰絰士輿櫬楚子問諸逢伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而祓之焚其櫬禮而命之使復其所史記宋世家云武王克殷微子啓乃持其祭器造於軍門肉袒面縛左牽羊右把茅膝行而前以告武王乃釋微子復其位如故是言微子克殷始歸周也馬遷之書辭多錯謬面縛縛手於後故口銜其璧又安得左牽羊右把茅也要言歸周之事是其實耳樂記云武王克殷既下車投殷之後於宋則𫝊言復其位者以其自縛為囚釋之使從本爵復其卿大夫之位及下車即封於宋以其終為殷後故樂記云投殷之後爾時未為殷之後也微子初封於宋不知何爵此時因舊宋命之為公令為湯後使祀湯耳不繼紂也微子之命傳稱其本爵以名篇疏正義曰令寫命書之辭以為此篇君陳君牙冏命皆此類也王若曰猷殷王元子傳微子帝乙元子故順道本而稱之惟稽古崇德象賢傳惟考古典有尊德象賢之義言今法之綂承先王修其禮物傳言二王之後各修其典禮正朔服色與時王並通三統作賔于王家與國咸休永世無窮傳為時王賔客與時皆美長世無竟嗚呼乃祖成湯克齊聖廣淵傳言汝祖成湯能齊德聖達廣大深逺澤流後世皇天眷佑誕受厥命傳大天眷顧湯佑助之大受其命謂天命撫民以寛除其邪虐傳撫民以寛政放桀邪滛蕩之德功加于時德垂後裔傳言湯立功加於當時德澤垂及後世裔末也爾惟踐修厥猷舊有令聞傳汝微子言能踐湯德久有善譽昭聞逺近恪愼克孝肅恭神人予嘉乃德曰篤不忘傳言微子敬愼能孝嚴恭神人故我善汝德謂厚不可忘音義正音政裔以制反聞如字又音問篤本又作竺東谷反疏正義曰王順道而言曰今以大道告汝殷王首子告之以下辭也曰猷如大誥言以道誥之傳正義曰呂氏春秋仲冬紀云紂之母生微子啓與仲衍尚為妾已而為妻後生紂紂父欲立啓為太子太史據法而爭之曰有妻之子不可立妾之子故紂為後鄭云微子啓紂同母庶兄也若順也猷道也以其本是元子故順道本而稱之釋詁云元首始也易曰元者善之長也郊特牲云天子存二代之後猶尊賢也尊賢不過二代書傳云王者存二王之後與己爲三所以通三統立三正周人以日至爲正殷人以日至後三十日爲正夏人以日至後六十日爲正天有三統土有三王三王者所以統天下也禮運云杞之郊也禹也宋之郊也契也是二王後爲郊祭天以其祖配之鄭云所存二王後者命使郊天以天子禮祭其始祖受命之王自行其正朔服色此謂通天三統是立二王後之義也此命首言稽古則立先代之後自古而有此法不知從何代然也孔意自夏以上不必改正縱使正朔不改典禮服色自當異也僖十二年左傳王命管仲之辭曰謂督不忘則曰亦謂義孔訓篤爲厚故傳云謂厚不可忘杜預以督爲正可謂正而不可忘也上帝時歆下民祇協庸建爾于上公尹茲東夏傳孝恭之人祭祀則神歆享施令則人敬和用是封立汝於上公之位正此東方華夏之國宋在京師東欽哉往敷乃訓愼乃服命率由典常以蕃王室傳敬哉敬其爲君之德往臨人布汝敎訓愼汝祖服命數循用舊典無失其常以蕃屏周室戒之音義歆許今反蕃方元反本亦作藩疏正義曰傳言愼汝祖服命數謂祭湯廟得用天子之禮服其殷之本服命則上公九命當愼之無使乖禮制也𢎞乃烈祖律乃有民永綏厥位毗予一人傳大汝烈祖成湯之道以法度齊汝所有之人則長安其位以輔我一人言上下同榮慶世世享德萬邦作式傳言微子累世享德不忝厥祖雖同公侯而特爲萬國法式俾我有周無斁傳汝世世享德則使我有周好汝無厭嗚呼往哉惟休無替朕命傳歎其德遣往之國言當惟爲美政無廢我命音義毗房脂反俾必爾反斁音亦好呼報反厭於艶反序唐叔得禾異畝同穎傳唐叔成王母弟食邑内得異禾也畝壟穎穗也禾各生一壟而合爲一穗獻諸天子傳拔而貢之王命唐叔歸周公于東傳異畝同穎天下和同之象周公之德所致周公東征未還故命唐叔以禾歸周公唐叔後封晉作歸禾傳亡音義穎役領反穗似醉反本亦作穟疏正義曰成王母弟唐叔於其食邑之内得禾下異畝壟上同穎穗以其有異拔而貢之天子以爲周公德所感致於時周公東征未反王命唐叔歸周公於東命有言辭史叙其事作歸禾之篇傳正義曰昭十五年左傳云叔父唐叔成王之母弟指言唐叔得禾知其所食邑内得異禾也唐叔食邑書傳無文詩述后稷種禾於實秀之下乃言實穎毛傳云穎垂言穗重而垂是穎爲穗也禾各生一壟而合爲一穗言其異也書傳云成王之時有三苗貫桑葉而生同爲一穗其大盈車長幾充箱民得而上諸成王下傳云拔而貢之若是盈車之穗不可手拔而貢孔不用書傳爲說也禾者和也異畝同穎是天下和同之象成王以爲周公德所感致於時周公東征未還故命唐叔以禾歸周公於東也歸禾年月史傳無文不知在啓金縢之先後也王啓金縢正當禾熟之月若是前年得之於時王疑未解必不肯歸周公當是啓金縢之後喜得東土和平而有此應故以歸周公也唐叔後封於晉經史多矣傳言此者欲見此時未封知在邑内得之昭元年左傳稱成王滅唐而封太叔焉所滅之唐即晉國是也然則得禾之時未封於唐從後稱之爲唐叔耳序周公旣得命禾旅天子之命傳已得唐叔之禾遂陳成王歸禾之命而推美成王善則稱君作嘉禾傳天下和同政之善者故周公作書以善禾名篇告天下亡疏正義曰周公既得王所命禾乃陳天子歸禾之命爲文辭稱此禾之善推美於成王史叙其事作嘉禾之篇傳正義曰鄭云受王歸已禾之命與其禾以爲既得命禾謂復得禾義當然矣成王歸禾之命必歸美周公周公陳歸禾之命又推美成王是善則稱君之義也善則稱君坊記文也嘉訓善也言此禾之善故以善禾名篇陳天子之命故當布告天下此以善禾爲書之篇名後世同穎之禾遂名爲嘉禾由此也二篇東征未還時事微子受命應在此篇後篇在前者盖先封微子後布此書故也尚書注疏卷十二尚書注疏卷十二考證旅獒序大保作旅獒疏釋詁云旅陳也林之竒曰經云西旅則不可以訓陳也葢書篇名惟取篇中之字如詩云維鵲有巢即以鵲巢名篇也如必以旅爲陳則書序不當云作旅獒臣召南按旅訓陳以之解旅巢命則可以解旅獒則不可以經言西旅厎貢厥獒是國名也林說自確西旅厎貢厥獒傳犬高四尺曰獒以大爲異林之竒曰說文犬知人心而可使者曰獒左氏公羊言晉靈公事則獒之爲犬有異於常犬也畢獻方物疏鄭元云所貴寶見經傳者犬戎獻白狼白鹿是也臣召南按鄭以穆王事解蕃國貴寶爲贄已屬不經孔疏引以証此篇方物尤非也穆王不聽祭公之諫耀兵勤逺得四白鹿白狼自是荒服不至召公當開國時若預料有其事者於西旅貢獒即動色告戒以不寶逺物安得以周語及王會篇解此文哉金縢序周公作金縢疏史叙其事乃作此篇非周公作也臣召南按孔疏此條直紏小序之失語足翼經植璧秉珪傳璧以禮神疏又置以爲贄也林之竒曰按下文曰屏璧與珪則圭璧似皆以祈神非執桓圭以爲贄也惟爾元孫某疏本告神云元孫發臣諱君故曰某也林之竒曰周公之禱葢用武王名及史官記載則諱其名而代以某字桓六年左傳申繻曰周人以諱事神名之諱始於周也又曰自太王王季而言之曰元孫自文王而言之曰丕子其實一也是有丕子之責于天丕子史記作負子管叔及其羣弟傳周公攝政其弟管叔及蔡叔霍叔乃放言於國疏孔似不用孟子之說臣召南按此孔傳之誤也下文又曰三叔以周公大聖有次立之勢是安國實指周公爲兄異於孟子据史記武王同母兄弟十人長伯邑考次武王次管叔次周公次蔡叔次曹叔次成叔次霍叔次康叔次冉季次序秩然孟子之說不可易也我之弗辟我無以告我先王傳辟法也告召公太公言我不以法法三叔則我無以成周道告我先王音義辟馬鄭音避謂避居東都臣召南按周公居東此條爲千古疑案由經文我之弗辟辟字孔讀作刑辟之辟故以居東爲東征鄭讀作避地之避故以居東爲避謗以詩豳風證之毛傳小序說與孔同而鄭箋獨異宋儒以孔傳爲是者林之竒以鄭箋爲是者項安世至朱子則初取孔傳以爲詩傳晚年又駮孔傳而從鄭箋蔡氏傳則朱子晚年說也從孔傳則辟訓法即後蔡仲之命有致辟管叔之明文從鄭箋則古文辟字作本是避字二說互異不能強合獨怪孔穎達於詩疏曲鬯鄭箋於書疏不能力主孔傳即辟之訓法祗以釋詁文三字解之何哉又按史記作我之所以弗辟而攝行政此則又一說也周公居東二年傳周公既告二公遂東征之疏詩東山之篇歌此事也臣召南按以居東爲東征則作大誥誅武庚罪三監皆在此時破斧之詩周公東征四國是皇歌此事也王猶未察公作鴟鴞之詩及王感風雷之變而迎公歸時則已三年矣我徂東山之詩公所以勞歸士也然則居東即東居舊殷征戰之地罪人斯得即武庚管叔授首孔疏何乃引王肅說謂東是洛邑哉何乃謂東征鎮撫案驗其事哉孔疏所云是仍以鄭箋解孔傳矣于後公乃爲詩以貽王疏鄭元以爲武王崩周公爲冢宰三年服終將欲攝政管蔡流言即避居東都臣召南按康成箋詩於周公避居東都說異毛傳邶鄘衛譜豳譜再三言之必有所据但其解鴟鴞之詩則確然知其非也謂居東後成王殺其屬黨乃作詩貽王以救之是以鴟鴞目其君而以子目其官僚也尋常之人悖謬不至於此况聖人乎孔疏於詩既不能紏其違於書又援引其說昧於裁矣二公及王顧炎武曰主少國疑周公又出居外而上下安寧無腹心之患者二公之力也荀子曰二公仁智且不蔽故能持周公而名利福禄與周公齊王出郊天乃雨王應麟曰金縢之異說有二焉魯世家曰周公卒後秋未穫暴風雷雨禾盡偃大木盡拔周國大恐成王與大夫朝服以開金縢書梅福傳云昔成王以諸侯禮葬周公而皇天動威雷風著災此皆尚書大傳之說葢伏生不見古文故也蒙恬傳曰成王有病甚殆公旦自揃爪以沈于河乃書而藏之記府及王能治國有賊臣言周公欲爲亂周公走而奔於楚成王觀于記府得周公沈書乃流涕曰孰謂周公旦欲爲亂乎此又以武王有疾爲成王魯世家亦與恬傳同譙周曰秦既燔書時人欲言金縢之事失其本末也大誥序三監及淮夷叛傳三監管蔡商疏惟鄭以三監爲管蔡霍獨爲異耳臣召南按孔傳解三監非也康成說是設三監所以監武庚也若并數武庚尚監誰哉孔穎達於詩邶鄘衛譜暢言三監是管蔡霍引伏生書傳及蔡仲之命以明其說又引孫毓曰三監當有霍叔鄭義爲長惜不移以疏此序也天降割于我家不少音義馬讀不少延爲句疏鄭王皆以延上屬爲句臣召南按馬鄭王皆學今文据音義及疏是伏生所傳以不少延爲句孔氏古文則以不少爲句也王安石蘇軾並謂馬鄭王讀是後儒從之寧王傳謂文王也蘇軾曰當時稱武王爲寧王以其克殷而安天下也林之竒曰此篇所稱考寧王寧考寧人皆是武王先儒以爲文王殊失經意殷小腆林之竒曰蘇氏以腆爲厚按左傳云不腆敝邑固當訓厚金履祥曰小腆猶云蕞爾國微子之命序命微子啟代殷後傳啟知紂必亡而奔周命爲宋公爲湯後臣召南按序是言成王既殺武庚始命微子爵爲上公以奉湯祀也孔傳之說則武王克商即封宋公矣與序不合又此傳可疑漢以景帝諱啟作開史記宋世家稱微子開是也孔傳何得不避先儒疑孔傳多後人所爲此亦一証矣疏非去紂即奔周也臣召南按孔疏紏史記抱器面縛之妄極精微子之命傳稱其木爵以名篇林之竒曰不云宋公之命猶稱殷爵葢殷臣之客於周者也顧炎武曰微子於周葢受國以存先王之祀不受爵以示不爲臣之節故終身稱微子也愼乃服命疏上公九命葉適曰周制三公八命出封作伯九命謂之上公二王後亦出封之公也尚書注疏卷十二考證
