front:
  text: 御製讀尚書有㑹櫽括為言心傳允在辨危微敷政平章慎萬㡬念彼有為兼有守所其無逸乃無違欽承祖訓惟時乂顧畏民碞敢作威千古帝王師法具歛時錫極㑹而歸御製書無逸篇因題其後訪落殷憂慎始圖昌言一帙擬三謨為元后則時天若知小人依所逸無享國明標四迪哲𤼵端深致七嗚呼詎惟尚父丹書繼信是千秋帝範模御製讀召誥詩三百一言以蔽之曰思無邪予讀召誥之篇求其一言以蔽之者莫若曰􅂚其奈何弗敬盖召公因成王始政拳拳致告蔡傳所謂究其歸以諴民為祈天之本而又以敬徳為諴民之本一篇之中三致意焉則所謂奈何弗敬者非挈一篇之領要乎夫奈何者一唱三歎之意言有盡而義無窮奈何者更有不忍人之心以不忍人之心行不忍人之政則敬之施於外者也敬勝怠者吉義勝欲者從然必敬勝而後能義勝則又敬之存乎内者也内外交養誠實無妄祈天永命其弗基於此乎兹因謁明陵而思及受命保命之要必當以奈何弗敬為棘且君者天之子也天者君之父也父之於子無不亟其愛子之於父當無不亟其敬然及其失父之爱一再失其敬者猶示以警以訓誨之至於訓誨而弗改則父亦弗爱之而已矣嗚呼可不懼乎可不敬乎厯代遥矣不可屈指數明之事則近可徴也如永樂之簒位大行誅戮應其亡也而天弗亡之正統之北狩應其亡也而天亦弗亡之正徳之􅂽􅁋失徳應其亡也而天尚弗亡之此非慈父之逭其罪而仍有所顧惜乎必至萬厯怠政天啟童騃崇禎有猜忌之失無恢復之能而後亡之讀史而有受命保命之責者可不知懼知敬乎人莫不飲食鮮能知味也人莫不讀召誥鮮能知要也兹舉其一言以蔽之者於謁明陵之日後之􅄃者亦可以絜矩知吾意矣欽定四庫全書經部二
