body:
  text: 尚書注疏書𩔖目錄尚書正義序尚書序尚書原目尚書注解傳述人卷一虞書堯典卷二虞書舜典卷三虞書大禹謨臯陶謨卷四虞書益稷卷五夏書禹貢卷六夏書廿誓𦙍征五子之歌卷七商書湯誓上仲虺之誥太甲太甲中湯誥下伊訓有一徳太甲咸卷八商書盤庚上盤庚下盤庚中卷九商書説命上日説命中戡説命下子髙宗肜西伯黎微卷十周書泰誓上武泰誓中牧誓成泰誓下卷十一周書洪範卷十二周書旅􅋙大誥金縢之命微子卷十三周書康誥梓材酒誥卷十四周書召誥洛誥卷十五周書多士君奭無逸卷十六周書蔡仲之命立政多方卷十七周書周官顧命君陳卷十八周書康王之誥刑畢命冏命呂君牙卷十九周書文侯之命泰誓費誓臣等謹案尚書注疏十九卷漢孔安國傳唐孔頴達疏漢初惟傳伏生今文尚書二十八篇後安國得壁中書較多於伏生所傳又其字體與漢𨽻異是為古文永嘉之亂古文中絶晉梅􅄨乃上古文尚書四十五篇並安國所作傳識者疑之頴達作正義專主安國翻疑康成等所見古文為偽書何也晁公武謂其因梁費甝疏廣之盖六朝諸家尚書義疏世多不傳惟是書猶存其崖畧云乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀尚書正義序唐孔穎達撰夫書者人君辭誥之典右史記言之䇿古之王者事總萬㡬發號出令義非一揆或設教以馭下或展禮以事上或宣威以肅震曜或敷和而散風雨得之則百度惟貞失之則千里斯謬樞機之發榮辱之主絲綸之動不可不慎所以辭不茍出君舉必書欲其昭法誡慎言行也其泉源所漸基於出震之君黼藻斯彰郁乎如雲之后勲華揖讓而典謨起湯武革命而誓誥興先君宣父生於周末有至徳而無至位修聖道以顯聖人芟煩亂而翦浮辭舉宏綱而撮機要上斷唐虞下終秦魯時經五代書總百篇採翡翠之羽毛㧞犀象之牙角罄荆山之石所得者連城窮漢水之濱所求者照乗巍巍蕩蕩無得而稱郁郁紛紛於斯為盛斯乃前言往行足以埀法將來者也暨乎七雄已戰五精未聚儒雅與深穽同埋經典共積薪俱燎漢氏大濟區宇廣求遺逸採古文於金石得今書於齊魯其文則歐陽夏侯二家之所説蔡邕碑石刻之古文則兩漢亦所不行安國注之實遭巫蠱遂寢而不用歴及魏晉方始稍興故馬鄭諸儒莫覩其學所注經傳時或異同晉世皇甫謐獨得其書載於帝紀其後傳授乃可詳焉但古文經雖然早出晚始得行其辭富而備其義宏而雅故復而不厭乆而愈亮江左學者咸悉祖焉近至隋初始流河朔其為正義者蔡大寶巢猗費甝顧彪劉焯劉炫等其諸公㫖趣多或因循怗釋注文義皆淺略惟劉焯劉炫最為詳雅然焯乃織綜經文穿鑿孔穴詭其新見異彼前儒非險而更為險無義而更生義竊以古人言誥惟在達情雖復時或取象不必辭皆有意若其言必託數經悉對文斯乃鼔怒浪於平流震驚飊於静樹使教者煩而多惑學者勞而少功過猶不及良為此也炫嫌焯之煩雜就而刪焉雖復微稍省要又好改張前義義更太略辭又過華雖為文筆之善乃非開奨之路義既無義文又非文欲使後生若為領袖此乃炫之所失未為得也今奉明勑考定是非謹罄庸愚竭所聞見覽古人之傳記質近代之異同存其是而去其非削其煩而増其簡此亦非敢臆説必據舊聞謹與朝散大夫行太學博士臣王徳韶前四門助教臣李子雲等謹共銓叙至十六年又奉勑與前脩疏人及通直郎行四門博士驍騎尉臣朱長才給事郎守四門博士上騎都尉臣蘇徳融登仕郎守太學助教雲騎尉臣隨徳素儒林郎守四門助教雲騎尉臣王士雄等對勑使趙𢎞智覆更詳審為之正義凡二十卷庶對揚於聖範冀有益於童稚略陳其事叙之云爾尚書正義序尚書正義序考證晉世皇甫謐獨得其書載於帝紀臣召南按此帝紀謂謐所撰之帝王世紀也謐依孔安國説以伏羲神農黄帝為三皇以少昊顓頊帝嚳堯舜為五帝異乎史記其為正義者蔡大寳巢猗費甝顧彪劉焯劉炫等臣召南按隋唐二志蔡大寶南梁蕭􅊫司徒撰尚書義疏三十卷巢猗梁國子助教撰尚書百釋三卷尚書義三卷唐志作義疏十卷費甝梁國子助教撰義疏十卷顧彪隋秘書學士撰疏二十卷劉焯隋太學博士撰義疏三十卷劉炫隋國子助教撰述義二十卷以時世先後為次則巢猗費甝似應敘蔡大寶之前謹共銓敘銓字疑應作詮對勅使趙𢎞智覆更詳審臣召南按五經正義孔穎達及諸儒於貞觀初奉勅撰至十六年又同諸儒覆審者以博士馬嘉運掎摭其疵至相詆譏太宗詔再詳定至髙宗永徽二年又詔中書門下與國子三館博士𢎞文館學士攷正之四年三月始頒正義於天下葢兩經詳審而書始定也尚書正義序但敘初撰及第一次詳審人姓名至永徽再加刋定唐書藝文志具列於尚書正義撰人之後太尉長孫无忌司空李勣左僕射于志寜右僕射張行成侍中髙季輔吏部尚書褚遂良中書令栁奭𢎞文館學士谷那律劉伯莊太學博士賈公彦范義頵齊威太常博士栁士宣孔志約四門博士趙君贊𢎞文館直學士薛伯珍國子助教史士𢎞太學助教鄭祖元周元達四門助教李元植王真儒與王徳韶隨徳素等共二十三人不書於各經下而書於尚書下葢互文也儒林傳但云于志寜張行成髙季輔就加増損取其尤著者也附錄以備掌故之一則尚書正義序考證尚書序漢孔氏撰唐陸徳明音義孔穎達疏尚書序音義此孔氏所作述尚書起之時代并叙為注之由故相承講之今依舊為音疏正義曰道本沖寂非有名言既形以道生物由名舉則凡諸經史因物立名物有本形形從事著聖賢闡教事顯於言言愜羣心書而示法既書有法因號曰書後人見其乆逺自於上世尚者上也言此上代以来之書故曰尚書且言者意之聲書者言之記是故存言以聲意立書以記言故易曰書不盡言言不盡意是言者意之筌蹄書言相生者也書者舒也書緯璿璣鈐云書者如也則書寫其言如其意情得展舒也又劉熙釋名云書者庶也以記庶物又為著言事得彰著五經六籍皆是筆書此獨稱書者以彼五經者非是君口出言即書為法所書之事各有云為遂以所為別立其稱稱以事立故不名書至於此書者本書君事事雖有別正是君言言而見書因而立號以此之故名異諸部但諸部之書隨事立名名以事舉要名立之後亦是筆書故百氏六經總曰書也論讖所謂題意別名各自載耳昭二年左傳曰晉韓起適魯觀書於太史氏見易象與魯春秋此總名書也序者言序述尚書起訖存亡注説之由序為尚書而作故曰尚書序周頌曰繼序思不忘毛傳云序者緒也則緒述其事使理相𦙍續若繭之抽緒但易有序卦子夏作詩序孔子亦作尚書序故孔君因此作序名也鄭𤣥謂之贊者以序不分散避其序名故謂之贊贊者明也佐也佐成序義明以注􅄙故也安國以孔子之序分附篇端故己之總述亦謂之序事不煩重義無所嫌故也古者伏犧氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉音義伏古作虙犧本又作羲亦作戲許皮反説文云賈侍中説此犧非古字張揖字詁云羲古字􅃧今字氏一號庖犧氏三皇之最先風姓母曰華胥以木徳王即太皥也王于況反畫乎麥反卦俱賣反契苦計反書者文字契者刻木而書其側故曰書契也一云以書契約其事也鄭𤣥云以書書木邉言其事刻其木謂之書契也結繩易繫辭云上古結繩而治後世聖人易之以書契文文字也籍書籍也疏正義曰代結繩者言前世之政用結繩今冇書契以代之則伏犧時始有文字以書事故曰由是文籍生焉自今本昔曰古古者以聖徳㐲物教人取犧牲故曰伏犧字或作宓犧音亦同律厯志曰結作網罟以取犧牲故曰伏犧或曰包犧言取犠而包之顧氏讀包為庖取其犧牲以供庖㕑顧氏又引帝王世紀云伏犧母曰華胥有巨人跡出於雷澤華胥以是履之有娠生伏犧於成紀蛇身人首月令云其帝太昊繫辭云古者包犧氏之王天下也是直變包言伏耳則伏犧是皇言王天下者以皇與帝王據跡為優劣通亦為王故禮運云昔者先王亦謂上代為王但自下言之則以上身為王據王身於下謂之王天下也知伏犧始畫八卦者以繫辭云包犧氏之王天下也後乃云始畫八卦以通神明之徳以𩔖萬物之情故知之也知時造書契以代結繩之政者亦以繫辭云上古結繩而治後世聖人易之以書契蓋取諸夬是造書契可以代結繩也彼直言後世聖人知是伏犧者以理比況而知何則八卦畫萬物之象文字書百事之名故繫辭曰仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物始畫八卦是萬象見於卦然畫亦書也與卦相𩔖故知書契亦伏犧時也由此孔意正欲須言伏犧時有書契本不取於八卦今云八卦者明書卦相𩔖據繫辭有畫八卦之成文而言明伏犧造書契也言結繩者當如鄭注云為約事大大其繩事小小其繩王肅亦曰結繩識其政事是也言書契者鄭云書之於木刻其側為契各持其一後以相考合若結繩之為治孔無明説義或當然説文云文者物象之本也籍者借也借此簡書以記錄政事故曰籍蓋取諸夬夬者決也言文籍所以決斷宣揚王政是以夬繇曰揚于王庭繫辭云包犧氏之王天下又云作結繩而為㒺罟蓋取諸離彼謂結罔罟之繩與結為政之繩異也若然尚書緯及孝經讖皆云三皇無文字又班固馬融鄭𤣥王肅諸儒皆以為文籍初自五帝亦云三皇未有文字與此説不同何也又蒼頡造書出於世本蒼頡豈伏犧時乎且繫辭云黄帝堯舜為九事之目末乃云上古結繩而治後世聖人易之以書契是後世聖人即黄帝堯舜何得為伏犧哉孔何所據而更與繫辭相反如此不同者藝文志曰仲尼沒而微言絶七十子喪而大義乖況遭秦焚書之後羣言競出其緯文鄙近不出聖人前賢共疑有所不取通人考正偽起哀平則孔君之時未有此緯何可引以為難乎其馬鄭諸儒以據文立説見後世聖人在九事之科便謂書起五帝自所見有異亦不可難孔也而繫辭云後世聖人在九事之下者有以而然案彼文先厯説伏犧神農蓋取下乃云黄帝堯舜垂衣裳而天下治蓋取諸乾坤是黄帝堯舜之事也又舟楫取渙服牛取隨重門取豫臼杵取小過弧矢取暌此五者時無所繫在黄帝堯舜時以否皆可以通也至於宫室𦵏與書契皆先言上古古者乃言後世聖人易之則別起事之端不指黄帝堯舜時以此𦵏事云古者不云上古而云易之以棺槨棺槨自殷湯而然非是彼時之驗則上古結繩何廢伏犧前也其蒼頡則説者不同故世本云蒼頡作書司馬遷班固韋誕宋忠傅𤣥皆云蒼頡黄帝之史官也崔瑗曹植蔡邕索靖皆直云古之王也徐整云在神農黄帝之間譙周云在炎帝之世衛氏云當在庖犧蒼帝之世慎到云在庖犧之前張揖云蒼頡為帝王生於禪通之紀廣雅曰自開闢至獲麟二百七十六萬嵗分為十紀則大率一紀二十七萬六千年十紀者九頭一也五龍二也攝提三也合雒四也連通五也序命六也循蜚七也因提八也禪通九也疏仡十也如揖此言則蒼頡在獲麟前二十七萬六千餘年是説蒼頡其年代莫能有定亦不可以難孔也然紀自燧人而下揖以為自開闢而設又伏犧前六紀後三紀亦為據張揖慎到徐整等説亦不可以年斷其疏仡之紀似自黄帝為始耳又依易緯通卦驗燧人在伏犧前表計寘其刻曰蒼牙通靈昌之成孔演命明道經鄭𤣥注云刻謂刻石而記識之據此伏犧前已有文字矣又隂陽書稱天老對黄帝云鳳皇之象首戴徳背負仁頸荷義膺抱信足履政尾繫武又山海經云鳳皇首文曰德背文曰義翼文曰順膺文曰仁腹文曰信又易繫辭云河出圖洛出書聖人則之是文字與天地竝興焉又韓詩外傳稱古封太山禪梁甫者萬餘人仲尼觀焉不能盡識又管子書稱管仲對齊桓公曰古之封太山者七十二家夷吾所識十二而已首有無懐氏封太山禪云云其登封者皆刻石紀號但逺者字有彫毁故不可識則夷吾所不識者六十家又在無懐氏前孔子覩而不識又多於夷吾是文字在伏犧之前已自乆逺何怪伏犧而有書契乎如此者蓋文字在三皇之前未用之教世至伏犧乃用造書契以代結繩之政是教世之用猶燧人有火中古用以燔􅁰捭豚後聖乃修其利相似文字理本有之用否隨世而漸也若然惟繫辭至神農始有噬嗑與益則伏犧時其卦未重當無雜卦而得有取諸夬者此自鄭𤣥等説耳案説卦曰昔者聖人幽贊於神明而生蓍繫辭曰天生神物聖人則之則伏犧用蓍而筮矣故鄭注説卦亦曰昔者聖人謂伏犧文王也繫辭又曰十有八變而成卦是言爻皆三歸竒為三變十八變則六爻明矣則筮皆六爻伏犧有筮則有六爻何為不重而怪有夬卦乎伏犧神農黄帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也音義神農炎帝也姜姓母曰文登以火徳王三皇之二也黄帝軒轅也姬姓少典之子母曰附寳以土德王三皇之三也史記云姓公孫名軒轅一號冇熊氏墳扶云反大也少詩照反昊胡老反少昊金天氏名摯字青陽一曰𤣥囂己姓黄帝之子母曰女節以金徳王五帝之最先顓音專頊許玉反顓頊髙陽氏姬姓黄帝之孫昌意之子母曰景僕謂之女樞以水德王五帝之二也髙辛帝嚳也姬姓嚳口毒反母名不見以木徳王五帝之三也唐帝堯也姓伊耆氏堯初為唐侯後為天子都陶故號陶唐氏帝嚳之子帝摯之弟母曰慶都以火德王五帝之四也虞帝舜也姓姚氏國號有虞顓頊六世孫瞽瞍之子母曰握登以土徳王五帝之五也先儒解三皇五帝多與孔不同並見發題疏正義曰墳大也以所論三皇之事其道至大故曰言大道也以典者常也言五帝之道可以百代常行故曰言常道也此三皇五帝或舉徳號或舉地名或直指其人言及稱便不為義例顧氏引帝王世紀云神農母曰女登有神龍首感女登而生炎帝人身牛首黄帝母曰附寳見大電光繞北斗樞星附寳感而懐孕二十四月而生黄帝日角龍顔少昊金天氏母曰女節有星如虹下流意感而生少昊顓頊母曰景僕昌意正妃謂之女樞有星貫月如虹感女樞於幽房之宮而生顓頊堯母曰慶都觀河遇赤龍晻然隂風感而有孕十四月而生堯又云舜母曰握登見大虹感而生舜此言謂之三墳謂之五典者因左傳有三墳五典之文故指而謂之然五帝之書皆謂之典則虞書臯陶謨益稷之屬亦應稱典所以別立名者若主論帝徳則以典為名其臣下所為隨義立稱其三墳直云言大道也五典直云言常道也不訓墳典之名者以墳大典常常訓可知故略之也常道所以與大道為異者以帝者公平天下其道可以常行故以典言之而皇優於帝其道不但可常行而已又更大於常故言墳也此為對例耳雖少有優劣皆是大道並可常行故禮運云以大道之行為五帝時也然帝號同天名所莫加優而稱皇者以皇是美大之名言大於帝也故後代措廟立主尊之曰皇生者莫敢稱焉而士庶祖父稱曰皇者以取美名可以通稱故也案左傳上有三墳五典下言墳是三皇之書典是五帝之書孔知然者案今堯典舜典是二帝二典推此二典而丄則五帝當五典為五帝之書今三墳之書在五典之上數與三皇相當墳又大名與皇義相類故云三皇之書為三墳孔君必知三皇有書者案周禮外史職掌三皇五帝之書是其明文也鄭𤣥亦云其書即三墳五典但鄭𤣥以三皇無文或據後録定孔君以為書者記當時之事不可以在後追録若當時無書後代何以得知其道也此亦孔君所據三皇有文字之驗耳鄭𤣥注中候依運斗樞以伏犧女媧神農為三皇又云五帝座帝鴻金天髙陽髙辛唐虞氏知不爾者孔君既不依緯不可以緯難之又易興作之條不見冇女媧何以輙數又鄭𤣥云女媧修伏犧之道無改作則已上修舊者衆豈皆為皇乎既不數女媧不可不取黄帝以充三皇耳又鄭𤣥數五帝何以六人或為之説云徳協五帝座不限多少故六人亦名五帝若六帝何有五座而皇指大帝所謂耀魄寳止一而已本自無三皇何云三皇豈可三皇數人五帝數座二文舛互自相乖阻也其諸儒説三皇或數燧人或數祝融以配犧農者其五帝皆自軒轅不數少昊斯亦非矣何燧人説者以為伏犧之前據易曰帝出於震震東方其帝太昊又云古者包犧氏之王天下也言古者制作莫先於伏犧何以燧人厠在前乎又祝融及顓頊以下火官之號金天已上百官之號以其徵五經無云祝融為皇者縱冇不過如共工氏共工有水瑞乃與犧農軒摯相類尚云霸其九州祝融本無此瑞何可數之乎左傳曰少昊之立鳳鳥適至於月令又在秋享食所謂白帝之室者也何為獨非帝乎故孔君以黄帝上數為皇少昊為五帝之首耳若然案今世本帝繫及大戴禮五帝德并家語宰我問太史公五帝本紀皆以黄帝為五帝此乃史籍明文而孔君不從之者孟軻曰信書不如其無書吾於武成取二三策而已言書以漸染之濫也孟軻已然况後之説者乎又帝繫本紀家語五帝徳皆云少昊即黄帝子青陽是也顓頊黄帝孫昌意子帝嚳髙辛氏為黄帝曾孫𤣥嚻孫僑極子堯為帝嚳子舜為顓頊七世孫此等之書説五帝而以黄帝為首者原由世本經於暴秦為儒者所亂家語則王肅多私定大戴禮本紀出於世本以此而同蓋以少昊而下皆出黄帝故不得不先説黄帝因此謬為五帝耳亦由繫辭以黄帝與堯舜同事故儒者共數之焉孔君今者意以月令春曰太昊夏曰炎帝中央曰黄帝依次以為三皇又依繫辭先包犧氏王沒神農氏作又沒黄帝氏作亦文相次皆著作見於易此三皇之明文也月令秋曰少昊冬曰顓頊自此為五帝然皇帝是皇今言帝不云皇者以皇亦帝也別其美名耳太昊為皇月令亦曰其帝太昊易曰帝出於震是也又軒轅之稱黄帝猶神農之云炎帝神農於月令為炎帝不怪炎帝為皇何怪軒轅稱帝而梁主云書起軒轅同以燧人為皇其五帝自黄帝至堯而止知帝不可以過五故曰舜非三皇亦非五帝與三王為四代而已其言與詩之為體不雅則風除皇已下不王則帝何有非王非帝以為何人乎典謨皆云帝曰非帝如何至于夏商周之書雖設教不倫雅誥奥義其歸一揆音義夏禹天下號也以金徳王三王之最先商湯天下號也亦號殷以水徳王三王之二也周文王武王有天下號也以木徳王三王之三也誥故報反告也示也奥烏報反深也揆葵癸反度也疏正義曰既皇書稱墳帝書稱典除皇與帝墳典之外以次累陳故言至于夏商周三代之書雖復當時所設之教與皇及帝墳典之等不相倫類要其言皆是雅正辭誥有深奥之義其所歸趣與墳典一揆明雖事異墳典而理趣終同故所以同入尚書共為世教也孔君之意以墳典亦是尚書故此因墳典而及三代下云討論墳典斷自唐虞以下是墳典亦是尚書之内而外史偏掌之者以其逺代故也此既言墳典不依外文連類解八索九丘而言三代之書厠於其間者孔意以墳典是尚書丘索是尚書外物欲先説尚書事訖然後及其外物故先言之也夏商周之書皆訓誥誓命之事言設教者以此訓誥誓命即為教而設故云設教也言不倫者倫類也三代戰爭不與皇帝等類若然五帝稱典三王劣而不倫不得稱典則三代非典不可常行何以垂法乎然三王世澆不如上代故隨事立名雖篇不目典理實是典故曰雅誥奥義其歸一揆即為典之謂也然三王之書惟無典謨以外訓誥誓命歌貢征範類猶有八獨言誥者以別而言之其類有八文從要約一誥兼焉何者以此八事皆有言以誥示故總謂之誥又言奥義者指其言謂之誥論其理謂之義故以義配焉言其歸一揆見三代自歸於一亦與墳典為一揆者况喻之義假譬人射莫不皆發志揆度於的猶如聖人立教亦同揆度於至理故云一揆是故厯代寶之以為大訓疏正義曰顧命云越玉五重陳寶即以赤刀大訓在西序是寳之以為大訓之文彼注以典謨為之與此相當要六藝皆是此直為書者指而言之故彼注亦然也彼直周時寶之此知厯代者以墳典乆逺周尚寶之前代可知故言厯代耳八卦之説謂之八索求其義也九州之志謂之九丘丘聚也言九州所有土地所生風氣所宜皆聚此書也音義索所白反下同求也徐音素本或作素疏正義曰以墳典内外文而知其丘索與墳典文連故連而説之故總引傳文以充足己意且為於下見與墳典俱被黜削故説而以為首引言為論八卦事義之説者其書謂之八索其論九州之事所有志記者其書謂之九丘所以名丘者以丘聚也言於九州當有土地所生之物風氣所宜之事莫不皆聚見於此書故謂之九丘焉然八卦言之説九州言之志不同者以八卦交互相説其理九州當州有所志識以此而不同此索謂求索亦為搜索以易八卦為主故易曰八卦成列象在其中矣因而重之爻在其中矣又曰八卦相盪是六十四卦三百八十四爻皆出於八卦就八卦而求其理則萬冇一千五百二十䇿天下之事得故謂之索非一索再索而已此索於左傳亦或謂之索説有不同皆後人失其真理妄穿鑿耳其九丘取名於聚義多如山丘故為聚左傳或謂之九區得為説當九州之區域義亦通也又言九州所有此一句與下為總即土地所生風氣所宜是所有也言土地所生即其動物植物大率土之所生不出此二者又云風氣所宜者亦與土地所生大同何者以九州各有土地有生與不生由風氣所宜與不宜此亦職方禹貢之類別而言之土地所生若禹貢之厥貢厥篚也風氣所宜若職方其畜宜若干其民若干男若干女是也上墳典及索不別訓之以可知故略之丘訓既難又須別言九州所有已下故先訓之於下結義故云皆聚此書也春秋左氏傳曰楚左史倚相能讀三墳五典八索九丘即謂上世帝王之遺書也音義左史史官在左倚於綺反劉琴綺反相息亮反倚相楚靈王時史官疏正義曰以上因有外文言墳典丘索而謂之故引成文以證結之此昭十二年左傳楚靈王見倚相趨過告右尹子革以此辭知倚相是其名字蓋為太史而主記左動之事謂之左史不然或楚俗與諸國不同官多以左右為名或別有此左史乎彼子革答王云倚相臣問祈招之詩而不知若問逺焉其焉能知之彼以為倚相不能讀之此云能者以此據左傳成文因王言而引之假不能讀事亦無妨况子革欲開諫王之路倚相未必不能讀也言此墳典丘索即此書是謂上世帝王遺餘之書也以楚王論時已在三王之末故云遺書其丘索知是前事亦不知在何代故直總言帝王耳先君孔子生於周末覩史籍之煩文懼覽之者不一遂乃定禮樂明舊章刪詩為三百篇約史記而修春秋讚易道以黜八索述職方以除九丘音義刪色姦反疏正義曰既結申帝王遺書欲言孔子就而刋定孔子世家云安國是孔子十一世孫而上尊先祖故曰先君穀梁以為魯襄公二十一年冬十一月庚子孔子生左傳哀公十六年夏四月己丑孔子卒訃以周靈王時生敬王時卒故為周末上云文籍下云滅先代典籍此言史籍籍者古書之大名由文而有籍謂之文籍用史所書謂之史籍可以為常故曰典籍義亦相通也但上因書契而言文下傷秦滅道以稱典於此言史者不但義通上下又以此史籍不必是先王正史是後代好事者作以此懼其不一故曰蓋有不知而作之者我無是也先言定禮樂者欲明孔子欲反於聖道以歸於一故先言其舊行可從者修而不改曰定就而減削曰刪準依其事曰約因而佐成曰贊顯而明之曰述各從義理而言獨禮樂不改者以禮樂聖人制作已無貴位故因而定之又云明舊章者即禮樂詩易春秋是也以易道職方與黜八索除九丘相對其約史記以刪詩書為偶其定禮樂文孤故以明舊章配之作文之體也易亦是聖人所作不言定者以易非如禮樂人之行事不須云定又因而為作十翼故云贊耳易文在下者亦為黜八索與除九丘相近故也為文之便不為義例孔子之脩六藝年月孔無明説論語曰吾自衛反魯然後樂正雅頌各得其所則孔子以魯哀公十一年反魯為大夫十二年孟子卒孔子弔則致仕時年七十以後脩述也詩有序三百一十一篇全者三百五篇云三百者亦舉全數計職方在周禮夏官亦武帝時出於山巖屋壁即藏祕府世人莫見以孔君為武帝博士於祕府而見焉知必黜八索除九丘者以三墳五典本有八今序只有二典而已其三典三墳今乃寂寞明其除去既墳典書内之正尚有去者況書外乎故知丘索亦黜除也黜與除其義一也黜退不用而除去之必云贊易道以黜者以不有所興孰有所廢故也職方即周禮也上已云定禮樂即職方在其内別云述之以為除九丘舉其類者以言之則云述者以定而不改即是遵述非更有書以述之討論墳典斷自唐虞以下訖于周芟夷煩亂翦截浮辭舉其宏綱撮其機要足以垂世立教典謨訓誥誓命之文凡百篇音義斷丁亂反訖居乙反又許乙反芟色咸反翦咨淺反撮七活反機本又作㡬典凡十五篇正典二攝十三十一篇亡謨莫胡反凡三篇正二攝一訓凡十六篇正二篇亡攝十四三篇亡誥凡三十八篇正八攝三十十八篇亡誓市制反凡十篇正八攝二一篇亡命凡十八篇正十二三篇亡攝六四篇亡疏正義曰言孔子既懼覽之者不一不但刪詩約史定禮贊易有所黜除而已又討整論理此三墳五典并三代之書也論語曰世叔討論之鄭以討論為整理孔君既取彼文義亦當然以書是亂物故就而整理之若然墳典周公制禮使外史掌之而孔子除之者蓋隨世不同亦可孔子之時墳典已雜亂故因去之左傳曰芟夷蘊崇之又曰俘翦惟命詩曰海外冇截此孔君所取之文也芟夷者據全代全篇似草隨次皆芟使平夷若自帝嚳已上三典三墳是芟夷之文自夏至周雖有所留全篇去之而多者即芟夷也翦截者就代就篇辭冇浮者翦截而去之去而少者為翦截也舉其宏綱即上芟夷煩亂也撮其機要即上翦截浮辭也且宏綱云舉是據篇代大者言之機要云撮為就篇代之内而撮出之耳宏大也綱者網之索舉大綱則衆目隨之機者機關撮取其機關之要者斷自唐虞以下者孔無明説書緯以為帝嚳以上朴略難傳唐虞已来煥炳可法又禪讓之首至周五代一意故耳孔義或然典即堯典舜典謨即大禹謨臯陶謨訓即伊訓髙宗之訓誥即湯誥大誥誓即甘誓湯誓命即畢命顧命之等是也説者以書體例有十此六者之外尚有征貢歌範四者并之則十矣若益稷盤庚單言附於十事之例今孔不言者不但舉其機約亦自征貢歌範非君出言之名六者可以兼之此云凡百篇據序而數故耳或云百二篇者誤有所由以前漢之時有東萊張霸偽造尚書百兩篇而為緯者附之因此鄭云異者其在大司徒大僕正乎此事為不經也鄭作書論依尚書緯云孔子求書得黄帝𤣥孫帝魁之書迄於秦穆公凡三千二百四十篇斷逺取近定可以為世法者百二十篇以百二篇為尚書十八篇為中候以為去三千一百二十篇以上取黄帝𤣥孫以為不可依用今所考覈尚書首自舜之末年以禪於禹上錄舜之得用之事由堯以為堯典下取舜禪之後以為爵讓得人故史體例別而不必君言若禹貢全非君言而禹身事受禪之後無入夏書之言是舜史自錄成一法後代因之耳所以恢𢎞至道示人主以軌範也帝王之制坦然明白可舉而行三千之徒並受其義音義恢苦回反大也坦土但反疏正義曰此論孔子正理羣經已畢總而結之故為此言家語及史記皆云孔子弟子三千人故云三千之徒也及秦始皇滅先代典籍焚書坑儒學士逃難解散我先人用藏其家書于屋壁音義始皇名政二十六年初并六國自號始皇帝焚詩書在始皇之三十四年坑儒在三十五年坑苦庚反難乃旦反解音蟹疏正義曰言孔子既定此書後雖曰明白反遭秦始皇滅除之依秦本紀云秦王政二十六年平定天下尊為皇帝不復立諡以為初并天下故號始皇為滅先代典籍故云坑儒焚書以即位三十四年因置酒於咸陽宫丞相李斯奏請天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書者棄市令下三十日不燒黥為城旦制曰可是焚書也三十五年始皇以方士盧生求仙藥不得以為誹謗諸生連相告引四百六十餘人皆坑之咸陽是坑儒也又衛宏古文竒字序云秦改古文以為篆隷國人多誹謗秦患天下不從而召諸生至者皆拜為郎凡七百人又密令冬月種𤓰於驪山硎谷之中温處瓜實乃使人上書曰瓜冬有實有詔天下博士諸生説之人人各異則皆使往視之而為伏機諸生方相論難因發機從上填之以土皆終命也我先人用藏其家書于屋壁者史記孔子世家云孔子生鯉字伯魚魚生伋字子思思生白字子上上生求字子家家生箕字子京京生穿字子髙髙生慎慎為魏相慎生鮒鮒為陳涉博士鮒弟子襄為惠帝博士長沙太守襄生中中生武武生延陵及安國為武帝博士臨淮太守家語序云子襄以秦法峻急壁中藏其家書是安國祖藏之漢室龍興開設學校旁求儒雅以闡大猷濟南伏生年過九十失其本經口以傳授裁二十餘篇以其上古之書謂之尚書百篇之義世莫得聞音義校户教反詩箋云鄭國謂學為校闡尺善反大也明也濟子禮反郡名也伏生名勝過古卧反後同傳直專反下傳之子孫同二十餘篇即馬鄭所注二十九篇也疏正義曰將言所藏之書得之所由故本之也言龍興者以易龍能變化故比之聖人九五飛龍在天猶聖人在天子之位故謂之龍興也言學校者校學之一名也故鄭詩序云子衿刺學校廢左傳云然明請毁鄉校是也漢書云惠帝除挟書之律立學興教招聘名士文景以後儒者更衆至武帝尤甚故云旁求儒雅詩小雅曰匪先民是程匪大猷是經彼注云猷道也大道即先王六籍是也伏生名勝為秦二世博士儒林傳云孝文帝時求能治尚書者天下無冇聞伏生治之欲召時伏生年已九十有餘老不能行於是詔太常使掌故臣鼂錯往受之得二十九篇即以教於齊魯之間是年過九十也案史記秦時焚書伏生壁藏之其後兵大起流亡漢定天下伏生求其書亡數十篇獨得二十九篇以教于齊魯之間則伏生壁内得二十九篇而云失其本經口以傳授者蓋伏生初實壁内得之以教齊魯傳教既乆誦文則熟至其末年因其習誦或亦目暗至年九十鼂錯往受之時不執經而口授之故也又言裁二十餘篇者意在傷亡為少之文勢何者以數法隨所近而言之若欲多之當云得三十篇今裁二十餘篇言裁亦意以為少之辭又二十九篇自是計卷若計篇則三十四去泰誓猶有三十一案史記及儒林傳皆云伏生獨得二十九篇以教齊魯則今之泰誓非初伏生所得案馬融云泰誓後得鄭𤣥書論亦云民間得泰誓別錄曰武帝末民有得泰誓書於壁内者獻之與博士使讀説之數月皆起傳以教人則泰誓非伏生所傳而言二十九篇者以司馬遷在武帝之世見泰誓出而得行入於伏生所傳内故為史總之并云伏生所出不復曲別分析云民間所得其實得時不與伏生所傳同也但伏生雖無此一篇而書傳有八百諸侯俱至孟津白魚入舟之事與泰誓事同不知為伏生先為此説不知為是泰誓出後後人加增此語案王充論衡及後漢史獻帝建安十四年黄門侍郎房宏等説云宣帝本始元年河内女子有壊老子屋得古文泰誓三篇論衡又云以掘地所得者今史漢書皆云伏生傳二十九篇則司馬遷時已得泰誓以并歸於伏生不得云宣帝時始出也則云宣帝時女子所得亦不可信或者爾時重得之故於後亦據而言之史記云伏生得二十九篇武帝記載今文泰誓末篇由此劉向之作別錄班固為儒林傳不分明因同於史記而劉向云武帝未得之泰誓理當是一而古今文不同者即馬融所云吾見書傳多矣凡諸所引今之泰誓皆無此言而古文皆有則古文為真亦復何疑但此先有張霸之徒偽造泰誓以藏壁中故後得而惑世也亦可今之泰誓百篇之外若周書之例以於時實有觀兵之誓但不録入尚書故古文泰誓曰皇天震怒命我文考肅將天威大勲未集肆予小子發以爾友邦冢君觀政於商是也又云以其上古之書謂之尚書者此文繼在伏生之下則言以其上古之書謂之尚書此伏生意也若以伏生指解尚書之名名已先有有則當云名之尚書既言以其上古之書今先云以其則伏生意之所加則知尚字乃伏生所加也以尚解上則尚訓為上上者下所慕尚故義得為通也孔君既陳伏生此義於下更無是非明即用伏生之説故書此而論之馬融雖不見孔君此説理自然同故曰上古有虞氏之書故曰尚書是也王肅曰上所言史所書故曰尚書鄭氏云尚書上也尊而重之若天書然故曰尚書二家以尚與書相埒則上名不正出於伏生鄭𤣥依書緯以尚字是孔子所加故書贊曰孔子乃尊而命之曰尚書璿璣鈐云因而謂之書加尚以尊之又曰書務以天言之鄭𤣥溺於書緯之説何冇人言而須繫之於天乎且孔君親見伏生不容不悉自云伏生以其上古之書謂之尚書何云孔子加也王肅曰上所言史所書則尚字與書俱有無先後既直云尚何以明上之所言書者以筆畫記之辭羣書皆是何知書要責史所為也此其不若前儒之説密耳云上古者亦無指定之目自伏生言之則於漢世仰遵前代自周已上皆是馬融云有虞氏為書之初耳若易厯三世則伏犧為上古文王為中古孔子為下古禮運鄭𤣥以先王食腥與易上古結繩同時為上古神農為中古五帝為下古其不相對則無例耳且太之與上為義不異禮以唐虞為太古以下有三代冠而推之為然是為不定則但今世已上仰之已古便為上古耳以書是本名尚是伏生所加故諸引書直云書曰若有配代而言則曰夏書無言尚書者至魯共王好治宮室壞孔子舊宅以廣其居於壁中得先人所藏古文虞夏商周之書及傳論語孝經皆科斗文字王又升孔子堂聞金石絲竹之音乃不壞宅音義共音恭亦作龔又作恭共王漢景帝之子名餘好呼報反下好古同壊音怪下同字林作􅭔云公壞反毁也傳謂春秋也一云周易十翼非經謂之傳論如字又音倫科苦禾反科斗蟲名蝦蟆子書形似之疏正義曰欲云得百篇之由故序其事漢景帝之子名餘封於魯為王死諡曰共存日以居於魯近孔子宅好治宮室故欲裒益乃壞孔子舊宅以増廣其居於所壊壁内得安國先人所藏古文虞夏商周之書及傳論語孝經皆是科斗文字王雖得此書猶壊不止又升孔子廟堂聞金鐘石磬絲琴竹管之音以懼其神異乃止不復敢壊宅也上言藏家書於屋壁此亦屋壁内得書也亦得及傳論語孝經等不從約云得尚書而煩文言虞夏商周之書者以壁内所得上有題目虞夏商周書其序直云書序皆無尚字故其目錄亦然故不云尚書而言虞夏商周之書安國亦以此知尚字是伏生所加推此壁内所無則書本無尚字明矣凡書非經則謂之傳言及傳論語孝經正謂論語孝經是傳也漢武帝謂東方朔云傳曰時然後言人不厭其言又漢東平王劉雲與其太師䇿書云傳曰陳力就列不能者止又成帝賜翟方進䇿書云傳曰髙而不危所以長守貴也是漢世通謂論語孝經為傳也以論語孝經非先王之書是孔子所傳説故謂之傳所以異於先王之書也上已云壞孔子舊宅又云乃不壞宅者初王意欲壞之已壞其屋壁聞八音之聲乃止餘者不壞明知已壞者亦不敢居故云乃不壤宅耳悉以書還孔氏科斗書廢已乆時人無能知者以所聞伏生之書考論文義定其可知者為𨽻古定更以竹簡寫之増多伏生二十五篇伏生又以舜典合於堯典益稷合於臯陶謨盤庚三篇合為一康王之誥合於顧命復出此篇并序凡五十九篇為四十六卷其餘錯亂摩滅弗可復知悉上送官藏之書府以待能者音義隷音麗謂用隷書寫古文二十五篇謂虞書大禹謨夏書五子之歌𦙍征商書仲虺之誥湯誥伊訓太甲三篇咸有一徳説命三篇周書泰誓三篇武成旅獒微子之命蔡仲之命周官君陳畢命君牙冏命合舊音閤又如字下同臯音高本又作咎陶音遥本又作繇盤歩干反本又作般復扶又反下同五十九篇即今所行五十八篇其一是百篇之序其餘錯亂摩滅謂虞書汩作九共九篇槀飫夏書帝告釐沃湯征汝鳩汝方商書夏社疑至臣扈典實明居肆命徂后沃丁咸又四篇伊陟原命仲丁河亶甲祖乙髙宗之訓周書分器旅巢命歸未嘉禾成王政將蒲姑賄肅慎之命亳姑凡四十二篇亡上時掌反疏正義曰既云王不壞宅以懼神靈因還其書已前所得言悉以書還孔氏則上傳論語孝經等皆還之故言悉也科斗書古文也所謂蒼頡本體周所用之以今所不識是古人所為故名古文形多頭麤尾細狀腹團圓似水蟲之科斗故曰科斗也以古文經秦不用故云廢已久矣時人無能知識者孔君以人無能知識之故已欲傳之故以所聞伏生之書比校起發考論古文之義考文而云義者以上下事義推考其文故云義也定其可知者就古文内定可知識者為隷古定不言就伏生之書而云以其所聞者明用伏生書外亦考之故云可知者謂并伏生書外有可知不徒伏生書内而已言𨽻古者正謂就古文體而從𨽻定之存古為可慕以𨽻為可識故曰𨽻古以雖𨽻而猶古由此故謂孔君所傳為古文也古文者蒼頡舊體周世所用之文字案班固漢志及許氏説文書本有六體一曰指事上下二曰象形日月三曰形聲江河四曰會意武信五曰轉注考老六曰假借令長此造字之本也自蒼頡以至今字體雖變此本皆同古今不易也自蒼頡以至周宣皆蒼頡之體未聞其異宣王紀其史籀始有大篆十五篇號曰篆籀惟篆與蒼頡二體而已衞恒曰蒼頡造書觀於鳥跡因而遂滋則謂之字字有六義其文至於三代不改及秦用篆書焚燒先代典籍古文絶矣許慎説文言自秦有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書亡新居攝以應制作改定古文使甄豐校定時有六書一曰古文孔子壁内書也二曰竒字即古字有異者三曰篆書即小篆下杜人程邈所作也四曰佐書秦隷書也五曰繆篆所以摹印也六曰鳥蟲書所以書幡信也由此而論即秦罷古文而有八體非古文矣以至亡新六書并八體亦用書之六體以造其字其亡新六書於秦八體用其小篆蟲書摹印𨽻書去其大篆刻符殳書署書而加以古文與竒字其刻符及署書蓋同摹印殳書同於繆篆大篆正古文之別以慕古故乃用古文與竒字而不用大篆也是孔子壁内古文即蒼頡之體故鄭𤣥云書初出屋壁皆周時象形文字今所謂科斗書以形言之為科斗指體即周之古文鄭𤣥知者若於周時秦世所有至漢猶當識之不得云無能知者又亡新古文亦云即孔氏壁内古文是其證也或以古文即大篆非也何者八體六書自大篆與古文不同又秦有大篆若大篆是古文不得云古文遂絶以此知大篆非古文也六書古文與蟲書本別則蟲書非科斗書也鄭𤣥云周之象形文字者總指六書象科斗之形不謂六書之内一曰象形也又云更以竹簡寫之明留其壁内之本也顧氏云策長二尺四寸簡長一尺二寸増多伏生二十五篇者以壁内古文篇題殊別故知以舜典合於堯典益稷合於臯陶謨伏生之本亦壁内古文而合之者蓋以老而口授之時因誦而連之故殊耳其盤庚本當同卷故有并也康王之誥以一時之事連誦而同卷當以王出在應門之内為篇首及以王若曰庶邦亦誤失以伏生本二十八篇盤庚岀二篇加舜典益稷康王之誥凡五篇為三十三篇加所增二十五篇為五十八加序一篇為五十九故云復出此篇并序凡五十九篇此云為四十六卷者謂除序也下云定五十八篇既畢不更云卷數明四十六卷故爾又伏生二十九卷而序在外故知然矣此云四十六卷者不見安國明説蓋以同序者同卷異序者異卷故五十八篇為四十六卷何者五十八篇内有太甲盤庚説命泰誓皆三篇共卷減其八又大禹謨臯陶謨益稷又三篇同序共卷其康誥酒誥梓材亦三篇同序共卷則又減四通前十二以五十八減十二非四十六卷而何其康王之誥乃與顧命別卷以別序故也其餘錯亂摩滅五十八篇外四十二篇也以不可復知亦上送官其可知者已用竹簡寫得其本亦俱送入府故在祕府得有古文也以後生可畏或賢聖間出故須藏之以待能整理讀之者承詔為五十九篇作傳於是遂研精覃思博考經籍採摭羣言以立訓傳約文申義敷暢厥㫖庶幾有補於將來音義為于偽反覃徒南反深也思息嗣反採本又作采摭之石反一音之若反敷芳夫反暢丑亮反疏正義曰安國時為武帝博士孔君考正古文之日帝之所知亦既定訖當以聞於帝帝令注解故云承詔為五十九篇作傳以注者多言曰傳傳者傳通故也以傳名出自丘明賓牟賈對孔子曰史失其傳又喪服儒者皆云子夏作傳是傳名乆矣但大率秦漢之際多名為傳於後儒者以其傳多或有改之別云注解者仍有同者以當時之意耳説者為例云前漢稱傳於後皆稱注誤矣何者馬融王肅亦稱注名為傳傳何有例乎以聖道𢎞深當須詳悉於是研覈精審覃靜思慮以求其理冀免乖違既顧察經文又取證於外故須廣博推考羣經六籍又捃拾採摭羣書之言以此文證造立訓解為之作傳明不率爾雖復廣證亦不煩多為傳直約省文令得申盡其義明文要義通不假煩多也以此得申故能徧布通暢書之㫖意是辭達而已不求於煩既義暢而文要則觀者曉悟故云庶㡬有所補益於將來讀之者得悟而有益也敷布也厥其也庶幸也㡬冀也爾雅有訓既云經籍又稱羣言者經籍五經是也羣言子史是也以書與經籍理相因通故云博考子史時有所須故云採摭耳案孔君此傳辭㫖不多是約文也要文無不解是申義也其義既申故云敷暢其義之㫖趣耳考其此注不但言少書之為言多須詁訓而孔君為例一訓之後重訓者少此亦約文也書序序所以為作者之意昭然義見宜相附近故引之各冠其篇首定五十八篇既畢會國有巫蠱事經籍道息用不復以聞傳之子孫以貽後代若好古博雅君子與我同志亦所不隱也音義為于偽反又如字見賢遍反冠工亂反巫蠱漢武帝末征和中江充造蠱敗戾太子故經籍道息焉巫音無蠱音古貽以之反遺也疏正義曰孔君既言已立傳之意又當斟酌所宜而書序雖名為序不是總陳書意汎論乃篇篇各序作意但作序者不敢厠於正經故謙而聚於下而注述者不可代作者之謙須從利益而欲分之從便云序序所以當篇為作此書之意則是當篇作意觀序而昭然意義顯見既義見由序宜各與其本篇相從附近不宜聚於一處故毎篇引而分之各冠加於篇首令意昭見序既分散損其一篇故定五十八篇然此本承詔而作作畢當以上奏聞知但會值國家有巫蠱之事好愛經籍之道滅息假奏亦不能行用為此之故不復以此傳奏聞亦以既傳成不得聞上惟自傳於已之子孫以遺與後世之人使行之亦不敢望後世必行故云若後世有好愛古道廣博學問志懐雅正如此之君子冀能與我同於慕古之志以行我道我道得此人流行亦所以傳不隠蔽是𢎞道由人也言巫蠱者王制曰執左道以亂政者殺鄭𤣥注云左道謂巫蠱之屬以非正道故謂之左道以蠱皆巫之所行故云巫蠱蠱者總名左傳云惑蠱其君則蠱者怪惑之名指體則藥毒害人者是若行符厭俗之為魅令人蠱惑夭年傷性皆是也依漢書此時武帝末年上已年老淫惑鬼神崇信巫術由此姦人江充因而行詐先於太子宫埋桐人告上云太子宫有蠱氣上信之使江充治之於太子宮果得桐人太子知己不為此以江充故為䧟己因而殺之而帝不知太子實心謂江充言為實即詔丞相劉屈氂發三輔兵討之太子釋長安囚與鬭不勝而出走奔湖遂自殺此即巫蠱事也言不隱者不謂恐隱藏已道以已道人所不知懼其幽隱人能行之使顯為不隱蔽耳易曰謙謙君子仁者好謙而孔君自作揄揚云君子知己者亦意在教世欲令人覩此言知己傳是深逺因而有所曉寤令之有益故不可以茍謙也亦猶孔子曰何有於我㢤尚書序尚書序考證古者伏犧氏之王天下也疏其緯文鄙近不出聖人前賢共疑有所不取通人考正偽起哀平則孔君之時未有此緯何可引以為難乎臣召南按漢人注經大有功於聖籍其過則在執緯以誣經唐人疏經亦大有功於前賢其過則在屈經以從注若此疏原本張衡力闢邪説可謂懸諸日月而不刋者矣夫安國當孝武時未嘗有緯况可誣緯為孔子所作乎穎達於此序毅然呵之乃其疏毛詩疏禮記又曲䕶康成箋注凡所引緯必巧為附會以伸其説是何意也宋歐陽修嘗言孔疏所載既博所擇不精欲刪䜟緯之文然後經義純一無雜至言哉伏犧神農黄帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也王應麟曰前言謂臯夔稷契有何書可讀理實未然黄帝顓頊之道在丹書武王所以端絻東面而受於師尚父也少皡氏之紀官夫子所以見郯子而學也孰謂無書可讀哉疏按周禮外史職掌三皇五帝之書臣浩按監本作小史掌三皇五帝之書非也小史但掌邦國之志奠繫世辨昭穆耳今据周禮改正臣召南按孔疏引周禮外史所掌以証三皇五帝之書可謂確當但周禮祗云三皇五帝之書不云皇名三墳帝名五典也左傳所謂左史倚相能讀三墳五典八索九丘者亦無明文孰為三皇之書孰為五帝之書故康成注周禮但引左傳而不實指其名至杜預注左傳但云皆古書名并不略援周禮葢其慎也左傳正義亦出穎達之手先引孔傳此文旁及賈逵馬融康成三説而斷之云此諸家者各以意言無正騐杜所不信較此疏為尤確矣述職方以除九丘劉敞曰虞書有九共九篇應作九􅉌古文􅉌作與共相近故誤傳以為共耳孔序曰述職方以除九丘按職方氏之書一官所守耳周禮出於周公仲尼未嘗刪述而云除九丘乎用藏其家書於屋壁疏子襄以秦法峻急壁中藏其家書是安國祖藏之臣召南按藏書於壁説亦不同此疏作子襄是孔鮒弟即家語所謂孔騰也漢記尹敏傳云是孔鮒隋書志云是孔惠陸氏經典釋文亦然為𨽻古定疏正謂就古文體而從𨽻定之鄭樵曰古文之別十有三而科斗者特水蟲也古文之體不一漢儒總謂之科斗今之所謂古文者有上古之文科斗之類是也有中古之文史籕大篆是也有𨽻古之文孔安國以𨽻存古是也皆謂之古文書序序所以為作者之意朱子曰小序斷不是孔子作又曰是周秦間低手人作金履祥曰方漢初時泰誓且有偽書何况書序之類孫寶侗曰逸書之名亦多不典如左傳定四年祝佗告萇𢎞其言魯曰命以伯禽言衞曰命以康誥言晉曰命以唐誥是則伯禽之命康誥唐誥周書之三篇孔子所必録也為書序者不知不列篇名於百篇之内疎漏顯然是則不但書序可疑并百篇之名亦未可信矣顧炎武曰今攷傳記引書並無序所亡四十二篇之文則篇名葢未可信臣召南按書序不知誰作與安國同時而信書序者有司馬遷於夏商周本紀中凡逸篇之名俱載尚書序考證尚書注疏原目虞書音義凡十六篇十一篇亡五篇見存堯典第一疏古文尚書堯典第一一正義曰檢古本并石經直言堯典第無古文尚書以孔君從隸古仍號古文故後人因而題於此以別伏生所出大小夏侯及歐陽所傳為今文故也堯典第一篇之名當與衆篇相次第訓為次也於次第之内而處一故曰堯典第一以此第一者以五帝之末接三王之初典策既備因機成務交代揖讓以垂無為故為第一也然書者理由舜史勒成一家可以為法上取堯事下終禪禹以至舜終皆為舜史所錄其堯舜之典多陳行事之狀其言寡矣禹貢即全非君言準之後代不應入書此其一體之異以此禹之身事於禪後無入夏書之理自甘誓已下皆多言辭則古史所書於是乎始知五子之歌亦非上言典書草創以義而錄但致言有本各隨其事檢其此體為例有十一曰典二曰謨三曰貢四曰歌五曰誓六曰誥七曰訓八曰命九曰征十曰範堯典舜典二篇典也大禹謨臯陶謨二篇謨也禹貢一篇貢也五子之歌一篇歌也甘誓泰誓三篇湯誓牧誓費誓泰誓八篇誓也仲虺之誥湯誥大誥康誥酒誥召誥洛誥康王之誥八篇誥也伊訓一篇訓也説命三篇微子之命蔡仲之命顧命畢命冏命文侯之命九篇命也𦙍征一篇征也洪範一篇範也此各隨事而言益稷亦謨也因其人稱言以別之其太甲咸有一德伊尹訓道王亦訓之類盤庚亦誥也故王肅云不言誥何也取其徙而立功非但錄其誥髙宗肜日與訓序連文亦訓辭可知也西伯戡黎云祖伊恐奔告于受亦誥也武成云識其政事亦誥也旅獒戒王亦訓也金縢自為一體祝亦誥辭也梓材酒誥分出亦誥也多士以王命誥自然誥也無逸戒王亦訓也君奭周公誥召公亦誥也多方周官上誥於下亦誥也君陳君牙與畢公之類亦命也呂刑陳刑告王亦誥也書篇之名因事而立既無體例隨便為文其百篇次第於序孔鄭不同孔以湯誓在夏社前於百篇為第二十六鄭以為在臣扈後第二十九孔以咸有一徳次太甲後第四十鄭以為在湯誥後第三十二孔以蔡仲之命次君奭後第八十三鄭以為在費誓前第九十六孔以周官在立政後第八十八鄭以為在立政前第八十六孔以費誓在文侯之命後第九十九鄭以為在呂刑前第九十七不同者孔依壁内篇次及序為文鄭依賈氏所奏別錄為次孔未入學官以此不同考論次第孔義是也虞書疏正義曰堯典雖曰唐事本以虞史所錄末言舜登庸由堯故追堯作典非唐史所錄故謂之虞書也鄭𤣥云舜之美事在於堯時是也案馬融鄭𤣥王肅別錄題皆曰虞夏書以虞夏同科雖虞事亦連夏此直言虞書本無尚書之題也案鄭序以為虞夏書二十篇商書四十篇周書四十篇贊云三科之條五家之教是虞夏同科也其孔於禹貢註云禹之王以是功故為夏書之首則禹夏別題也以上為虞書則十六篇又帝告釐沃湯征汝鳩汝方於鄭𤣥為商書而孔并於𦙍征之下或以為夏事猶西伯戡黎則夏書九篇商書三十五篇此與鄭異也或孔因帝告以下五篇亡并註於夏書不廢猶商書乎別文所引皆云虞書曰夏書曰無并言虞夏書者又伏生雖有一虞夏傳以外亦有虞傳夏傳此其所以宜別也此孔依虞夏各別而存之莊八年左傳云夏書曰臯陶邁種徳僖二十四年左傳引夏書曰地平天成二十七年引夏書賦納以言襄二十六年引夏書曰與其殺不辜寜失不經皆在大禹謨臯陶謨當云虞書而云夏書者以事關禹故引為夏書若洪範以為周書以箕子至周商人所陳而傳引之即曰商書也案壁内所得孔為傳者凡五十八篇為四十六卷三十三篇與鄭注同二十五篇増多鄭注也其二十五篇者大禹謨一五子之歌二𦙍征三仲虺之誥四湯誥五伊訓六太甲三篇九咸有一徳十説命三篇十三泰誓三篇十六武成十七旅獒十八微子之命十九蔡仲之命二十周官二十一君陳二十二畢命二十三君牙二十四冏命二十五但孔君所傳值巫蠱不行以終前漢諸儒知孔本有五十八篇不見孔傳遂有張霸之徒於鄭注之外偽造尚書凡二十四篇以足鄭注三十四篇為五十八篇其數雖與孔同其篇有異孔則於伏生所傳二十九篇内無古文泰誓除序尚二十八篇分出舜典益稷盤庚二篇康王之誥為三十三増二十五篇為五十八篇鄭𤣥則於伏生二十九篇之内分出盤庚二篇康王之誥又泰誓三篇為三十四篇更增益偽書二十四篇為五十八所增益二十四篇者則鄭注書序舜典一汩作二九共九篇十一大禹謨十二益稷十三五子之歌十四𦙍征十五湯誥十六咸有一徳十七典寳十八伊訓十九肆命二十原命二十一武成二十二旅獒二十三冏命二十四以此二十四為十六卷以九共九篇共卷除八篇故為十六故藝文志劉向別錄云五十八篇藝文志又云孔安國者孔子後也悉得其書以古文又多十六篇篇即卷也即是偽書二十四篇也劉向作別錄班固作藝文志並云此言不見孔傳也劉歆作三統歴論武王伐紂引今文泰誓云丙午逮師又引武成越若來三月五日甲子咸劉商王受並不與孔同亦不見孔傳也後漢初賈逵奏尚書疏云流為烏是與孔亦異也馬融書序云經傳所引泰誓泰誓並無此文又云逸十六篇絶無師説是融亦不見也服䖍杜預注左傳亂其紀綱並云夏桀時服䖍杜預皆不見也鄭𤣥亦不見之故注書序舜典云入麓伐木注五子之歌云避亂於洛汭注𦙍征云𦙍征臣名又注禹貢引𦙍征云厥篚𤣥黄昭我周王又注咸有一徳云伊陟臣扈曰又注典寶引伊訓云載孚在亳又曰征是三朡又注旅獒云獒讀曰豪謂是酋豪之長又古文有仲虺之誥太甲説命等見在而云亡其汩作典寶之等一十三篇見亡而云已逸是不見古文也案伏生所傳三十四篇者謂之今文則夏侯勝夏侯建歐陽和伯等三家所傳及後漢末蔡邕所勒石經是也孔所傳者膠東庸生劉歆賈逵馬融等所傳是也鄭𤣥書贊云我先師棘子下生安國亦好此學衛賈馬二三君子之業則雅才好博既宣之矣又云歐陽氏失其本義今疾此蔽冒猶復疑惑未悛是鄭意師祖孔學傳授膠東庸生劉歆賈逵馬融等學而賤夏侯歐陽等何意鄭注尚書亡逸並與孔異篇數並與三家同又劉歆賈逵馬融之等並傳孔學云十六篇逸與安國不同者良由孔注之後其書散逸傳注不行以庸生賈馬之等惟傳孔學經文三十三篇故鄭與三家同以為古文而鄭承其後所注皆同賈逵馬融之學題曰古文尚書篇與夏侯等同而經字多異夏侯等書宅嵎夷為宅嵎䥫昧谷曰栁谷心腹腎腸曰憂腎陽劓刵劅剠云臏宫劓割頭庶剠是鄭注不同也三家之學傳孔業者漢書儒林傳云安國傳都尉朝子俊俊傳膠東庸生生傳清河胡常常傳徐敖敖傳王璜及塗惲惲傳河南桑欽至後漢初衛賈馬亦傳孔學故書贊云自世祖興後漢衛賈馬二三君子之業是也所得傳者三十三篇古經亦無其五十八篇及傳説絶無傳者至晉世王肅注書始似竊見孔傳故注亂其紀網為夏太康時又晉書皇甫謐傳云姑子外弟梁栁邊得古文尚書故作帝王世紀往往載孔傳五十八篇之書晉書又云晉太保公鄭沖以古文授扶風蘇愉愉字休預預授天水梁栁字洪季即謐之外弟也季授城陽臧曹字彦始始授郡守子汝南梅頤字仲真又為豫章内史遂於前晉奏上其書而施行焉時已亡失舜典一篇晉末范甯為解時己不得焉至齊蕭鸞建武四年姚方興於大航頭得而獻之議者以為孔安國之所注也值方興有罪事亦隨寢至隋開皇二年購募遺典乃得其篇焉然孔注之後厯及後漢之末無人傳説至晉之初猶得存者雖不列學官散在民間事雖久逺故得猶存孔氏傳傳即注也以傳述為義舊説漢已前稱傳疏正義曰以注者多門故云某氏以別衆家或當時自題孔氏亦可以後人辨之舜典第二音義王氏注相承云梅賾上孔氏傳古文尚書云舜典一篇時以王肅注頗類孔氏故取王注從眘徽五典以下為舜典以續孔傳徐仙氏亦音此本今依舊音之大禹謨第三音義徐云本虞書總為一卷凡一十二卷今依七志七錄為十卷臯陶謨第四益稷第五夏書禹貢第一甘誓第二五子之歌第三𦙍征第四商書音義凡三十四篇十七篇存湯誓第一仲虺之誥第二湯誥第三伊訓第四太甲上第五太甲中第六太甲下第七咸有一德第八盤庚上第九盤庚中第十盤庚下第十一説命上第十二説命中第十三説命下第十四髙宗肜日第十五西伯戡黎第十六微子第十七周書泰誓上第一泰誓中第二泰誓下第三牧誓第四武成第五洪範第六旅獒第七金縢第八大誥第九微子之命第十康誥第十一酒誥第十二梓材第十三召誥第十四洛誥第十五多士第十六無逸第十七君奭第十八蔡仲之命第十九多方第二十立政第二十一周官第二十二君陳第二十三顧命第二十四康王之誥第二十五畢命第二十六君牙第二十七冏命第二十八呂刑第二十九文侯之命第三十費誓第三十一秦誓第三十二尚書注疏原目尚書注疏原目考證虞書音義凡十六篇十一篇亡五篇見存臣浩按此段音義監本刻在堯典第一之下非也堯典祗一篇安得有十六篇乎此總計虞書自堯典舜典至九共九篇凡十六篇耳今改正堯典第一疏禹貢即全非君言凖之後代不應入書臣召南按孔疏殊誤左右史分記言動尚書重在紀言此亦論其大致則然在古人原無一定之例也且疏謂甘誓以下始多言辭右史所書於是乎始斯又誤矣武成金縢不專敘事乎虞書疏非唐史所録故謂之虞書也顧炎武曰竊疑古時有堯典無舜典有夏書無虞書而堯典亦夏書也孟子引二十有八載而謂之堯典左傳所引虞書皆謂之夏書周語内史過引衆非元后何戴二句亦謂之夏書則後之目為虞書者贅矣何則記此書必出於夏之史臣雖傳之自唐而潤色成文不無待於後人故篇首言曰若稽古以古為言明非當日之記也世更三聖事同一家以夏之臣追記二帝之事不謂之夏書而何又疏按壁内所得孔為傳者凡五十八篇顧炎武曰漢時尚書今文與古文為二而古文又自有二藝文志曰尚書古文經四十六卷為五十七篇師古曰安國承詔作傳引序各冠其篇首定五十八篇鄭元序贊云後又亡其一篇故五十七藝文志又曰經二十九卷大小夏侯二家歐陽經三十二卷師古曰此二十九卷伏生傳授者此今文與古文為二也儒林傳曰世所傳百兩篇者出東萊張覇成帝時求其古文者覇以能為百兩徴以中書校之非是此又孔氏古文與張覇之書為二也後漢書儒林傳曰孔僖魯人也自安國以下世傳古文尚書又曰扶風杜林傳古文尚書林同郡賈逵為之作訓馬融作傳鄭元注解由是古文尚書遂顯於世然則安國所傳以至孔僖者竟無其傳而杜林賈逵馬融鄭元則不見安國傳而為之作訓作傳作注解此則孔鄭之學又當為二而無可考矣臣召南按張覇之百兩篇偽古文也而賈馬鄭所解之古文則就伏生所傳之二十八篇其字句稍異於歐陽夏侯三家故亦稱古文尚書耳然賈馬鄭皆未見古文全經亦並未見孔傳是以注解不同穎達疏詳核矣又疏姑子外弟梁栁邊得古文尚書臣召南按邊字衍文梁栁即皇甫謐姑子外弟也但推詳文義姑子上似脱從字言謐從栁得古文尚書乃作帝王世紀耳又疏至隋開皇二年購募遺典鄭樵曰古文遭秦而失其半其半存者又𨼆而不見自漢武征和二年巫蠱事起至隋開皇二年凡六百七十餘嵗然後五十八篇得傳於學者而大備自開皇二年至唐天寶三載又百六十餘嵗始改古𨽻而從今文馬端臨曰唐藝文志有今文尚書十三卷注言元宗詔集賢學士衛包改古文從今文然則漢所謂古文者科斗書今文者𨽻書也唐所謂古文者𨽻書今文者世所通用之俗字也尚書注疏原目考證尚書注解傳述人唐國子博士兼太子中允贈齊州刺史呉縣開國男陸徳明錄書者本王之號令右史所記孔子刪録斷自唐虞下訖秦穆典謨訓誥誓命之文凡百篇而為之序及秦禁學孔子之末孫惠壁藏之家語云孔騰字子襄畏秦法峻急藏尚書孝經論語於夫子舊堂壁中漢紀尹敏傳以為孔鮒藏之漢興欲立尚書無能通者聞濟南伏生名勝故秦博士傳之文帝欲徴時年已九十餘不能行於是詔太常使掌故晁錯受焉古文尚書云伏生年老不能正言言不可曉使其女傳言教錯伏生失其本經口誦二十九篇傳授漢書云伏生為秦禁書壁藏之漢定伏生求其書亡數十篇獨得二十九篇以教齊魯之間以其上古之書謂之尚書鄭𤣥以為孔子撰書尊而命之曰尚書尚者上也蓋言若天書然王肅云上所言下為史所書故曰尚書伏生授濟南張生千乘歐陽生字和伯千乘人生授同郡兒寛御史大夫寛又從孔安國受業以授歐陽生之子歐陽大小夏侯尚書皆出於寛歐陽氏世傳業至曾孫髙作尚書章句為歐陽氏學髙孫地餘字長賓侍中少府以書授元帝傳至歐陽歙字正思後漢大司徒歙以上八世皆為博士濟南林尊字長賓為博士論石渠官至少府太子太傅受尚書於歐陽髙以授平當字子思下邑人徙平陵官至丞相封侯子晏亦明經至大司徒及陳翁生梁人信都太傅家世傳業翁生授殷崇琅邪人為博士及龔勝字君賓楚人右扶風當授朱普字公文九江人為博士及鮑宣字子都勃海人官至司𨽻後漢濟隂曹曾字伯山諫大夫受業於歐陽歙傳其子祉河南尹又陳留陳弇字叔明受業於丁鴻樂安牟長字君髙河内太守中散大夫竝傳歐陽尚書沛國桓榮字春卿太子太傅太常五更關内侯受尚書於朱普東觀漢記云榮事九江朱文文即普字以授漢明帝遂世相傳東京最盛漢紀云門生為公卿者甚衆學者慕之以為法榮子郁以書授和帝而官至侍中太常郁子焉復以書授安帝官至太子太傅太尉張生濟南人為博士授夏侯都尉魯人都尉傳族子始昌始昌通五經以齊詩尚書教授為昌邑太傅始昌傳族子勝字長公後屬東平長信少府太子太傅勝從始昌受尚書及洪範五行傳説災異又事同郡簡卿卿者兒寛門人又從歐陽氏問為學精熟所問非一師善説禮服受詔撰尚書論語説藝文志夏侯勝尚書章句二十九卷號為大夏侯氏學傳齊人周堪堪字少卿太子少傅光禄勲及魯國孔霸字次􅐐孔子十三世孫為博士以書授元帝官至太中大夫闗内侯號襃成君霸傳子光字子夏丞相博山侯光又事牟卿堪授魯國牟卿為博士及長安許商字伯長四至九卿善算著五行論商授沛唐林字子高王莽時為九卿及平陵呉章字偉君王莽時博士重泉王吉字少音王莽時為九卿齊炔欽字幼卿王莽時博士後漢北海牟融亦傳大夏侯尚書夏侯建字長卿勝從父兄子為博士議郎太子少傅師事夏侯勝及歐陽髙左右采獲又從五經諸儒問與尚書相出入者牽引以次章句為小夏侯氏學傳平陵張山拊字長賓為博士論石渠至少府山拊授同縣李尋字子長騎都尉及鄭寛中字少君為博士授成帝官至光禄大夫領尚書事闗内侯山陽張無故字子儒廣陵太傅信都秦恭字延君城陽内史増師法至百萬言陳留假倉字子驕以謁者論石渠至膠東相寛中授東郡趙𤣥御史大夫無故授沛唐尊王莽太傅恭授魯馮賓為博士後漢東海王良亦傳小夏侯尚書漢宣帝本始中河内女子得泰誓一篇獻之與伏生所誦合三十篇漢世行之然泰誓年月不與序相應又不與左傳國語孟子衆書所引泰誓同馬鄭王肅諸儒皆疑之漢書儒林傳云百兩篇者出東萊張霸分析合二十九篇以為數十又采左傳書序為作首尾凡百二篇篇或數簡文意淺陋成帝時劉向校之非是後遂黜其書古文尚書者孔惠之所藏也魯恭王壞孔子舊宅漢景帝程姬之子名餘封於魯諡恭王於壁中得之禮論語孝經皆科斗文字博士孔安國字子國魯人孔子十二世孫受詩於魯申公官至諫大夫臨淮太守以校伏生所誦為𨽻古寫之增多伏生二十五篇藝文志云多十六篇又伏生誤合五篇凡五十九篇為四十六卷藝文志云尚書古文經四十六卷五十七篇安國又受詔為古文尚書傳值武帝末巫蠱事起經籍道息不獲奏上藏之私家安國并作古文論語古文孝經傳藝文志云安國獻尚書傳遭巫蠱事未列於學官以授都尉朝司馬遷亦從安國問故遷書多古文説劉向以中古文校歐陽大小夏侯三家經文脱誤甚衆藝文志云酒誥脱簡一召誥脱簡二文異者七百有餘脱字數十都尉朝授膠東庸生名譚亦傳論語庸生授清河胡常字少子以明穀梁春秋為博士至部刺史又傳左氏春秋常授虢徐敖右扶風掾又傳毛詩敖授琅邪王璜及平陸塗惲字子真惲授河南乘欽字君長一本作桑欽王莽時諸學皆立惲璜等貴顯范􅁮後漢書云中興扶風杜林傳古文尚書賈逵字景伯扶風人左中郎將侍中為之作訓馬融作傳鄭𤣥注解由是古文尚書遂顯于世案今馬鄭所注竝伏生所誦非古文也孔氏之本絶是以馬鄭杜預之徒皆謂之逸書王肅亦注今文而解大與古文相類或肅私見孔傳而秘之乎江左中興元帝時豫章内史梅賾字仲真汝南人奏上孔傳古文尚書亡舜典一篇購不能得乃取王肅注堯典從眘徽五典以下分為舜典篇以續之孔序謂伏生以舜典合於堯典孔傳堯典止説帝曰欽哉而馬鄭王之本同為堯典故取為舜典學徒遂盛後范甯字武子順陽人東晉豫章太守兼注穀梁變為今文集注俗間或取舜典篇以續孔氏齊明帝建武中呉興姚方興采馬王之注造孔傳舜典一篇云於大􅟘頭買得上之梁武時為博士議曰孔序稱伏生誤合五篇皆文相承接所以致誤舜典首有曰若稽古伏生雖昬耄何容合之遂不行用漢始立歐陽尚書宣帝復立大小夏侯博士平帝立古文永嘉喪亂衆家之書竝滅亡而古文孔傳始興置博士鄭氏亦置博士一人近唯崇古文馬鄭王注遂廢今以孔氏為正其舜典一篇仍用王肅本孔安國古文尚書傳十三卷馬融注十一卷字季長鄭𤣥注九卷王肅注十卷謝沈注十五卷字行思會稽人東晉尚書部郎領著作録一卷李顒注十卷字長林江夏人東晉本郡太守范甯集解十卷姜道盛集解十卷天水人宋給事中字道盛尚書大傳三卷伏生作為尚書音者四人孔安國鄭𤣥李軌徐邈案漢人不作音後人所託梁國子助教江夏費甝作義疏行於世尚書注解傳述人
