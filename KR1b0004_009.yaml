body:
  text: 尚書注疏卷九漢孔氏傳唐陸德明音義孔穎達疏商書説命上黎説命中西伯戡微子説命下髙宗肜日序髙宗夢得説傳盤庚弟小乙子名武丁德髙可尊故號髙宗夢得賢相其名曰説使百工營求諸野得諸傳巖傳使百官以所夢之形象經營求之於外野得之於傳巖之溪作説命三篇傳命説為相使攝政音義説本又作兌音悅注及下篇同相息亮反下同疏正義曰殷之賢王有髙宗者夢得賢相其名曰説羣臣之內既無其人使百官以所夢之形象經營求之於外野得之于傅氏之巖遂命以為相史敘其事作説命三篇傳正義曰世本云盤庚崩弟小辛立崩弟小乙立崩子武丁立是武丁為盤庚弟小乙子也喪服四制云髙宗者武丁武丁者殷之賢王也當此之時殷衰而復興禮廢而復起中而髙之故謂之髙宗是德髙可尊故號髙宗也經云爰立作相王呼之曰説知其名曰説以工為官見其求者衆多故舉百官言之使百官以所夢之形象經營求於外野皇甫謐云使百工寫其形象則謂工為工巧之人與孔異也釋水云水注川曰溪李巡曰水出於山入於川曰溪然則溪是水流之處巖是山崖之名序稱得諸傅巖傳云得之於傅巖之溪以巖是總名故序言之耳經稱爰立作相是命為相也惟説命總百官是使攝政也説命上傳始求得而命之疏正義曰此三篇上篇言夢説始求得而命之中篇説既總百官戒王為政下篇王欲師説而學説報王為學之有益王又厲説以伊尹之功相對以成章史分序以為三篇也王宅憂亮隂三祀傳隂默也居憂信默三年不言音義亮本人作諒如字又力章反疏正義曰言王居父憂信任冡宰默而不言已三年矣三年不言自是常事史録此句於首者謂既免喪事可以言而猶不言故述此以發端也傳正義曰隂者幽暗之義默亦暗義故為默也易稱君子之道或默或語則默者不言之謂也無逸傳云乃有信默三年不言有此信默則信謂信任冡宰也既免喪其惟弗言傳除喪猶不言政羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則傳知事則為明智明智則能制作法則天子惟君萬邦百官承式傳天下待令百官仰法王言惟作命不言臣下罔攸稟令傳稟受令亦命也王庸作書以誥曰以台正于四万惟恐德弗類茲故弗言傳用臣下怪之故作誥類善也我正四方恐德不善此故不言恭默思道夢帝賚豫良弼其代豫言傳夢天與我輔弼良佐將代我言政教乃審厥象俾以形旁求于天下傳審所夢之人刻其形象以四方旁求之於民間説築傅巖之野惟肖傳傅氏之巖在虞虢之界通道所經有澗水壞道常使胥靡刑人築護此道説賢而隱代胥靡築之以供食肖似似所夢之形音義哲本又作哲誥故報反台音怡賚力代反徐音來俾必爾反肖音笑虢寡白反壞音怪供音恭疏傳正義曰傳以傳為氏此巖以傅為名明巖傍有姓傳之氏故云傅氏之巖也尸子云傅巖在北海之洲傳言虞虢之界孔必有所案據而言之也史記殷本紀云是時説為胥靡築於傳險晉灼漢書音義云胥相也靡隨也古者相隨坐輕刑之名言於時築傅險則以杵築地傅説賢人必身不犯罪其言説為胥靡當是時代胥靡也傳云通道所經有澗水壞道常使胥靡刑人築護此道説賢而隱代胥靡築之以供食或亦有成文也殷本紀又云武丁得説舉以為相遂以傳險姓之號曰傳説鄭云得諸傅巖髙宗因以傅命説為氏案序直言夢得説不言傳或如馬鄭之言如髙宗始命為傅氏不知舊何氏也皇甫謐云髙宗夢天賜賢人胥靡之衣蒙之而來曰云我徒也姓傅名説天下得我者豈徒也哉武丁悟而推之曰傅者相也説者歡恱也天下當有傅我而説民者哉明以夢視百官百官皆非也乃使百工寫其形象求諸天下果見築者胥靡衣褐帶索執役於虞虢之間傅巖之野名説以其得之傅巖謂之傅説案謐言初夢即云姓傅名説又言得之傅巖謂之傅説其言自不相副謐惟見此書傅會為近世之語其言非實事也爰立作相王置諸其左右傳於是禮命立以為相使在左右命之曰朝夕納誨以輔台德傳言當納諫誨直辭以輔我德若金用汝作礪傳鐡須礪以成利器若濟巨川用汝作舟楫傳渡大水待舟楫若嵗大旱用汝作霖雨傳霖三日雨霖以救旱疏傳正義曰隱九年左傳云凡雨自三日已往為霖啓乃心沃朕心若藥弗瞑眩厥疾弗瘳傳開汝心以沃我心如服藥必暝眩極其病乃除欲其出切言以自警音義朝張遙反礪力世反楫音接徐音集瞑莫遍反眩玄遍反徐又呼縣反瞑眩困極也瘳敕留反警音景疏正義曰當開汝心所有以灌沃我心欲令以彼所見教己未知故也其沃我心須切至若服藥不使人瞑眩憒亂則其疾不得瘳愈言藥毒乃得除病言切乃得去惑也傳正義曰瞑眩者令人憒悶之意也方言云凡飲藥而毒東齊海岱間或謂之瞑或謂之眩郭璞云瞑眩亦通語也然則藥之攻病先使人瞑眩憒亂病乃得瘳傳言瞑眩極者言悶極藥乃行也椘語稱衛武公作懿以自警懿即大雅抑詩也切言出於傅説據王以為自警也若跣弗視地厥足用傷傳跣必視地足乃無害言欲使為己視聽音義跣先典反徐七顯反為于偽反惟暨乃僚罔不同心以匡乃辟傳與汝並官皆當倡率無不同心以匡正汝君音義辟必亦反俾率先王迪我高后以康兆民傳言匡正汝君使循先王之道蹈成湯之蹤以安天下嗚呼欽豫時命其惟有終傳敬我是命修其職使有終説復于王曰惟木從繩則正后從諫則聖傳言木以繩直君以諫明后克聖臣不命其承傳君能受諫則臣不待命其承意而諫之疇敢不祇若王之休命傳言王如此誰敢不敬順王之美命而諫者乎説命中惟説命總百官傳在冢宰之任音義總音總疏正義曰惟此傅説受王命總百官之職謂在冢宰之任也説以官髙任重乃進言於王故史特標此句為發言之端也乃進于王曰嗚呼明王奉若天道建邦設都傳天有日月北斗五星二十八宿皆有尊卑相正之法言明王奉順此道以立國設都音義宿音秀疏傳正義曰晉語云大者天地其次君臣易繫辭云天垂象見吉凶聖人象之皆言人君法天以設官順天以致治也天有日月照臨晝夜猶王官之伯率領諸侯也北斗環繞北極猶卿士之周衛天子也五星行於列宿猶州牧之省察諸侯也二十八宿布於四方猶諸侯為天子守土也天象皆有尊卑相正之法言明王奉順天道以立國設都也立國謂立王國及邦國設都謂設帝都及諸侯國都總言建國立家之事樹后王君公承以大夫師長傳言立君臣上下將陳為治之本故先舉其始音義王于方反長丁丈反治直吏反下同疏正義曰此又總言設官分職之事也樹立也后王謂天子也君公謂諸侯也承者奉上之名后王君公人主也大夫師長人臣也臣當奉行君命故以承言之周禮立官多以師為名師者衆所法亦是長之義也大夫已下分職不同每官各有其長故以師長言之三公則君公之內包之卿則大夫之文兼之師長之言亦通有上將陳為治之本故先舉其始略言設官故辭不詳備為治之本惟天聰明已下皆是也不惟逸豫惟以亂民傳不使有位者逸豫民上言立之主使治民音義豫羊慮反惟天聰明惟聖時憲惟臣欽若惟民從乂傳憲法也言聖王法天以立教臣敬順而奉之民以從上為治音義從才容反疏正義曰憲法釋詀文人之聞見在於耳目天無形體假人事以言之聰謂無所不聞明謂無所不見惟聖人於是法天言聖王法天以立教於下無不聞見除其所惡納之於善雖復運有推移道有升降其所施為未嘗不法天也臣敬順而奉之奉即上文承也奉承君命而布之於民民以從上為治不從上命則亂故從乂也惟口起羞惟甲胄起戎傳甲鎧胄兜鍪也言不可輕教令易用兵惟衣裳在笥惟干戈省厥躬傳言服不可加非其人兵不可任非其才音義胄直又反鎧苦代反兜丁侯反鍪莫侯反易以䜴反笥息嗣反省息井反一本作眚疏正義曰言王者法天施化其舉止不可不慎惟口出令不善以起羞辱惟甲胄伐非其罪以起戎兵言不可輕教令易用兵也惟衣裳在篋笥不可加非其人觀其能足稱職然後賜之惟干戈在府庫不可任非其才省其身堪將帥然後授之上二句事相類下二句文不同者衣裳言在篋笥干戈不言所在干戈云省厥躬衣裳不言視其人令其互相足也傳正義曰經傳之文無鎧與兜鍪蓋秦漢已來始有此名傳以今曉古也古之甲胄皆用犀兕未有用鐡者而鍪鎧之字皆從金蓋後世始用鐡耳口之出言為教令甲胄興師乃用之言不可輕教令易用兵也易亦輕也安危在出令令之不善則人違背之是起羞也靜亂在用兵伐之無罪則人叛違之是起戎也非其人非其才義同而互文也周禮犬宗伯以九儀之命正邦國之位一命受職再命受服三命受位四命受器五命賜則六命賜官士命賜國八命作牧九命作伯鄭云一命始見命為正吏受職治職事也列國之士一命王之下士亦一命再命受服受玄冕之服列國之大夫再命王之中士亦再命然則再命已上始受衣服未賜之時在官之篋笥也甲胄干戈俱是軍器上言不可輕用兵此言不可妄委人雖文重而意異也王惟戒兹允茲克明乃罔不休傳言王戒慎此四惟之事信能明政乃無不美惟治亂在庶官傳言所官得人則治失人則亂官不及私昵惟其能傳不加私昵惟能是官爵罔及惡德惟其賢傳言非賢不爵音義昵女乙反疏正義曰王制云論定然後官之任官然後爵之鄭云官之使之試守也爵之命之也然則治其事謂之官受其位謂之爵官爵一也所從言之異耳賢謂德行能謂才用治事必用能故官云惟其能受位宜得賢故爵云惟其賢詩序云任賢使能周禮鄉大夫三年則大比考其德行道藝而興賢者能者鄭云賢者有德行者能者有道藝者是賢能為異耳私昵謂知其不可而用之惡德謂不知其非而任之戒王使審求人絶私好也慮善以動動惟厥時傳非善非時不可動有其善喪厥善矜其能喪厥功傳雖天子亦必讓以得之音義喪息浪反疏正義曰人性尚謙讓而憎自取自有其善則人不以為善故實善而喪其善自誇其能則人不以為能故實能而喪其能由其自取故人不與之有其善即伐善也舜美禹云汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功是言推而不有故名反歸之也惟事事乃其有備有備無患傳事事非一事無啓寵納侮傳開寵非其人則納侮之道疏正義曰君子位髙益恭小人得寵則慢若寵小人則必恃寵慢主無得間小人以寵自納此輕侮也開謂君出恩以寵臣納謂臣入慢以輕主據君而言開納以出入為文也無恥過作非傳恥過誤而文之遂成大非疏傳正義曰仲虺之美成湯云改過不吝明小人有過皆惜而不改論語云小人之過也必文恥有過誤而更以言辭文飾之望人不覺其非彌甚故遂成大非也惟厥攸居政事惟醇傳其所居行皆如所言則王之政事醇粹黷于祭祀時謂弗欽禮煩則亂事神則難傳祭不欲數數則黷黷則不敬事神禮煩則亂而難行髙宗之祀特豐數近廟故説因以戒之音義醇音純粹雖遂反黷徒木反數色角反疏傳正義曰祭不欲數數則黷黷則不敬禮記祭義文也此一經皆言祭祀之事禮煩亦謂祭祀之煩故傳總云事神禮煩則亂而難行孔以髙宗肜日祖己訓諸王祀無豐于昵謂傅説此言為彼事而發故云髙宗之祀特豐數於近廟故説因而戒之王曰旨哉説乃言惟服傳旨美也美其所言皆可服行乃不良于言豫罔聞于行傳汝若不善於所言則我無聞於所行之事説拜稽首曰非知之艱行之惟艱傳言知之易行之難以勉髙宗王忱不艱允協于先王成德傳王心誠不以行之為難則信合於先王成德惟説不言有厥咎傳王能行善而説不言則有其咎罪音義忱市林反説命下王曰來汝説台小子舊學于甘盤傳學先王之道甘盤殷賢臣有道德者音義台音怡疏正義曰舊學于甘盤謂為王子時也君奭篇周公仰陳殷之賢臣云在武丁時則有若甘盤然則甘盤於髙宗之時有大功也上篇髙宗免喪不言即求傅説似得説時無賢臣矣蓋甘盤於小乙之世以為大臣小乙將崩受遺補政髙宗之初得有大功及髙宗免喪甘盤已死故君奭傳曰髙宗即位甘盤佐之後有傅説是言傅説之前有甘盤也但下句言既乃遁于荒野是學訖乃遁非即位之初從甘盤學也既乃遁于荒野入宅于河傳既學而中廢業遁居田野河洲也其父欲使髙宗知民之艱苦故使居民間音義遁徒頓反疏傳正義曰河是水名水不可居而云入宅于河知在河之洲也釋水云水中可居者曰洲初遁田野後入河洲言其徙居無常也無逸云其在髙宗時舊勞於外爰暨小人言其父欲使髙宗知民之艱苦故使居民間也於時蓋未為太子殷道雖質不可既為太子更得與民雜居自河徂亳暨厥終罔顯傳自河往居亳與今其終故遂無顯明之德爾惟訓于朕志傳言汝當教訓於我使我志通達若作酒醴爾惟麴糵傳酒醴須麴糵以成亦言我須汝以成若作和羹爾惟鹽梅傳鹽鹹梅醋羹須鹹醋以和之爾交修子罔豫棄豫惟克邁乃訓傳交非一之義邁行也言我能行汝教音義麴起六反糵魚列反羹音庚一音衡鹽余廉反梅亦作梅醋七故反和如字又胡臥反疏傳正義曰爾交修豫令其交更修治己也故以交為非一之義言交互教之非一事之義邁行釋言文説曰王人求多聞時惟建事學于古訓乃有獲傳王者求多聞以立事學於古訓乃有所得事不師古以克永世匪説攸聞傳事不法古訓而以能長世非説所聞言無是道惟學遜志務時敏厥修乃來傳學以順志務是敏疾其德之修乃來疏正義曰人志本欲求善欲學順人本志學能務是敏疾則其德之修乃自來言務之既疾則德自來歸己也允懷于兹道積于厥躬傳信懷此學志則道積於其身惟斆學半念終始典于學厥德修罔覺傳斆教也教然後知所困是學之半終始常念學則其德之修無能自覺音義斆户孝反疏正義曰教人然後知困知困必將自強惟教人乃是學之半言其功半於學也於學之法念終念始常在於學則其德之修漸漸進益無能自覺其進言日有所益不能自知也監于先王成憲其永無愆傳愆過也視先王成法其長無過其惟學乎音義愆起虔反惟説式克欽承旁招俊乂列于庶位傳言王能志學説亦用能敬承王志廣招俊乂使列衆官音義俊本又作畯王曰嗚呼説四海之內咸仰朕德時乃風傳風教也使天下皆仰我德是汝教音義仰如字徐五亮反股肱惟人良臣惟聖傳手足具乃成人有良臣乃成聖昔先正保衡作我先王傳保衡伊尹也作起正長也言先世長官之臣音義長丁丈反下同疏傳正義曰保衡阿衡俱伊尹也君奭傳曰伊尹為保衡言天下所取安所取平也鄭箋云阿倚衡平也伊尹湯所依倚而取平也故以為官名又云太甲時曰保衡鄭不見古文太甲云不惠于阿衡故此為解孔所不用計此阿衡保衡非常人之官名蓋當時特以此名號伊尹也作訓為起言起而助湯也正長釋詁文乃曰豫弗克俾厥后惟堯舜其心愧恥若撻于市傳言伊尹不能使其君如堯舜則恥之若見撻于市故成其能一夫不獲則曰時豫之辜傳伊尹見一夫不得其所則以為己罪佑我烈祖格于皇天傳言以此道左右成湯功至于天無能及者爾尚明保子罔俾阿衡專美有商傳汝庶幾明安我事則與伊尹同美惟后非賢不乂惟賢非后不食傳言君須賢治賢須君食其爾克紹乃辟于先王永綏民傳能繼汝君於先王長安民則汝亦有保衡之功説拜稽首曰敢對揚天子之休命傳對答也答受美命而稱揚之音義俾必爾反撻他達反何烏何反治直吏反辟必亦反序高宗祭成湯有飛雉升鼎耳而雊傳耳不聰之異雊鳴祖己訓諸王傳賢臣也以訓道諌王作高宗肜日高宗之訓傳所以訓也亡音義雊工豆反已音紀肜音融疏正義曰高宗祭其太祖成湯於肜祭之日有飛雉來升祭之鼎耳而雊鳴其臣祖己以為王有失德而致此祥遂以道義訓王勸王改修德政史敘其事作高宗肜日高宗之訓二篇傳正義曰經言肜日有雊雉不知祭何廟鳴何處故序言祭成湯升鼎耳以足之禘祫與四時之祭祭之明日皆為肜祭不知此肜是何祭之肜也洪範五事有貌言視聽思若貌不恭言不從視不明聽不聰思不睿各有妖異興焉雉乃野鳥不應入室今乃入宗廟之內升鼎耳而鳴孔以雉鳴在鼎耳故以為耳不聰之異也洪範五行傳云視之不明時則有羽蟲之孽聽之不聰時則有介蟲之孽言之不從時則有毛蟲之孽貌之不恭時則有鱗蟲之孽思之不睿時則有倮蟲之孽先儒多以此為羽蟲之孽非為耳不聰也漢書五行志劉歆以為鼎三足三公象也而以耳行野鳥居鼎耳是小人將居公位敗宗廟之祀也鄭云鼎三公象也又用耳行雉升鼎耳而鳴象視不明天意若云當任三公之謀以為政劉鄭雖小異其為羽蟲之孽則同與孔意異詩云雉之朝雊尚求其雌説文云雊雄雉嗚也雷始動雉乃鳴而雊其頸名高宗之訓所以訓高宗也此二篇俱是祖己之言並是訓王之事經云乃訓于王此篇亦是訓也但所訓事異分為二篇標此為發言之端故以肜日為名下篇總諌王之事故名之訓終始互相明也肆命徂后孔厯其名於伊尹之下别為之傳此髙宗之訓因序為傳不重出名者此以訓王事同因解文便作傳不為例也高宗肜日傳祭之明日又祭殷曰肜周曰繹音義繹音亦字書作襗爾雅云又祭也周曰繹商曰肜夏曰復胙疏傳正義曰釋天云繹又祭也周曰繹商曰肜孫炎曰祭之明日尋繹復祭也肜者相尋不絶之意春秋宣八年六月辛巳有事於太廟壬午猶繹榖梁傳曰繹者祭之旦日之享賓也是肜者祭之明日又祭也爾雅因繹祭而本之上世故先周後商此以上代先後故與爾雅倒也釋天又云夏曰復胙郭璞云未見所出或無此一句孔傳不言夏曰復胙於義非所須或本無此事也儀禮有司徹上大夫曰儐尸與正祭同日鄭康成注詩鳧鷖云祭天地社稷山川五祀皆有繹祭高宗肜日越有雊雉傳於肜日有雉異祖己曰惟先格王正厥事傳言至道之王遭變異正其事而異自消疏正義曰高宗既祭成湯肜祭之日於是有雊鳴之雉在於鼎耳此乃怪異之事賢臣祖己見其事而私自言曰惟先世至道之王遭遇變異則正其事而異自消也既作此言乃進言訓王史録其事以為訓王之端也傳正義曰格訓至也至道之王謂用心至極行合於道遭遇變異改修德教正其事而異自消太戊拱木武丁雊雉皆感變而懼殷道復興是異自消之驗也至道之王當無災異而云遭變消災者天或有譴告使之至道未必為道不至而致此異且此勸戒之辭不可執文以害意也此經直云祖己曰不知與誰語鄭云謂其黨王肅云言于王下句始言乃訓于王此句未是告王之辭私言告人鄭説是也乃訓于王曰惟天監下民典厥義傳祖己既言遂以道訓諫王言天視下民以義為常降年有永有不永非天夭民民中絶命傳言天之下年與民有義者長無義者不長非天欲夭民民自不修義以致絶命民有不若德不聽罪天既孚命正厥德傳不順德言無義不服罪不改修天已信命正其德謂有永有不永音義中丁仲反又如字疏正義曰祖己既私言其事乃以道訓諫於王曰惟天視此下民常用其義言以義視下觀其為義以否其下年與民有長者有不長者言與為義者長不義者短短命者非是天欲夭民民自不修義使中道絶其性命但人有為行不順德義有過不服聽罪過而不改乃致天罰非天欲夭之也天既信行賞罰之命正其馭民之德欲使有義者長不義者短王安得不行義事求長命也傳正義曰經惟言有永有不永安知由義者以上句云惟天監下民典厥義天既以義為常知命之長短莫不由義故云天之下年與民有義者長無義者不長也民有五常之性謂仁義禮智信也此獨以義為言者五常指體則別理亦相通義者宜也得其事宜五常之名皆以適宜為用故稱義可以總之也民有貴賤貧富愚智好醜不同多矣獨以夭夀為言者鄭玄云年命者蠢愚之人尤愒焉故引以諫王也愒貪也洪範五福以壽為首六極以短折為先是年夀者最是人之所貪故祖己引此以諫王也傳亦顧上經故不順德言無義也聽謂聽從故以不聽為不服罪言既為罪過而不肯改修也天已信命正其德言天自信命賞有義罰無義此事必信也天自正其德福善禍淫其德必不差也謂民有永有不永天隨其善惡而報之勸王改過修德以求永也乃曰其如台傳祖己恐王未受其言故乃復曰天道其如我所言嗚呼王司敬民罔非天胤典祀無豐于昵傳胤嗣昵近也歎以感王入其言王者主民當敬民事民事無非天所嗣常也祭祀有常不當特豐於近廟欲王因異服罪改修之音義台音怡復扶又反豐方弓反昵女乙反尸子云不避逺昵昵近也又乃禮反馬云昵考也謂禰廟也疏正義曰祖己恐其言不入王意又歎而戒之嗚呼王者主民當謹敬民事民事無非天所繼嗣以為常道者也天以其事為常王當繼天行之祀禮亦有常無得豐厚於近廟若特豐於近廟是失於常道高宗豐於近廟欲王服罪改修也傳正義曰釋詀云胤嗣繼也俱訓為繼是胤得為嗣嗣亦繼之義也釋詁云昵尼也孫炎曰即猶今也尼者近也郭璞引尸子曰悅尼而來逺是尼為近也尼與昵音義同蒸民不能自治自立君以主之是王者主民也既與民為主當敬慎民事民事無大小無非天所嗣常也言天意欲令繼嗣行之所以為常道也祭祀有常謂犧牲粢盛尊彛爼豆之數禮有常法不當特豐於近廟謂犧牲禮物多也祖己知高宗豐於近廟欲王因此雊雉之異服罪改修以從禮耳其異不必由豐近而致之也王肅亦云高宗豐於禰故有雊雉升逺祖成湯廟鼎之異序殷始咎周傳咎惡周人乘黎傳乘勝也所以見惡祖伊恐傳祖己後賢臣奔告于受傳受紂也音相亂帝乙之子嗣立暴虐無道作西伯戡黎傳戡亦勝也音義咎其九反馬云咎周者為周所咎黎力兮反國名尚書大傳作耆受如字傳云受紂也音相亂馬云受讀曰紂或曰受婦人之言故號曰受也伯亦作拍戡音堪説文作云殺也以此戡訓刺音竹甚反勝詩證反疏正義曰文王功業稍髙王兆漸著殷之朝廷之臣始畏惡周家所以畏惡之者以周人伐而勝黎邑故也殷臣祖伊見周克黎國之易恐其終必伐殷奔走告受言殷將滅史敘其事作西伯戡黎傳正義曰易繫辭云無咎者善補過也則咎是過之别名以彼過而憎惡之故咎為惡也以其勝黎所以見惡釋其見惡之由是周人勝黎之後始惡之詩毛傳云乘陵也乘駕是加陵之意故乘為勝也鄭玄云紂聞文王斷虞芮之訟又三伐皆勝而始畏惡之所言據書傳為説伏生書傳云文王受命一年斷虞芮之質二年伐邗三年伐密須四年伐犬夷五年伐耆六年伐崇七年而崩耆即黎也乘黎之前始言惡周故鄭以伐邗伐密須伐犬夷三伐皆勝始畏惡之武成篇文王誕膺天命九年乃崩則伐國之年不得如書傳所説未必見三伐皆勝始畏之祖己後賢臣此無所出正以同為祖氏知是其後明能先覺故知賢臣經云奔告于王王無諡號故序言受以明之此及泰誓武成皆呼此君為受自外書傳皆呼為紂受即紂也音相亂故字改易耳殷本紀云帝乙崩子辛立是為帝辛天下謂之紂鄭玄云紂帝乙之少子名辛帝乙愛而欲立焉號曰受德時人傳聲轉作紂也史掌書知其本故曰受與孔大同諡法云殘義損善曰紂殷時未有諡法後人見其惡為作惡義耳戡勝釋詁文孫炎曰戡強之勝也西伯戡黎西伯既戡黎傳近王圻之諸侯在上黨東北音義近附近之近圻巨依反疏正義曰鄭玄云西伯周文王也時國於岐封為雍州伯也國在西故曰西伯王肅云王者中分天下為二公總治之謂之二伯得専行征伐文王為西伯黎侯無道文王伐而勝之兩説不同孔無明解下傳云文王率諸侯以事紂非獨率一州之諸侯也論語稱三分天下有其二以服事殷謂文王也終乃三分有二豈獨一州牧乎且言西伯對東為名不得以國在西而稱西伯也蓋同王肅之説傳正義曰黎國漢之上黨郡壺關所治黎亭是也紂都朝歌王圻千里黎在朝歌之西故為近王圻之諸侯也鄭云入紂圻內文王猶尚事紂不可伐其圻內所言圻內亦無文也祖伊恐奔告于王曰天子天既訖我殷命傳文王率諸侯以事紂內秉王心紂不能制今又克有黎國迫近王圻故知天已畢訖殷之王命言將化為周音義主心于況反下注宜王者同疏傳正義曰襄四年左傳云文王率殷之叛國以事紂是率諸侯共事紂也貌雖事紂內秉王心布德行威有將王之意而紂不能制日益強大今復克有黎國迫近王圻似有天助之力故云天已畢訖殷之王命言殷祚至此而畢將欲化為周也格人元龜罔敢知吉傳至人以人事觀殷大龜以神靈考之皆無知吉疏傳正義曰格訓為至至人謂至道之人有所識解者也至人以人事觀殷大龜有神靈逆知來物故大龜以神靈考之二者皆無知殷有吉者言必凶也祖伊未必問至人親灼龜但假之以為言耳非先王不相我後人惟王淫戲用自絶傳非先祖不助子孫以王淫過戲逸用自絶於先王故天棄我不有康食不虞天性不迪率典傳以紂自絶於先王故天亦棄之宗廟不有安食於天下而王不度知天性命所在而所行不蹈循常法言多罪音義相息亮反度待洛反疏傳正義曰禮記稱萬物本於天人本於祖則天與先王俱是人君之本紂既自絶於先王亦自絶於天上經言紂自絶先王此言天棄紂互明紂自絶然後天與先王棄絶之故傳申通其意以紂自絶先王故天亦棄之亦者亦先王言先王與天俱棄之也孝經言天子得萬國之歡心以事其先王然後祭則鬼享之今紂既自絶於先王先王不有安食於天下言紂雖以天子之尊事宗廟宗廟之神不得安食也而王不度知天命所在不知己之性命當盡也而所行不蹈循常法動悉違法言多罪今我民罔弗欲喪曰天曷不降威大命不摯今王其如台傳摯至也民無不欲王之亡言天何不下罪誅之有大命宜王者何以不至王之凶害其如我所言音義摯音至本又作􅧈疏傳正義曰摯至同音故摯為至也言天何不下罪誅之恨其久行虐政欲得早殺之也有大命宜王者何以不至向望大聖之君欲令早伐紂也王之凶禍其如我之所言以王不信故審告之也王曰嗚呼我生不有命在天傳言我生有壽命在天民之所言豈能害我遂惡之辭祖伊反曰嗚呼乃罪多參在上乃能責命于天傳反報紂也言汝罪惡衆多參列於上天天誅罰汝汝能責命于天拒天誅乎殷之即喪指乃功不無戮于爾邦傳言殷之就亡指汝功事所致汝不得無死戮於殷國必將滅亡立可待音義參七南反馬云參字纍在上序殷既錯天命傳錯亂也微子作誥父師少師傳告二師而去紂音義錯七各反馬云廢也少詩照反疏正義曰殷紂既暴虐無道錯亂天命其兄微子知紂必亡以作言誥告父師箕子少師比干史敘其事而作此篇也名曰微子而不言作微子者已言微子作誥以可知而省文也傳正義曰交錯是渾亂之義故為亂也不指言紂惡而言錯亂天命者天生蒸民立君以牧之為君而無君道是錯亂天命為惡之大故舉此以見惡之極耳微子傳微圻內國名子爵為紂卿士去無道疏傳正義曰微國在圻內先儒相傳為然鄭玄以為微與箕俱在圻內孔雖不言箕亦當在圻內也王肅云微國名子爵入為王卿士肅意蓋以微為圻外故言入也微子名啓世家作開避漢景帝諱也啓與其弟仲衍皆是紂之同母庶兄史記稱微仲衍衍亦稱微者微子封微以微為氏故弟亦稱微猶如春秋之世虞公之弟稱虞叔祭公之弟稱祭叔微子若非人臣則無假憂紂亦不必須去以此知其為卿士也傳云去無道者以去見其為卿士也微子若曰父師少師傳父師太師三公箕子也少師孤卿比干微子以紂拒諫知其必亡順其事而言之殷其弗或亂正四方傳或有也言殷其不有治正四方之事將必亡我祖砥遂陳于上傳言湯致遂其功陳列於上世我用沈酗于酒用亂敗厥德于下傳我紂也沈湎酗醟敗亂湯德於後世殷罔不小大好草竊姦宄傳草野竊盜又為姦宄於內外卿士師師非度凡有辜罪乃罔恆獲傳六卿典士相師效為非法度皆有辜罪無秉常得中者小民方興相為敵讎傳卿士既亂而小人各起一方共為敵讎言不和同今殷其淪喪若涉大水其無津涯傳淪沒也言殷將沒亡如涉大水無涯際無所依就殷遂喪越至于今傳言遂喪亡於是至於今到不待久音義治直吏反沈徐直金反酗況具反以酒為凶曰酗説文作酗云酒醟湎靣善反醟音詠説文于命反酗酒也好呼報反宄音軌度如字讎市周反淪音倫徐力允反喪息浪反涯五皆反又宜佳反疏正義曰微子將欲去殷順其去事而言曰父師少帥呼二師與之言也今殷國其將不復有治正四方之事言其必滅亡也昔我祖成湯致行其道遂其功業陳列於上世矣今我紂惟用沈湎酗醟於酒用是亂敗其祖之德於下由紂亂敗之故今日殷人無不小大皆好草竊姦宄雖在朝卿士相師師為非法度之事朝廷之臣皆有辜罪乃無有一人能秉常得中者在外小人方方各起相與共為敵讎荒亂如此今殷其沒亡若涉大水其無津濟涯岸殷遂喪亡言不復久也此喪亡於是至於今到必不得更久也傳正義曰以畢命之篇王呼畢公為父師畢公時為太師也周官云太師太傳太保兹惟三公少師少傅少保曰三孤家語云比干官則少師少師是比干知太師是箕子也遍檢書傳不見箕子之名惟司馬彪注莊子云箕子名胥餘不知出何書也周官以少師為孤此傳言孤卿者孤亦卿也考工記曰外有九室九卿朝焉是三孤六卿共為九卿也比干不言封爵或本無爵或有而不言也家語云比干是紂之親則諸父知比干是紂之諸父耳箕子則無文宋世家云箕子者紂親戚也止言親戚不知為父為兄也鄭玄王肅皆以箕子為紂之諸父服虔杜預以為紂之庶兄既無正文各以意言之耳微子以紂距諫知其必亡心欲去之故順其去事而言呼二師以告之或者不定之辭其事欲然則當有是事故以或為有也鄭玄論語注亦云或方之言有也不有言無也天子天下之主所以治正四言殷其不有治正四方之事言將必亡嗜酒亂德是紂之行故知我我紂也人以酒亂若沈於水故以耽酒為沈也湎然是齊同之意詩云天不湎爾以酒鄭云天不同汝顔色以酒是湎謂酒變靣色湎然齊同無復平時之容也説文云酗醟也然則酗醟一物謂飲酒醉而發怒經言亂敗其德必有所屬上言我祖指謂成湯知言敗亂湯德於後世也上謂前世故下為後世也士訓事也故卿士為六卿典事師師言相師效為非法度之事也止言卿士以貴者尚爾見賤者皆然故王肅云卿士以下轉相師效為非法度之事也鄭云凡猶皆也傳意亦然以凡為皆言卿士以下在朝之臣其所舉動皆有辜罪無人能秉常行得中正者曰父師少師我其發出狂吾家耄遜于荒傳我念殷亡發疾生狂在家耄亂故欲遁出於荒野言愁悶今爾無指告豫顛隮若之何其傳汝無指意告我殷邦顛隕隮墜如之何其救之音義出尺遂反耄字又作旄莫報反遁徒困反徐徒頓反一音徒困反隮子細反玉篇子兮反切韻祖稽反隕于敏反疏正義曰微子既言紂亂乃問身之所宜止而復言故别加一曰父師少師更呼而告之也我念殷亡之故其心發疾生狂吾在家心內耄亂欲遜遁出於荒野今汝父師少師無指滅亡之意告我云殷邦其隕墜則當如之何其救之乎恐其留己共救之也傳正義曰狂生於心而出於外故傳以出狂為生狂應璩詩云積念發狂癡此其事也在家思念之深精神益以耄亂鄭玄云耄昏亂也在家不堪耄亂故欲遁出於荒野言愁悶之至詩云駕言出遊以寫我憂亦此意也無指意告我者謂無指殷亡之事告我言殷將隕墜欲留我救之顛謂從上而隕隮謂墜於溝壑皆滅亡之意也昭十三年左傳曰小人老而無子知隮於溝壑矣王肅云隮隮溝壑言此隮之義如左傳也父師若曰王子傳比干不見明心同省文微子帝乙元子故曰王子天毒降災荒殷邦方興沈酗于酒傳天生紂為亂是天毒下災四方化紂沈湎不可如何乃罔畏畏咈其耇長舊有位人傳言起沈湎上不畏天災下不畏賢人違戾耇老之長致仕之賢不用其教法紂故今殷民乃攘竊神祗之犧牷牲用以容將食無災傳自來而取曰攘色純曰犧體完曰牷牛羊豕曰牲器實曰用盜天地宗廟牲用相容行食之無災罪之者言政亂降監殷民用乂讎斂召敵讎不怠傳下視殷民所用治者皆重賦傷民斂聚怨讎之道而又亟行暴虐自召敵讎不解怠罪合于一多瘠罔詔傳言殷民上下有罪皆合於一法紂故使民多瘠病而無詔救之者商今其有災我興受其敗傳災滅在近我起受其敗言宗室大臣義不忍去商其淪喪我罔為臣僕詔王子出迪傳商其沒亡我二人無所為臣僕欲以死諌紂我教王子出合於道我舊云刻子王子弗出我乃顛隮傳刻病也我久知子賢言於帝乙欲立子帝乙不肯病子不得立則宜為殷後者子今若不出逃難我殷家宗廟乃隕墜無主自靖人自獻于先王傳各自謀行其志人人自獻達於先王以不失道我不顧行遁傳言將與紂俱死所執各異皆歸於仁明君子之道出處語默非一途音義見賢遍反省所景反咈扶勿反耇工口反長丁丈反注同攘如羊反因來而取曰攘竊馬云往盜曰竊神祗天曰神地曰祗犧許宜反牷音全讎如字下同徐云鄭音疇馬本作禱云數也斂力檢反馬鄭力豔反謂賦斂也徐云鄭力劒反治直吏反亟欺忌反數也又紀力反本又作極如字至也懈佳賣反瘠在益反臣僕一本無臣字舊云馬云言也刻音克馬云侵刻也難乃旦反靖馬本作清謂潔也顧音故徐音鼓疏正義曰父師亦順其事而報微子曰主子今天酷毒下災生此昏虐之君以荒亂殷之邦國紂既沈湎四方化之皆起而沈湎酗醟於酒不可如何小人皆自放恣乃無所畏上不畏天災下不畏賢人違戾其耇老之長與舊有爵位致仕之賢人今殷民乃攘竊祭祀神祗之犧牷牲用以相通容行取食之無災罪之者盜天地大祀之物用而不得罪言政亂甚也我又下視殷民所用為治民者皆讎怨斂聚之道也言重賦傷民民以在上為讎重賦乃是斂讎也既為重賦又急行暴虐此所以益招民怨是乃自召敵讎不懈怠也上下各有罪合於一紂之身言紂化之使然也故使民多瘠病而無詔救之者商今其有滅亡之災我起而受其敗商其沒亡喪滅我無所為人臣僕言不可别事他人必欲諌取死也我教王子出奔於外是道也我久云子賢言於帝乙欲立子不肯我乃病傷子不得立為王則宜終為殷後若王子不出則我殷家宗廟乃隕墜無主既勸之出即與之別云各自謀行其志人人各自獻達於先王我不顧念行遁之事明期與紂俱死傳正義曰咨二人而一人答明心同省文也鄭云少師不答志在必死然則箕子本意豈必求生乎身若求生何以不去既不顧行遁明期於必死但紂自不殺之耳若比干意異箕子則別有答安得默而不言孔解心同是也微子帝乙元子微子之命有其文也父師呼微子為王子則父師非王子矣鄭王等以為紂之諸父當是實也荒殷邦者乃是紂也而云天毒降災故言天生紂為亂本之於天天毒下災也以微子云若之何此答彼意故言四方化紂沈湎不可如何乃罔畏畏文在方興沈酗之下則此無所畏畏者謂當時四方之民也民所當畏惟畏天與人耳故知二畏者上不畏天下不畏賢人違戾者長與舊有位人即是不畏賢人故不用其教紂無所畏此民無所畏謂法紂故也攘竊同文則攘是竊類釋詁云攘因也是因其自來而取之名攘也説文云犧宗廟牲也曲禮云天子以犧牛天子祭牲必用純色故知色純曰犧也周禮牧人掌牧六牲以供祭祀之牲牷以牷為言必是體全具也故體完曰牷經傳多言三牲知牲是牛羊豕也以犧牷牲三者既為爼實則用者簠簋之實謂黍稷稻粱故云器實曰用謂粢盛也禮天曰神地曰祗舉天地則人鬼在其間矣故總云盜天地宗廟牲用也訓將為行相容行食之謂所司相通容使盜者得行盜而食之大祭祀之物物之重者盜而無罪言政亂甚也漢魏以來著律皆云敢盜郊祀宗廟之物無多少皆死為特重故也箕子身為三公下觀世俗故云下視殷民所用治者謂卿士以下是治民之官也以紂暴虐務稱上旨皆重賦傷民民既傷矣則以上為讐泰誓所謂虐我則讎是也重斂民財乃是聚斂怨讎之道既為重斂而又亟行暴虐亟急也急行暴虐欲以威民乃是自召敵讐勤行虐政是不懈怠也有災與淪喪一事而重出文者上言商今其有災我興受其敗逆言災雖未至至則已必受禍此言商其淪喪我為臣僕豫言殷滅之後言已不事異姓辭有二意故重出其文我無所為臣僕言不能與人為臣僕必欲以死諫紂但箕子之諌值紂怒不甚故得不死耳我教王子出合於道保全身命終為殷後使宗廟有主享祀不絶是合其道也刻者傷害之意故為病也吕氏春秋仲冬紀云紂之母生微子啓與仲衍其時猶尚為妾改而為妻後生紂紂之父欲立微子啓為太子太史據法而爭曰有妻之子不可立妾之子故立紂為後於時箕子蓋謂請立啓而帝乙不聽今追恨其事我久知子賢言於帝乙欲立子為太子而帝乙不肯我病子不得立則宜為殷後不肯遁以求生言將與紂俱死也或去或留所執各異皆歸於仁孔子稱殷有三仁焉是皆歸於仁也易繫辭曰君子之道或出或處或默或語是非一途也何晏云仁者愛人三人行異而同稱仁者以其俱在憂亂寧民尚書注疏卷九尚書注疏卷九考證説命上傳始求得而命之王樵曰命官有辭自唐虞有之少僅一言多或數言止於當時靣命有書自説命始乃審厥象俾以形旁求於天下傳審所夢之人刻其形象臣召南按傳言刻其形象是刻木非繪圖也疏並無一語解刻字後文引皇甫謐云使百工寫其形象是作繪圖解也疑傳刻字是則字之訛説築傅巖之野惟肖傳傅氏之巖在虞虢之界水經注曰沙澗水出虞山東南徑傅巖歷傅説隱室前俗謂之聖人窟孔安國傳傅説隱於虞虢之間即此處也地理志釋今山西乎陸縣東北二十五里俗名隱賢社又傳説賢而隱代胥靡築之以供食何孟春曰孟子言傅説舉於版築之間墨翟書曰傅説衣褐帶索傭築於傅巖孔傳謂代胥靡以供食即墨之所謂傭也臣召南按此説可以補疏所不及賈誼賦曰傳説胥靡乃相武丁史記曰説為胥靡築於傅險皆實言説曾犯刑此蓋傳聞失實也疏遂以傅險姓之以字監本作令今從殷本紀原文改正明王奉若天道建邦設都疏猶王官之伯率領諸侯也臣照按王官之伯二伯也二伯分掌東西故配日月惟干戈省厥躬傳兵不可任非其才疏省其身堪將帥然後授之臣召南按傳疏解作慎選將才於經文省厥躬義終未協且古制卿士大夫即是將帥文武之途不分上句言衣裳在笥已該括矣朱子謂干戈施於人而必省自己之是非是也台小子舊學於甘盤疏君奭傳曰高宗即位甘盤佐之後有傅説鄭曉曰周公數六臣皆商前王舊臣輔後王者説則高宗所求非其父小乙所遺也周公留召公專述舊臣故數盤而不及説説曰王人求多聞時惟建事傳王者求多聞以立事臣召南按傳意是王人求多聞為一句也其實王字當讀斷如禹曰帝豫何言帝字自為一句學於古訓乃有獲朱子曰經籍言學字自説命始王應麟曰仲虺之誥言仁之始也湯誥言性之始也太甲言誠之始也説命言學之始也皆見於商書惟學遜志務時敏臣召南按學記引説命此文作敬孫務時敏鄭注敬道孫業也引斆學半作學學半鄭注言學人乃益已之學半引念終始典於學鄭注典經也言學之不舍業也鄭雖不見古文其解亦自暗合高宗肜日序高宗祭成湯有飛雉升鼎耳而雊蔡沈曰蓋祭禰廟也序言湯廟非是金履祥曰蓋髙宗之廟祖庚肜祭之曰有雊雉之異也序非是臣照按飛雉之異史記殷本紀及封禪書漢書五行志皆據此序謂武丁因災恐懼修德中興先儒並無異論金氏因經文首句即稱高宗知此事是祖庚之事意蓋謂信小序不如信經文也顧書不必作於高宗時後史所記亦何不可史記云子帝祖庚立祖己嘉武丁之以祥雉為德立其廟為高宗遂作高宗肜日及訓然則高宗於肜日越有雊雉非祭高宗之肜日也高宗二字讀斷其義自明西伯既戡黎傳在上黨東北疏黎國漢之土黨郡壺關所治黎亭是也括地志故黎城黎侯國在潞州黎城縣東北八十里王應麟曰商都朝歌黎在上黨壺關乃河朔險要之地黎亡而商震矣周以商墟封衛狄人迫逐黎侯衛不能救而式微旄邱之詩作衛亦為狄所滅衛之滅猶商之亡也秦拔上黨而趙韓危唐平澤潞而三鎮服形勢豈可忽哉臣召南按疏所治黎亭所治二字疑衍地理志上黨郡壺關縣注引應劭曰黎侯國也今黎亭是後書郡國志曰壺關有黎亭故黎國劉昭注曰文王戡黎即此然則黎亭是壺關縣鄉亭之名非所治也祖伊恐傳文王率諸侯以事紂內秉王心紂不能制疏貌雖事紂內秉王心王應麟曰孔傳豈知文王之心哉文王之德之純心與貌異乎微子傳微圻內國名地理今釋今潞安府潞城縣東北十五里有微子鎮即寰宇記所謂微子城在潞東北者也尚書注疏卷九考證
